  {q:'[ข้อสอบ 2567] นายเพชรยกที่นาให้นายเศรษฐี ทำให้เจ้าหนี้นายเพชรบังคับคดีไม่ได้ เจ้าหนี้จะทำอย่างไร?',a:'ขอให้ศาลเพิกถอนการฉ้อฉล ม.237',d:'หลักเกณฑ์ ม.237: (1)มีหนี้อยู่ก่อน (2)ทำนิติกรรมกับบุคคลที่สาม (3)ทำให้เจ้าหนี้เสียเปรียบ (4)รู้ว่าเจ้าหนี้เสียเปรียบ ถ้ายกโดยเสน่หา → ไม่ต้องพิสูจน์ข้อ 4 เพิกถอนได้เลย ม.240: ฟ้องภายใน 1 ปี/10 ปี',star:3,exam:true},
  {q:'[ข้อสอบ 2566/2567] นายรัก/รุ่ง/เรืองเป็นลูกหนี้ร่วม 300,000 บาท นายรักชำระครบ ผลต่อนายรุ่ง-เรืองเป็นอย่างไร?',a:'นายรุ่งและนายเรืองหลุดพ้น แต่นายรักไล่เบี้ยได้คนละ 100,000',d:'ม.291: เจ้าหนี้เรียกจากคนใดก็ได้ ม.292: คนหนึ่งชำระครบ → ทุกคนหลุดพ้น นายรักใช้สิทธิรับช่วง ม.229(1) ไล่เบี้ยจากนายรุ่ง-เรืองได้คนละ 100,000 บาท',star:3,exam:true},

// ==================== COMPONENTS ====================
function Stars({n}) {
  return <span style={{color:'#B5986A'}}>{'⭐'.repeat(n)}</span>;
}

function SummaryTab() {
  return (
    <div style={{padding:'8px 0'}}>
      {summaryData.map(sec=>(
        <Card key={sec.key} size="small"
          style={{marginBottom:16,background:C.surface,borderColor:C.border}}
          title={<span style={{color:C.text,fontWeight:600,fontFamily:'Noto Sans Thai,sans-serif'}}>{sec.title}</span>}
          extra={<Space wrap>{sec.tags.map(([l,c],i)=><Tag key={i} color={c}>{l}</Tag>)}</Space>}
        >
          {sec.content()}
        </Card>
      ))}
    </div>
  );
}

function FlashcardTab() {
  const [idx,setIdx]=React.useState(0);
  const [flipped,setFlipped]=React.useState(false);
  const [score,setScore]=React.useState({correct:0,wrong:0});
  const [filter,setFilter]=React.useState('all');
  const [order,setOrder]=React.useState(flashcards.map((_,i)=>i));

  const filtered=React.useMemo(()=>{
    let arr=flashcards.map((c,i)=>({...c,origIdx:i}));
    if(filter==='exam') arr=arr.filter(c=>c.exam);
    if(filter==='star3') arr=arr.filter(c=>c.star===3);
    return arr;
  },[filter]);

  const orderedCards=React.useMemo(()=>order.map(i=>filtered[i]||filtered[0]).filter(Boolean),[order,filtered]);
  const total=filtered.length;
  const current=filtered[idx%total];

  React.useEffect(()=>{setIdx(0);setFlipped(false);setOrder([...Array(filtered.length)].map((_,i)=>i));},[filter]);

  function shuffle(){
    const arr=[...Array(filtered.length)].map((_,i)=>i);
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    setOrder(arr);setIdx(0);setFlipped(false);
  }
  function go(dir){setIdx(i=>(i+dir+total)%total);setFlipped(false);}
  function mark(correct){setScore(s=>({...s,[correct?'correct':'wrong']:s[correct?'correct':'wrong']+1}));go(1);}

  if(!current) return <div style={{padding:40,textAlign:'center'}}><Text>ไม่มีการ์ดในตัวกรองนี้</Text></div>;

  return (
    <div style={{padding:'8px 0'}}>
      <Flex justify="center" gap={8} wrap="wrap" style={{marginBottom:12}}>
        <Button type={filter==='all'?'primary':'default'} onClick={()=>setFilter('all')}>ทั้งหมด ({flashcards.length})</Button>
        <Button type={filter==='exam'?'primary':'default'} onClick={()=>setFilter('exam')} style={{background:filter==='exam'?C.red:undefined,borderColor:filter==='exam'?C.red:undefined}}>ข้อสอบเก่า ({flashcards.filter(c=>c.exam).length})</Button>
        <Button type={filter==='star3'?'primary':'default'} onClick={()=>setFilter('star3')}>⭐⭐⭐ ({flashcards.filter(c=>c.star===3).length})</Button>
        <Button onClick={shuffle} style={{background:C.amber,borderColor:C.amber,color:'#fff'}}>🔀 สุ่ม</Button>
      </Flex>
      <div style={{textAlign:'center',marginBottom:8}}>
        <Text style={{color:C.text3}}>ข้อ {idx+1} / {total} &nbsp;|&nbsp; <Stars n={current.star}/> &nbsp;
          {current.exam&&<Tag color="red" style={{fontSize:11}}>ข้อสอบเก่า</Tag>}
        </Text>
      </div>
      <div className="fc-perspective" onClick={()=>setFlipped(f=>!f)} style={{maxWidth:700,margin:'0 auto'}}>
        <div className={`fc-card${flipped?' flipped':''}`}>
          <div className="fc-face fc-front">
            <Text style={{fontSize:15,color:C.text,lineHeight:1.7}}>{current.q}</Text>
          </div>
          <div className="fc-face fc-back">
            <div style={{textAlign:'left',width:'100%'}}>
              <Text strong style={{color:C.green,display:'block',marginBottom:4}}>{current.a}</Text>
              <Text style={{fontSize:13,color:C.text2,lineHeight:1.6}}>{current.d}</Text>
            </div>
          </div>
        </div>
      </div>
      <Text style={{display:'block',textAlign:'center',color:C.text3,fontSize:12,marginTop:4}}>แตะการ์ดเพื่อพลิกดูคำตอบ</Text>
      <Flex justify="center" gap={12} style={{marginTop:12}} wrap="wrap">
        <Button onClick={()=>go(-1)}>← ก่อนหน้า</Button>
        <Button style={{background:C.red,borderColor:C.red,color:'#fff'}} onClick={()=>mark(false)}>❌ ยังไม่รู้</Button>
        <Button style={{background:C.green,borderColor:C.green,color:'#fff'}} onClick={()=>mark(true)}>✅ รู้แล้ว</Button>
        <Button onClick={()=>go(1)}>ถัดไป →</Button>
      </Flex>
      <Flex justify="center" gap={24} style={{marginTop:12}}>
        <Statistic title="✅ รู้แล้ว" value={score.correct} valueStyle={{color:C.green,fontSize:20}}/>
        <Statistic title="❌ ยังไม่รู้" value={score.wrong} valueStyle={{color:C.red,fontSize:20}}/>
      </Flex>
    </div>
  );
}

function QuickTab() {
  return (
    <div style={{padding:'8px 0'}}>
      {quickSections.map((item,i)=>{
        if(item.divider){
          return <Divider key={i} style={{borderColor:C.borderDark,color:C.goldDark,fontWeight:700,fontFamily:'Noto Sans Thai,sans-serif'}}>{item.divider}</Divider>;
        }
        const typeStyle={
          mnem:{bg:C.purpleBg,border:C.purple,accent:C.purple},
          flow:{bg:C.cyanBg,border:C.cyan,accent:C.cyan},
          contrast:{bg:C.redBg,border:C.red,accent:C.red},
          chunk:{bg:C.blueBg,border:C.blue,accent:C.blue},
          formula:{bg:'#FFF8E7',border:C.amber,accent:C.amber},
        }[item.type]||{bg:C.surface,border:C.border,accent:C.gold};
        return (
          <div key={i} className="qc" style={{background:typeStyle.bg,border:`1px solid ${typeStyle.border}`,borderLeft:`4px solid ${typeStyle.accent}`,borderRadius:8,padding:'10px 14px',marginBottom:10}}>
            <Flex justify="space-between" align="center" style={{marginBottom:4}}>
              <Tag color="default" style={{background:typeStyle.accent,color:'#fff',border:'none',fontSize:11}}>{item.s}</Tag>
              <Text strong style={{color:C.text,fontSize:13}}>{item.t}</Text>
            </Flex>
            <Text style={{color:C.text2,fontSize:13,lineHeight:1.7,whiteSpace:'pre-line'}}>{item.b}</Text>
          </div>
        );
      })}
    </div>
  );
}

  return (
    <ConfigProvider theme={{
      algorithm:theme.defaultAlgorithm,
      token:{
        colorPrimary:C.gold,
        colorBgBase:C.bg,
        colorBgContainer:C.surface,
        colorBorder:C.border,
        colorText:C.text,
        colorTextSecondary:C.text2,
        fontFamily:"'Noto Sans Thai',sans-serif",
        borderRadius:8,
      }
    }}>
      <Layout style={{background:C.bg,minHeight:'100vh'}}>
        <Content style={{maxWidth:900,margin:'0 auto',padding:'16px 12px 40px'}}>
          <div style={{textAlign:'center',marginBottom:16,padding:'16px',background:C.surface,borderRadius:12,border:`1px solid ${C.border}`}}>
            <Title level={3} style={{color:C.goldDark,margin:0,fontFamily:'Noto Sans Thai,sans-serif'}}>⚖️ LAW2102</Title>
            <Title level={5} style={{color:C.text2,margin:'4px 0 0',fontWeight:400,fontFamily:'Noto Sans Thai,sans-serif'}}>กฎหมายแพ่งและพาณิชย์ว่าด้วยหนี้ — มหาวิทยาลัยรามคำแหง</Title>
            <div style={{marginTop:8}}>
              <Tag color="volcano">4 ข้อ × 25 คะแนน</Tag>
              <Tag color="gold">ม.194-355</Tag>
              <Tag color="green">บรรพ 2</Tag>
            </div>
          </div>
          <Tabs centered type="card" size="middle" items={[
            {key:'summary',label:'📋 สรุปเนื้อหา',children:<SummaryTab/>},
            {key:'flash',label:'🃏 Flashcard',children:<FlashcardTab/>},
            {key:'quick',label:'⚡ การ์ดจำด่วน',children:<QuickTab/>},
          ]}/>
          <div style={{textAlign:'center',marginTop:20,color:C.text3,fontSize:12}}>
            LAW2102 Review · {flashcards.length} Flashcards · ข้อสอบ 2566-2568
          </div>
        </Content>
      </Layout>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
