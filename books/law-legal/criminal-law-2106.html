<script type="text/babel" data-presets="env,react">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button,
        Row, Col, Divider, Alert, Statistic, Flex, Segmented, Radio, Progress, Steps,
        Collapse, Switch, Select, Result, Tooltip, Badge, Empty } = antd;

const { useState, useEffect, useRef, useMemo } = React;

/* ============ PALETTE (โทนเลือดหมู–ดินเผา เฉพาะวิชาอาญา) ============ */
const C = {
  crimson:'#9A5A4C', crimsonDark:'#7C4437', crimsonLight:'#C79E90',
  clay:'#A8674B', clayDark:'#7E4E36',
  bg:'#F7F1EC', surface:'#EFE6DF', surface2:'#E8DBD2', surface3:'#F2E9E2',
  border:'#DFCEC4', borderDark:'#C79E90',
  text:'#3B2F2C', text2:'#5C4B45', text3:'#7C6A63',
  white:'#FBF8F5',
  green:'#5D8A66', greenBg:'#EFF5F0',
  red:'#B85555', redBg:'#F5ECEA',
  purple:'#7B6B8A', purpleBg:'#F0ECF3',
  blue:'#5B7A9E', blueBg:'#ECF0F5',
  cyan:'#5B8A8A', cyanBg:'#ECF2F2',
};

/* ============ SHARED HELPERS ============ */
const Stars = ({n}) => <span style={{color:C.clay, letterSpacing:1}}>{'★'.repeat(n)}<span style={{color:C.border}}>{'★'.repeat(3-n)}</span></span>;

const Sec = ({children}) => (
  <span className="sec-badge" style={{background:C.surface2, color:C.crimsonDark, padding:'1px 8px', borderRadius:7, border:`1px solid ${C.border}`, whiteSpace:'nowrap'}}>ม.{children}</span>
);

const Pill = ({color, bg, children}) => (
  <span className="tag-chip" style={{background:bg, color:color, border:`1px solid ${color}33`}}>{children}</span>
);

const Box = ({tone='crimson', title, icon, children, style}) => {
  const map = {
    green:[C.green,C.greenBg], red:[C.red,C.redBg], blue:[C.blue,C.blueBg],
    purple:[C.purple,C.purpleBg], cyan:[C.cyan,C.cyanBg], crimson:[C.crimsonDark,C.surface3]
  };
  const [cc,bb] = map[tone]||map.crimson;
  return (
    <div className="lesson-body" style={{background:bb, border:`1px solid ${cc}33`, borderLeft:`4px solid ${cc}`, borderRadius:12, padding:'13px 16px', margin:'10px 0', ...style}}>
      {title && <div style={{fontWeight:700, color:cc, marginBottom:6, fontSize:15}}>{icon} {title}</div>}
      <div style={{color:C.text2, fontSize:14.5}}>{children}</div>
    </div>
  );
};

/* ============ ANIMATED SVG DIAGRAM ENGINE ============ */
function DiaNode({x, y, w=150, h=62, title, sub, color, active, dim, onClick}) {
  return (
    <g style={{cursor:onClick?'pointer':'default', opacity:dim?0.28:1, transition:'opacity .4s'}} onClick={onClick} className={active?'node-pulse':''}>
      <rect x={x-w/2} y={y-h/2} width={w} height={h} rx={14}
        fill={active ? color : C.white}
        stroke={color} strokeWidth={active?3:2}
        style={{filter: active?`drop-shadow(0 4px 10px ${color}55)`:'none', transition:'all .4s'}} />
      <text x={x} y={sub? y-6 : y+5} textAnchor="middle"
        fontFamily="'Noto Sans Thai'" fontWeight="700" fontSize="15"
        fill={active ? C.white : color}>{title}</text>
      {sub && <text x={x} y={y+14} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="11"
        fill={active ? C.white : C.text3}>{sub}</text>}
    </g>
  );
}

function DiaEdge({id, d, color, label, labelX, labelY, dashed, animate, dur=2.6, reverse, width=3, dim}) {
  const op = dim ? 0.15 : 1;
  return (
    <g style={{opacity:op, transition:'opacity .4s'}}>
      <path id={id} d={d} fill="none" stroke={color} strokeWidth={width}
        strokeDasharray={dashed?'7 7':'none'} strokeLinecap="round"
        markerEnd={`url(#arrow-${id})`} />
      <defs>
        <marker id={`arrow-${id}`} markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L7,3 L0,6 Z" fill={color}/>
        </marker>
      </defs>
      {animate && !dim &&
        <circle r="6.5" fill={color}>
          <animateMotion dur={`${dur}s`} repeatCount="indefinite" keyPoints={reverse?'1;0':'0;1'} keyTimes="0;1" rotate="0">
            <mpath href={`#${id}`}/>
          </animateMotion>
        </circle>}
      {label &&
        <g>
          <rect x={labelX-label.length*4.1-8} y={labelY-13} width={label.length*8.2+16} height={22} rx={11}
            fill={C.white} stroke={color+'55'} />
          <text x={labelX} y={labelY+2} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5"
            fontWeight="600" fill={color}>{label}</text>
        </g>}
    </g>
  );
}

/* ============ บันไดความรับผิดอาญา 4 ขั้น (Concept Diagram หลักของวิชา) ============ */
function LiabilityLadder() {
  const modes = {
    full: {
      label:'ผิดเต็ม (ฆ่าโดยเจตนา)', color:C.red, stop:5,
      verdict:'ผ่านครบทุกขั้น → รับโทษเต็มตามฐานความผิด (เช่น ฆ่าผู้อื่นโดยเจตนา ม.288)',
      desc:'ตัวอย่าง: นายดำตั้งใจยิงนายแดงตาย — มีการกระทำ ครบองค์ประกอบ (เจตนาประสงค์ต่อผล ม.59) ไม่มีเหตุยกเว้นความผิด ไม่มีเหตุยกเว้น/ลดโทษ → ผิด ม.288 รับโทษเต็ม'
    },
    noact: {
      label:'ไม่มีการกระทำ', color:C.blue, stop:1,
      verdict:'ตกตั้งแต่ขั้น ๑ — ไม่ใช่ "การกระทำ" ตามกฎหมายอาญา → ไม่ต้องรับผิดเลย จบการวิเคราะห์',
      desc:'ตัวอย่าง: ละเมอ ชักเพราะโรค หรือถูกคนอื่นจับมือกดลงไป — ไม่ใช่การเคลื่อนไหวร่างกายโดยรู้สำนึกภายใต้บังคับของจิตใจ → ไม่มี "การกระทำ" ไม่ต้องไล่ขั้นต่อ'
    },
    defend: {
      label:'ป้องกัน ม.68', color:C.green, stop:3,
      verdict:'สะดุดขั้น ๓ — มีเหตุยกเว้นความผิด (ป้องกันพอสมควรแก่เหตุ) → "ไม่มีความผิด" เลย',
      desc:'ตัวอย่าง: โจรถือมีดวิ่งเข้ามาจะแทง จึงใช้ไม้ตีโจรล้ม — ครบองค์ประกอบทำร้ายก็จริง แต่เป็นการป้องกันสิทธิจากภยันตรายละเมิดกฎหมายที่ใกล้จะถึง พอสมควรแก่เหตุ → ม.68 ยกเว้นความผิด'
    },
    insane: {
      label:'วิกลจริต ม.65', color:C.purple, stop:4,
      verdict:'สะดุดขั้น ๔ — ผิดครบองค์ประกอบ แต่มีเหตุยกเว้นโทษ → มีความผิดแต่ "ไม่ต้องรับโทษ"',
      desc:'ตัวอย่าง: คนวิกลจริตที่ไม่สามารถรู้ผิดชอบหรือบังคับตนเองได้ แทงคนตาย — การกระทำครบองค์ประกอบและไม่มีเหตุยกเว้นความผิด แต่ ม.65 ยกเว้นโทษให้ (ถ้ายังรู้ผิดชอบอยู่บ้าง ศาลลดโทษได้)'
    },
    rage: {
      label:'บันดาลโทสะ ม.72', color:C.clayDark, stop:4,
      verdict:'สะดุดขั้น ๔ — เหตุลดโทษ → ยังมีความผิด แต่ศาลลงโทษน้อยกว่าที่กฎหมายกำหนดได้',
      desc:'ตัวอย่าง: ถูกข่มเหงอย่างร้ายแรงด้วยเหตุอันไม่เป็นธรรม (ถูกตบหน้าหลายทีต่อหน้าแฟน) จึงกระทำผิดต่อผู้ข่มเหง "ในขณะนั้น" → ม.72 ลดโทษ ไม่ใช่ยกเว้นความผิด'
    },
  };
  const [m, setM] = useState('full');
  const M = modes[m];
  const stages = [
    {t:'๑ การกระทำ', s:'รู้สำนึก+บังคับจิตใจ', x:95},
    {t:'๒ องค์ประกอบ', s:'ภายนอก + เจตนา/ประมาท', x:275},
    {t:'๓ ยกเว้นความผิด', s:'ป้องกัน 68 / จำเป็น 67', x:455},
    {t:'๔ ยกเว้น/ลดโทษ', s:'65 / 70 / 72 / เด็ก', x:635},
  ];
  return (
    <div>
      <div style={{textAlign:'center', marginBottom:12}}>
        <Segmented value={m} onChange={setM} size="middle"
          options={Object.keys(modes).map(k=>({label:modes[k].label, value:k}))} />
      </div>
      <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:16, padding:'8px 4px'}}>
        <svg viewBox="0 0 730 300" style={{width:'100%', height:'auto', maxHeight:380}}>
          {stages.slice(0,-1).map((st,i)=>(
            <DiaEdge key={i} id={`lad${i}`} d={`M ${st.x+78} 80 L ${stages[i+1].x-78} 80`}
              color={i+2<=M.stop? C.crimson : C.border} animate={i+2<=M.stop} dur={2}
              width={3} dim={i+2>M.stop} />
          ))}
          {stages.map((st,i)=>{
            const n = i+1;
            const passed = n < M.stop;
            const stopped = n === M.stop && M.stop<=4;
            return (
              <DiaNode key={i} x={st.x} y={80} w={155} h={64}
                title={st.t} sub={st.s}
                color={stopped ? M.color : C.crimson}
                active={stopped || (m==='full' && passed)}
                dim={n > M.stop} />
            );
          })}
          <DiaEdge id="toverdict"
            d={`M ${M.stop<=4 ? stages[M.stop-1].x : 635} 114 Q 365 190 365 208`}
            color={M.color} animate dur={2.2} width={4}
            label="ผลทางกฎหมาย" labelX={365} labelY={168} />
          <g className="breathe">
            <rect x={95} y={212} width={540} height={64} rx={16} fill={M.color+'18'} stroke={M.color} strokeWidth={2.5}/>
            <text x={365} y={238} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontWeight="800" fontSize="16" fill={M.color}>⚖️ {M.label}</text>
            <text x={365} y={262} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5" fill={C.text2}>{M.verdict.length>78 ? M.verdict.slice(0,78)+'…' : M.verdict}</text>
          </g>
        </svg>
      </div>
      <Box tone={m==='defend'?'green':(m==='insane'?'purple':(m==='noact'?'blue':'red'))} title={`โหมด: ${M.label}`} icon="🎬" style={{marginTop:12}}>
        <div style={{marginBottom:6}}>{M.desc}</div>
        <div style={{fontWeight:700}}>{M.verdict}</div>
      </Box>
    </div>
  );
}

/* ============ FlowStrip (ท่อลำดับขั้น) ============ */
function FlowStrip({steps, color=C.crimson}) {
  return (
    <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:14, padding:'16px 10px', overflowX:'auto'}}>
      <svg viewBox={`0 0 ${steps.length*180} 130`} style={{width:'100%', minWidth:steps.length*150, height:'auto'}}>
        {steps.map((s,i)=>{
          const x = 90 + i*180;
          return (
            <g key={i}>
              {i<steps.length-1 &&
                <DiaEdge id={`fs${color.replace('#','')}${i}`} d={`M ${x+62} 55 L ${x+118} 55`} color={color} animate dur={1.8} width={2.5}/>}
              <circle cx={x} cy={55} r={34} fill={s.bg||C.surface3} stroke={color} strokeWidth={2.5} className="node-pulse"/>
              <text x={x} y={60} textAnchor="middle" fontSize="24">{s.icon}</text>
              <text x={x} y={112} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5" fontWeight="600" fill={C.text2}>
                {s.t}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ============ TAB 1: FOUNDATIONS (ปูพื้นฐาน) ============ */
function FoundationsTab() {
  const vocab = [
    ['การกระทำ', 'Act', 'เคลื่อนไหวร่างกายโดยรู้สำนึก + อยู่ภายใต้บังคับของจิตใจ (ละเมอ/ชัก/ถูกบังคับกาย = ไม่ใช่)', C.blue],
    ['เจตนา', 'Intention (ม.59)', 'ประสงค์ต่อผล (มุ่งให้เกิดผลโดยตรง) หรือ ย่อมเล็งเห็นผล (รู้ว่าผลจะเกิดแน่นอน)', C.crimson],
    ['ประมาท', 'Negligence (ม.59 ว.4)', 'ปราศจากความระมัดระวังตามวิสัยและพฤติการณ์ ทั้งที่อาจใช้ได้แต่หาได้ใช้ให้เพียงพอไม่', C.clayDark],
    ['ป้องกัน', 'Self-defence (ม.68)', 'ตอบโต้ภยันตรายจากการประทุษร้ายอันละเมิดกฎหมายที่ใกล้จะถึง อย่างพอสมควรแก่เหตุ → ไม่ผิด', C.green],
    ['จำเป็น', 'Necessity (ม.67)', 'หนีภัยจากธรรมชาติ/สัตว์/สถานการณ์ โดยกระทำต่อบุคคลที่สามได้', C.cyan],
    ['พยายาม', 'Attempt (ม.80)', 'ลงมือแล้วแต่ทำไปไม่ตลอด หรือทำตลอดแล้วไม่บรรลุผล → โทษ 2 ใน 3', C.purple],
  ];
  return (
    <div className="fade-up">
      <Alert type="info" showIcon style={{marginBottom:18, background:C.blueBg, border:`1px solid ${C.blue}44`}}
        message={<span style={{fontWeight:700, color:C.blue, fontSize:16}}>เริ่มจากศูนย์ก็เข้าใจได้ 👋</span>}
        description={<span style={{color:C.text2}}>กฎหมายอาญาภาค 1 (ภาคทั่วไป) ตอบคำถามเดียว: <strong>"คนคนนี้ต้องรับผิดทางอาญาหรือไม่ และรับโทษแค่ไหน?"</strong> เครื่องมือหลักคือ "บันได 4 ขั้น" — ทุกข้อสอบต้องไต่บันไดนี้ทีละขั้นเสมอ ข้ามขั้นเมื่อไหร่ คะแนนหายเมื่อนั้น</span>} />

      <Card style={{marginBottom:18, borderColor:C.border, background:C.surface3}} bodyStyle={{padding:'18px 20px'}}>
        <Title level={4} style={{marginTop:0, color:C.text}}>🪜 โครงสร้างตอบข้อสอบ 4 ขั้น (หัวใจของทั้งวิชา)</Title>
        <Paragraph style={{color:C.text2, fontSize:15}}>
          ก่อนตอบทุกข้อ ให้ถามตัวเองตามลำดับ:
          <Pill color={C.blue} bg={C.blueBg}>๑ มี "การกระทำ" ไหม</Pill>

function IracCard({c}) {
  const [step, setStep] = useState(0);
  const parts = [
    {k:'Issue', th:'ประเด็น (I)', color:C.blue, body:c.issue},
    {k:'Rule', th:'หลักกฎหมาย (R)', color:C.purple, body:<span>{c.rule.map(x=><span key={x} style={{marginRight:6}}><Sec>{x}</Sec></span>)}<div style={{marginTop:8}}>{c.ruleText}</div></span>},
    {k:'Application', th:'วินิจฉัย — ปรับข้อเท็จจริง (A)', color:C.clayDark, body:c.application},
    {k:'Conclusion', th:'สรุป (C)', color:C.green, body:c.conclusion},
  ];
  return (
    <Card style={{marginBottom:18, borderColor:C.border}} bodyStyle={{padding:'18px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:10}}>
        <Tag color="volcano" style={{fontWeight:700}}>{c.tag}</Tag>
        <span style={{fontWeight:700, fontSize:16, color:C.text}}>{c.topic}</span>
        <Stars n={c.star}/>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3}}>
        <strong style={{color:C.crimsonDark}}>ข้อเท็จจริง: </strong>{c.facts}
      </div>
      <div style={{margin:'14px 0 6px'}}>
        {parts.slice(0,step).map((p,i)=>(
          <div key={i} className="fade-up" style={{borderLeft:`4px solid ${p.color}`, background:p.color+'12', borderRadius:'0 10px 10px 0', padding:'11px 15px', marginBottom:10}}>
            <div style={{fontWeight:700, color:p.color, marginBottom:3}}>{p.th}</div>
            <div style={{color:C.text2, fontSize:14.3}}>{p.body}</div>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center', marginTop:6}}>
        {step<4
          ? <Button type="primary" size="large" onClick={()=>setStep(step+1)}
              style={{background:parts[step].color, borderColor:parts[step].color}}>
              เปิดขั้น {parts[step].th} ▸</Button>
          : <Space>
              <Tag color="green" style={{padding:'6px 14px', fontSize:14}}>✅ ครบ IRAC แล้ว</Tag>
              <Button onClick={()=>setStep(0)}>เริ่มใหม่</Button>
            </Space>}
      </div>
    </Card>
  );
}

function IracTab() {
  return (
    <div className="fade-up">
      <Alert type="info" showIcon style={{marginBottom:16, background:C.blueBg, border:`1px solid ${C.blue}44`}}
        message={<span style={{fontWeight:700, color:C.blue}}>เดินเคสจริง ทีละขั้น Issue → Rule → Application → Conclusion</span>}
        description={<span style={{color:C.text2}}>ลองคิดคำตอบในใจก่อน แล้วค่อยกดเปิดทีละขั้น เพื่อฝึกโครงการเขียนตอบแบบได้คะแนนเต็ม — สังเกตว่าขั้น A จะขึ้นต้นด้วย "กรณีตามปัญหา…" และขั้น C ปิดด้วยธงคำตอบเสมอ</span>} />
      {iracCases.map(c=><IracCard key={c.id} c={c}/>)}
      <Box tone="crimson" title="โครงเขียนตอบให้ได้คะแนน (จำเป็นมาก)" icon="✍️">
        <b>วางหลักกฎหมาย</b> (ยกมาตราที่เกี่ยว) → <b>วินิจฉัย</b> ("กรณีตามปัญหา…เห็นว่า…" เอาข้อเท็จจริงจับกับหลักทีละองค์ประกอบ) → <b>สรุป</b> ("กล่าวโดยสรุป…" ตอบคำถามให้ตรงธง) ห้ามสลับลำดับ และไล่บันได 4 ขั้นก่อนเสมอ
      </Box>
    </div>
  );
}

function PredictCard({c}) {
  const [pick, setPick] = useState(null);
  const revealed = pick !== null;
  const correct = revealed && pick === c.answer;
  return (
    <Card className={revealed?'':'hoverlift'} style={{marginBottom:16, borderColor:revealed?(correct?C.green:C.red):C.border, borderWidth:revealed?2:1}} bodyStyle={{padding:'16px 18px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8, flexWrap:'wrap'}}>
        <span style={{fontSize:22}}>{c.icon}</span>
        <span style={{fontWeight:700, fontSize:15.5, color:C.text}}>{c.topic}</span>
        {revealed && <Tag color={correct?'green':'red'} style={{fontWeight:700}}>{correct?'🎯 ทำนายถูก!':'📖 ทำนายพลาด — อ่านเฉลยดี ๆ'}</Tag>}
      </div>
      <div style={{background:C.surface3, borderRadius:10, padding:'10px 14px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.2, marginBottom:10}}>
        {c.facts}
      </div>
      <div style={{display:'flex', gap:12, alignItems:'center', flexWrap:'wrap'}}>
        <span style={{fontWeight:700, color:C.crimsonDark, fontSize:14.5, flex:'1 1 260px'}}>❓ {c.question}</span>
        <Radio.Group value={pick} disabled={revealed} onChange={e=>setPick(e.target.value)} optionType="button" buttonStyle="solid"
          options={[{label:'ใช่',value:true},{label:'ไม่ใช่',value:false}]} />
      </div>
      {revealed && (
        <div className="fade-up" style={{marginTop:12}}>
          <div style={{marginBottom:8}}>
            {c.secs.map(s=><span key={s} style={{display:'inline-block', margin:'3px 6px 3px 0', background:correct?C.green:C.red, color:C.white, padding:'3px 12px', borderRadius:8, fontWeight:700, fontFamily:"'Noto Serif Thai'"}}>{s.length>4? s : 'มาตรา '+s}</span>)}
            <Tag color={c.answer?'blue':'purple'} style={{fontWeight:700}}>คำตอบที่ถูก: {c.answer?'ใช่':'ไม่ใช่'}</Tag>
          </div>
          <div style={{background:C.white, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`}}>
            <div style={{fontSize:12.5, color:C.text3, fontWeight:700, marginBottom:4}}>คำวินิจฉัย</div>
            <div style={{color:C.text2, fontSize:14.5, lineHeight:1.85}}>{c.verdict}</div>
          </div>
          <Box tone="red" title="กับดักข้อสอบ" icon="⚠️" style={{marginTop:10, marginBottom:0}}>{c.trap}</Box>
          <div style={{textAlign:'right', marginTop:8}}>
            <Button size="small" onClick={()=>setPick(null)}>ลองใหม่</Button>
          </div>
        </div>
      )}
    </Card>
  );
}

function Quiz() {
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const Qd = quizData[i];
  const choose = (k)=>{ if(picked!==null) return; setPicked(k); if(k===Qd.correct) setScore(s=>s+1); };
  const next = ()=>{ if(i+1>=quizData.length){ setDone(true); } else { setI(i+1); setPicked(null);} };
  const restart = ()=>{ setI(0); setPicked(null); setScore(0); setDone(false); };

  if(done) return (
    <Result status={score>=7?'success':'info'}
      title={`ได้ ${score} / ${quizData.length} คะแนน`}
      subTitle={score>=7?'เก่งมาก! บันได 4 ขั้นแม่นแล้ว พร้อมสอบ 🎉':'กลับไปทบทวนแท็บบทเรียน & Case Lab อีกรอบแล้วลองใหม่นะ 💪'}
      extra={<Button type="primary" style={{background:C.crimson, borderColor:C.crimson}} onClick={restart}>ทำใหม่อีกครั้ง</Button>}/>
  );
  return (
    <div>
      <Flex justify="space-between" align="center" style={{marginBottom:10}}>
        <Text style={{color:C.text3}}>ข้อ {i+1} / {quizData.length}</Text>
        <Tag color="volcano">คะแนน {score}</Tag>
      </Flex>
      <Progress percent={Math.round((i)/quizData.length*100)} showInfo={false} strokeColor={C.green} trailColor={C.surface2} style={{marginBottom:16}}/>
      <div style={{fontSize:17, fontWeight:600, color:C.text, marginBottom:16, lineHeight:1.7}}>{Qd.q}</div>
      <Space direction="vertical" style={{width:'100%'}} size={10}>
        {Qd.opts.map((o,k)=>{
          let bg=C.white, bd=C.border, cc=C.text;
          if(picked!==null){
            if(k===Qd.correct){ bg=C.greenBg; bd=C.green; cc=C.green; }
            else if(k===picked){ bg=C.redBg; bd=C.red; cc=C.red; }
          }
          return (
            <div key={k} onClick={()=>choose(k)} className={picked===null?'hoverlift':''}
              style={{cursor:picked===null?'pointer':'default', background:bg, border:`1.5px solid ${bd}`, borderRadius:10, padding:'12px 16px', color:cc, fontSize:15, fontWeight:500, transition:'all .25s'}}>
              <span style={{fontWeight:700, marginRight:8}}>{'กขคง'[k]}.</span>{o}
              {picked!==null && k===Qd.correct && <span style={{float:'right'}}>✅</span>}
              {picked===k && k!==Qd.correct && <span style={{float:'right'}}>❌</span>}
            </div>
          );
        })}
      </Space>
      {picked!==null && (
        <div className="fade-up">
          <Box tone={picked===Qd.correct?'green':'red'} title={picked===Qd.correct?'ถูกต้อง!':'ยังไม่ใช่'} icon={picked===Qd.correct?'🎯':'📖'} style={{marginTop:14}}>
            {Qd.exp}
          </Box>
          <div style={{textAlign:'center', marginTop:12}}>
            <Button type="primary" size="large" style={{background:C.green, borderColor:C.green}} onClick={next}>
              {i+1>=quizData.length?'ดูผลคะแนน':'ข้อถัดไป ▸'}</Button>
          </div>
        </div>
      )}
    </div>
  );
}

function FlashcardTab() {
  const [mode, setMode] = useState('all');
  const pool = useMemo(()=>{
    let p = flashcards;
    if (mode==='exam') p = flashcards.filter(c=>c.exam);
    if (mode==='star3') p = flashcards.filter(c=>c.star===3);
    return p;
  },[mode]);
  const [order, setOrder] = useState(()=>flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flip, setFlip] = useState(false);
  const [score, setScore] = useState({c:0,w:0});

  useEffect(()=>{ setOrder(pool.map((_,i)=>i)); setIdx(0); setFlip(false); setScore({c:0,w:0}); },[mode]);

  const card = pool[order[idx]] || pool[0];
  const go = (dir)=>{ setFlip(false); setTimeout(()=>setIdx(i=>Math.max(0,Math.min(pool.length-1,i+dir))),120); };
  const shuffle = ()=>{ const o=[...Array(pool.length).keys()]; for(let i=o.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]];} setOrder(o); setIdx(0); setFlip(false); };
  const mark = (ok)=>{ setScore(s=>({c:s.c+(ok?1:0), w:s.w+(ok?0:1)})); go(1); };

  if(!card) return <Empty description="ไม่มีการ์ด"/>;
  return (
    <div className="fade-up">
      <Flex justify="space-between" align="center" wrap="wrap" gap={10} style={{marginBottom:14}}>
        <Segmented value={mode} onChange={setMode}
          options={[{label:`ทั้งหมด (${flashcards.length})`,value:'all'},{label:`ออกสอบ (${flashcards.filter(c=>c.exam).length})`,value:'exam'},{label:`★★★ (${flashcards.filter(c=>c.star===3).length})`,value:'star3'}]}/>
        <Space>
          <Tag color="green">ถูก {score.c}</Tag>
          <Tag color="red">ผิด {score.w}</Tag>
          <Button size="small" onClick={shuffle}>🔀 สุ่ม</Button>
        </Space>
      </Flex>
      <div style={{textAlign:'center', color:C.text3, marginBottom:8}}>การ์ด {idx+1} / {pool.length} · โจทย์คือ "สถานการณ์" — ทายมาตราให้ได้ก่อนพลิก</div>
      <Progress percent={Math.round((idx+1)/pool.length*100)} showInfo={false} strokeColor={C.crimson} trailColor={C.surface2} style={{marginBottom:14}}/>
      <div className="fc-perspective" style={{maxWidth:640, margin:'0 auto', minHeight:280}}>
        <div className={'fc-card'+(flip?' flipped':'')} style={{minHeight:280}} onClick={()=>setFlip(f=>!f)}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.crimson}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:280}}>
            <div style={{position:'absolute', top:14, left:16}}><Stars n={card.star}/></div>
            {card.exam && <Tag color="volcano" style={{position:'absolute', top:12, right:12}}>ข้อสอบ</Tag>}
            <div style={{fontSize:12.5, color:C.text3, marginBottom:10}}>❓ สถานการณ์ — เดามาตรา (แตะเพื่อพลิก)</div>
            <div style={{fontSize:18, fontWeight:600, color:C.text, textAlign:'center', lineHeight:1.7}}>{card.q}</div>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.green}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:280}}>
            <div style={{fontSize:12.5, color:C.green, marginBottom:8, fontWeight:700}}>✅ คำตอบ</div>
            <div style={{fontSize:21, fontWeight:800, color:C.green, textAlign:'center', marginBottom:card.d?12:0}}>{card.a}</div>
            {card.d && <div style={{fontSize:14.5, color:C.text2, textAlign:'center', lineHeight:1.8}}>{card.d}</div>}
          </div>
        </div>
      </div>
      <Flex justify="center" align="center" gap={10} style={{marginTop:20}} wrap="wrap">
        <Button onClick={()=>go(-1)} disabled={idx===0}>◂ ก่อนหน้า</Button>
        {flip
          ? <Space>
              <Button danger onClick={()=>mark(false)}>✗ ยังไม่แม่น</Button>
              <Button type="primary" style={{background:C.green, borderColor:C.green}} onClick={()=>mark(true)}>✓ จำได้</Button>
            </Space>
          : <Button type="primary" style={{background:C.crimson, borderColor:C.crimson}} onClick={()=>setFlip(true)}>พลิกดูคำตอบ</Button>}
        <Button onClick={()=>go(1)} disabled={idx===pool.length-1}>ถัดไป ▸</Button>
      </Flex>
    </div>
  );
}

          <div style={{color:'#FCEDE6', fontSize:14.5}}>ห้องเรียนอินเทอร์แอกทีฟ · เรียนจากศูนย์ถึงเขียนตอบข้อสอบได้ · สไตล์ Harvard</div>

        <Layout.Content style={{padding:'22px 16px 10px'}}>

          จัดทำเพื่อการทบทวนของนักศึกษา · อ้างอิงประมวลกฎหมายอาญา มาตรา 59–63, 65, 67–70, 72, 80–81, 83–87 (และบทเฉพาะ ม.288, 290, 295) · แนวคำตอบยึดตามแนวข้อสอบรามคำแหง

    </ConfigProvider>
  );
}
