<html lang="th">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap');
body { background:#F5F0E8; line-height:1.8; font-family:'Noto Sans Thai', sans-serif; margin:0; }
.fc-perspective { perspective:1200px; }
.fc-card { position:relative; width:100%; height:320px; transform-style:preserve-3d; transition:transform 0.5s; cursor:pointer; }

.fc-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:12px; padding:28px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; overflow-y:auto; }

.qc { transition:all .2s; }
.qc:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(61,50,41,.12); }

.node.done { opacity:.95; border-color:#5D8A66; background:#EFF5F0; }

@keyframes pulse { 0%,100% { box-shadow:0 0 0 0 rgba(168,144,108,.45);} 50% { box-shadow:0 0 0 10px rgba(168,144,108,0);} }

<body>
<div id="root"></div>
<script type="text/babel">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button, Row, Col, Divider, Alert, Statistic, Flex, Slider, InputNumber, Switch } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState, useEffect, useRef } = React;

const C = {
  gold: '#A8906C', goldDark: '#8B7355', goldLight: '#C4B49A',
  amber: '#B5986A', amberDark: '#7A6548',
  bg: '#F5F0E8', surface: '#EDE8DF', surface2: '#E5DFD4', surface3: '#F0EBE2',
  border: '#DDD3C1', borderDark: '#C4B49A',
  text: '#3D3229', text2: '#5C4F42', text3: '#7A6E62',
  white: '#FAF7F2',
  green: '#5D8A66', greenBg: '#EFF5F0',
  red: '#B85C5C', redBg: '#F5ECEA',
  purple: '#7B6B8A', purpleBg: '#F0ECF3',
  blue: '#5B7A9E', blueBg: '#ECF0F5',
  cyan: '#5B8A8A', cyanBg: '#ECF2F2',
};
const fmt = (n) => Math.round(n).toLocaleString('en-US');
const fmt1 = (n) => (Math.round(n*100)/100).toLocaleString('en-US');
const Stars = ({n}) => <span>{'⭐'.repeat(n)}</span>;
const Pop = ({v, color, prefix, suffix, f}) => <span key={String(v)} className="pop" style={{fontWeight:700, color: color||C.goldDark}}>{prefix||''}{(f||fmt)(v)}{suffix||''}</span>;

/* ============================================================
   TAB 0 — ปูพื้นก่อน (คนไม่มีพื้น)
   ============================================================ */
const CoffeeShop = () => {
  const [cups, setCups] = useState(100);
  const P = 100, V = 40, F = 9000;
  const cm = P - V;
  const profit = cm*cups - F;
  const be = F / cm;
  return (
    <Card size="small" style={{background:C.white, borderColor:C.borderDark}}
      title={<Text strong style={{color:C.text}}>☕ ลองเล่น: ร้านกาแฟของคุณ — ขายแก้วละ 100.- ต้นทุนต่อแก้ว 40.- ค่าเช่า+เงินเดือน 9,000.-/เดือน</Text>}>
      <Text style={{color:C.text2}}>เดือนนี้ขายได้: <Pop v={cups}/> แก้ว</Text>
      <Slider min={0} max={400} value={cups} onChange={setCups}/>
      <Row gutter={12}>
        <Col xs={12} md={6}><Statistic title="เงินเข้าร้าน" value={fmt(P*cups)} valueStyle={{color:C.blue, fontSize:18}}/></Col>
        <Col xs={12} md={6}><Statistic title="ค่าของ (ผันแปร)" value={fmt(V*cups)} valueStyle={{color:C.red, fontSize:18}}/></Col>
        <Col xs={12} md={6}><Statistic title="เหลือช่วยจ่ายค่าเช่า (CM)" value={fmt(cm*cups)} valueStyle={{color:C.cyan, fontSize:18}}/></Col>
        <Col xs={12} md={6}><Statistic title="กำไร/ขาดทุน" value={fmt(profit)} valueStyle={{color: profit>=0?C.green:C.red, fontSize:18}}/></Col>
      </Row>
      <Alert style={{marginTop:8}} type={profit>=0 ? 'success':'error'}
        message={profit>=0
          ? <span>เกินจุดคุ้มทุนแล้ว! ทุกแก้วที่ขายเพิ่มจากนี้ = กำไรเพิ่มแก้วละ 60.- เต็ม ๆ (เพราะค่าเช่าถูกจ่ายครบแล้ว)</span>
          : <span>ยังขาดทุนอยู่ — ทุกแก้วช่วย "อุด" ค่าเช่าได้แก้วละ 60.- ต้องขายให้ถึง <Text strong>{fmt(be)} แก้ว</Text> ถึงจะเท่าทุน (9,000 ÷ 60 = 150)</span>}/>
      <Paragraph style={{color:C.text3, marginTop:8}}>
        แค่นี้คุณเข้าใจทั้งบทแล้ว: เงินที่เหลือต่อแก้ว (60.-) คือ <strong>Contribution Margin</strong> และจำนวนแก้วที่พอดีเท่าทุน (150) คือ <strong>Break-Even Point</strong>
      </Paragraph>
    </Card>
  );
};

const vocab4 = [
  {key:1, w:'Variable cost (VC)', m:'ต้นทุนที่โตตามจำนวนที่ขาย — ขายมากจ่ายมาก เช่น ค่าเมล็ดกาแฟ ค่านม ค่าคอมมิชชั่น'},
  {key:2, w:'Fixed cost (FC/F)', m:'ต้นทุนที่นิ่งไม่ว่าขายเท่าไร เช่น ค่าเช่า เงินเดือนพนักงานประจำ ค่าเสื่อมเครื่องจักร'},
  {key:3, w:'Contribution Margin (CM)', m:'ราคาขาย − ต้นทุนผันแปร = เงินที่เหลือจากการขาย 1 หน่วยไว้ "ช่วยจ่าย" ต้นทุนคงที่ พอจ่ายครบ ที่เหลือคือกำไร'},
  {key:4, w:'Break-Even Point (BE)', m:'จุดที่รายได้รวม = ต้นทุนรวม กำไรเป็นศูนย์พอดี — ขายต่ำกว่านี้ขาดทุน สูงกว่านี้กำไร'},
  {key:5, w:'Operating Income (OI)', m:'กำไรจากการดำเนินงาน (ก่อนดอกเบี้ยและภาษี) — ตัวที่ CVP ใช้เป็น "กำไร" ตลอดทั้งบท'},
  {key:6, w:'Relevant range', m:'ช่วงปริมาณที่สมมติฐาน "เส้นตรง" ยังใช้ได้ — นอกช่วงนี้ราคา/ต้นทุนอาจเปลี่ยนพฤติกรรม'},
  {key:7, w:'Sales mix', m:'สัดส่วนจำนวนหน่วยของสินค้าแต่ละตัวที่ขาย เช่น ขายเครื่องตัดหญ้าแบบเดินตาม 3 คัน ต่อแบบนั่งขับ 2 คัน'},
  {key:8, w:'Contribution margin income statement', m:'งบกำไรขาดทุนที่จัดเรียงใหม่: ขาย − VC = CM − F = กำไร (ต่างจากงบปกติที่แยกตามหน้าที่)'},
];

const BasicsTab = () => (
  <div>
    <Card className="fadein" style={{marginBottom:16, background:C.white, borderColor:C.border}}
      title={<Text strong style={{color:C.text}}>🤔 บทนี้ตอบคำถามอะไร?</Text>}>
      <Paragraph style={{color:C.text}}>
        CVP (Cost-Volume-Profit) คือเครื่องมือถามตอบเรื่อง <Tag color="blue">ต้นทุน</Tag><Tag color="purple">ปริมาณขาย</Tag><Tag color="green">กำไร</Tag>:
        "ต้องขายกี่ชิ้นถึงเท่าทุน?" · "อยากได้กำไรเท่านี้ต้องขายเท่าไร?" · "ถ้าลดราคา/ค่าเช่าขึ้น กำไรกระทบแค่ไหน?"
      </Paragraph>
      <Paragraph style={{color:C.text}}>
        หนังสือใช้บริษัท <strong>Whittier Company</strong> ขายเครื่องตัดหญ้า คันละ $400 เป็นตัวอย่างตลอดบท — ไฟล์นี้ก็ใช้ตัวเลขชุดเดียวกัน
      </Paragraph>
    </Card>
    <div className="fadein" style={{animationDelay:'0.1s'}}><CoffeeShop/></div>
    <Card className="fadein" style={{marginTop:16, marginBottom:16, background:C.white, borderColor:C.border, animationDelay:'0.2s'}}
      title={<Text strong style={{color:C.text}}>📖 ศัพท์ที่ต้องรู้ (8 คำ)</Text>}>
      <Table size="small" pagination={false} columns={[
        {title:'คำศัพท์', dataIndex:'w', key:'w', width:260, render:t=><Text strong style={{color:C.goldDark}}>{t}</Text>},
        {title:'ความหมายแบบบ้าน ๆ', dataIndex:'m', key:'m'},
      ]} dataSource={vocab4}/>
    </Card>
    <Card className="fadein" style={{background:C.white, borderColor:C.border, animationDelay:'0.3s'}}
      title={<Text strong style={{color:C.text}}>🧭 แผนที่ของบท (เชื่อมกับการบ้านที่ทำไปแล้ว)</Text>}>
      <Table size="small" pagination={false} columns={[
        {title:'LO', dataIndex:'lo', key:'lo', width:60},
        {title:'เรื่อง', dataIndex:'t', key:'t'},
        {title:'โจทย์การบ้านที่ใช้', dataIndex:'h', key:'h'},
      ]} dataSource={[
        {key:1, lo:'LO-1', t:'จุดคุ้มทุนเป็นหน่วยและยอดขาย + CM/VC ratio', h:'ข้อ 1, 2, 3(A-C), 4A'},
        {key:2, lo:'LO-2', t:'ขายเท่าไรให้ได้กำไรเป้าหมาย', h:'ข้อ 3D, 4B'},
        {key:3, lo:'LO-3', t:'กราฟ Profit-Volume และ CVP + ข้อสมมติ', h:'(ลองในห้องทดลอง)'},
        {key:4, lo:'LO-4', t:'หลายสินค้า (sales mix, package)', h:'ข้อ 5, 6'},
        {key:5, lo:'LO-5', t:'ความเสี่ยง: Margin of Safety, Operating Leverage', h:'(เนื้อหาอ่านเพิ่มที่แนะนำไว้)'},
      ]}/>
    </Card>
  </div>
);

/* ============================================================
   TAB 1 — สรุปเนื้อหา + WATERFALL ANIMATION
   ============================================================ */
const wfSteps = [
  {label:'ยอดขาย', v:400000, color:C.blue, d:'Whittier ขาย 1,000 คัน × $400 = $400,000 — จุดตั้งต้นของทุกอย่าง'},
  {label:'− ต้นทุนผันแปร', v:325000, color:C.red, d:'1,000 คัน × $325 (DM 180 + DL 100 + VOH 25 + คอมมิชชั่น 20) = $325,000'},
  {label:'= Contribution Margin', v:75000, color:C.cyan, d:'เหลือ $75,000 (คันละ $75) — เงินก้อนนี้มีหน้าที่ "จ่ายต้นทุนคงที่ก่อน แล้วที่เหลือเป็นกำไร"'},
  {label:'− ต้นทุนคงที่', v:45000, color:C.purple, d:'FOH $15,000 + Fixed S&A $30,000 = $45,000 นิ่งเท่านี้ไม่ว่าขายกี่คัน'},
  {label:'= กำไรดำเนินงาน', v:30000, color:C.green, d:'$30,000 — ถ้า CM = F พอดี กำไรเป็น 0 นั่นแหละคือจุดคุ้มทุน (600 คัน)'},
];

const Waterfall = () => {
  const [step, setStep] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const timer = useRef(null);
  useEffect(() => {
    if (playing) {
      timer.current = setInterval(() => setStep(s => {
        if (s >= wfSteps.length-1) { setPlaying(false); return s; }
        return s+1;
      }), 1500);
    }
    return () => clearInterval(timer.current);
  }, [playing]);
  const maxV = 400000;
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>🎬 เส้นทางจากยอดขายสู่กำไร (กด Play — งบกำไรขาดทุนแบบ CM ของ Whittier)</Text>}>
      <Flex gap={8} style={{marginBottom:12}}>
        <Button type="primary" className={playing?'':'pulse'} disabled={playing} onClick={()=>{setStep(0); setPlaying(true);}}>▶ Play</Button>
        <Button onClick={()=>{setPlaying(false); setStep(-1);}}>รีเซ็ต</Button>
        <Button onClick={()=>{setPlaying(false); setStep(wfSteps.length-1);}}>แสดงทั้งหมด</Button>
      </Flex>
      <Flex gap={12} align="end" justify="center" style={{height:190, marginBottom:8}}>
        {wfSteps.map((s,i)=>(
          <div key={i} style={{textAlign:'center', width:110}}>
            <div className="wf-bar" style={{
              height: i<=step ? Math.max(10, s.v/maxV*150) : 0,
              background: s.color, opacity: i<=step?1:.0, margin:'0 auto', width:'80%'}}/>
            <Text strong style={{color: i<=step ? s.color : C.border, fontSize:12}}>{s.label}</Text><br/>
            {i<=step && <Text className="pop" strong style={{color:s.color, fontSize:13}}>${fmt(s.v)}</Text>}
          </div>
        ))}
      </Flex>
      <div style={{minHeight:56}}>
        {step>=0
          ? <Alert type="info" message={<span><Text strong>{wfSteps[step].label}: </Text>{wfSteps[step].d}</span>}/>
          : <Alert type="warning" message="โครง 5 บรรทัดนี้คือ Contribution Margin Income Statement (Cornerstone 4.1) — กระดูกสันหลังของทั้งบท"/>}
      </div>
    </Card>
  );
};

const summaryData4 = [
  {
    key:'lo1', title:'⚖️ LO-1: จุดคุ้มทุน — หน่วย & ยอดขาย', tags:[['ออกทุกครั้ง','volcano']],
    content: () => (
      <div>
        <Row gutter={12}>
          <Col xs={24} md={12}><Card size="small" style={{background:C.blueBg, borderColor:C.blue, height:'100%'}}>
            <Text strong style={{color:C.blue}}>BE (หน่วย) = F ÷ CM ต่อหน่วย</Text><br/>
            <Text style={{color:C.text}}>Whittier: 45,000 ÷ (400−325) = 45,000 ÷ 75 = <strong>600 คัน</strong> (CS 4.2)</Text>
          </Card></Col>
          <Col xs={24} md={12}><Card size="small" style={{background:C.purpleBg, borderColor:C.purple, height:'100%'}}>
            <Text strong style={{color:C.purple}}>BE (ยอดขาย) = F ÷ CM ratio</Text><br/>
            <Text style={{color:C.text}}>CM ratio = 75/400 = 18.75% → 45,000 ÷ 0.1875 = <strong>$240,000</strong> (CS 4.4) — เช็ค: 600×400 = 240,000 ✓</Text>
          </Card></Col>
        </Row>
        <Paragraph style={{color:C.text, marginTop:12}}>
          <strong>ที่มา (เข้าใจไม่ต้องท่อง):</strong> กำไร = PQ − VQ − F ตั้งกำไร = 0 → Q(P−V) = F → Q = F ÷ (P−V)
        </Paragraph>
        <Card size="small" style={{background:C.surface3, borderColor:C.borderDark}}>
          <Text strong style={{color:C.text2}}>ความสัมพันธ์ 3 กรณี (สไลด์เน้น): </Text>
          <Text style={{color:C.text}}>CM = F → กำไร 0 (คุ้มทุน) | CM &gt; F → กำไร | CM &lt; F → ขาดทุน</Text><br/>
          <Text strong style={{color:C.text2}}>อัตราส่วนคู่หู: </Text>
          <Text style={{color:C.text}}>VC ratio = 325/400 = 81.25% และ CM ratio = 18.75% → รวมกัน = 100% เสมอ (CS 4.3)</Text>
        </Card>
      </div>
    )
  },
  {
    key:'lo2', title:'🎯 LO-2: Target Income — ขายเท่าไรให้ได้กำไรตามเป้า', tags:[['ออกทุกครั้ง','volcano']],
    content: () => (
      <div>
        <Card size="small" style={{background:C.greenBg, borderColor:C.green, marginBottom:8}}>
          <Text style={{color:C.text, fontSize:16}}><strong>หน่วย = (F + Target) ÷ CM</strong>   |   <strong>ยอดขาย = (F + Target) ÷ CM ratio</strong></Text>
        </Card>
        <Paragraph style={{color:C.text}}>
          Whittier อยากได้กำไร $37,500: หน่วย = (45,000+37,500) ÷ 75 = <strong>1,100 คัน</strong> (CS 4.5)
          หรือยอดขาย = 82,500 ÷ 0.1875 = <strong>$440,000</strong> (CS 4.6) — มอง target เป็น "ต้นทุนคงที่ก้อนพิเศษ" ที่ต้องหาเพิ่ม
        </Paragraph>
        <Alert type="info" message={<span><Text strong>ทางลัดที่ข้อสอบชอบ (สไลด์ 35): </Text>Δกำไร = CM ratio × Δยอดขาย — ยอดขายเพิ่ม $40,000 → กำไรเพิ่ม 0.1875 × 40,000 = $7,500 ทันที ไม่ต้องทำงบใหม่ (F ไม่เปลี่ยน)</span>}/>
      </div>
    )
  },
  {
    key:'lo3', title:'📈 LO-3: กราฟ 2 แบบ + ข้อสมมติ 4 ข้อ', tags:[['ทฤษฎี','blue']],
    content: () => (
      <div>
        <Row gutter={12}>
          <Col xs={24} md={12}><Card size="small" style={{background:C.cyanBg, borderColor:C.cyan, height:'100%'}}>
            <Text strong style={{color:C.cyan}}>Profit-Volume Graph</Text><br/>
            <Text style={{color:C.text}}>เส้นเดียว: กำไร vs หน่วยขาย เริ่มที่ −F (ขายศูนย์ = ขาดทุนเท่าต้นทุนคงที่) ชันขึ้นทีละ CM ตัดแกนศูนย์ที่ BE</Text>
          </Card></Col>
          <Col xs={24} md={12}><Card size="small" style={{background:C.blueBg, borderColor:C.blue, height:'100%'}}>
            <Text strong style={{color:C.blue}}>CVP Graph</Text><br/>
            <Text style={{color:C.text}}>สองเส้น: รายได้ (ชัน P) กับต้นทุนรวม (เริ่ม F ชัน V) — จุดตัด = BE ซ้ายคือโซนขาดทุน ขวาคือโซนกำไร</Text>
          </Card></Col>
        </Row>
        <Card size="small" style={{background:C.redBg, borderColor:C.red, marginTop:8}}>
          <Text strong style={{color:C.red}}>ข้อสมมติ CVP 4 ข้อ (สไลด์ 39 — ออกสอบทฤษฎีบ่อย):</Text>

const CVPGraph = ({P, V, F, Q, mode}) => {
  const W=440, H=280, ml=56, mr=14, mt=14, mb=34;
  const iw = W-ml-mr, ih = H-mt-mb;
  const cm = P - V;
  const be = cm>0 ? F/cm : Infinity;
  const xmax = Math.max(Q*1.3, (isFinite(be)?be:0)*1.8, 100);
  let ymin, ymax;
  if (mode==='pv') { ymin = -F*1.15; ymax = Math.max(cm*xmax - F, F)*1.1; }
  else { ymin = 0; ymax = Math.max(P*xmax, F + V*xmax)*1.05; }
  const X = x => ml + x/xmax*iw;
  const Y = y => mt + (1 - (y-ymin)/(ymax-ymin))*ih;
  const ticksX = [0, xmax/2, xmax].map(Math.round);
  const profitQ = cm*Q - F;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', background:C.white, borderRadius:10, border:`1px solid ${C.border}`}}>
      <line x1={ml} y1={mt} x2={ml} y2={H-mb} stroke={C.text3} strokeWidth="1.5"/>
      <line x1={ml} y1={Y(0)} x2={W-mr} y2={Y(0)} stroke={C.text3} strokeWidth="1.5"/>
      {ticksX.map((t,i)=><text key={i} x={X(t)} y={H-mb+16} fontSize="10" fill={C.text3} textAnchor="middle">{fmt(t)}</text>)}
      <text x={W-mr} y={H-mb+28} fontSize="10" fill={C.text3} textAnchor="end">หน่วยขาย →</text>
      {mode==='pv' ? (
        <g>
          <line x1={X(0)} y1={Y(-F)} x2={X(xmax)} y2={Y(cm*xmax-F)} stroke={C.goldDark} strokeWidth="3"/>
          <text x={X(0)+6} y={Y(-F)-6} fontSize="10" fill={C.red}>เริ่มที่ −F = -{fmt(F)}</text>
          {isFinite(be) && be<=xmax && <g>
            <circle cx={X(be)} cy={Y(0)} r="6" fill={C.red}/>
            <text x={X(be)} y={Y(0)-10} fontSize="11" fontWeight="700" fill={C.red} textAnchor="middle">BE = {fmt(be)}</text>
          </g>}
          <line x1={X(Q)} y1={mt} x2={X(Q)} y2={H-mb} stroke={C.blue} strokeWidth="1" strokeDasharray="4 3"/>
          <circle cx={X(Q)} cy={Y(profitQ)} r="6" fill={profitQ>=0?C.green:C.red}/>
          <text x={X(Q)+8} y={Y(profitQ)+4} fontSize="11" fontWeight="700" fill={profitQ>=0?C.green:C.red}>{profitQ>=0?'กำไร ':'ขาดทุน '}{fmt(Math.abs(profitQ))}</text>
        </g>
      ) : (
        <g>
          <line x1={X(0)} y1={Y(0)} x2={X(xmax)} y2={Y(P*xmax)} stroke={C.blue} strokeWidth="3"/>
          <text x={X(xmax*0.72)} y={Y(P*xmax*0.72)-8} fontSize="11" fontWeight="700" fill={C.blue}>รายได้ (ชัน P)</text>
          <line x1={X(0)} y1={Y(F)} x2={X(xmax)} y2={Y(F+V*xmax)} stroke={C.red} strokeWidth="3"/>
          <text x={X(xmax*0.72)} y={Y(F+V*xmax*0.72)+16} fontSize="11" fontWeight="700" fill={C.red}>ต้นทุนรวม (เริ่ม F ชัน V)</text>
          {isFinite(be) && be<=xmax && <g>
            <circle cx={X(be)} cy={Y(P*be)} r="6" fill={C.goldDark}/>
            <text x={X(be)} y={Y(P*be)-10} fontSize="11" fontWeight="700" fill={C.goldDark} textAnchor="middle">BE = {fmt(be)} หน่วย</text>
          </g>}
          <line x1={X(Q)} y1={mt} x2={X(Q)} y2={H-mb} stroke={C.text3} strokeWidth="1" strokeDasharray="4 3"/>
        </g>
      )}
    </svg>
  );
};

const FlashcardTab = () => {
  const [filter, setFilter] = useState('all');
  const [order, setOrder] = useState(flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [score, setScore] = useState({ok:0, ng:0});
  const pool = order.map(i=>flashcards[i]).filter(c => filter==='all' ? true : filter==='exam' ? c.exam : c.star===3);
  const card = pool[Math.min(idx, pool.length-1)];
  const shuffle = () => { const a=[...Array(flashcards.length).keys()]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} setOrder(a); setIdx(0); setFlipped(false); setScore({ok:0,ng:0}); };
  const nav = (d) => { setFlipped(false); setIdx(i => (i + d + pool.length) % pool.length); };
  const mark = (good) => { setScore(s => good ? {...s, ok:s.ok+1} : {...s, ng:s.ng+1}); nav(1); };
  const setF = (f) => { setFilter(f); setIdx(0); setFlipped(false); };
  if (!card) return <Alert type="warning" message="ไม่มีการ์ดในโหมดนี้" />;
  return (
    <div>
      <Flex justify="space-between" wrap="wrap" gap={8} style={{marginBottom:12}}>
        <Space wrap>
          <Button type={filter==='all'?'primary':'default'} onClick={()=>setF('all')}>ทั้งหมด ({flashcards.length})</Button>
          <Button type={filter==='exam'?'primary':'default'} onClick={()=>setF('exam')}>เฉพาะแนวข้อสอบ ({flashcards.filter(c=>c.exam).length})</Button>
          <Button type={filter==='star3'?'primary':'default'} onClick={()=>setF('star3')}>⭐⭐⭐ ({flashcards.filter(c=>c.star===3).length})</Button>
        </Space>
        <Button onClick={shuffle}>🔀 สลับการ์ด</Button>
      </Flex>
      <Row gutter={16} style={{marginBottom:12}}>
        <Col span={8}><Statistic title="การ์ดที่" value={`${idx+1} / ${pool.length}`} /></Col>
        <Col span={8}><Statistic title="ตอบถูก" value={score.ok} valueStyle={{color:C.green}} /></Col>
        <Col span={8}><Statistic title="ตอบผิด" value={score.ng} valueStyle={{color:C.red}} /></Col>
      </Row>
      <div className="fc-perspective" onClick={()=>setFlipped(f=>!f)}>
        <div className={'fc-card' + (flipped ? ' flipped' : '')}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.borderDark}`}}>
            <Space direction="vertical" align="center">
              <Space>{card.exam && <Tag color="volcano">แนวข้อสอบ</Tag>}<Stars n={card.star} /></Space>
              <Title level={4} style={{color:C.text, margin:0}}>{card.q}</Title>
              <Text style={{color:C.text3}}>(คลิกเพื่อพลิกดูคำตอบ)</Text>
            </Space>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.gold}`}}>
            <Space direction="vertical" align="center">
              <Title level={4} style={{color:C.goldDark, margin:0}}>{card.a}</Title>
              <Text style={{color:C.text2}}>{card.d}</Text>
            </Space>
          </div>
        </div>
      </div>
      <Flex justify="center" gap={8} style={{marginTop:16}} wrap="wrap">
        <Button onClick={()=>nav(-1)}>← ก่อนหน้า</Button>
        <Button style={{background:C.greenBg, borderColor:C.green, color:C.green}} onClick={()=>mark(true)}>✓ ตอบถูก</Button>
        <Button style={{background:C.redBg, borderColor:C.red, color:C.red}} onClick={()=>mark(false)}>✗ ตอบผิด</Button>
        <Button onClick={()=>nav(1)}>ถัดไป →</Button>
      </Flex>
    </div>
  );
};
