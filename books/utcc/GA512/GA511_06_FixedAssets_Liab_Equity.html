<script type="text/babel" data-presets="env,react">
const { Tabs, Card, Collapse, Tag, Button, Row, Col, Progress, Alert, Steps, Drawer, FloatButton, Segmented, Radio, InputNumber } = antd;
const { useState } = React;
const money=(x)=>x.toLocaleString('en-US',{maximumFractionDigits:0});

/* ============ TAB 1 : PPE definition & cost ============ */
function PPETab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">1.1</span>นิยามสินทรัพย์ถาวร (IAS 16 / TAS 16)</h3>
      <p>ที่ดิน อาคารและอุปกรณ์ (PPE) = สินทรัพย์<b>มีตัวตน</b>ที่:</p>
      <table className="fin"><tbody>
        <tr><td>①</td><td>ถือไว้<b>ใช้ในการผลิต ให้บริการ ให้เช่า หรือเพื่อการบริหาร</b></td></tr>
        <tr><td>②</td><td>คาดว่าจะใช้<b>นานกว่า 1 รอบระยะเวลาบัญชี</b></td></tr>
      </tbody></table>
      <div className="kbox">📒 บัญชีที่เกี่ยวข้อง: <b>PPE ราคาทุน (at cost)</b> และ <b>ค่าเสื่อมราคาสะสม (Accumulated depreciation)</b></div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.2</span>เกณฑ์รับรู้ต้นทุนเป็นสินทรัพย์</h3>
      <p>รับรู้ต้นทุนเป็นสินทรัพย์ก็ต่อเมื่อ<b>เข้าครบ 2 ข้อ</b>:</p>
      <table className="fin"><tbody>
        <tr><td>①</td><td>น่าจะได้<b>ประโยชน์เชิงเศรษฐกิจในอนาคต</b>ไหลเข้ากิจการ</td></tr>
        <tr><td>②</td><td><b>วัดต้นทุนได้อย่างน่าเชื่อถือ</b></td></tr>
      </tbody></table>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.3</span>ต้นทุนรวมอะไรบ้าง (IAS 16)</h3>
      <table className="fin"><tbody>
        <tr><td>①</td><td><b>ราคาซื้อ</b> (รวมอากรขาเข้าและภาษีซื้อที่เรียกคืนไม่ได้ หลังหักส่วนลดการค้าและจำนวนที่ได้รับคืน)</td></tr>
        <tr><td>②</td><td><b>ต้นทุนทางตรงอื่นๆ</b> ที่ทำให้สินทรัพย์อยู่ในสถานที่และสภาพพร้อมใช้งานตามที่ฝ่ายบริหารต้องการ</td></tr>
        <tr><td>③</td><td><b>ประมาณการต้นทุนการรื้อ ขนย้าย และบูรณะสถานที่ตั้ง</b> ซึ่งเป็นภาระผูกพันของกิจการ</td></tr>
      </tbody></table>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.4</span>"รวมเป็นราคาทุนหรือไม่?" — 3 เคสจากสไลด์</h3>
      <Collapse items={[
        {key:'1',label:'① เครื่องควบคุมระบบผลิตสารเคมี (ตามข้อกำหนดสิ่งแวดล้อม) ที่ไม่เพิ่มปริมาณผลผลิต',children:<div>
          <Tag color="green">รวมเป็นราคาทุน (capitalize)</Tag>
          <p style={{marginTop:6,fontSize:13.5}}>แม้ไม่เพิ่มผลผลิตโดยตรง แต่เป็นสินทรัพย์ที่<b>จำเป็นเพื่อให้กิจการได้ประโยชน์จากสินทรัพย์อื่น</b> (ต้องมีเพื่อให้ดำเนินการผลิต/เก็บสารเคมีได้ตามกฎหมายสิ่งแวดล้อม) — IAS 16 ให้ capitalize</p></div>},
        {key:'2',label:'② ค่าแรง วัสดุสิ้นเปลือง อะไหล่ชิ้นเล็ก ในการซ่อมบำรุงประจำปี',children:<div>
          <Tag color="red">ไม่รวม — เป็นค่าใช้จ่าย</Tag>
          <p style={{marginTop:6,fontSize:13.5}}>การซ่อมบำรุงประจำวัน/ประจำปี (day-to-day servicing) เป็น<b>รายจ่ายฝ่ายรายได้</b> → ลงเป็นค่าใช้จ่ายทันที</p></div>},
        {key:'3',label:'③ สายการบินเปลี่ยนเก้าอี้ผู้โดยสารทุก 7 ปี ตลอดอายุเครื่องบิน 28 ปี',children:<div>
          <Tag color="green">รวมเป็นราคาทุน (capitalize)</Tag>
          <p style={{marginTop:6,fontSize:13.5}}>เป็นการเปลี่ยน<b>ส่วนประกอบ (component)</b> ที่มีอายุใช้งานต่างจากตัวเครื่องบิน → capitalize เป็นสินทรัพย์แยกและตัดค่าเสื่อมตามอายุ 7 ปี (component approach ของ IAS 16)</p></div>},
      ]}/>
      <div className="kbox">🧪 กดปุ่มลอย "ทดลอง" → <b>รวมทุน vs ค่าใช้จ่าย</b> เพื่อฝึกแยก</div>
    </div>
  </div>;
}

/* ============ TAB 2 : PPE audit procedures ============ */
function PPEAuditTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">2.1</span>แนวทางการตรวจสอบทั่วไป (สินทรัพย์ถาวร)</h3>
      <Row gutter={[8,8]}>
        {['สอบทานค่าบำรุงรักษา (Review maintenance expenses)','สอบทานความคุ้มครองประกันภัย','ตรวจนับสินทรัพย์จริง (Physical examination)','สอบทานการจัดประเภทสินทรัพย์','ทดสอบการด้อยค่า / สินทรัพย์ที่ตีราคาใหม่','สอบทานภาระผูกพันที่ต้องเปิดเผยจากการซื้อสินทรัพย์','สอบทาน/คำนวณค่าเสื่อมราคาใหม่','ตรวจโฉนดตัวจริง/ใบแสดงกรรมสิทธิ์'].map((t,i)=>
          <Col xs={24} md={12} key={i}><div style={{fontSize:13,padding:'6px 10px',background:'#f6f0e8',borderRadius:6,border:'1px solid #e6dccd'}}>✓ {t}</div></Col>)}
      </Row>
      <div className="analogy">💡 "สอบทานค่าบำรุงรักษา" สำคัญ 2 ทาง: ระวังรายจ่ายที่ควร capitalize แต่ลงเป็นค่าใช้จ่าย และรายจ่ายซ่อมที่เอาไป capitalize ผิด</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">2.2</span>กรณีซื้อ vs จำหน่ายสินทรัพย์</h3>
      <Row gutter={[10,10]}>
        <Col xs={24} md={12}><Card size="small" title="🛒 ซื้อสินทรัพย์ (Purchased)" style={{height:'100%',background:'#f0f5ee'}}>
          ได้รับการอนุมัติ · ราคาซื้อเหมาะสม · ต้นทุนถูกต้อง · ตรวจกับ<b>ใบเสร็จตัวจริง</b></Card></Col>
        <Col xs={24} md={12}><Card size="small" title="📤 จำหน่ายสินทรัพย์ (Disposal)" style={{height:'100%',background:'#fbf3ec'}}>
          ได้รับการอนุมัติ · ราคาขายเหมาะสม · ตรวจ pay-in slip/บันทึกธนาคารว่า<b>เงินเข้าบัญชีจริง</b></Card></Col>
      </Row>
    </div>
  </div>;
}

/* ============ TAB 3 : Liabilities ============ */
function LiabTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">3.1</span>ภาพรวมหนี้สิน — หัวใจคือ "ความครบถ้วน"</h3>
      <p>บัญชีที่เกี่ยวข้อง: เงินเบิกเกินบัญชีและเงินกู้ระยะสั้นจากธนาคาร · เจ้าหนี้การค้า · เงินกู้ระยะยาว · ภาระผูกพันและหนี้สินที่อาจเกิดขึ้น</p>
      <div className="warn">🎯 <b>จุดต่างสำคัญ:</b> สำหรับหนี้สิน ผู้สอบกังวลเรื่อง<b>ความครบถ้วน (Completeness)</b> มากกว่าความมีอยู่จริง (Existence) — เพราะกิจการมีแรงจูงใจ<b>ซ่อน/แสดงหนี้ต่ำเกินไป</b> (ตรงข้ามกับสินทรัพย์ที่กังวลว่าจะแสดงเกินจริง)</div>
      <div className="kbox">🧪 กดปุ่มลอย "ทดลอง" → <b>Assertion ที่เน้น</b> เพื่อฝึกว่าบัญชีไหนเน้น existence หรือ completeness</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">3.2</span>เงินเบิกเกินบัญชี & เงินกู้ระยะสั้น</h3>
      <Row gutter={[8,8]}>
        {['ส่งจดหมายยืนยันยอด','ตรวจงบกระทบยอดเงินฝากธนาคาร','ดูสัญญา OD และสัญญาเงินกู้ตัวจริง','ทดสอบการคำนวณและการรวมยอดในเอกสารสนับสนุน','ชนยอดต้นงวดกับกระดาษทำการปีก่อน','เปรียบเทียบยอดกับงบทดลองและ G/L','สอบทานเหตุผลการโอนเงินช่วงปลายงวด','อ่านรายงานการประชุม','เปรียบเทียบการเปลี่ยนแปลงยอดกับปีก่อนและงบประมาณ','เปรียบเทียบอัตราดอกเบี้ยเฉลี่ยกับอัตราจริง','สอบถามภาระผูกพันต่างๆ','ระวังดอกเบี้ยสูง/ต่ำผิดปกติเทียบกับยอดเงินกู้'].map((t,i)=>
          <Col xs={24} md={12} key={i}><div style={{fontSize:13,padding:'6px 10px',background:'#f6f0e8',borderRadius:6,border:'1px solid #e6dccd'}}>✓ {t}</div></Col>)}
      </Row>
    </div>
  </div>;
}

/* ============ TAB 4 : A/P & cut-off & FX ============ */
function APTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">4.1</span>เจ้าหนี้การค้า (Accounts Payable)</h3>
      <Row gutter={[8,8]}>
        {['ระวังเจ้าหนี้จากบุคคล/กิจการที่เกี่ยวข้องกัน','ส่งจดหมายยืนยันยอด','ทำ purchase cut-off โดยเลือก GRN (ใบรับของ) ใกล้สิ้นงวด ตรวจว่าบันทึกตรงงวด','ทดสอบการคำนวณและการรวมยอด','เปรียบเทียบการเปลี่ยนแปลงยอดกับปีก่อน/งบประมาณ (A/P ควรไปกับ inventory)','เปรียบเทียบ days in A/P กับ credit term ของ supplier','ตรวจรายการผิดปกติ','ตรวจใบลดหนี้ (credit notes)','อ่านรายงานการประชุม','ตรวจการแปลงค่าเงินตราต่างประเทศ','เทียบรายละเอียด A/P ปีนี้กับปีก่อน','เทียบอัตราส่วน A/P ต่อยอดซื้อกับปีก่อน'].map((t,i)=>
          <Col xs={24} md={12} key={i}><div style={{fontSize:13,padding:'6px 10px',background:'#f6f0e8',borderRadius:6,border:'1px solid #e6dccd'}}>✓ {t}</div></Col>)}
      </Row>
      <div className="kbox">🔁 <b>ถ้าไม่ตอบยืนยันยอด (Alternative):</b> ตรวจการจ่ายเงินภายหลังวันที่ในงบ (subsequent payment) · ตรวจ GRN ตัวจริงที่มีลายเซ็นผู้รับของ</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">4.2</span>Purchase Cut-off</h3>
      <p>เลือก<b>ใบรับของ (GRN)</b> ใกล้วันสิ้นงวด แล้วตรวจว่าบันทึกเจ้าหนี้/ซื้อ<b>ตรงงวด</b>หรือไม่ — กันการแสดงหนี้สิน/ค่าซื้อผิดงวด (มักโยงกับ inventory cut-off)</p>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">4.3</span>ซื้อสินค้าเป็นเงินตราต่างประเทศ (ตัวอย่างสไลด์)</h3>
      <p>1 ธ.ค. 20x1 บริษัท B ซื้อสินค้าจาก supplier สหรัฐ ราคา $100,000 จ่าย 1 มี.ค. 20x2 (ทำ forward contract ป้องกันความเสี่ยง, risk-free 6%/ปี)</p>
      <table className="fin">
        <thead><tr><th></th><th>1 ธ.ค. 20x1</th><th>31 ธ.ค. 20x1</th><th>1 มี.ค. 20x2</th></tr></thead>
        <tbody>
          <tr><td>Spot Rate</td><td className="num">35.00</td><td className="num">35.70</td><td className="num">36.10</td></tr>
          <tr><td>Forward Rate</td><td className="num">35.50 (90 วัน)</td><td className="num">35.90 (60 วัน)</td><td></td></tr>
        </tbody>
      </table>
      <div className="je"><b>1 ธ.ค.:</b> Dr สินค้าคงเหลือ 3,500,000 / Cr เจ้าหนี้ (USD) 3,500,000 &nbsp;(35.00 × 100,000)</div>
      <div className="je"><b>31 ธ.ค. (ปรับยอดเจ้าหนี้ตาม spot ใหม่):</b> Dr ขาดทุนจากอัตราแลกเปลี่ยน 70,000 / Cr เจ้าหนี้ (USD) 70,000 &nbsp;((35.70 − 35.00) × 100,000)</div>
      <div className="kbox">💱 เจ้าหนี้เงินตราต่างประเทศต้อง<b>แปลงค่าใหม่ ณ วันสิ้นงวด</b>ด้วย spot rate — เงินบาทอ่อน (rate สูงขึ้น) → หนี้เพิ่ม → ขาดทุนอัตราแลกเปลี่ยน<br/>🧪 กดปุ่มลอย "ทดลอง" → <b>คำนวณ FX เจ้าหนี้</b></div>
    </div>
  </div>;
}

/* ============ TAB 5 : Owners equity ============ */
function EquityTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">5.1</span>ส่วนของเจ้าของ — บัญชีที่เกี่ยวข้อง</h3>
      <table className="fin"><tbody>
        <tr><td><b>ทุน (Capital)</b></td><td>ทุนจดทะเบียน (Registered capital) · ทุนที่ออกและชำระแล้ว (Issued and paid capital)</td></tr>
        <tr><td><b>กำไรสะสม</b></td><td>Retained earnings</td></tr>
        <tr><td><b>เงินปันผล</b></td><td>Dividends</td></tr>

const CAPQUIZ=[

  {s:'เปลี่ยนเก้าอี้ผู้โดยสารเครื่องบินทุก 7 ปี (อายุเครื่อง 28 ปี)',ans:'ทุน',ex:'เปลี่ยน component ที่อายุใช้งานต่างจากตัวเครื่อง → capitalize เป็นสินทรัพย์แยก'},

  {s:'ค่าเปลี่ยนน้ำมันเครื่องและทำความสะอาดตามปกติ',ans:'ค่าใช้จ่าย',ex:'ซ่อมบำรุงปกติ ไม่เพิ่มประโยชน์อนาคต → ค่าใช้จ่าย'},
  {s:'ประมาณการค่ารื้อถอนและบูรณะสถานที่ตั้งเมื่อเลิกใช้สินทรัพย์',ans:'ทุน',ex:'IAS 16 ให้รวมประมาณการรื้อถอน/บูรณะเป็นต้นทุนสินทรัพย์'},

function CapLab(){
  const [i,setI]=useState(0);const [picked,setPicked]=useState(null);const [score,setScore]=useState(0);const [done,setDone]=useState(false);

  return <div>

      <div style={{fontWeight:700,marginBottom:4}}>{picked===q.ans?'✅ ถูกต้อง — '+q.ans:'❌ คำตอบคือ '+q.ans}</div>{q.ex}
      <div style={{marginTop:8}}><Button type="primary" size="small" style={{background:'#7d5a3c'}} onClick={next}>{i+1<CAPQUIZ.length?'ข้อถัดไป →':'ดูคะแนน'}</Button></div>
    </div>}
  </div>;
}

function FXLab(){
  const [usd,setUsd]=useState(100000);const [r0,setR0]=useState(35.00);const [r1,setR1]=useState(35.70);
  const ap0=usd*r0; const ap1=usd*r1; const diff=ap1-ap0;
  return <div>
    <Alert type="info" showIcon style={{marginBottom:12}} message="แปลงค่าเจ้าหนี้เงินตราต่างประเทศ ณ วันสิ้นงวด" description="ใช้ spot rate ปรับยอดเจ้าหนี้ → ผลต่าง = กำไร/ขาดทุนอัตราแลกเปลี่ยน"/>
    <Row gutter={[8,8]} style={{marginBottom:8}}>
      <Col xs={8}><div style={{fontSize:12.5}}>จำนวน (USD)</div><InputNumber style={{width:'100%'}} value={usd} min={0} step={10000} onChange={v=>setUsd(v||0)} formatter={v=>`${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>
      <Col xs={8}><div style={{fontSize:12.5}}>spot วันซื้อ</div><InputNumber style={{width:'100%'}} value={r0} min={0} step={0.1} onChange={v=>setR0(v||0)}/></Col>
      <Col xs={8}><div style={{fontSize:12.5}}>spot วันสิ้นงวด</div><InputNumber style={{width:'100%'}} value={r1} min={0} step={0.1} onChange={v=>setR1(v||0)}/></Col>
    </Row>
    <div className="je">เจ้าหนี้วันซื้อ = {money(usd)} × {r0} = {money(ap0)} | สิ้นงวด = {money(usd)} × {r1} = {money(ap1)}</div>
    <div style={{padding:'14px',borderRadius:10,textAlign:'center',background:diff===0?'#f2f0eb':diff>0?'#fff1f0':'#eaf6ea',border:'2px solid '+(diff>0?'#c0564a':diff<0?'#237804':'#aaa')}}>
      <div style={{fontSize:13,color:'#555'}}>ผลต่างที่ต้องปรับเจ้าหนี้</div>
      <div style={{fontSize:22,fontWeight:800,color:diff>0?'#c0564a':diff<0?'#237804':'#555'}}>{diff>0?`ขาดทุน FX ${money(diff)}`:diff<0?`กำไร FX ${money(-diff)}`:'ไม่มีผลต่าง'}</div>
    </div>
    <div className="je" style={{marginTop:8}}>{diff>0?`Dr ขาดทุนอัตราแลกเปลี่ยน ${money(diff)} / Cr เจ้าหนี้ (USD) ${money(diff)}`:diff<0?`Dr เจ้าหนี้ (USD) ${money(-diff)} / Cr กำไรอัตราแลกเปลี่ยน ${money(-diff)}`:'ไม่ต้องบันทึกปรับปรุง'}</div>
  </div>;
}

function FloatingLab(){
  const [open,setOpen]=useState(false);const [seg,setSeg]=useState('cap');
  const w=typeof window!=='undefined'?Math.min(560,window.innerWidth-16):560;
  return <React.Fragment>
    <FloatButton type="primary" onClick={()=>setOpen(true)} description="ทดลอง" shape="square" style={{right:24,bottom:24,width:58,height:58}} icon={<span style={{fontSize:20}}>🧪</span>}/>
    <Drawer open={open} onClose={()=>setOpen(false)} width={w} title="🧪 ห้องทดลองแบบโต้ตอบ" styles={{body:{paddingTop:12}}}>
      <Segmented block value={seg} onChange={setSeg} style={{marginBottom:14}} options={[{label:'🏭 รวมทุน/ค่าใช้จ่าย',value:'cap'},{label:'🎯 Assertion',value:'assert'},{label:'💱 FX เจ้าหนี้',value:'fx'}]}/>
      {seg==='cap'&&<CapLab/>}
      {seg==='assert'&&<AssertLab/>}
      {seg==='fx'&&<FXLab/>}
    </Drawer>
  </React.Fragment>;
}

function App(){
  return <div className="wrap">
    <div className="hero">
      <h1>🏭 GA511 — สินทรัพย์ถาวร หนี้สิน และส่วนของเจ้าของ</h1>
      <p>Note 6: PPE นิยาม & ต้นทุน (IAS 16) → ตรวจสอบสินทรัพย์ถาวร → หนี้สิน (เน้น Completeness) → เจ้าหนี้ & FX → ส่วนของเจ้าของ | อิงสไลด์ GA511 และ IAS 16</p>
      <p style={{marginTop:8,fontSize:13.5,background:'rgba(255,255,255,0.15)',padding:'6px 12px',borderRadius:8,display:'inline-block'}}>🧪 ปุ่มลอย "ทดลอง" — รวมทุน/ค่าใช้จ่าย · Assertion · FX เจ้าหนี้</p>
    </div>
    <Tabs size="large" items={[
      {key:'1',label:'🏭 PPE นิยาม & ต้นทุน',children:<PPETab/>},
      {key:'2',label:'🔎 ตรวจสอบ PPE',children:<PPEAuditTab/>},
      {key:'3',label:'📉 หนี้สิน (Completeness)',children:<LiabTab/>},
      {key:'4',label:'🧾 เจ้าหนี้ & FX',children:<APTab/>},
      {key:'5',label:'👥 ส่วนของเจ้าของ',children:<EquityTab/>},
      {key:'6',label:'🃏 Flashcard',children:<FlashTab/>},
      {key:'7',label:'⚡ การ์ดจำด่วน',children:<QuickTab/>},
    ]}/>
  </div>;
}
function Root(){ return <React.Fragment><App/><FloatingLab/></React.Fragment>; }
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
