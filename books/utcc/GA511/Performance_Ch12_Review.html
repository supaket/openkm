const sortItems = [
  {t:'ค่าวัตถุดิบที่จะใช้ผลิตปีหน้า', rel:true, why:'เกิดในอนาคต + เปลี่ยนตามทางเลือก (ทำเอง = จ่าย, ซื้อ = ไม่จ่าย)'},

const SunkSorter = () => {
  const [answers, setAnswers] = useState({});
  const [show, setShow] = useState(null);
  const answer = (i, val) => {
    setAnswers(a => ({...a, [i]: val}));
    setShow(i);
  };
  const score = Object.entries(answers).filter(([i,v]) => sortItems[i].rel === v).length;
  const done = Object.keys(answers).length;
  return (
    <Card size="small" style={{background:C.white, borderColor:C.borderDark}}
      title={<Text strong style={{color:C.text}}>🎮 เกมคัดต้นทุน: ข้อไหน "เกี่ยว" กับการตัดสินใจ (relevant) ข้อไหน "ไม่เกี่ยว"?</Text>}>
      {sortItems.map((it,i)=>{
        const a = answers[i];
        const correct = a !== undefined && a === it.rel;
        return (
          <Card key={i} size="small" className="sortitem" style={{marginBottom:8,
            background: a===undefined ? C.surface3 : correct ? C.greenBg : C.redBg,
            borderColor: a===undefined ? C.border : correct ? C.green : C.red}}>
            <Flex justify="space-between" align="center" gap={8} wrap="wrap">
              <Text style={{color:C.text}}>{it.t}</Text>
              <Space>
                <Button size="small" type={a===true?'primary':'default'} onClick={()=>answer(i,true)}>เกี่ยว ✓</Button>
                <Button size="small" type={a===false?'primary':'default'} onClick={()=>answer(i,false)}>ไม่เกี่ยว ✗</Button>
              </Space>
            </Flex>
            {show===i && a!==undefined && (
              <Alert style={{marginTop:6}} type={correct?'success':'error'}
                message={<span><Text strong>{correct?'ถูกต้อง! ':'ยังไม่ใช่ — '}</Text>{it.why}</span>}/>
            )}
          </Card>
        );
      })}
      <Statistic title="คะแนน" value={`${score} / ${done}`} valueStyle={{color: score===done?C.green:C.goldDark}}/>
    </Card>
  );
};

  useEffect(() => {
    if (playing) {
      timer.current = setInterval(() => setStep(s => {
        if (s >= flowNodes.length-1) { setPlaying(false); return s; }
        return s+1;
      }), 1600);
    }
    return () => clearInterval(timer.current);
  }, [playing]);
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>🎬 เส้นเรื่อง Ch.12 ใน 6 ขั้น — จากมอบอำนาจถึงวัดผลครบมิติ (กด Play)</Text>}>
      <Flex gap={8} style={{marginBottom:12}}>
        <Button type="primary" className={playing?'':'pulse'} disabled={playing} onClick={()=>{setStep(0); setPlaying(true);}}>▶ Play</Button>
        <Button onClick={()=>{setPlaying(false); setStep(-1);}}>รีเซ็ต</Button>
        <Button onClick={()=>{setPlaying(false); setStep(flowNodes.length-1);}}>แสดงทั้งหมด</Button>
      </Flex>
      <Row gutter={[8,8]}>
        {flowNodes.map((n,i)=>(
          <Col xs={12} md={8} key={i}>
            <div className={'node' + (i===step?' active':'') + (i<step?' done':'')}>
              <div style={{fontSize:20}}>{n.icon}</div>{n.t}
            </div>
          </Col>
        ))}
      </Row>
      <div style={{minHeight:56, marginTop:12}}>
        {step>=0
          ? <Alert type="info" message={<span><Text strong>{flowNodes[step].icon} {flowNodes[step].t}: </Text>{flowNodes[step].d}</span>}/>
          : <Alert type="warning" message={'Ch.12 คือเรื่องเดียวยาว ๆ: มอบอำนาจแล้วต้องวัดให้แฟร์ — ทุกหัวข้อในบทงอกออกมาจากปัญหานี้'}/>}
      </div>
    </Card>
  );
};

const ROILab = () => {
  const [oi, setOi] = useState(48000);
  const [sales, setSales] = useState(480000);
  const [assets, setAssets] = useState(300000);
  const [minRate, setMinRate] = useState(12);
  const [projROI, setProjROI] = useState(13);
  const margin = sales>0 ? oi/sales : 0;
  const turnover = assets>0 ? sales/assets : 0;
  const roi = assets>0 ? oi/assets : 0;
  const ri = oi - minRate/100*assets;
  const projRI = (projROI - minRate)/100;
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>📈 Lab 5: เครื่อง ROI / RI — และกับดักที่ทำให้ผู้จัดการปฏิเสธโครงการดี (ค่าเริ่มต้น = Celimar CS 12.1–12.2)</Text>}>
      <Row gutter={24}>
        <Col xs={24} md={12}>
          <Text style={{color:C.text2}}>Operating income: $<Pop v={oi}/></Text>
          <Slider min={0} max={150000} step={2000} value={oi} onChange={setOi}/>
          <Text style={{color:C.text2}}>Sales: $<Pop v={sales} color={C.blue}/></Text>

          <Text style={{color:C.text2}}>สินทรัพย์ดำเนินงานเฉลี่ย: $<Pop v={assets} color={C.purple}/></Text>
          <Slider min={100000} max={800000} step={10000} value={assets} onChange={setAssets}/>
          <Text style={{color:C.text2}}>อัตราขั้นต่ำของบริษัท: <Pop v={minRate} suffix="%"/></Text>
          <Slider min={5} max={20} step={0.5} value={minRate} onChange={setMinRate}/>
          <Row gutter={8}>
            <Col span={6}><Statistic title="Margin" value={(margin*100).toFixed(1)+'%'} valueStyle={{fontSize:15}}/></Col>
            <Col span={6}><Statistic title="Turnover" value={turnover.toFixed(2)} valueStyle={{fontSize:15}}/></Col>
            <Col span={6}><Statistic title="ROI" value={(roi*100).toFixed(1)+'%'} valueStyle={{fontSize:15, color:C.green}}/></Col>
            <Col span={6}><Statistic title="RI" value={fmt(ri)} valueStyle={{fontSize:15, color: ri>=0?C.green:C.red}}/></Col>
          </Row>
        </Col>
        <Col xs={24} md={12}>
          <Card size="small" style={{background:C.surface3, borderColor:C.gold}}>
            <Text strong style={{color:C.text}}>🎭 ฉากจำลองกับดัก ROI:</Text><br/>
            <Text style={{color:C.text2}}>มีโครงการใหม่เข้ามา ROI ของโครงการ = <Pop v={projROI} suffix="%"/></Text>
            <Slider min={5} max={25} step={0.5} value={projROI} onChange={setProjROI}/>
            <div style={{fontSize:14, color:C.text}}>
              มุมผู้จัดการ (ถูกวัดด้วย ROI): {projROI < roi*100
                ? <Text strong style={{color:C.red}}>ปฏิเสธ — ต่ำกว่า ROI แผนก ({(roi*100).toFixed(1)}%) เดี๋ยวฉุดค่าเฉลี่ยฉัน!</Text>
                : <Text strong style={{color:C.green}}>รับ — ดัน ROI แผนกขึ้น</Text>}<br/>
              มุมบริษัท (วัดด้วย RI): {projROI > minRate
                ? <Text strong style={{color:C.green}}>ควรรับ — ทำได้เกินขั้นต่ำ {minRate}% (RI ของโครงการเป็นบวก)</Text>

            </div>

              <Alert style={{marginTop:8}} type="error" message="ตรงนี้แหละที่สองมุมขัดกัน! โครงการดีต่อบริษัทแต่ผู้จัดการไม่เอา — เหตุผลที่ตำราแนะนำใช้ RI/EVA ประกอบ ไม่ใช่ ROI เดี่ยว ๆ"/>}

const MixLab = () => {
  const [cmX, setCmX] = useState(25);
  const [hrX, setHrX] = useState(2);
  const [cmY, setCmY] = useState(10);
  const [hrY, setHrY] = useState(0.5);
  const [hours, setHours] = useState(40000);
  const [capY, setCapY] = useState(80000);
  const perX = hrX>0 ? cmX/hrX : 0;
  const perY = hrY>0 ? cmY/hrY : 0;
  const yFirst = perY >= perX;
  const first = yFirst ? {cm:cmY, hr:hrY, cap:capY, n:'Y'} : {cm:cmX, hr:hrX, cap:Infinity, n:'X'};
  const second = yFirst ? {cm:cmX, hr:hrX, n:'X'} : {cm:cmY, hr:hrY, n:'Y'};
  const firstUnits = Math.min(first.cap, first.hr>0 ? hours/first.hr : 0);
  const hoursLeft = hours - firstUnits*first.hr;
  const secondUnits = second.hr>0 ? hoursLeft/second.hr : 0;
  const totalCM = firstUnits*first.cm + secondUnits*second.cm;
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>⛓️ Lab 6: Product Mix เมื่อชั่วโมงเครื่องมีจำกัด (ค่าเริ่มต้น = Jorgenson CS 13.6–13.7)</Text>}>
      <Row gutter={24}>
        <Col xs={24} md={12}>
          <Text style={{color:C.text2}}>เฟือง X: CM $<Pop v={cmX}/>/ตัว ใช้ <Pop v={hrX} f={fmt2}/> ชม.</Text>
          <Slider min={5} max={50} value={cmX} onChange={setCmX}/>
          <Slider min={0.5} max={4} step={0.5} value={hrX} onChange={setHrX}/>
          <Text style={{color:C.text2}}>เฟือง Y: CM $<Pop v={cmY}/>/ตัว ใช้ <Pop v={hrY} f={fmt2}/> ชม.</Text>
          <Slider min={5} max={50} value={cmY} onChange={setCmY}/>
          <Slider min={0.5} max={4} step={0.5} value={hrY} onChange={setHrY}/>
          <Text style={{color:C.text2}}>ชั่วโมงเครื่องทั้งหมด: <Pop v={hours}/> ชม. | เพดานขาย Y: <Pop v={capY}/> ตัว</Text>
          <Slider min={10000} max={80000} step={5000} value={hours} onChange={setHours}/>
          <Slider min={10000} max={120000} step={5000} value={capY} onChange={setCapY}/>
        </Col>
        <Col xs={24} md={12}>
          <Card size="small" style={{background:C.surface3, borderColor:C.gold}}>
            <div style={{fontSize:15, color:C.text}}>
              CM ต่อชั่วโมงเครื่อง: X = <Pop v={perX} f={fmt2} color={yFirst?C.text2:C.green}/> | Y = <Pop v={perY} f={fmt2} color={yFirst?C.green:C.text2}/><br/>
              → ทำ <Text strong style={{color:C.green}}>{first.n}</Text> ก่อน: <Pop v={firstUnits}/> ตัว (ใช้ {fmt(firstUnits*first.hr)} ชม.)<br/>
              เหลือ {fmt(hoursLeft)} ชม. → {second.n}: <Pop v={secondUnits}/> ตัว<br/>
              <Divider style={{margin:'8px 0'}}/>
              <Text strong style={{fontSize:18, color:C.goldDark}}>CM รวม = $</Text><span key={totalCM} className="pop" style={{fontSize:24, fontWeight:700, color:C.goldDark}}>{fmt(totalCM)}</span>

const FlashcardTab = () => {
  const [filter, setFilter] = useState('all');
  const [order, setOrder] = useState(flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [score, setScore] = useState({ok:0, ng:0});
  const pool = order.map(i=>flashcards[i]).filter(c => filter==='all' ? true : filter==='exam' ? c.exam : c.star===3);
  const card = pool[Math.min(idx, pool.length-1)];
  const shuffle = () => { const a=[...Array(flashcards.length).keys()]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} setOrder(a); setIdx(0); setFlipped(false); setScore({ok:0,ng:0}); };
  const nav = (d) => { setFlipped(false); setIdx(i => (i + d + pool.length) % pool.length); };
  const mark = (good) => { setScore(s => good ? {...s, ok:s.ok+1} : {...s, ng:s.ng+1}); nav(1); };
  const setF = (f) => { setFilter(f); setIdx(0); setFlipped(false); };
  if (!card) return <Alert type="warning" message="ไม่มีการ์ดในโหมดนี้" />;
  return (
    <div>
      <Flex justify="space-between" wrap="wrap" gap={8} style={{marginBottom:12}}>
        <Space wrap>
          <Button type={filter==='all'?'primary':'default'} onClick={()=>setF('all')}>ทั้งหมด ({flashcards.length})</Button>
          <Button type={filter==='exam'?'primary':'default'} onClick={()=>setF('exam')}>เฉพาะแนวข้อสอบ ({flashcards.filter(c=>c.exam).length})</Button>
          <Button type={filter==='star3'?'primary':'default'} onClick={()=>setF('star3')}>⭐⭐⭐ ({flashcards.filter(c=>c.star===3).length})</Button>
        </Space>
        <Button onClick={shuffle}>🔀 สลับการ์ด</Button>
      </Flex>
      <Row gutter={16} style={{marginBottom:12}}>
        <Col span={8}><Statistic title="การ์ดที่" value={`${idx+1} / ${pool.length}`} /></Col>
        <Col span={8}><Statistic title="ตอบถูก" value={score.ok} valueStyle={{color:C.green}} /></Col>
        <Col span={8}><Statistic title="ตอบผิด" value={score.ng} valueStyle={{color:C.red}} /></Col>
      </Row>
      <div className="fc-perspective" onClick={()=>setFlipped(f=>!f)}>
        <div className={'fc-card' + (flipped ? ' flipped' : '')}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.borderDark}`}}>
            <Space direction="vertical" align="center">
              <Space>{card.exam && <Tag color="volcano">แนวข้อสอบ</Tag>}<Stars n={card.star} /></Space>
              <Title level={4} style={{color:C.text, margin:0}}>{card.q}</Title>
              <Text style={{color:C.text3}}>(คลิกเพื่อพลิกดูคำตอบ)</Text>
            </Space>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.gold}`}}>
            <Space direction="vertical" align="center">
              <Title level={4} style={{color:C.goldDark, margin:0}}>{card.a}</Title>
              <Text style={{color:C.text2}}>{card.d}</Text>
            </Space>
          </div>
        </div>
      </div>
      <Flex justify="center" gap={8} style={{marginTop:16}} wrap="wrap">
        <Button onClick={()=>nav(-1)}>← ก่อนหน้า</Button>
        <Button style={{background:C.greenBg, borderColor:C.green, color:C.green}} onClick={()=>mark(true)}>✓ ตอบถูก</Button>
        <Button style={{background:C.redBg, borderColor:C.red, color:C.red}} onClick={()=>mark(false)}>✗ ตอบผิด</Button>
        <Button onClick={()=>nav(1)}>ถัดไป →</Button>
      </Flex>
    </div>
  );
};
