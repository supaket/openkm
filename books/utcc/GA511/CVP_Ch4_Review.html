<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVP Analysis — Chapter 4 Review (Cornerstones of Managerial Accounting)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/reset.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/antd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap');
body { background:#F5F0E8; line-height:1.8; font-family:'Noto Sans Thai', sans-serif; margin:0; }
.fc-perspective { perspective:1200px; }
.fc-card { position:relative; width:100%; height:320px; transform-style:preserve-3d; transition:transform 0.5s; cursor:pointer; }
.fc-card.flipped { transform:rotateY(180deg); }
.fc-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:12px; padding:28px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; overflow-y:auto; }
.fc-back { transform:rotateY(180deg); }
.qc { transition:all .2s; }
.qc:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(61,50,41,.12); }
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-track { background:#EDE8DF; }
::-webkit-scrollbar-thumb { background:#C4B49A; border-radius:5px; }
::selection { background:#DDD3C1; color:#3D3229; }
.ant-table-cell { line-height:1.9 !important; }
.step-line { padding:6px 12px; border-left:3px solid #A8906C; margin:6px 0; background:#F0EBE2; border-radius:0 8px 8px 0; }

<body>
<div id="root"></div>
<script type="text/babel">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button, Row, Col, Divider, Alert, Statistic, Flex, Collapse } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState } = React;

const C = {
  gold: '#A8906C', goldDark: '#8B7355', goldLight: '#C4B49A',
  amber: '#B5986A', amberDark: '#7A6548',
  bg: '#F5F0E8', surface: '#EDE8DF', surface2: '#E5DFD4', surface3: '#F0EBE2',
  border: '#DDD3C1', borderDark: '#C4B49A',
  text: '#3D3229', text2: '#5C4F42', text3: '#7A6E62',
  white: '#FAF7F2',
  green: '#5D8A66', greenBg: '#EFF5F0',
  red: '#B85C5C', redBg: '#F5ECEA',
  purple: '#7B6B8A', purpleBg: '#F0ECF3',
  blue: '#5B7A9E', blueBg: '#ECF0F5',
  cyan: '#5B8A8A', cyanBg: '#ECF2F2',
};

const Stars = ({n}) => <span>{'⭐'.repeat(n)}</span>;

/* ============================================================
   TAB 1 — ตัวตรวจข้อสอบ + เฉลยวิธีคิดละเอียด (6 ข้อ)
   ============================================================ */
const solutions = [
  {
    key: 'p1', title: 'ข้อ 1 — Dance Unlimited (Break-even หน่วย & ยอดขาย)',
    concept: 'Break-even พื้นฐาน (สินค้าเดียว)',
    given: ['ราคาขาย P = $50/หน่วย', 'ต้นทุนผันแปร V = $30/หน่วย', 'ต้นทุนคงที่ F = $65,000', 'แผนขาย 10,000 หน่วย (ข้อมูลลวง — ไม่ได้ใช้คำนวณจุดคุ้มทุน!)'],
    steps: [
      ['หา CM ต่อหน่วย', 'CM = P − V = 50 − 30 = $20'],
      ['A) จุดคุ้มทุน (หน่วย)', 'BE units = F ÷ CM = 65,000 ÷ 20 = 3,250 คู่'],
      ['หา CM ratio', 'CM ratio = CM ÷ P = 20 ÷ 50 = 0.40'],
      ['B) จุดคุ้มทุน (ยอดขาย)', 'BE sales = F ÷ CM ratio = 65,000 ÷ 0.40 = $162,500'],
      ['ตรวจคำตอบ', '3,250 คู่ × $50 = $162,500 ✓ ตรงกันทั้งสองวิธี'],
    ],
    answer: 'A) 3,250 คู่   B) $162,500',
    pitfall: 'อย่าเอา 10,000 หน่วยที่ "วางแผนจะขาย" มาปนกับการหาจุดคุ้มทุน — จุดคุ้มทุนขึ้นกับ F, P, V เท่านั้น',
  },
  {
    key: 'p2', title: 'ข้อ 2 — Newman Company (VC, CM, Ratio)',
    concept: 'แยกต้นทุนผันแปร/คงที่ + อัตราส่วน',
    given: ['ราคาขาย $40', 'VC ผลิต $10/หน่วย + VC ขาย $6/หน่วย', 'FC ผลิต $16,000 + FC ขาย $8,000 (ไม่ได้ใช้ในข้อนี้)', 'ผลิตขาย 2,000 หน่วย'],
    steps: [
      ['A) VC ต่อหน่วย', 'รวมต้นทุนผันแปร "ทุกประเภท" = 10 + 6 = $16'],
      ['B) CM ต่อหน่วย', 'CM = 40 − 16 = $24'],
      ['C) Variable cost ratio', 'VC ratio = 16 ÷ 40 = 0.40 = 40%'],
      ['D) CM ratio', 'CM ratio = 24 ÷ 40 = 0.60 = 60%'],
      ['เช็คความสัมพันธ์', 'VC ratio + CM ratio = 40% + 60% = 100% เสมอ ✓'],
    ],
    answer: 'A) $16   B) $24   C) 40%   D) 60%',
    pitfall: 'พลาดบ่อย: ลืมบวก variable selling cost ($6) — ต้นทุนผันแปรรวมทั้งฝ่ายผลิตและฝ่ายขาย',
  },
  {
    key: 'p3', title: 'ข้อ 3 — Music Now (Ratio + Target Profit)',
    concept: 'CM ratio + จำนวนหน่วยเพื่อกำไรเป้าหมาย',
    given: ['P = $60', 'V = $12', 'F = $24,000', 'กำไรเป้าหมาย $90,000'],
    steps: [
      ['A) VC ratio', '12 ÷ 60 = 0.20 = 20%'],
      ['B) CM ratio', '(60 − 12) ÷ 60 = 48 ÷ 60 = 0.80 = 80% (หรือ 1 − 0.20)'],
      ['C) BE ยอดขาย', 'F ÷ CM ratio = 24,000 ÷ 0.80 = $30,000'],
      ['D) หน่วยเพื่อกำไรเป้าหมาย', 'Units = (F + Target) ÷ CM = (24,000 + 90,000) ÷ 48 = 114,000 ÷ 48 = 2,375 เครื่อง'],
      ['ตรวจคำตอบ', 'ขาย 2,375×$60=142,500 | VC 2,375×$12=28,500 | CM=114,000 | หัก F 24,000 → กำไร $90,000 ✓'],
    ],
    answer: 'A) 20%   B) 80%   C) $30,000   D) 2,375 เครื่อง',
    pitfall: 'สูตร target profit คือ (F + กำไรเป้าหมาย) ÷ CM — ห้ามลืม "บวก" กำไรเข้าไปกับต้นทุนคงที่',
  },
  {
    key: 'p4', title: 'ข้อ 4 — Crisby Company (BE จากงบรวม)',
    concept: 'ใช้ CM ratio จากยอดรวม (ไม่มีข้อมูลต่อหน่วย)',
    given: ['Sales = $500,000', 'Variable costs = $100,000', 'Fixed costs = $200,000'],
    steps: [
      ['หา CM รวม', 'CM = 500,000 − 100,000 = $400,000'],
      ['หา CM ratio', '400,000 ÷ 500,000 = 0.80'],
      ['A) BE ยอดขาย', '200,000 ÷ 0.80 = $250,000'],
      ['B) ยอดขายเพื่อกำไร $40,000', '(200,000 + 40,000) ÷ 0.80 = $300,000'],
      ['ตรวจคำตอบ', 'ที่ยอดขาย 300,000: CM = 300,000×0.8 = 240,000 − F 200,000 = กำไร $40,000 ✓'],
    ],
    answer: 'A) $250,000   B) $300,000',
    pitfall: 'โจทย์ไม่มีข้อมูลต่อหน่วย → ต้องคิดเป็น "ยอดขาย (dollars)" ด้วย CM ratio เท่านั้น หาเป็นหน่วยไม่ได้',
  },
  {
    key: 'p5', title: 'ข้อ 5 — Lauren Company (2 สินค้า, Sales Mix)',
    concept: 'Multi-product BE ด้วย weighted average CM',
    given: ['X: CM = $40/หน่วย (ขาย 60%)', 'Y: CM = $60/หน่วย (ขาย 40%)', 'F = $144,000'],
    steps: [
      ['หา weighted CM ต่อหน่วย', '(0.60 × 40) + (0.40 × 60) = 24 + 24 = $48'],
      ['BE รวมทุกสินค้า', '144,000 ÷ 48 = 3,000 หน่วย'],
      ['แยกตามสัดส่วน', 'X = 3,000 × 60% = 1,800 หน่วย | Y = 3,000 × 40% = 1,200 หน่วย'],
      ['ตรวจคำตอบ', 'CM: (1,800×40) + (1,200×60) = 72,000 + 72,000 = 144,000 = F พอดี ✓'],
    ],
    answer: 'X = 1,800 หน่วย และ Y = 1,200 หน่วย',
    pitfall: 'วิธี package ก็ได้คำตอบเดียวกัน: 1 package = 3X+2Y, CM = $240 → 144,000÷240 = 600 packages → X=1,800, Y=1,200',
  },
  {
    key: 'p6', title: 'ข้อ 6 — Young Manufacturing (3 สินค้า, Package Method)',
    concept: 'Multi-product BE ด้วยวิธี package',
    given: ['ค้อน CM $12 (50%)', 'ไขควง CM $4 (30%)', 'เลื่อย CM $20 (20%)', 'F = $76,000/ปี', 'กำไรเป้าหมาย $19,000'],
    steps: [
      ['สร้าง package ตามสัดส่วน', '1 package = ค้อน 5 : ไขควง 3 : เลื่อย 2 (รวม 10 หน่วย)'],
      ['CM ต่อ package', '(5×12) + (3×4) + (2×20) = 60 + 12 + 40 = $112'],
      ['A) BE packages', '76,000 ÷ 112 = 678.57 → ปัดขึ้น 679 packages'],
      ['B) ค้อน ณ จุดคุ้มทุน', '679 × 5 = 3,395 อัน'],
      ['C) target income $19,000', '(76,000 + 19,000) ÷ 112 = 848.21 → 849 packages → 849 × 10 = 8,490 หน่วย'],
    ],
    answer: 'A) 679 packages   B) ค้อน 3,395 อัน   C) 8,490 หน่วย',
    pitfall: 'หารไม่ลงตัวให้ "ปัดขึ้น" เสมอ (ปัดลงจะยังขาดทุน/ไม่ถึงเป้า) และอย่าลืมคูณ 10 กลับเป็นหน่วยรวมในข้อ C',
  },
];

const SolutionCard = ({s}) => {
  const [show, setShow] = useState(false);
  return (
    <Card style={{ marginBottom:16, background:C.white, borderColor:C.border }}
      title={<Space wrap><Text strong style={{color:C.text}}>{s.title}</Text><Tag color="gold">{s.concept}</Tag></Space>}>
      <Text strong style={{color:C.blue}}>สิ่งที่โจทย์ให้:</Text>
      <ul style={{marginTop:4}}>{s.given.map((g,i)=><li key={i}><Text style={{color:C.text2}}>{g}</Text></li>)}</ul>
      {!show
        ? <Button type="primary" onClick={()=>setShow(true)}>👀 ลองคิดเองก่อน แล้วกดดูเฉลย</Button>
        : <div>
            <Divider style={{margin:'12px 0'}}>วิธีคิดทีละขั้น</Divider>
            {s.steps.map((st,i)=>(
              <div className="step-line" key={i}>
                <Text strong style={{color:C.goldDark}}>ขั้นที่ {i+1} — {st[0]}: </Text>
                <Text style={{color:C.text}}>{st[1]}</Text>
              </div>
            ))}
            <Alert style={{marginTop:12}} type="success" message={<Text strong>✅ คำตอบ: {s.answer}</Text>} />
            <Alert style={{marginTop:8}} type="warning" message={<span><Text strong>⚠️ จุดที่พลาดบ่อย: </Text>{s.pitfall}</span>} />
            <Button size="small" style={{marginTop:8}} onClick={()=>setShow(false)}>ซ่อนเฉลย</Button>
          </div>}
    </Card>
  );
};

const SolutionsTab = () => (
  <div>
    <Alert type="info" style={{marginBottom:16}}
      message={<Text strong>วิธีใช้: อ่านโจทย์ → คิดคำตอบเอง → กดดูเฉลยเพื่อตรวจ ทีละขั้น พร้อมจุดที่คนพลาดบ่อย</Text>} />
    {solutions.map(s => <SolutionCard key={s.key} s={s} />)}
  </div>
);

/* ============================================================
   TAB 2 — สรุปเนื้อหา + หลักการที่ต้องอ่านเพิ่ม
   ============================================================ */
const fmtTable = (cols, data) => <Table size="small" pagination={false} columns={cols} dataSource={data} style={{marginTop:8}} />;

const summaryData = [
  {
    key: 'overview', title: '📋 ภาพรวม CVP Analysis คืออะไร', tags: [['พื้นฐานต้องแม่น','volcano']],
    content: () => (
      <div>
        <Paragraph style={{color:C.text}}>
          <strong>Cost-Volume-Profit (CVP) Analysis</strong> = เครื่องมือวิเคราะห์ความสัมพันธ์ระหว่าง
          <Tag color="blue">ต้นทุน (Cost)</Tag><Tag color="purple">ปริมาณขาย (Volume)</Tag><Tag color="green">กำไร (Profit)</Tag>
          ใช้ตอบคำถามเช่น "ต้องขายกี่หน่วยถึงคุ้มทุน?" "ขายเท่าไหร่ถึงได้กำไรตามเป้า?"
        </Paragraph>
        <Card size="small" style={{background:C.greenBg, borderColor:C.green, marginBottom:8}}>
          <Text strong style={{color:C.green}}>หัวใจของบท: สมการกำไร</Text><br/>
          <Text style={{color:C.text}}>Operating Income = (P × Q) − (V × Q) − F  หรือ  กำไร = CM รวม − ต้นทุนคงที่</Text>
        </Card>
        <Card size="small" style={{background:C.redBg, borderColor:C.red}}>
          <Text strong style={{color:C.red}}>ข้อสมมติของ CVP (ออกสอบทฤษฎีบ่อย)</Text>
          <ul style={{margin:'4px 0'}}>
            <li>ราคาขายและต้นทุนผันแปรต่อหน่วย <strong>คงที่</strong> ตลอดช่วงที่วิเคราะห์ (linear)</li>
            <li>แยกต้นทุนได้ชัดเป็น <strong>ผันแปร</strong> กับ <strong>คงที่</strong></li>
            <li>ผลิต = ขาย (ไม่มีการเปลี่ยนแปลงสินค้าคงเหลือ)</li>
            <li>กรณีหลายสินค้า: <strong>sales mix คงที่</strong></li>
          </ul>
        </Card>
      </div>
    )
  },
  {
    key: 'cm', title: '💰 Contribution Margin — แกนกลางของทุกสูตร', tags: [['ออกทุกครั้ง','volcano']],
    content: () => (
      <div>
        {fmtTable(
          [{title:'แนวคิด',dataIndex:'c',key:'c'},{title:'สูตร',dataIndex:'f',key:'f'},{title:'ความหมาย',dataIndex:'m',key:'m'}],
          [
            {key:1,c:'CM ต่อหน่วย',f:'P − V',m:'ขาย 1 หน่วย เหลือเงินไป "ช่วยจ่าย" ต้นทุนคงที่เท่าไร'},
            {key:2,c:'CM รวม',f:'Sales − Total VC',m:'เงินที่เหลือทั้งหมดก่อนหักต้นทุนคงที่'},
            {key:3,c:'CM ratio',f:'CM ÷ P หรือ CM รวม ÷ Sales',m:'ยอดขาย $1 เหลือเป็น CM กี่เซนต์'},
            {key:4,c:'VC ratio',f:'V ÷ P',m:'ยอดขาย $1 เป็นต้นทุนผันแปรกี่เซนต์'},
          ]
        )}
        <Alert style={{marginTop:12}} type="info" message={<span><Text strong>ความสัมพันธ์สำคัญ: </Text>VC ratio + CM ratio = 1 เสมอ (เช่นข้อ 3: 20% + 80% = 100%) — ใช้เช็คคำตอบตัวเองได้ทันที</span>} />
        <Card size="small" style={{background:C.cyanBg, borderColor:C.cyan, marginTop:8}}>
          <Text strong style={{color:C.cyan}}>ตัวอย่าง:</Text> <Text style={{color:C.text}}>กาแฟแก้วละ 100 บาท ต้นทุนผันแปร (เมล็ด+นม+แก้ว) 40 บาท → CM = 60 บาท, CM ratio = 60% แปลว่าทุกยอดขาย 100 บาท มีเงิน 60 บาทไว้จ่ายค่าเช่าร้าน (F) และเป็นกำไร</Text>
        </Card>
      </div>
    )
  },
  {
    key: 'be', title: '⚖️ Break-Even Point — จุดคุ้มทุน 2 แบบ', tags: [['ออกทุกครั้ง','volcano']],
    content: () => (
      <div>
        <Row gutter={12}>
          <Col span={12}><Card size="small" style={{background:C.blueBg, borderColor:C.blue, height:'100%'}}>
            <Text strong style={{color:C.blue}}>แบบที่ 1: เป็นหน่วย (units)</Text><br/>
            <Text style={{color:C.text, fontSize:16}}><strong>BE units = F ÷ CM ต่อหน่วย</strong></Text><br/>
            <Text style={{color:C.text3}}>ใช้เมื่อโจทย์ให้ข้อมูล "ต่อหน่วย" (ข้อ 1A)</Text>
          </Card></Col>
          <Col span={12}><Card size="small" style={{background:C.purpleBg, borderColor:C.purple, height:'100%'}}>
            <Text strong style={{color:C.purple}}>แบบที่ 2: เป็นยอดขาย (dollars)</Text><br/>
            <Text style={{color:C.text, fontSize:16}}><strong>BE sales = F ÷ CM ratio</strong></Text><br/>
            <Text style={{color:C.text3}}>ใช้เมื่อโจทย์ให้แต่ยอดรวม ไม่มีข้อมูลต่อหน่วย (ข้อ 4)</Text>
          </Card></Col>
        </Row>
        <Paragraph style={{color:C.text, marginTop:12}}>
          <strong>ที่มาของสูตร (เข้าใจแล้วไม่ต้องท่อง):</strong> ที่จุดคุ้มทุน กำไร = 0 →
          CM รวม = F → Q × CM = F → <strong>Q = F ÷ CM</strong>
        </Paragraph>
        <Card size="small" style={{background:C.cyanBg, borderColor:C.cyan}}>
          <Text strong style={{color:C.cyan}}>ตัวอย่างเพิ่ม:</Text> <Text style={{color:C.text}}>ร้านขายเสื้อ P=300, V=180, F=36,000/เดือน → CM=120 → BE = 36,000÷120 = 300 ตัว/เดือน = ยอดขาย 90,000 บาท (ตรวจ: 36,000 ÷ 0.40 = 90,000 ✓)</Text>
        </Card>
      </div>
    )
  },
  {
    key: 'target', title: '🎯 Target Profit — ขายเท่าไรถึงได้กำไรตามเป้า', tags: [['ออกทุกครั้ง','volcano']],
    content: () => (
      <div>
        <Card size="small" style={{background:C.greenBg, borderColor:C.green, marginBottom:8}}>
          <Text style={{color:C.text, fontSize:16}}><strong>Units = (F + Target Income) ÷ CM ต่อหน่วย</strong></Text><br/>
          <Text style={{color:C.text, fontSize:16}}><strong>Sales = (F + Target Income) ÷ CM ratio</strong></Text>
        </Card>
        <Paragraph style={{color:C.text}}>
          มองง่าย ๆ: กำไรเป้าหมายเปรียบเสมือน "ต้นทุนคงที่ก้อนพิเศษ" ที่ต้องหาให้ครอบคลุมเพิ่ม
          — สูตรเดียวกับ BE แค่บวก target เข้าไป (ข้อ 3D, 4B, 6C ใช้แบบนี้ทั้งหมด)
        </Paragraph>
        <Alert type="warning" message={<span><Text strong>อ่านเพิ่ม (มักออกสอบข้อยาก): </Text>ถ้าโจทย์ให้กำไรเป้าหมาย "หลังภาษี" (after-tax) ต้องแปลงก่อน: Before-tax income = After-tax ÷ (1 − tax rate) แล้วค่อยเข้าสูตร</span>} />
      </div>
    )
  },
  {
    key: 'multi', title: '📦 Multi-Product CVP — หลายสินค้า (Sales Mix)', tags: [['ข้อยากประจำบท','red']],
    content: () => (

const FlashcardTab = () => {
  const [filter, setFilter] = useState('all');
  const [order, setOrder] = useState(flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [score, setScore] = useState({ok:0, ng:0});
  const pool = order.map(i=>flashcards[i]).filter(c => filter==='all' ? true : filter==='exam' ? c.exam : c.star===3);
  const card = pool[Math.min(idx, pool.length-1)];
  const shuffle = () => { const a=[...Array(flashcards.length).keys()]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} setOrder(a); setIdx(0); setFlipped(false); setScore({ok:0,ng:0}); };
  const nav = (d) => { setFlipped(false); setIdx(i => (i + d + pool.length) % pool.length); };
  const mark = (good) => { setScore(s => good ? {...s, ok:s.ok+1} : {...s, ng:s.ng+1}); nav(1); };
  const setF = (f) => { setFilter(f); setIdx(0); setFlipped(false); };
  if (!card) return <Alert type="warning" message="ไม่มีการ์ดในโหมดนี้" />;
  return (
    <div>
      <Flex justify="space-between" wrap="wrap" gap={8} style={{marginBottom:12}}>
        <Space>
          <Button type={filter==='all'?'primary':'default'} onClick={()=>setF('all')}>ทั้งหมด ({flashcards.length})</Button>
          <Button type={filter==='exam'?'primary':'default'} onClick={()=>setF('exam')}>เฉพาะแนวข้อสอบ ({flashcards.filter(c=>c.exam).length})</Button>
          <Button type={filter==='star3'?'primary':'default'} onClick={()=>setF('star3')}>⭐⭐⭐ ({flashcards.filter(c=>c.star===3).length})</Button>
        </Space>
        <Button onClick={shuffle}>🔀 สลับการ์ด</Button>
      </Flex>
      <Row gutter={16} style={{marginBottom:12}}>
        <Col span={8}><Statistic title="การ์ดที่" value={`${idx+1} / ${pool.length}`} /></Col>
        <Col span={8}><Statistic title="ตอบถูก" value={score.ok} valueStyle={{color:C.green}} /></Col>
        <Col span={8}><Statistic title="ตอบผิด" value={score.ng} valueStyle={{color:C.red}} /></Col>
      </Row>
      <div className="fc-perspective" onClick={()=>setFlipped(f=>!f)}>
        <div className={'fc-card' + (flipped ? ' flipped' : '')}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.borderDark}`}}>
            <Space direction="vertical" align="center">
              <Space>{card.exam && <Tag color="volcano">แนวข้อสอบ</Tag>}<Stars n={card.star} /></Space>
              <Title level={4} style={{color:C.text, margin:0}}>{card.q}</Title>
              <Text style={{color:C.text3}}>(คลิกเพื่อพลิกดูคำตอบ)</Text>
            </Space>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.gold}`}}>
            <Space direction="vertical" align="center">
              <Title level={4} style={{color:C.goldDark, margin:0}}>{card.a}</Title>
              <Text style={{color:C.text2}}>{card.d}</Text>
            </Space>
          </div>
        </div>
      </div>
      <Flex justify="center" gap={8} style={{marginTop:16}} wrap="wrap">
        <Button onClick={()=>nav(-1)}>← ก่อนหน้า</Button>
        <Button style={{background:C.greenBg, borderColor:C.green, color:C.green}} onClick={()=>mark(true)}>✓ ตอบถูก</Button>
        <Button style={{background:C.redBg, borderColor:C.red, color:C.red}} onClick={()=>mark(false)}>✗ ตอบผิด</Button>
        <Button onClick={()=>nav(1)}>ถัดไป →</Button>
      </Flex>
    </div>
  );
};
