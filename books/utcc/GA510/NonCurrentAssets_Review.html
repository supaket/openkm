<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non-Current Assets — ทบทวนฉบับเริ่มจากศูนย์</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/antd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/reset.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  body { background:#f2f5f2; font-family:'Noto Sans Thai',sans-serif; margin:0; }
  * { font-family:'Noto Sans Thai',sans-serif !important; }
  .wrap { max-width:1080px; margin:0 auto; padding:16px 12px 60px; }
  .hero { background:linear-gradient(135deg,#2f6d5f,#3f9484); border-radius:14px; padding:22px 26px; color:#f0fbf7; margin-bottom:14px; }
  .hero h1 { margin:0 0 6px; font-size:24px; color:#f0fbf7; }
  .hero p { margin:0; opacity:.94; }
  .sec-card { background:#fffdf9; border:1px solid #d9e5df; border-radius:12px; padding:16px 18px; margin-bottom:12px; box-shadow:0 1px 3px rgba(40,80,60,.06); }
  .sec-card h3 { margin:0 0 10px; color:#2f6d5f; font-size:17px; }
  .tag-step { display:inline-block; background:#2f6d5f; color:#fff; border-radius:20px; padding:1px 12px; font-size:12.5px; margin-right:8px; }
  table.fin { width:100%; border-collapse:collapse; font-size:13.5px; background:#fff; }
  table.fin th { background:#dcebe4; color:#255649; padding:6px 8px; border:1px solid #c2ddd2; text-align:center; }
  table.fin td { padding:5px 8px; border:1px solid #dbe8e2; }
  table.fin td.num { text-align:right; font-variant-numeric:tabular-nums; }
  table.fin td.neg { text-align:right; color:#a8071a; }
  table.fin tr.total td { background:#e6f2ec; font-weight:700; }
  table.fin tr.head td { background:#f0f7f3; font-weight:600; }
  .hl { background:#fff3bf; padding:0 4px; border-radius:4px; font-weight:600; }
  .kbox { background:#e6f2ec; border-left:4px solid #2f6d5f; border-radius:8px; padding:10px 14px; margin:10px 0; font-size:14px; }
  .analogy { background:#eef7ee; border-left:4px solid #4a7c46; border-radius:8px; padding:10px 14px; margin:10px 0; font-size:14px; }
  .warn { background:#fdf1f0; border-left:4px solid #c0564a; border-radius:8px; padding:10px 14px; margin:10px 0; font-size:14px; }
  .bonus { background:#f4f0fa; border-left:4px solid #7a5c9e; border-radius:8px; padding:10px 14px; margin:10px 0; font-size:14px; }
  .je { background:#f8f6ef; border:1px dashed #8fb3a6; border-radius:8px; padding:8px 14px; font-size:13.5px; margin:8px 0; }
  .je b { color:#2f6d5f; }
  .flip-card { perspective:1000px; cursor:pointer; height:210px; }
  .flip-inner { position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d; }
  .flip-card.flipped .flip-inner { transform:rotateY(180deg); }
  .flip-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:16px; text-align:center; }
  .flip-front { background:#fffdf9; border:2px solid #9ec4b7; color:#255649; font-weight:600; font-size:15.5px; }
  .flip-back { background:#2f6d5f; color:#f0fbf7; transform:rotateY(180deg); font-size:13.5px; line-height:1.55; overflow:auto; }
  .qcard { border-radius:12px; padding:14px 16px; color:#fff; margin-bottom:10px; }
  .qcard h4 { color:#fff; margin:0 0 6px; font-size:15.5px; }
  .qcard div { font-size:13.5px; line-height:1.6; }
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { Tabs, Card, Collapse, Tag, Button, Row, Col, Progress, Alert, Steps, Drawer, FloatButton, Segmented, Slider, Switch, Radio, InputNumber, Statistic, Divider } = antd;
const { useState } = React;
const money = (x)=> x.toLocaleString('en-US',{maximumFractionDigits:2});

/* ============ TAB 1 : ภาพรวม & ต้นทุนได้มา ============ */
function OverviewTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">1.1</span>PP&E คืออะไร — 3 ลักษณะสำคัญ</h3>
      <table className="fin"><tbody>
        <tr><td>①</td><td>ถือไว้<b>ใช้ในการดำเนินงาน</b> (แม้ไม่ได้ใช้ตลอดเวลา) — ที่ถือไว้ขายหรือลงทุน ไม่ใช่ PP&E</td></tr>
        <tr><td>②</td><td>อายุการใช้งาน<b>เกิน 1 ปี</b></td></tr>
        <tr><td>③</td><td>มี<b>ตัวตนจับต้องได้</b> (tangible)</td></tr>
      </tbody></table>
      <p style={{marginTop:8}}>ตัวอย่าง: ที่ดิน อาคาร อุปกรณ์ คอมพิวเตอร์ เครื่องจักร เครื่องพิมพ์</p>
      <div className="kbox">📌 <b>เกณฑ์รับรู้เป็นสินทรัพย์ (Recognition):</b> ต้องเข้าครบ 2 ข้อ — ① น่าจะได้<b>ประโยชน์เชิงเศรษฐกิจในอนาคต</b>ไหลเข้ากิจการ และ ② <b>วัดต้นทุนได้อย่างน่าเชื่อถือ</b></div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.2</span>ต้นทุนเริ่มแรก (Initial Cost) — รวมอะไรบ้าง</h3>
      <p>หลักการ: <b>ทุกต้นทุนที่จำเป็นเพื่อทำให้สินทรัพย์พร้อมใช้งาน ณ สถานที่และสภาพที่ต้องการ</b> ให้รวมเป็นต้นทุนสินทรัพย์</p>
      <Row gutter={[10,10]}>
        <Col xs={24} md={12}><Card size="small" title="✅ รวมเข้าต้นทุน" style={{height:'100%',background:'#eef7ee'}}>
          ราคาซื้อ (รวมค่านายหน้า/กฎหมาย ภาษีนำเข้า ภาษีซื้อที่<b>ขอคืนไม่ได้</b>) หลังหักส่วนลดการค้า | ต้นทุนที่เกี่ยวโดยตรง: เตรียมสถานที่ ขนส่ง ติดตั้ง ทดสอบ | ประมาณการ<b>รื้อถอนและบูรณะสถานที่</b></Card></Col>
        <Col xs={24} md={12}><Card size="small" title="❌ ไม่รวม (ลงค่าใช้จ่าย)" style={{height:'100%',background:'#fdf1f0'}}>
          ค่าซ่อมความเสียหายที่เกิดระหว่างติดตั้ง (ไม่ทำประกัน) | ค่าฝึกอบรมพนักงาน | ค่าใช้จ่ายบริหารทั่วไป | ภาษีทรัพย์สินงวดปัจจุบัน</Card></Col>
      </Row>
      <div className="analogy">❄️ <b>ตัวอย่างง่าย (แอร์):</b> ราคาซื้อ 20,000 + ค่าติดตั้ง 2,000 = ต้นทุนแอร์ <b>22,000</b> บาท — ค่าติดตั้งจำเป็นเพื่อให้ใช้งานได้ จึงรวม</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.3</span>ตัวอย่างสไลด์ #1: ที่ดิน (Dexter Company)</h3>
      <p>ซื้อที่ดินเป็นที่ตั้งโรงงานใหม่ 200,000 แล้วรื้ออาคารเก่าเพื่อสร้างโรงงาน:</p>
      <table className="fin"><tbody>
        <tr><td>ราคาซื้อที่ดิน</td><td className="num">200,000</td></tr>
        <tr><td>+ ค่ารื้อถอนอาคารเก่า (Demolition)</td><td className="num">8,000</td></tr>
        <tr><td>+ ค่าประกันกรรมสิทธิ์ (Title insurance)</td><td className="num">4,000</td></tr>
        <tr><td>+ ค่าสำรวจที่ดิน (Land survey)</td><td className="num">2,300</td></tr>
        <tr><td>+ ภาษีทรัพย์สินค้างเก่า (Delinquent property taxes)</td><td className="num">1,000</td></tr>
        <tr><td>− ขายซากวัสดุจากอาคารเก่า</td><td className="neg">(1,500)</td></tr>
        <tr className="total"><td>ต้นทุนที่ดิน</td><td className="num">213,800</td></tr>
      </tbody></table>
      <div className="je">Dr ที่ดิน 213,800 + Dr <b>ค่าใช้จ่ายภาษีทรัพย์สิน 900</b> (งวดปัจจุบัน แยกออก) / Cr เงินสด 214,700</div>
      <div className="warn">⚠️ 2 กับดัก: ① <b>ภาษีค้างเก่า (delinquent) รวม</b>เข้าที่ดิน แต่ <b>ภาษีงวดปัจจุบัน 900 เป็นค่าใช้จ่าย</b> ② เงินขายซากวัสดุ <b>หักออก</b>จากต้นทุนที่ดิน</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.4</span>ตัวอย่างสไลด์ #2: เครื่องจักร (DEX Inc.)</h3>
      <p>ราคาตามสัญญา 50,000 เงื่อนไข 2/10, n/30 จ่ายทันส่วนลด + ค่าขนส่ง 2,000 + ติดตั้ง/ทดสอบ 1,500 + VAT 3,500 + ระหว่างติดตั้งเกิดความเสียหายไม่ทำประกัน 400:</p>
      <table className="fin"><tbody>
        <tr><td>ราคาตามสัญญา</td><td className="num">50,000</td></tr>
        <tr><td>− ส่วนลดเงินสด (2% × 50,000)</td><td className="neg">(1,000)</td></tr>
        <tr><td>+ ค่าขนส่ง</td><td className="num">2,000</td></tr>
        <tr><td>+ ค่าติดตั้งและทดสอบ</td><td className="num">1,500</td></tr>
        <tr><td>+ ภาษีขาย/VAT (ขอคืนไม่ได้)</td><td className="num">3,500</td></tr>
        <tr className="total"><td>ต้นทุนเครื่องจักร</td><td className="num">56,000</td></tr>
      </tbody></table>
      <div className="je">Dr เครื่องจักร 56,000 + Dr <b>ค่าซ่อมแซม (Repair &amp; Maintenance) 400</b> / Cr เงินสด 56,400</div>
      <div className="warn">⚠️ ความเสียหาย 400 ระหว่างติดตั้ง (ไม่ทำประกัน) <b>ไม่รวม</b>เข้าเครื่องจักร → ลงเป็นค่าใช้จ่ายซ่อมแซม (ไม่ใช่ต้นทุนที่จำเป็น เป็นความผิดพลาด)</div>
    </div>
  </div>;
}

/* ============ TAB 2 : รายจ่ายภายหลัง ============ */
function SubsequentTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">2.1</span>รายจ่ายภายหลังการได้มา — Capitalize หรือ Expense?</h3>
      <p>หลังได้สินทรัพย์มา มีรายจ่ายตามมาเรื่อยๆ ตั้งแต่ซ่อมเล็กน้อยจนถึงยกเครื่องใหญ่ ต้องตัดสินใจว่าจะ<b>บันทึกเป็นสินทรัพย์ (capitalize)</b> หรือ<b>ค่าใช้จ่าย (expense)</b></p>
      <div className="kbox">🔑 <b>เกณฑ์ตัดสิน:</b> ถ้ารายจ่ายคาดว่าจะ<b>เพิ่มประโยชน์เชิงเศรษฐกิจในอนาคต</b> → capitalize (เป็นสินทรัพย์) ไม่งั้น → expense</div>
      <p>ประโยชน์ในอนาคตที่เข้าเกณฑ์ capitalize:</p>
      <table className="fin"><tbody>
        <tr><td>①</td><td><b>ยืดอายุการใช้งาน</b>ของสินทรัพย์ (extending useful life)</td></tr>
        <tr><td>②</td><td><b>เพิ่มกำลังการผลิต</b> — ผลิตได้มากขึ้นด้วยต้นทุนเท่าเดิม หรือผลิตเท่าเดิมด้วยต้นทุนต่ำลง</td></tr>
        <tr><td>③</td><td><b>เพิ่มคุณภาพ</b>ของสินค้า</td></tr>
      </tbody></table>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">2.2</span>เทียบชัดๆ — ปรับปรุง (Capital) vs ซ่อมบำรุง (Revenue)</h3>
      <Row gutter={[10,10]}>
        <Col xs={24} md={12}><Card size="small" title="🏗️ รายจ่ายฝ่ายทุน (Capital Expenditure)" style={{height:'100%',background:'#eef7ee'}}>
          บันทึกเป็น<b>สินทรัพย์</b> → ทยอยตัดค่าเสื่อม<br/>ต่อเติม/ขยายอาคาร ยกเครื่องใหญ่ที่ยืดอายุ ปรับปรุงให้ผลิตดีขึ้น</Card></Col>
        <Col xs={24} md={12}><Card size="small" title="🔧 รายจ่ายฝ่ายรายได้ (Revenue Expenditure)" style={{height:'100%',background:'#fdf1f0'}}>
          บันทึกเป็น<b>ค่าใช้จ่าย</b>งวดนั้นทันที<br/>ซ่อมบำรุงตามปกติ ทาสี เปลี่ยนอะไหล่เล็กน้อย ค่าน้ำมันเครื่อง</Card></Col>
      </Row>
      <div className="analogy">🚗 <b>เทียบรถยนต์:</b> เปลี่ยนน้ำมันเครื่อง = ค่าใช้จ่าย (ทำให้วิ่งต่อได้ตามปกติ) | ยกเครื่องยนต์ใหม่ที่ยืดอายุรถอีก 5 ปี = capitalize (เพิ่มประโยชน์อนาคต)</div>
      <div className="kbox">📌 <b>ตัวอย่างสไลด์ (BAX Inc.):</b> จ่าย 160,000 เพื่อ<b>ต่อเติมโรงงานให้ใหญ่ขึ้น</b> เพิ่มประโยชน์ → capitalize เข้าอาคาร<br/><span className="je" style={{display:'block',marginTop:6}}>Dr อาคาร 160,000 / Cr เงินสด 160,000</span></div>
    </div>
  </div>;
}

/* ============ TAB 3 : ค่าเสื่อมราคา ============ */
function DepreciationTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">3.1</span>ค่าเสื่อมราคาคืออะไร — แนวคิดหลัก</h3>
      <p>ค่าเสื่อมราคา = การ<b>ปันส่วนต้นทุน</b>ของสินทรัพย์มีตัวตนไปเป็นค่าใช้จ่ายในงวดที่ใช้ประโยชน์ (ไม่ใช่การตีมูลค่าตลาด!) ค่าเสื่อมสะสมทั้งหมดตลอดอายุ = ต้นทุนเดิม − มูลค่าซาก</p>
      <table className="fin"><tbody>
        <tr><td><b>ฐานคิดค่าเสื่อม (Depreciable base)</b></td><td>ต้นทุนเดิม − มูลค่าซาก (residual value)</td></tr>
        <tr><td><b>อายุการใช้งาน (Useful life)</b></td><td>ระยะที่กิจการคาดว่าจะใช้ประโยชน์ — ต่างจากอายุทางกายภาพ (โต๊ะไม้ทนได้ 40 ปี แต่ใช้จริง 10 ปี → คิด 10 ปี)</td></tr>
        <tr><td><b>ค่าเสื่อมราคาสะสม (Accumulated Depreciation)</b></td><td>บัญชี<b>ปรับมูลค่า (contra-asset)</b> หักจากต้นทุนในงบฐานะการเงิน</td></tr>
        <tr><td><b>มูลค่าตามบัญชี (Carrying/Book value)</b></td><td>ต้นทุนเดิม − ค่าเสื่อมราคาสะสม</td></tr>
      </tbody></table>
      <div className="kbox">🗓️ ค่าเสื่อมราคาเป็น <b>การปันส่วนต้นทุน</b> (allocation) ไม่ใช่การตีราคาตลาดของสินทรัพย์ — แม้ราคาตลาดขึ้น ก็ยังคิดค่าเสื่อมตามต้นทุนเดิมเสมอ</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">3.2</span>การคำนวณค่าเสื่อมราคา — ตอบ 3 คำถาม (The Computation of Depreciation)</h3>
      <p>สไลด์วางกรอบว่า ก่อนคิดค่าเสื่อมต้องตอบ 3 คำถามนี้ให้ครบก่อน:</p>
      <Steps direction="vertical" size="small" current={-1} items={[
        {title:'คำถามที่ 1 — ใช้ฐานคิดค่าเสื่อมเท่าไร? (Depreciable base)',description:'ฐาน = ต้นทุนเดิม − มูลค่าซาก | ต้นทุนเดิมรวมทุกอย่างที่จำเป็นเพื่อให้พร้อมใช้ | มูลค่าซาก = จำนวนที่คาดว่าจะได้จากการจำหน่ายเมื่อสิ้นอายุ'},
        {title:'คำถามที่ 2 — อายุการใช้งานเท่าไร? (Useful life / Service life)',description:'ปริมาณบริการหรือการใช้ที่กิจการคาดว่าจะได้จากสินทรัพย์ก่อนจำหน่าย — คนละอย่างกับอายุทางกายภาพ (physical life)'},
        {title:'คำถามที่ 3 — ใช้วิธีค่าเสื่อมแบบไหน? (Depreciation method)',description:'เช่น วิธีเส้นตรงที่อาจารย์เน้น (ดูหัวข้อ 3.3)'},
      ]}/>
      <table className="fin"><tbody>
        <tr className="head"><td colSpan={2}>ตัวอย่างฐานคิดค่าเสื่อม (สไลด์)</td></tr>
        <tr><td>ต้นทุนเดิม (Original cost)</td><td className="num">50,000</td></tr>
        <tr><td>หัก มูลค่าซาก (Residual value)</td><td className="neg">(5,000)</td></tr>
        <tr className="total"><td>ฐานคิดค่าเสื่อม (Depreciable base)</td><td className="num">45,000</td></tr>
      </tbody></table>

      <div className="bonus">💡 เสริม: อายุจำกัด (finite) → ตัดจำหน่าย | อายุไม่จำกัด (indefinite) และ goodwill → ไม่ตัดจำหน่าย แต่<b>ทดสอบด้อยค่า</b>ทุกปี</div>
    </div>
  </div>;
}

/* ============ TAB 6 : สูตร & แทนค่า ============ */
function FormulaTab(){
  const F = ({t,f,s})=> <div className="sec-card"><h3>{t}</h3><div className="je"><b>สูตร:</b> {f}</div><div className="kbox"><b>แทนค่า (จากตัวอย่างสไลด์):</b> {s}</div></div>;
  return <div>
    <F t="① ต้นทุนสินทรัพย์ (Initial Cost)" f="ราคาซื้อ (หักส่วนลด) + ต้นทุนที่เกี่ยวโดยตรง (ขนส่ง ติดตั้ง ทดสอบ) + ประมาณการรื้อถอน" s="DEX: 50,000 − 1,000 + 2,000 + 1,500 + 3,500 = 56,000 (ค่าเสียหาย 400 เป็นค่าใช้จ่าย)"/>
    <F t="② ต้นทุนที่ดิน" f="ราคาซื้อ + ค่ารื้อถอน + ประกันกรรมสิทธิ์ + สำรวจ + ภาษีค้างเก่า − ขายซาก" s="Dexter: 200,000 + 8,000 + 4,000 + 2,300 + 1,000 − 1,500 = 213,800 (ภาษีปัจจุบัน 900 = ค่าใช้จ่าย)"/>
    <F t="③ ค่าเสื่อมราคา (เส้นตรง)" f="(ต้นทุน − มูลค่าซาก) ÷ อายุการใช้งาน" s="อุปกรณ์: (1,000,000 − 100,000) ÷ 5 = 180,000/ปี"/>
    <F t="④ มูลค่าตามบัญชี (Carrying Value)" f="ต้นทุน − ค่าเสื่อมราคาสะสม (− ค่าเผื่อด้อยค่าสะสม ถ้ามี)" s="ปีที่ 1: 1,000,000 − 180,000 = 820,000"/>
    <F t="⑤ มูลค่าที่จะได้รับคืน (Recoverable Amount)" f="ค่าที่สูงกว่า ระหว่าง (FV หักต้นทุนขาย) กับ (มูลค่าจากการใช้)" s="MAC: สูงกว่า(390,000 , 410,000) = 410,000"/>
    <F t="⑥ ขาดทุนจากการด้อยค่า" f="มูลค่าตามบัญชี − มูลค่าที่จะได้รับคืน (เมื่อบัญชี > recoverable)" s="MAC กรณีด้อยค่า: 400,000 − 390,000 = 10,000"/>
    <F t="⑦ ค่าเสื่อมบางส่วนของปี (Partial Year)" f="ค่าเสื่อมเต็มปี × (เดือนที่ใช้ ÷ 12)" s="Martin: 2,000 × 9/12 = 1,500 (ม.ค.–ต.ค.)"/>
    <F t="⑧ กำไร/ขาดทุนจากการจำหน่าย" f="เงินที่ได้รับ − มูลค่าตามบัญชี ณ วันจำหน่าย" s="Martin: 2,500 − 4,500 = ขาดทุน 2,000 (บัญชี = 20,000 − 15,500)"/>
    <F t="⑨ ค่าสูญสิ้น/หน่วย (Depletion Rate)" f="(ต้นทุน − มูลค่าซาก) ÷ หน่วยที่คาดว่าจะได้" s="MIN: (2,000,000 − 100,000) ÷ 500,000 = 3.80/ตัน"/>
    <F t="⑩ ค่าสูญสิ้นงวด" f="อัตราค่าสูญสิ้น × หน่วยที่ขุดได้จริง" s="MIN: 3.80 × 50,000 = 190,000"/>
    <F t="⑪ [เสริม] ยอดลดลงทวีคูณ (DDB)" f="มูลค่าตามบัญชีต้นปี × (2 ÷ อายุ) จนแตะมูลค่าซาก" s="1,000,000 × 40% = 400,000 (ปีแรก)"/>
    <F t="⑫ [เสริม] ผลรวมจำนวนปี (SYD)" f="(ปีคงเหลือ ÷ ผลรวมจำนวนปี) × ฐานคิดค่าเสื่อม" s="ปีแรก: 5/15 × 900,000 = 300,000"/>
  </div>;
}

/* ============ INTERACTIVE LAB 1 : Depreciation Visualizer ============ */
function schedule(method, cost, res, life){
  const rows=[]; let bv=cost; let acc=0; const base=cost-res; const syd=life*(life+1)/2;
  for(let y=1;y<=life;y++){
    let dep;
    if(method==='SL') dep = base/life;
    else if(method==='DDB'){ dep = bv*(2/life); if(bv-dep<res) dep=Math.max(0,bv-res); }
    else dep = (life-y+1)/syd*base;
    acc+=dep; bv-=dep; rows.push({y,dep,acc,bv});
  }
  return rows;
}
function DepLab(){
  const [cost,setCost]=useState(1000000);
  const [res,setRes]=useState(100000);
  const [life,setLife]=useState(5);
  const [method,setMethod]=useState('SL');
  const [year,setYear]=useState(1);
  const L = Math.max(2,Math.min(12,life||5));
  const yr = Math.max(0,Math.min(L,year));
  const methods=['SL','DDB','SYD'];
  const colors={SL:'#2f6d5f',DDB:'#c0564a',SYD:'#7a5c9e'};
  const names={SL:'เส้นตรง',DDB:'DDB (เสริม)',SYD:'SYD (เสริม)'};
  const scheds={}; methods.forEach(m=>scheds[m]=schedule(m,cost,res,L));
  const cur = scheds[method];
  const row = yr===0? {dep:0,acc:0,bv:cost} : cur[yr-1];
  // geometry
  const x0=44,x1=340,yTop=18,yBot=200; const maxV=cost;
  const xf=(y)=> x0+(x1-x0)*(y/L);
  const yf=(v)=> yBot-(yBot-yTop)*(v/maxV);
  const bvSeries=(m)=>{ const s=scheds[m]; let pts=`${xf(0)},${yf(cost)}`; s.forEach(r=>pts+=` ${xf(r.y)},${yf(r.bv)}`); return pts; };
  return <div>
    <div className="bonus" style={{fontSize:12.5,marginBottom:10}}>💡 อาจารย์เน้น <b>เส้นตรง (SL)</b> — DDB/SYD ใส่ไว้ให้เห็นภาพเปรียบเทียบ (นอกสไลด์)</div>

      <Col xs={8}><div style={{fontSize:12.5}}>มูลค่าซาก</div><InputNumber style={{width:'100%'}} value={res} min={0} step={10000} onChange={v=>setRes(v||0)} formatter={v=>`${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>

    </Row>
    <Radio.Group value={method} onChange={e=>setMethod(e.target.value)} optionType="button" buttonStyle="solid" style={{marginBottom:10}}
      options={methods.map(m=>({label:names[m],value:m}))}/>
    <div style={{fontSize:13.5,margin:'2px 0 4px'}}>เลื่อนดู <b>สิ้นปีที่</b>: <b style={{color:'#2f6d5f'}}>{yr}</b> / {L}</div>
    <Slider min={0} max={L} value={yr} onChange={setYear} marks={Object.fromEntries(Array.from({length:L+1},(_,i)=>[i,`${i}`]))}/>
    <Row gutter={[12,12]}>
      <Col xs={24} md={13}>
        <svg viewBox="0 0 360 230" style={{width:'100%',background:'#fbfdfb',borderRadius:10,border:'1px solid #d9e5df'}}>
          <line x1={x0} y1={yBot} x2={x1} y2={yBot} stroke="#b9ccc3" strokeWidth="1"/>
          <line x1={x0} y1={yTop} x2={x0} y2={yBot} stroke="#b9ccc3" strokeWidth="1"/>
          {/* residual line */}
          <line x1={x0} y1={yf(res)} x2={x1} y2={yf(res)} stroke="#c9a227" strokeWidth="1" strokeDasharray="4 3"/>
          <text x={x1-2} y={yf(res)-3} textAnchor="end" fontSize="9.5" fill="#8a7016">ซาก {money(res)}</text>
          {/* other methods faint */}
          {methods.map(m=> m!==method && <polyline key={m} points={bvSeries(m)} fill="none" stroke={colors[m]} strokeWidth="1.3" opacity="0.28"/>)}
          {/* selected bold */}
          <polyline points={bvSeries(method)} fill="none" stroke={colors[method]} strokeWidth="2.6"/>
          {cur.map((r,i)=><circle key={i} cx={xf(r.y)} cy={yf(r.bv)} r="2.4" fill={colors[method]}/>)}
          {/* marker */}
          <line x1={xf(yr)} y1={yTop} x2={xf(yr)} y2={yBot} stroke="#666" strokeWidth="1" strokeDasharray="3 3"/>

        </Row>
        <table className="fin" style={{marginTop:8}}>
          <thead><tr><th>ปี</th><th>ค่าเสื่อม</th><th>สะสม</th><th>คงเหลือ</th></tr></thead>

  </div>;
}

    <Row gutter={[8,8]} style={{marginBottom:8}}>
      <Col xs={8}><div style={{fontSize:12.5}}>มูลค่าตามบัญชี</div><InputNumber style={{width:'100%'}} value={cv} min={0} step={10000} onChange={v=>setCv(v||0)} formatter={v=>`${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>
      <Col xs={8}><div style={{fontSize:12.5}}>FV − ต้นทุนขาย</div><InputNumber style={{width:'100%'}} value={fv} min={0} step={10000} onChange={v=>setFv(v||0)} formatter={v=>`${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>
      <Col xs={8}><div style={{fontSize:12.5}}>มูลค่าจากการใช้</div><InputNumber style={{width:'100%'}} value={viu} min={0} step={10000} onChange={v=>setViu(v||0)} formatter={v=>`${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>
    </Row>
    <svg viewBox="0 0 360 210" style={{width:'100%',background:'#fbfdfb',borderRadius:10,border:'1px solid #d9e5df'}}>
      <line x1="20" y1="175" x2="340" y2="175" stroke="#b9ccc3"/>
      {bars.map((b,i)=>{ const x=40+i*105; const isRec=(b.l!=='มูลค่าตามบัญชี'&&b.v===rec);
        return <g key={i}>
          <rect x={x} y={175-b.v*sc} width="70" height={b.v*sc} rx="4" fill={b.c} opacity={isRec?1:0.8} stroke={isRec?'#237804':'none'} strokeWidth={isRec?2.5:0}/>
          <text x={x+35} y={175-b.v*sc-5} textAnchor="middle" fontSize="11" fontWeight="700" fill="#20303c">{money(b.v)}</text>
          <text x={x+35} y="190" textAnchor="middle" fontSize="9.5" fill="#4a5650">{b.l}</text>
          {isRec && <text x={x+35} y={175-b.v*sc-18} textAnchor="middle" fontSize="9" fill="#237804" fontWeight="700">= recoverable</text>}
        </g>; })}
      <line x1="20" y1={175-rec*sc} x2="340" y2={175-rec*sc} stroke="#237804" strokeWidth="1" strokeDasharray="5 3"/>
    </svg>
    <Row gutter={8} style={{marginTop:8}}>
      <Col span={12}><Card size="small"><Statistic title="มูลค่าที่จะได้รับคืน" value={money(rec)} prefix="฿" valueStyle={{fontSize:18,color:'#237804'}}/></Card></Col>
      <Col span={12}><Card size="small"><Statistic title={impaired?'ขาดทุนจากการด้อยค่า':'ไม่ด้อยค่า'} value={impaired?money(loss):'—'} prefix={impaired?'฿':''} valueStyle={{fontSize:18,color:impaired?'#c0564a':'#237804'}}/></Card></Col>
    </Row>
    {impaired
      ? <div className="je" style={{marginTop:8}}>Dr ขาดทุนจากการด้อยค่า {money(loss)} / Cr ค่าเผื่อการด้อยค่าสะสม {money(loss)}</div>
      : <div className="analogy" style={{marginTop:8,fontSize:13}}>✅ recoverable {money(rec)} ≥ บัญชี {money(cv)} → ไม่ด้อยค่า ไม่ต้องบันทึก</div>}
  </div>;
}

/* ============ INTERACTIVE LAB 4 : Disposal ============ */
function DisposalLab(){
  const [cost,setCost]=useState(20000);
  const [acc,setAcc]=useState(15500);
  const [proceeds,setProceeds]=useState(2500);
  const cv=cost-acc;
  const gl=proceeds-cv;
  const gain=gl>0, loss=gl<0;
  const maxV=Math.max(proceeds,cv,1),sc=140/maxV;
  return <div>
    <Alert type="info" showIcon style={{marginBottom:10}} message="กำไร/ขาดทุน = เงินที่ได้รับ − มูลค่าตามบัญชี" description="ตัวอย่างสไลด์ Martin (หลังคิดค่าเสื่อมถึงวันขายแล้ว): ต้นทุน 20,000 / ค่าเสื่อมสะสม 15,500 / ขาย 2,500 → ขาดทุน 2,000"/>
    <Row gutter={[8,8]} style={{marginBottom:8}}>
      <Col xs={8}><div style={{fontSize:12.5}}>ต้นทุน</div><InputNumber style={{width:'100%'}} value={cost} min={0} step={1000} onChange={v=>setCost(v||0)} formatter={v=>`${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>
      <Col xs={8}><div style={{fontSize:12.5}}>ค่าเสื่อมสะสม</div><InputNumber style={{width:'100%'}} value={acc} min={0} step={500} onChange={v=>setAcc(v||0)} formatter={v=>`${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>
      <Col xs={8}><div style={{fontSize:12.5}}>เงินที่ได้รับ</div><InputNumber style={{width:'100%'}} value={proceeds} min={0} step={500} onChange={v=>setProceeds(v||0)} formatter={v=>`${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>
    </Row>
    <svg viewBox="0 0 300 190" style={{width:'100%',maxWidth:300,background:'#fbfdfb',borderRadius:10,border:'1px solid #d9e5df'}}>
      <line x1="20" y1="155" x2="280" y2="155" stroke="#b9ccc3"/>
      {[{l:'เงินที่ได้รับ',v:proceeds,c:'#7aa8c0'},{l:'มูลค่าตามบัญชี',v:cv,c:'#5a6a62'}].map((b,i)=>{const x=60+i*110;return <g key={i}>
        <rect x={x} y={155-b.v*sc} width="70" height={Math.max(0,b.v*sc)} rx="4" fill={b.c} opacity="0.85"/>
        <text x={x+35} y={155-b.v*sc-5} textAnchor="middle" fontSize="11" fontWeight="700" fill="#20303c">{money(b.v)}</text>
        <text x={x+35} y="170" textAnchor="middle" fontSize="9.5" fill="#4a5650">{b.l}</text>
      </g>;})}
      <text x="150" y="16" textAnchor="middle" fontSize="12" fontWeight="700" fill={gain?'#237804':loss?'#c0564a':'#5a6a62'}>{gain?`กำไร ${money(gl)}`:loss?`ขาดทุน ${money(-gl)}`:'ไม่มีกำไร/ขาดทุน'}</text>
    </svg>
    <div className="je" style={{marginTop:8}}>
      Dr เงินสด {money(proceeds)} + Dr ค่าเสื่อมสะสม {money(acc)}{loss?` + Dr ขาดทุนจากการจำหน่าย ${money(-gl)}`:''} / Cr สินทรัพย์ {money(cost)}{gain?` + Cr กำไรจากการจำหน่าย ${money(gl)}`:''}
    </div>
    <div className="warn" style={{fontSize:12.5}}>⚠️ ตัวเลข "ค่าเสื่อมสะสม" ต้องรวมค่าเสื่อมที่คิดถึงวันขายแล้ว (partial year) — ในสไลด์ Martin คือ 14,000 + 1,500 = 15,500</div>
  </div>;
}

/* ============ FLOATING TOGGLE TOOL ============ */
function FloatingLab(){
  const [open,setOpen]=useState(false);
  const [seg,setSeg]=useState('dep');
  const w = typeof window!=='undefined'? Math.min(580, window.innerWidth-16) : 580;
  return <React.Fragment>
    <FloatButton type="primary" onClick={()=>setOpen(true)} description="ทดลอง" shape="square"
      style={{right:24,bottom:24,width:58,height:58}} icon={<span style={{fontSize:20}}>🧪</span>}/>
    <Drawer open={open} onClose={()=>setOpen(false)} width={w} title="🧪 ห้องทดลองแบบโต้ตอบ — ลากปรับค่าแล้วดูภาพอัปเดตสด" styles={{body:{paddingTop:12}}}>
      <Segmented block value={seg} onChange={setSeg} style={{marginBottom:14}}
        options={[{label:'📉 ค่าเสื่อม',value:'dep'},{label:'🏗️ ต้นทุน',value:'cap'},{label:'💥 ด้อยค่า',value:'imp'},{label:'💰 จำหน่าย',value:'dis'}]}/>
      {seg==='dep' && <DepLab/>}
      {seg==='cap' && <CapExLab/>}
      {seg==='imp' && <ImpairLab/>}
      {seg==='dis' && <DisposalLab/>}
    </Drawer>
  </React.Fragment>;
}
