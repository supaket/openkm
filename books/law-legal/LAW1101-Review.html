{key:'meaning',title:'⚖️ ความหมายและประเภทของ ก.ม.มหาชน',tags:[['ออกทุกครั้ง','volcano'],['ลักษณะ4ประการ','blue']],content:()=>(<div><Alert type="info" showIcon message={<span><strong>กฎหมายมหาชน</strong> คือ กฎหมายที่บัญญัติให้อำนาจและหน้าที่แก่รัฐ หน่วยงานทางปกครอง เจ้าหน้าที่ของรัฐ ในทางปกครองและการบริการสาธารณะ เพื่อประโยชน์ ปชช.ส่วนใหญ่ ในฐานที่ฝ่ายปกครองมีอำนาจเหนือผู้ใต้ปกครอง</span>} style={{marginBottom:16}}/><Title level={5} style={{color:C.amberDark}}>⭐⭐⭐ ลักษณะ 4 ประการ (แนวข้อสอบ)</Title><Table dataSource={[{k:'1',e:'ใช้ในการปฏิรูป',d:'รธน.2560 ม.258 ปฏิรูป 7 ด้าน: การเมือง บริหาร กฎหมาย ยุติธรรม การศึกษา เศรษฐกิจ อื่นๆ'},{k:'2',e:'เพื่อสาธารณประโยชน์',d:'ใช้อำนาจรัฐตอบสนองความต้องการ ปชช.ส่วนใหญ่ ไม่ใช่เฉพาะบุคคลใด'},{k:'3',e:'ไม่เสมอภาค (บังคับเองได้)',d:'ฝ่ายรัฐมีอำนาจเหนือกว่า สั่งการฝ่ายเดียวโดยไม่ต้องยินยอม'},{k:'4',e:'ควบคุมอำนาจของรัฐ',d:'ควบคุมหน่วยงานรัฐ จนท.ปกครอง ฝ่ายปกครอง ให้ใช้อำนาจตามที่กำหนด'}]} columns={[{title:'#',dataIndex:'k',width:45,render:v=><Tag color="gold" style={{fontWeight:700}}>{v}</Tag>},{title:'ลักษณะ',dataIndex:'e',render:v=><Text strong style={{color:C.text}}>{v}</Text>},{title:'คำอธิบาย',dataIndex:'d',render:v=><Text style={{color:C.text2}}>{v}</Text>}]} pagination={false} size="small" rowKey="k" style={{marginBottom:16}}/><Title level={5} style={{color:C.amberDark}}>📚 ประเภท ก.ม.มหาชน</Title><Row gutter={[12,12]}><Col xs={24} sm={8}><Card size="small" style={{background:C.blueBg,border:'1px solid #93C5FD',borderRadius:12,height:'100%'}}><Text strong style={{color:C.blue}}>1. กฎหมายรัฐธรรมนูญ</Text><br/><Text style={{color:C.text2,fontSize:13}}>วางระเบียบการปกครองทางการเมือง กำหนดโครงสร้างรัฐ แบ่ง 3 อำนาจ: นิติบัญญัติ(รัฐสภา) บริหาร(ครม.) ตุลาการ(ศาล)</Text></Card></Col><Col xs={24} sm={8}><Card size="small" style={{background:C.greenBg,border:'1px solid #6EE7B7',borderRadius:12,height:'100%'}}><Text strong style={{color:C.green}}>2. กฎหมายปกครอง</Text><br/><Text style={{color:C.text2,fontSize:13}}>วางหลักจัดระเบียบการ {key:'public-interest',title:'🏛️ หลักประโยชน์สาธารณะ + บริการสาธารณะ',tags:[['สอบ2566','red'],['หลัก4ข้อ','gold']],content:()=>(<div><Alert type="info" showIcon message={<span><strong>หลักประโยชน์สาธารณะ</strong> = ใช้อำนาจรัฐเพื่อตอบสนองความต้องการ ปชช.ส่วนใหญ่ ไม่ใช่เพื่อบุคคลเพียงคนหนึ่ง</span>} style={{marginBottom:16}}/><Title level={5} style={{color:C.amberDark}}>📋 หลักการสำคัญ 4 ข้อ</Title><Row gutter={[12,12]} style={{marginBottom:16}}>{[{n:'1',t:'ความต่อเนื่อง',d:'บริการสาธารณะต้องสม่ำเสมอตลอดเวลา',c:C.blue,bg:C.blueBg,bd:'#BFDBFE'},{n:'2',t:'ความเสมอภาค',d:'ไม่เลือกปฏิบัติ ทั้งด้านบริการและรับบุคคลทำงาน',c:C.green,bg:C.greenBg,bd:'#BBF7D0'},{n:'3',t:'ปรับปรุงเปลี่ยนแปลง',d:'ปรับปรุงให้ทันสมัย',c:C.purple,bg:C.purpleBg,bd:'#DDD6FE'},{n:'4',t:'กำกับดูแลโดยรัฐ',d:'หน่วยงานรัฐต้องอยู่ภายใต้การกำกับดูแล เพื่อบรรลุผลสำเร็จ',c:C.red,bg:C.redBg,bd:'#FECACA'}].map(s=>(<Col xs={24} sm={12} key={s.n}><Card size="small" style={{background:s.bg,border:`1px solid ${s.bd}`,borderRadius:12,height:'100%'}}><Tag color={s.c} style={{fontWeight:700}}>{s.n}</Tag><Text strong style={{color:s.c}}> {s.t}</Text><br/><Text style={{color:C.text2,fontSize:13}}>{s.d}</Text></Card></Col>))}</Row><Title level={5} style={{color:C.amberDark}}>🏗️ 3 องค์กร จัดทำบริการสาธารณะ</Title><Row gutter={[12,12]}><Col xs={24} sm={8}><Card size="small" style={{background:C.blueBg,border:'1px solid #93C5FD',borderRadius:12,height:'100%'}}><Text strong style={{color:C.blue}}>1. นิติบัญญัติ(รัฐสภา)</Text><br/><Text style={{color:C.text2,fontSize:13}}>บัญญัติ ก.ม.ใช้บังคับทั่วไป + ควบคุมการบริหารราชการ</Text></Card></Col><Col xs={24} sm={8}><Card size="small" style={{background:C.greenBg,border:'1px solid #6EE7B7',borderRadius:12,height:'100%'}}><Text strong style={{color:C.green}}>2. บริหาร(ครม.)</Text><br/><Text style={{color:C.text2,fontSize:13}}>บริหารราชการ ใช้อำนาจทางปกครอง จัดทำบริการสาธารณะ ตอบสนองคนส่วนใหญ่</Text></Card></Col><Col xs={24} sm={8}><Card size="small" style={{background:C.purpleBg,border:'1px solid #C4B5FD',borderRadius:12,height:'100%'}}><Text strong style={{color:C.purple}}>3. ตุลาการ(ศาล)</Text><br/><Text style={{color:C.text2,fontSize:13}}>ศาลยุติธรรม ปกครอง ทหาร รัฐธรรมนูญ — พิจารณาพิพากษาคดี คุ้มครองสิทธิเสรีภาพ</Text></Card></Col></Row></div>)},

{id:16,q:'ปฏิรูป 7 ด้าน (รธน.2560 ม.258)?',a:'ก.การเมือง ข.การบริหาร ค.กฎหมาย ง.ยุติธรรม จ.การศึกษา ฉ.เศรษฐกิจ ช.อื่นๆ',star:2,exam:true},
{id:17,q:'นิติวิธี ก.ม.มหาชน 2 ประเภท?',a:'1.เชิงปฏิเสธ: ไม่เอาหลัก ก.ม.เอกชนมาใช้ 2.เชิงสร้างสรรค์: สร้างหลัก ก.ม.มหาชนจากประสานประโยชน์สาธารณะ+สิทธิเสรีภาพ',star:2,exam:false},
{id:18,q:'ศาลเดี่ยว vs ศาลคู่? ไทยใช้?',a:'เดี่ยว: วินิจฉัยทุกคดี(Common Law: UK USA) / คู่: แยกศาลปกครอง(Civil Law) / ไทย=ศาลคู่ 4 ระบบ: รธน. ยุติธรรม ปกครอง ทหาร',star:2,exam:false},
{id:19,q:'อปท. มีอะไรบ้าง? สถานะ?',a:'อบจ. เทศบาล อบต. กทม. พัทยา — นิติบุคคลตาม ก.ม.มหาชน ฐานะฝ่ายปกครอง หลักกระจายอำนาจ มีหน้าที่บริการสาธารณะ',star:2,exam:true},
{id:20,q:'นิติบุคคลมหาชน vs เอกชน?',a:'มหาชน: จัดตั้งโดย ก.ม.(กระทรวง กรม) มุ่งบริการสาธารณะ / เอกชน: จดทะเบียน ป.แพ่งฯ(บริษัท ห้างฯ) มุ่งผลกำไร',star:2,exam:false},
{id:21,q:'(สอบ2567 ข้อ1) ควบคุมอำนาจรัฐ+จัดระเบียบบริหาร',a:'เหตุผล(ไม่เสมอภาค) → ผูกพัน/ดุลพินิจ → 2 แบบ(ป้องกัน+แก้ไข) → พ.ร.บ.(ละเมิด2539 วิธีปฏิบัติ2539 ศาลปกครอง2542) → ราชการ 3 ส่วน(กลาง=รวม ภูมิภาค=แบ่ง ท้องถิ่น=กระจาย) ตาม พ.ร.บ.2534 → บังคับบัญชา vs กำกับดูแล',star:3,exam:true},
{id:22,q:'(สอบ2567 ข้อ2) ความหมาย ลักษณะ ขอบเขต ก.ม.มหาชน',a:'ขอบเขต 5 ข้อ: 1.กำหนดสถานะ/นิติสัมพันธ์องค์กรรัฐ 2.มุ่งประโยชน์สาธารณะ 3.ไม่เสมอภาค 4.สภาพบังคับทั่วไป 5.ศาลพิเศษ + ลักษณะ 4(ปฏิรูป สาธารณะ ไม่เสมอ ควบคุม) + แตกต่าง 6 ด้าน',star:3,exam:true},
{id:23,q:'(สอบ2567 ข้อ3) อปท. ในบริบท ก.ม.มหาชน',a:'อปท.=นิติบุคคลมหาชน ฐานะฝ่ายปกครอง + หลักกระจายอำนาจ + ตัวอย่าง อปท. + บริการสาธารณะ + เปรียบเทียบนิติบุคคลมหาชน vs เอกชน',star:3,exam:true},
{id:24,q:'(สอบ2566 ข้อ1) ควบคุมอำนาจรัฐในจัดระเบียบบริหาร',a:'ควบคุม 2 แบบ(ป้องกัน+แก้ไข) + พ.ร.บ.(ละเมิด วิธีปฏิบัติ ศาลปกครอง) + เชื่อมโยง 3 ส่วนราชการ + สอดแทรกรูปแบบควบคุม',star:3,exam:true},
{id:25,q:'(สอบ2566 ข้อ2) ประโยชน์สาธารณะ+บริการสาธารณะ',a:'ประโยชน์สาธารณะ=เพื่อ ปชช.ส่วนใหญ่ + 4 หลักสำคัญ(ต่อเนื่อง เสมอภาค ปรับปรุง กำกับ) + 3 องค์กร(นิติบัญญัติ บริหาร ตุลาการ) + อธิบายอำนาจแต่ละองค์กร',star:3,exam:true},
{id:26,q:'(สอบ2566 ข้อ3) "เราใช้ ก.ม.มหาชนในการปฏิรูป"',a:'ก.ม.มหาชน=ว่าด้วยความสัมพันธ์รัฐกับเอกชน ฐานะฝ่ายปกครอง + 2 ประเภท(ภายใน/ภายนอก) + รธน.2560 ม.258 ปฏิรูป 7 ด้าน + "ปฏิรูป"=ปรับปรุงให้สมควร',star:3,exam:true},
];

const quickSections=[
{divider:'⚡ สูตรจำ ลักษณะ ก.ม.มหาชน'},
{type:'mnem',title:'4 ลักษณะ ก.ม.มหาชน',body:'ปฏิ-สาธา-ไม่เสมอ-ควบคุม\n🔹 ปฏิ = ใช้ในการปฏิรูป\n🔹 สาธา = เพื่อสาธารณประโยชน์\n🔹 ไม่เสมอ = ไม่เสมอภาค(บังคับเองได้)\n🔹 ควบคุม = ควบคุมอำนาจของรัฐ'},
{type:'formula',title:'โครงสร้าง ก.ม.มหาชน',body:'ก.ม.มหาชน = {\n  ภายใน: [รัฐธรรมนูญ, ปกครอง, การคลัง],\n  ภายนอก: [ระหว่างประเทศแผนกคดีเมือง]\n}'},
{type:'contrast',title:'มหาชน vs เอกชน (6 ด้าน)',body:'🏛️ มหาชน → รัฐvsเอกชน | สาธารณะ | ไม่เสมอภาค | นิติวิธีมหาชน | ประสานสมดุล | ศาลพิเศษ\n👤 เอกชน → เอกชนvsเอกชน | กำไร | เสมอภาค | นิติวิธีเอกชน | ยุติธรรมเท่าเทียม | ศาลยุติธรรม'},
{divider:'🏛️ ประโยชน์สาธารณะ + บริการสาธารณะ'},
{type:'mnem',title:'4 หลักบริการสาธารณะ',body:'ต่อ-เสมอ-ปรับ-กำกับ\n🔹 ต่อ = ความต่อเนื่อง\n🔹 เสมอ = ความเสมอภาค\n🔹 ปรับ = ปรับปรุงเปลี่ยนแปลง\n🔹 กำกับ = กำกับดูแลโดยรัฐ'},
{type:'flow',title:'3 องค์กร บริการสาธารณะ',body:'นิติบัญญัติ(รัฐสภา) → ออก ก.ม.+ควบคุมบริหาร\n↓\nบริหาร(ครม.) → บริหาร+จัดทำบริการ\n↓\nตุลาการ(ศาล) → พิจารณา+คุ้มครองสิทธิ'},
{divider:'🔒 การควบคุมอำนาจรัฐ'},
{type:'contrast',title:'ผูกพัน vs ดุลพินิจ',body:'⚡ ผูกพัน → ต้องปฏิบัติตาม ก.ม. ไม่มีทางเลือก\n⚡ ดุลพินิจ → เลือกตัดสินใจได้ ก.ม.เปิดช่อง'},
{type:'flow',title:'ควบคุม 2 รูปแบบ',body:'🛡️ ป้องกัน(ก่อนทำ) → แย้ง → ปรึกษา → ไม่มีส่วนได้เสีย → ไต่สวน → แจ้งสิทธิ\n🔧 แก้ไข(หลังทำ) → ภายใน(บังคับบัญชา) → ภายนอก(รัฐสภา/ปปช.) → ศาล'},
{type:'mnem',title:'6 กรณีดุลพินิจไม่ชอบ',body:'ข้าม-ปราศ-ผิด-นอก-ภาระ-อคติ\n🔹 ข้าม=ข้ามขั้นตอน 🔹 ปราศ=ปราศจากอำนาจ\n🔹 ผิด=ผิดแบบ 🔹 นอก=นอกวัตถุประสงค์\n🔹 ภาระ=สร้างภาระ ปชช. 🔹 อคติ=อคติ/ไม่สุจริต'},
{divider:'🏗️ ราชการ 3 ส่วน'},
{type:'formula',title:'3 ส่วน + หลักการ',body:'กลาง+รวมอำนาจ = กระทรวง ทบวง กรม\nภูมิภาค+แบ่งอำนาจ = จังหวัด อำเภอ (ผู้ว่าฯ นายอำเภอ)\nท้องถิ่น+กระจายอำนาจ = อบต. อบจ. เทศบาล กทม. พัทยา'},
{type:'contrast',title:'บังคับบัญชา vs กำกับดูแล',body:'⚡ บังคับบัญชา(กลาง+ภูมิภาค) → ปรับ แก้ ยกเลิก เพิกถอนได้เสมอ\n⚡ กำกับดูแล(ท้องถิ่น) → อำนาจมีเงื่อนไข ใช้เมื่อ ก.ม.มอบอำนาจ'},
{type:'chunk',title:'พ.ร.บ.สำคัญ 4 ฉบับ',body:'📜 ความผิดทางละเมิดของ จนท.รัฐ 2539\n📜 วิธีปฏิบัติราชการทางปกครอง 2539\n📜 จัดตั้งศาลปกครองฯ 2542\n📜 ระเบียบบริหารราชการแผ่นดิน 2534'},
{divider:'⚖️ นิติรัฐ + ใช้อำนาจ + ปฏิรูป'},
{type:'mnem',title:'นิติรัฐ 3 ข้อ',body:'จำกัด-คุ้มครอง-เป็นธรรม\n🔹 จำกัด=จำกัดอำนาจรัฐในกรอบ ก.ม.\n🔹 คุ้มครอง=คุ้มครองสิทธิเสรีภาพ\n🔹 เป็นธรรม=ก.ม.ต้องยุติธรรม (ระบบนับถือกฎหมาย)'},
{type:'mnem',title:'ใช้อำนาจ 3 หลัก',body:'ชอบ-สาธารณะ-ยุติธรรม\n🔹 ชอบ=ชอบด้วย ก.ม.\n🔹 สาธารณะ=ประโยชน์สาธารณะ\n🔹 ยุติธรรม=ความยุติธรรม'},
{type:'chunk',title:'ปฏิรูป 7 ด้าน (ม.258)',body:'ก.การเมือง | ข.การบริหาร | ค.กฎหมาย\nง.ยุติธรรม | จ.การศึกษา | ฉ.เศรษฐกิจ | ช.อื่นๆ'},
{type:'flow',title:'นิติวิธี 2 ประเภท',body:'เชิงปฏิเสธ → ไม่เอาหลัก ก.ม.เอกชน\n↓\nเชิงสร้างสรรค์ → สร้างหลัก ก.ม.มหาชนใหม่'},
{divider:'📝 โครงสร้างคำตอบ'},
{type:'formula',title:'ตอบข้อ 1 (ควบคุม+บริหาร)',body:'เหตุผลควบคุม → ผูกพัน/ดุลพินิจ → 2 แบบ(ป้องกัน+แก้ไข)\n→ พ.ร.บ.(2539+2539+2542) → ราชการ 3 ส่วน → บังคับบัญชา vs กำกับดูแล'},
{type:'formula',title:'ตอบข้อ 2 (ความหมาย+ลักษณะ)',body:'ความหมาย → 4 ลักษณะ → ประเภท(รธน. ปกครอง การคลัง)\n→ ขอบเขต 5 ข้อ → แตกต่าง 6 ด้าน → ยกตัวอย่าง'},
{type:'formula',title:'ตอบข้อ 3 (อปท./ปฏิรูป)',body:'อปท.=นิติบุคคลมหาชน → กระจายอำนาจ → ตัวอย่าง\n→ บริการสาธารณะ → มหาชน vs เอกชน\nหรือ: ปฏิรูป → ม.258 → 7 ด้าน'},
{type:'contrast',title:'ศาลเดี่ยว vs ศาลคู่',body:'⚡ เดี่ยว → วินิจฉัยทุกคดี (Common Law: UK USA)\n⚡ คู่ → แยกศาลปกครอง (Civil Law: ฝรั่งเศส ไทย)\n🇹🇭 ไทย=ศาลคู่ 4 ระบบ: รธน. ยุติธรรม ปกครอง ทหาร'},
];

const SummaryTab=()=>{const[open,setOpen]=useState({structure:true});return(<Space direction="vertical" size={14} style={{width:'100%'}}>{summaryData.map(s=>(<Card key={s.key} size="small" style={{borderRadius:16,border:`1px solid ${C.border}`,background:C.white,boxShadow:'0 2px 12px rgba(59,130,246,.08)',cursor:'pointer'}} onClick={()=>setOpen(p=>({...p,[s.key]:!p[s.key]}))}><Flex justify="space-between" align="center" style={{marginBottom:open[s.key]?12:0}}><Space size={8} wrap><Text strong style={{fontSize:16,color:C.text}}>{s.title}</Text>{(s.tags||[]).map(([t,c],i)=><Tag key={i} color={c} style={{fontSize:11}}>{t}</Tag>)}</Space><Text style={{color:C.goldDark,fontSize:18}}>{open[s.key]?'▲':'▼'}</Text></Flex>{open[s.key]&&<div onClick={e=>e.stopPropagation()}>{s.content()}</div>}</Card>))}</Space>)};

const FlashcardTab=()=>{const[deck,setDeck]=useState(flashcardData);const[idx,setIdx]=useState(0);const[flipped,setFlipped]=useState(false);const[score,setScore]=useState({right:0,wrong:0});const[filter,setFilter]=useState('all');const filtered=filter==='exam'?deck.filter(c=>c.exam):filter==='star3'?deck.filter(c=>c.star===3):deck;const card=filtered[idx]||filtered[0];const shuffle=()=>{setDeck(d=>[...d].sort(()=>Math.random()-.5));setIdx(0);setFlipped(false)};const next=()=>{setIdx(i=>(i+1)%filtered.length);setFlipped(false)};const prev=()=>{setIdx(i=>(i-1+filtered.length)%filtered.length);setFlipped(false)};const markRight=()=>{setScore(s=>({...s,right:s.right+1}));next()};const markWrong=()=>{setScore(s=>({...s,wrong:s.wrong+1}));next()};if(!card)return<Alert message="ไม่มีการ์ด" type="warning"/>;return(<div style={{maxWidth:640,margin:'0 auto'}}><Flex justify="space-between" align="center" wrap="wrap" gap={8} style={{marginBottom:16}}><Space size={6} wrap><Button size="small" type={filter==='all'?'primary':'default'} onClick={()=>{setFilter('all');setIdx(0);setFlipped(false)}}>ทั้งหมด ({deck.length})</Button><Button size="small" type={filter==='exam'?'primary':'default'} onClick={()=>{setFilter('exam');setIdx(0);setFlipped(false)}}>ข้อสอบจริง ({deck.filter(c=>c.exam).length})</Button><Button size="small" type={filter==='star3'?'primary':'default'} onClick={()=>{setFilter('star3');setIdx(0);setFlipped(false)}}>⭐⭐⭐ ({deck.filter(c=>c.star===3).length})</Button></Space><Space size={6}><Tag color="green">✓ {score.right}</Tag><Tag color="red">✗ {score.wrong}</Tag><Button size="small" onClick={shuffle}>🔀 สับ</Button></Space></Flex><div className="fc-perspective" style={{marginBottom:16}} onClick={()=>setFlipped(f=>!f)}><div className={`fc-card ${flipped?'flipped':''}`}><div className="fc-face" style={{background:'linear-gradient(135deg,#F0F9FF,#FFFFFF)',border:'2px solid #93C5FD'}}><Text style={{color:C.text3,fontSize:13,marginBottom:8}}>คำถาม {idx+1}/{filtered.length} {'⭐'.repeat(card.star)}</Text>{card.exam&&<Tag color="red" style={{marginBottom:8}}>ข้อสอบจริง</Tag>}<Text style={{color:C.text,fontSize:17,fontWeight:600,lineHeight:1.8}}>{card.q}</Text><Text style={{color:C.goldLight,fontSize:12,marginTop:12}}>แตะเพื่อพลิกดูคำตอบ</Text></div><div className="fc-face fc-back" style={{background:'linear-gradient(135deg,#2563EB,#0EA5E9,#06B6D4)',border:'none',overflowY:'auto'}}><Text style={{color:'rgba(255,255,255,.7)',fontSize:13,marginBottom:8}}>คำตอบ</Text><Text style={{color:'#FFF',fontSize:15,fontWeight:500,lineHeight:1.9,whiteSpace:'pre-wrap'}}>{card.a}</Text></div></div></div><Flex justify="center" gap={8}><Button onClick={prev}>◀ ก่อนหน้า</Button><Button type="primary" danger onClick={markWrong}>✗ ยังไม่ได้</Button><Button type="primary" style={{background:C.green,borderColor:C.green}} onClick={markRight}>✓ ได้แล้ว</Button><Button onClick={next}>ถัดไป ▶</Button></Flex></div>)};

const typeColor={mnem:C.purple,flow:C.blue,contrast:C.red,chunk:C.cyan,formula:C.green};const typeBg={mnem:C.purpleBg,flow:C.blueBg,contrast:C.redBg,chunk:C.cyanBg,formula:C.greenBg};const typeLabel={mnem:'Mnemonic',flow:'Flow',contrast:'เปรียบเทียบ',chunk:'Chunk',formula:'สูตร'};
const QuickTab=()=>(<Space direction="vertical" size={12} style={{width:'100%'}}>{quickSections.map((s,i)=>{if(s.divider)return<Divider key={i} orientation="left" style={{borderColor:C.borderDark,color:C.goldDark,fontWeight:600,fontSize:15}}>{s.divider}</Divider>;const tc=typeColor[s.type]||C.gold;const tb=typeBg[s.type]||C.surface3;return(<Card key={i} size="small" className="qc" style={{borderRadius:14,border:`1px solid ${C.border}`,background:tb}}><Tag color={tc} style={{fontWeight:600,marginBottom:6}}>{typeLabel[s.type]||s.type}</Tag><Text strong style={{color:C.text,fontSize:15}}> {s.title}</Text><div style={{marginTop:8,whiteSpace:'pre-wrap',color:C.text2,fontSize:13,lineHeight:1.9}}>{s.body}</div></Card>)})}</Space>);

const App=()=>(<ConfigProvider theme={{algorithm:theme.defaultAlgorithm,token:{colorPrimary:'#2563EB',borderRadius:12,fontFamily:'Noto Sans Thai, sans-serif',colorBgContainer:'#FFFFFF',colorBorder:'#BAE6FD'}}}><Layout style={{background:'transparent',minHeight:'100vh',color:C.text}}><Content style={{maxWidth:960,margin:'0 auto',padding:'28px 16px 48px'}}><div style={{textAlign:'center',marginBottom:28}}><Title level={2} style={{marginBottom:4,background:'linear-gradient(90deg,#1D4ED8,#0EA5E9,#059669)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>LAW1101 หลักกฎหมายมหาชน</Title><Text style={{color:C.text3}}>มหาวิทยาลัยรามคำแหง — สรุป + Flashcard + การ์ดจำด่วน</Text><br/><Text style={{color:C.goldLight,fontSize:12}}>อัปเดต: {dayjs().format('D MMM YYYY')} • จากเนื้อหา + ข้อสอบ 2566-2567</Text></div><Tabs centered defaultActiveKey="summary" items={[{key:'summary',label:'📖 สรุปเนื้อหา',children:<SummaryTab/>},{key:'flashcard',label:`🃏 Flashcard (${flashcardData.length})`,children:<FlashcardTab/>},{key:'quick',label:'⚡ การ์ดจำด่วน',children:<QuickTab/>}]} style={{background:C.white,borderRadius:20,padding:'12px 20px 24px',border:`1px solid ${C.border}`,boxShadow:'0 4px 24px rgba(59,130,246,.1)'}}/></Content></Layout></ConfigProvider>);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
