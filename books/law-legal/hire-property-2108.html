<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เช่าทรัพย์ เช่าซื้อ LAW2108 · ห้องเรียนอินเทอร์แอกทีฟ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

/* responsive antd (UX audit 2026-07): กันแท็บ/หัวข้อดันหน้าล้นจอบนมือถือ */
@media (max-width: 820px) {

<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button,
        Row, Col, Divider, Alert, Statistic, Flex, Segmented, Radio, Progress, Steps,
        Collapse, Switch, Select, Result, Tooltip, Badge, Empty } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState, useEffect, useRef, useMemo } = React;

/* ============ PALETTE (โทนเขียวหยก — เฉพาะวิชา LAW2108) ============ */
const C = {
  teal:'#4E8D7C', tealDark:'#38695C', tealLight:'#A3C6BB',
  jade:'#6FA08F', jadeDark:'#2F5D50',
  bg:'#EEF4F1', surface:'#E2ECE7', surface2:'#D6E4DD', surface3:'#E9F1ED',
  border:'#C7DAD1', borderDark:'#A3C6BB',
  text:'#28352F', text2:'#44554D', text3:'#65786F',
  white:'#F9FBFA',
  green:'#4C8A57', greenBg:'#EDF5EE',
  red:'#B85C5C', redBg:'#F5ECEA',
  purple:'#7B6B8A', purpleBg:'#F0ECF3',
  blue:'#4F7AA0', blueBg:'#EBF1F6',
  cyan:'#4C8A8A', cyanBg:'#EAF2F2',
  orange:'#BF7B3F', orangeBg:'#F7F0E5',
};

/* ============ SHARED HELPERS ============ */
const Stars = ({n}) => <span style={{color:C.jade, letterSpacing:1}}>{'★'.repeat(n)}<span style={{color:C.border}}>{'★'.repeat(3-n)}</span></span>;

const Sec = ({children}) => (
  <span className="sec-badge" style={{background:C.surface2, color:C.tealDark, padding:'1px 8px', borderRadius:7, border:`1px solid ${C.border}`, whiteSpace:'nowrap'}}>ม.{children}</span>
);

const Dika = ({children}) => (
  <span className="sec-badge" style={{background:C.redBg, color:C.red, padding:'1px 8px', borderRadius:7, border:`1px solid ${C.red}44`, whiteSpace:'nowrap'}}>ฎ.{children}</span>
);

const Pill = ({color, bg, children}) => (
  <span className="tag-chip" style={{background:bg, color:color, border:`1px solid ${color}33`}}>{children}</span>
);

const Box = ({tone='teal', title, icon, children, style}) => {
  const map = {
    green:[C.green,C.greenBg], red:[C.red,C.redBg], blue:[C.blue,C.blueBg],
    purple:[C.purple,C.purpleBg], cyan:[C.cyan,C.cyanBg], orange:[C.orange,C.orangeBg],
    teal:[C.tealDark,C.surface3]
  };
  const [cc,bb] = map[tone]||map.teal;
  return (
    <div className="lesson-body" style={{background:bb, border:`1px solid ${cc}33`, borderLeft:`4px solid ${cc}`, borderRadius:12, padding:'13px 16px', margin:'10px 0', ...style}}>
      {title && <div style={{fontWeight:700, color:cc, marginBottom:6, fontSize:15}}>{icon} {title}</div>}
      <div style={{color:C.text2, fontSize:14.5}}>{children}</div>
    </div>
  );
};

/* ============ ANIMATED SVG DIAGRAM ENGINE ============ */
function DiaNode({x, y, w=150, h=62, title, sub, color, active, onClick}) {
  return (
    <g style={{cursor:onClick?'pointer':'default'}} onClick={onClick} className={active?'node-pulse':''}>
      <rect x={x-w/2} y={y-h/2} width={w} height={h} rx={14}
        fill={active ? color : C.white}
        stroke={color} strokeWidth={active?3:2}
        style={{filter: active?`drop-shadow(0 4px 10px ${color}55)`:'none', transition:'all .4s'}} />
      <text x={x} y={sub? y-6 : y+5} textAnchor="middle"
        fontFamily="'Noto Sans Thai'" fontWeight="700" fontSize="16"
        fill={active ? C.white : color}>{title}</text>
      {sub && <text x={x} y={y+14} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="11.5"
        fill={active ? C.white : C.text3}>{sub}</text>}
    </g>
  );
}

function DiaEdge({id, d, color, label, labelX, labelY, dashed, animate, dur=2.6, reverse, width=3, dim}) {
  const op = dim ? 0.18 : 1;
  return (
    <g style={{opacity:op, transition:'opacity .4s'}}>
      <path id={id} d={d} fill="none" stroke={color} strokeWidth={width}
        strokeDasharray={dashed?'7 7':'none'} strokeLinecap="round"
        markerEnd={`url(#arrow-${id})`} />
      <defs>
        <marker id={`arrow-${id}`} markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L7,3 L0,6 Z" fill={color}/>
        </marker>
      </defs>
      {animate && !dim &&
        <circle r="6.5" fill={color}>
          <animateMotion dur={`${dur}s`} repeatCount="indefinite" keyPoints={reverse?'1;0':'0;1'} keyTimes="0;1" rotate="0">
            <mpath href={`#${id}`}/>
          </animateMotion>
        </circle>}
      {label &&
        <g>
          <rect x={labelX-label.length*4.1-8} y={labelY-13} width={label.length*8.2+16} height={22} rx={11}
            fill={C.white} stroke={color+'55'} />
          <text x={labelX} y={labelY+2} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5"
            fontWeight="600" fill={color}>{label}</text>
        </g>}
    </g>
  );
}

/* เข็มทิศ 4 สัญญา — แผนภาพแกนกลางของวิชา: อะไรไหลไป-มาระหว่างคู่สัญญา และกรรมสิทธิ์อยู่ที่ใคร */
function ContractCompass() {
  const modes = {
    lease: {
      label:'เช่าทรัพย์', color:C.blue,
      left:{t:'ผู้ให้เช่า', s:'Lessor'}, right:{t:'ผู้เช่า', s:'Lessee'},
      give:'ให้ "ใช้หรือได้ประโยชน์" ในทรัพย์', back:'ค่าเช่า (ชั่วระยะเวลาจำกัด)',
      obj:'กรรมสิทธิ์ยังอยู่ที่ผู้ให้เช่าเสมอ',
      desc:'เช่าทรัพย์ (ม.537–571) คือการ "ยืมใช้แบบมีค่าตอบแทน" — ผู้เช่าได้แค่สิทธิใช้สอย ไม่มีวันได้กรรมสิทธิ์ จุดสอบอยู่ที่แบบของสัญญา (ม.538) หน้าที่คู่สัญญา (ม.552–554) และผลเมื่อโอนทรัพย์ที่เช่า (ม.569)'
    },
    hp: {
      label:'เช่าซื้อ', color:C.green,
      left:{t:'ผู้ให้เช่าซื้อ', s:'เจ้าของทรัพย์'}, right:{t:'ผู้เช่าซื้อ', s:'ผ่อนเป็นงวด'},
      give:'ให้เช่า + คำมั่นว่า "จะขาย" เมื่อชำระครบ', back:'ค่าเช่าซื้อเป็นงวด ๆ',
      obj:'ชำระครบทุกงวด → กรรมสิทธิ์จึงโอน',
      desc:'เช่าซื้อ (ม.572–574) = เช่า + คำมั่นจะขาย ต้องทำเป็น "หนังสือ" มิฉะนั้นโมฆะ (ม.572 ว.2) จุดตายของข้อสอบคือการบอกเลิก+ริบเงินตาม ม.574 ว.1 และกับดัก "เรียกค่างวดที่เหลือทั้งหมดไม่ได้" (ฎ.859/2524)'
    },
    labor: {
      label:'จ้างแรงงาน', color:C.purple,
      left:{t:'นายจ้าง', s:'Employer'}, right:{t:'ลูกจ้าง', s:'Employee'},
      give:'สินจ้าง "ตลอดเวลาที่ทำงาน"', back:'แรงงาน — เน้นกระบวนการทำงาน',
      obj:'สาระสำคัญ = ตัวลูกจ้าง (เปลี่ยนคนต้องยินยอม ม.577)',
      desc:'จ้างแรงงาน (ม.575–586) เน้น "กระบวนการ" — ลูกจ้างทำงานให้ นายจ้างจ่ายสินจ้างตลอดเวลาทำงาน จุดสอบคือการโอนสิทธิ/รับคนแทน (ม.577) และการบอกเลิก ม.582 (ต้องบอกล่วงหน้า) vs ม.583 (เลิกทันที)'
    },
    work: {
      label:'จ้างทำของ', color:C.orange,
      left:{t:'ผู้ว่าจ้าง', s:'Hirer'}, right:{t:'ผู้รับจ้าง', s:'Contractor'},
      give:'สินจ้าง แลกกับ "ผลสำเร็จ" ของงาน', back:'ทำงานจนสำเร็จ — เน้นผลสำเร็จ',
      obj:'ยังไม่สำเร็จ = ยังไม่ครบหน้าที่',
      desc:'จ้างทำของ (ม.587–607) เน้น "ผลสำเร็จ" ไม่ใช่กระบวนการ จุดสอบคือเลิกสัญญาเมื่อผู้รับจ้างชักช้า (ม.593) ข้อยกเว้นสัมภาระ/คำสั่งผู้ว่าจ้างบกพร่อง (ม.591) และสิทธิบอกเลิกได้เสมอแต่ต้องชดใช้ (ม.605)'
    }
  };
  const [m, setM] = useState('lease');
  const M = modes[m];
  const L = {x:130, y:95}, R = {x:530, y:95}, O = {x:330, y:290};
  return (
    <div>
      <div style={{textAlign:'center', marginBottom:12}}>
        <Segmented value={m} onChange={setM} size="large"
          options={Object.keys(modes).map(k=>({label:modes[k].label, value:k}))} />
      </div>
      <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:16, padding:'8px 4px'}}>
        <svg viewBox="0 0 660 350" style={{width:'100%', height:'auto', maxHeight:400}}>
          <DiaEdge id="give" d={`M ${L.x+55} ${L.y-14} Q 330 12 ${R.x-60} ${R.y-14}`} color={M.color}
            label={M.give} labelX={330} labelY={30} animate dur={2.6} width={3}/>
          <DiaEdge id="back" d={`M ${R.x-60} ${R.y+22} Q 330 175 ${L.x+58} ${L.y+22}`} color={C.jadeDark}
            label={M.back} labelX={330} labelY={148} animate dur={2.6} width={3}/>
          <DiaEdge id="obj1" d={`M ${L.x+12} ${L.y+40} L ${O.x-70} ${O.y-38}`} color={C.cyan}
            dashed animate dur={3.2} width={2.5}/>
          <DiaEdge id="obj2" d={`M ${R.x-12} ${R.y+40} L ${O.x+70} ${O.y-38}`} color={C.cyan}
            dashed animate dur={3.2} reverse width={2.5}/>
          <DiaNode {...L} title={M.left.t} sub={M.left.s} color={M.color} active />
          <DiaNode {...R} title={M.right.t} sub={M.right.s} color={C.jadeDark} active />
          <DiaNode {...O} w={300} title={m==='labor'||m==='work'?'งานที่ทำ':'ทรัพย์สินที่เช่า'} sub={M.obj} color={C.cyan} active />
        </svg>
      </div>
      <Box tone={m==='lease'?'blue':(m==='hp'?'green':(m==='labor'?'purple':'orange'))} title={`โหมด: ${M.label}`} icon="🎬" style={{marginTop:12}}>
        {M.desc}
      </Box>
    </div>
  );
}

/* แถบขั้นตอนแนวนอนแบบเคลื่อนไหว */
function FlowStrip({steps, color=C.teal}) {
  return (
    <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:14, padding:'16px 10px', overflowX:'auto'}}>
      <svg viewBox={`0 0 ${steps.length*180} 130`} style={{width:'100%', minWidth:steps.length*150, height:'auto'}}>
        {steps.map((s,i)=>{
          const x = 90 + i*180;
          return (
            <g key={i}>
              {i<steps.length-1 &&
                <DiaEdge id={`fs${color.replace('#','')}${i}`} d={`M ${x+62} 55 L ${x+118} 55`} color={color} animate dur={1.8} width={2.5}/>}
              <circle cx={x} cy={55} r={34} fill={s.bg||C.surface3} stroke={color} strokeWidth={2.5} className="node-pulse"/>
              <text x={x} y={60} textAnchor="middle" fontSize="24">{s.icon}</text>
              <text x={x} y={112} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5" fontWeight="600" fill={C.text2}>
                {s.t}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ============ TAB 1: FOUNDATIONS (ปูพื้นฐาน) ============ */
function FoundationsTab() {
  const vocab = [
    ['ผู้ให้เช่า / ผู้เช่า', 'Lessor / Lessee', 'คนที่ให้ใช้ทรัพย์แลกค่าเช่า กับคนที่จ่ายค่าเช่าเพื่อใช้ทรัพย์ — กรรมสิทธิ์ไม่โอนเด็ดขาด', C.blue],
    ['เช่าช่วง', 'Sublease', 'ผู้เช่าเอาทรัพย์ที่ตนเช่าไปให้คนอื่นเช่าต่อ — ทำไม่ได้ถ้าผู้ให้เช่าไม่ยินยอม (ม.544)', C.blue],
    ['เช่าซื้อ', 'Hire-Purchase', 'เจ้าของ "ให้เช่า" + ให้คำมั่นว่าจะ "ขาย" เมื่อผ่อนครบ — ต้องทำเป็นหนังสือ ไม่งั้นโมฆะ (ม.572)', C.green],
    ['ผู้เช่าซื้อ', 'Hire-Purchaser', 'คนผ่อนเป็นงวด ๆ — ผ่อนครบเมื่อไหร่ กรรมสิทธิ์จึงโอนมาเป็นของตน', C.green],
    ['นายจ้าง / ลูกจ้าง', 'Employer / Employee', 'จ้างแรงงาน (ม.575) — จ่ายสินจ้าง "ตลอดเวลาทำงาน" เน้นกระบวนการ', C.purple],
    ['ผู้ว่าจ้าง / ผู้รับจ้าง', 'Hirer / Contractor', 'จ้างทำของ (ม.587) — จ่ายสินจ้างแลก "ผลสำเร็จของงาน"', C.orange],
    ['สินจ้าง', 'Remuneration', 'ค่าตอบแทนในสัญญาจ้างทั้งสองแบบ — จุดแบ่งคือจ่ายเพราะ "เวลา" หรือเพราะ "ผลสำเร็จ"', C.jadeDark],
    ['บอกกล่าวก่อน', 'Prior Notice', 'ขั้นตอนบังคับก่อนบอกเลิกในบางมาตรา (เช่น ม.554, 582) — ข้ามขั้น = เลิกโดยมิชอบ', C.red],
  ];
  return (
    <div className="fade-up">
      <Alert type="info" showIcon style={{marginBottom:18, background:C.blueBg, border:`1px solid ${C.blue}44`}}
        message={<span style={{fontWeight:700, color:C.blue, fontSize:16}}>เริ่มจากศูนย์ก็เข้าใจได้ 👋</span>}
        description={<span style={{color:C.text2}}>วิชานี้คือเรื่องของ <strong>4 สัญญาในชีวิตประจำวัน</strong>: เช่าหอพัก (เช่าทรัพย์) · ผ่อนรถ (เช่าซื้อ) · ทำงานประจำ (จ้างแรงงาน) · จ้างช่างต่อเติมบ้าน (จ้างทำของ) ทุกมาตราตอบคำถามเดียวกันคือ <strong>"ใครมีหน้าที่ทำอะไร และเลิกสัญญากันอย่างไรจึงจะชอบด้วยกฎหมาย"</strong></span>} />

      <Card style={{marginBottom:18, borderColor:C.border, background:C.surface3}} bodyStyle={{padding:'18px 20px'}}>
        <Title level={4} style={{marginTop:0, color:C.text}}>🏠 นึกภาพง่าย ๆ ด้วยชีวิตจริง</Title>

function PredictCard({c}) {
  const [picked, setPicked] = useState(null); // null | true | false
  const revealed = picked !== null;
  const correct = revealed && picked === c.answer;
  return (
    <Card style={{marginBottom:16, borderColor:C.border}} bodyStyle={{padding:'18px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:10}}>
        <Tag color="geekblue" style={{fontWeight:700, background:c.color+'18', color:c.color, border:`1px solid ${c.color}55`}}>{c.tag}</Tag>
        <Stars n={c.star}/>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3}}>
        <strong style={{color:C.tealDark}}>ข้อเท็จจริง: </strong>{c.facts}
      </div>
      <div style={{margin:'14px 0 10px', fontWeight:700, fontSize:15.5, color:C.text}}>❓ {c.ask}</div>
      {!revealed ? (
        <Space wrap>
          <Button size="large" style={{borderColor:C.green, color:C.green, fontWeight:700}} onClick={()=>setPicked(true)}>✅ ได้ / ใช่</Button>
          <Button size="large" style={{borderColor:C.red, color:C.red, fontWeight:700}} onClick={()=>setPicked(false)}>⛔ ไม่ได้ / ไม่ใช่</Button>
        </Space>
      ) : (
        <div className="fade-up">
          <Alert type={correct?'success':'error'} showIcon
            style={{marginBottom:10, background:correct?C.greenBg:C.redBg, border:`1px solid ${(correct?C.green:C.red)}55`}}
            message={<span style={{fontWeight:700, color:correct?C.green:C.red}}>
              {correct ? 'ทำนายถูก! สายตาแบบนักกฎหมายแล้ว 🎯' : `ยังไม่ใช่ — คำตอบที่ถูกคือ "${c.answer?'ได้ / ใช่':'ไม่ได้ / ไม่ใช่'}"`}
            </span>} />
          <div style={{marginBottom:10}}>
            {c.secs.map(s=><span key={s} style={{display:'inline-block', margin:'3px 6px 3px 0', background:c.color, color:C.white, padding:'3px 12px', borderRadius:8, fontWeight:700, fontFamily:"'Noto Serif Thai'"}}>มาตรา {s}</span>)}
          </div>
          <div style={{background:C.surface3, borderRadius:12, padding:'13px 16px', border:`1px solid ${C.border}`}}>
            <div style={{fontSize:12.5, color:C.text3, fontWeight:700, marginBottom:4}}>คำวินิจฉัย</div>
            <div style={{color:C.text2, fontSize:14.6, lineHeight:1.85}}>{c.ruling}</div>
          </div>
          <div style={{marginTop:12, textAlign:'center'}}>
            <span style={{display:'inline-block', background:c.color+'1a', color:c.color, border:`1.5px dashed ${c.color}`, borderRadius:30, padding:'7px 18px', fontWeight:700, fontSize:14.5}}>
              🎯 ผล: {c.who}</span>
          </div>
          <Box tone="red" title="กับดัก" icon="⚠️" style={{marginTop:12, marginBottom:0}}>{c.trap}</Box>
          <div style={{textAlign:'center', marginTop:10}}>
            <Button size="small" onClick={()=>setPicked(null)}>ลองทายใหม่</Button>
          </div>
        </div>
      )}
    </Card>
  );
}

function CaseLabTab() {

      {labCases.map(c=><PredictCard key={c.id} c={c}/>)}

        และ <strong>"แบบของสัญญาครบไหม"</strong> (538 · 572) — จับสองแกนนี้ได้ ข้อสอบก็อ่านออกทั้งฉบับ
      </Box>
    </div>
  );
}

function IracCard({c}) {
  const [step, setStep] = useState(0); // 0=facts only, 1..4 reveal I R A C
  const parts = [
    {k:'Issue', th:'ประเด็น (I)', color:C.blue, body:c.issue},
    {k:'Rule', th:'หลักกฎหมาย (R)', color:C.purple, body:<span>{c.rule.map(x=><span key={x} style={{marginRight:6}}><Sec>{x}</Sec></span>)}<div style={{marginTop:8}}>{c.ruleText}</div></span>},
    {k:'Application', th:'ปรับข้อเท็จจริง (A)', color:C.jadeDark, body:c.application},
    {k:'Conclusion', th:'สรุป (C)', color:C.green, body:c.conclusion},
  ];
  return (
    <Card style={{marginBottom:18, borderColor:C.border}} bodyStyle={{padding:'18px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:10}}>
        <Tag color="volcano" style={{fontWeight:700}}>{c.tag}</Tag>
        <span style={{fontWeight:700, fontSize:16, color:C.text}}>{c.topic}</span>
        <Stars n={c.star}/>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3}}>
        <strong style={{color:C.tealDark}}>ข้อเท็จจริง: </strong>{c.facts}
      </div>
      <div style={{margin:'14px 0 6px'}}>
        {parts.slice(0,step).map((p,i)=>(
          <div key={i} className="fade-up" style={{borderLeft:`4px solid ${p.color}`, background:p.color+'12', borderRadius:'0 10px 10px 0', padding:'11px 15px', marginBottom:10}}>
            <div style={{fontWeight:700, color:p.color, marginBottom:3}}>{p.th}</div>
            <div style={{color:C.text2, fontSize:14.3}}>{p.body}</div>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center', marginTop:6}}>
        {step<4
          ? <Button type="primary" size="large" onClick={()=>setStep(step+1)}
              style={{background:parts[step].color, borderColor:parts[step].color}}>
              เปิดขั้น {parts[step].th} ▸</Button>
          : <Space>
              <Tag color="green" style={{padding:'6px 14px', fontSize:14}}>✅ ครบ IRAC แล้ว</Tag>
              <Button onClick={()=>setStep(0)}>เริ่มใหม่</Button>
            </Space>}
      </div>
    </Card>
  );
}

function FlashcardTab() {
  const [mode, setMode] = useState('all');
  const pool = useMemo(()=>{
    let p = flashcards;
    if (mode==='exam') p = flashcards.filter(c=>c.exam);
    if (mode==='star3') p = flashcards.filter(c=>c.star===3);
    return p;
  },[mode]);
  const [order, setOrder] = useState(()=>flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flip, setFlip] = useState(false);
  const [score, setScore] = useState({c:0,w:0});

  useEffect(()=>{ setOrder(pool.map((_,i)=>i)); setIdx(0); setFlip(false); setScore({c:0,w:0}); },[mode]);

  const card = pool[order[idx]] || pool[0];
  const go = (dir)=>{ setFlip(false); setTimeout(()=>setIdx(i=>Math.max(0,Math.min(pool.length-1,i+dir))),120); };
  const shuffle = ()=>{ const o=[...Array(pool.length).keys()]; for(let i=o.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]];} setOrder(o); setIdx(0); setFlip(false); };
  const mark = (ok)=>{ setScore(s=>({c:s.c+(ok?1:0), w:s.w+(ok?0:1)})); go(1); };

  if(!card) return <Empty description="ไม่มีการ์ด"/>;
  return (
    <div className="fade-up">
      <Flex justify="space-between" align="center" wrap="wrap" gap={10} style={{marginBottom:14}}>
        <Segmented value={mode} onChange={setMode}
          options={[{label:`ทั้งหมด (${flashcards.length})`,value:'all'},{label:`ออกสอบ (${flashcards.filter(c=>c.exam).length})`,value:'exam'},{label:`★★★ (${flashcards.filter(c=>c.star===3).length})`,value:'star3'}]}/>
        <Space>
          <Tag color="green">ถูก {score.c}</Tag>
          <Tag color="red">ผิด {score.w}</Tag>
          <Button size="small" onClick={shuffle}>🔀 สุ่ม</Button>
        </Space>
      </Flex>
      <div style={{textAlign:'center', color:C.text3, marginBottom:8}}>การ์ด {idx+1} / {pool.length}</div>
      <Progress percent={Math.round((idx+1)/pool.length*100)} showInfo={false} strokeColor={C.teal} trailColor={C.surface2} style={{marginBottom:14}}/>
      <div className="fc-perspective" style={{maxWidth:640, margin:'0 auto', minHeight:280}}>
        <div className={'fc-card'+(flip?' flipped':'')} style={{minHeight:280}} onClick={()=>setFlip(f=>!f)}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.teal}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:280}}>
            <div style={{position:'absolute', top:14, left:16}}><Stars n={card.star}/></div>
            {card.exam && <Tag color="volcano" style={{position:'absolute', top:12, right:12}}>ข้อสอบ</Tag>}
            <div style={{fontSize:12.5, color:C.text3, marginBottom:10}}>❓ คำถาม (แตะเพื่อพลิก)</div>
            <div style={{fontSize:19, fontWeight:600, color:C.text, textAlign:'center', lineHeight:1.7}}>{card.q}</div>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.green}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:280}}>
            <div style={{fontSize:12.5, color:C.green, marginBottom:8, fontWeight:700}}>✅ คำตอบ</div>
            <div style={{fontSize:21, fontWeight:800, color:C.green, textAlign:'center', marginBottom:card.d?12:0}}>{card.a}</div>
            {card.d && <div style={{fontSize:14.5, color:C.text2, textAlign:'center', lineHeight:1.8}}>{card.d}</div>}
          </div>
        </div>
      </div>
      <Flex justify="center" align="center" gap={10} style={{marginTop:20}} wrap="wrap">
        <Button onClick={()=>go(-1)} disabled={idx===0}>◂ ก่อนหน้า</Button>
        {flip
          ? <Space>
              <Button danger onClick={()=>mark(false)}>✗ ยังไม่แม่น</Button>
              <Button type="primary" style={{background:C.green, borderColor:C.green}} onClick={()=>mark(true)}>✓ จำได้</Button>
            </Space>
          : <Button type="primary" style={{background:C.teal, borderColor:C.teal}} onClick={()=>setFlip(true)}>พลิกดูคำตอบ</Button>}
        <Button onClick={()=>go(1)} disabled={idx===pool.length-1}>ถัดไป ▸</Button>
      </Flex>
    </div>
  );
}

function Quiz() {
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const Qd = quizData[i];
  const choose = (k)=>{ if(picked!==null) return; setPicked(k); if(k===Qd.correct) setScore(s=>s+1); };
  const next = ()=>{ if(i+1>=quizData.length){ setDone(true); } else { setI(i+1); setPicked(null);} };
  const restart = ()=>{ setI(0); setPicked(null); setScore(0); setDone(false); };

  if(done) return (
    <Result status={score>=9?'success':'info'}
      title={`ได้ ${score} / ${quizData.length} คะแนน`}
      subTitle={score>=9?'เก่งมาก! พร้อมสอบระดับหนึ่งแล้ว 🎉':'ทบทวนแท็บบทเรียน & Case Lab อีกรอบแล้วลองใหม่นะ 💪'}
      extra={<Button type="primary" style={{background:C.teal, borderColor:C.teal}} onClick={restart}>ทำใหม่อีกครั้ง</Button>}/>
  );
  return (
    <div>
      <Flex justify="space-between" align="center" style={{marginBottom:10}}>
        <Text style={{color:C.text3}}>ข้อ {i+1} / {quizData.length}</Text>
        <Tag color="green">คะแนน {score}</Tag>
      </Flex>
      <Progress percent={Math.round((i)/quizData.length*100)} showInfo={false} strokeColor={C.green} trailColor={C.surface2} style={{marginBottom:16}}/>
      <div style={{fontSize:17, fontWeight:600, color:C.text, marginBottom:16, lineHeight:1.7}}>{Qd.q}</div>
      <Space direction="vertical" style={{width:'100%'}} size={10}>
        {Qd.opts.map((o,k)=>{
          let bg=C.white, bd=C.border, cc=C.text;
          if(picked!==null){
            if(k===Qd.correct){ bg=C.greenBg; bd=C.green; cc=C.green; }
            else if(k===picked){ bg=C.redBg; bd=C.red; cc=C.red; }
          }
          return (
            <div key={k} onClick={()=>choose(k)} className={picked===null?'hoverlift':''}
              style={{cursor:picked===null?'pointer':'default', background:bg, border:`1.5px solid ${bd}`, borderRadius:10, padding:'12px 16px', color:cc, fontSize:15, fontWeight:500, transition:'all .25s'}}>
              <span style={{fontWeight:700, marginRight:8}}>{'กขคง'[k]}.</span>{o}
              {picked!==null && k===Qd.correct && <span style={{float:'right'}}>✅</span>}
              {picked===k && k!==Qd.correct && <span style={{float:'right'}}>❌</span>}
            </div>
          );
        })}
      </Space>
      {picked!==null && (
        <div className="fade-up">
          <Box tone={picked===Qd.correct?'green':'red'} title={picked===Qd.correct?'ถูกต้อง!':'ยังไม่ใช่'} icon={picked===Qd.correct?'🎯':'📖'} style={{marginTop:14}}>
            {Qd.exp}
          </Box>
          <div style={{textAlign:'center', marginTop:12}}>
            <Button type="primary" size="large" style={{background:C.green, borderColor:C.green}} onClick={next}>
              {i+1>=quizData.length?'ดูผลคะแนน':'ข้อถัดไป ▸'}</Button>
          </div>
        </div>
      )}
    </div>
  );
}

function QuickQuizTab() {
  const [view, setView] = useState('quiz');
  const typeColor = {mnem:C.purple, flow:C.cyan, contrast:C.red, chunk:C.blue, formula:C.jadeDark};
  const typeBg = {mnem:C.purpleBg, flow:C.cyanBg, contrast:C.redBg, chunk:C.blueBg, formula:'#EAF3EE'};
  return (
    <div className="fade-up">
      <div style={{textAlign:'center', marginBottom:18}}>
        <Segmented size="large" value={view} onChange={setView}
          options={[{label:'🎮 ทำควิซ',value:'quiz'},{label:'⚡ การ์ดจำด่วน',value:'quick'}]}/>
      </div>
      {view==='quick' ? (
        <div>
          {quickSections.map((q,i)=> q.divider ? (
            <Divider key={i} orientation="left" style={{borderColor:C.border, color:C.tealDark, fontWeight:700, fontSize:16}}>{q.divider}</Divider>
          ) : (
            <div key={i} className="qc" style={{background:typeBg[q.type], borderLeft:`4px solid ${typeColor[q.type]}`, borderRadius:'0 12px 12px 0', padding:'12px 16px', marginBottom:10, border:`1px solid ${typeColor[q.type]}22`, borderLeftWidth:4}}>
              <div style={{display:'flex', gap:10, alignItems:'baseline', flexWrap:'wrap'}}>
                <span style={{fontWeight:800, color:typeColor[q.type], fontSize:15, minWidth:56, fontFamily:"'Noto Serif Thai'"}}>{q.s}</span>
                <span style={{fontWeight:700, color:C.text}}>{q.t}</span>
              </div>
              <div style={{color:C.text2, fontSize:14, marginTop:4}}>{q.b}</div>
            </div>
          ))}
        </div>
      ) : (
        <Card style={{borderColor:C.border, maxWidth:680, margin:'0 auto'}} bodyStyle={{padding:'22px 24px'}}>
          <Quiz/>
        </Card>
      )}
    </div>
  );
}
