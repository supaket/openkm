<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Capital Investment Decisions — Ch 14 Review</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/reset.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/antd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap');
body { background:#F5F0E8; line-height:1.8; font-family:'Noto Sans Thai', sans-serif; margin:0; }
.fc-perspective { perspective:1200px; }
.fc-card { position:relative; width:100%; height:320px; transform-style:preserve-3d; transition:transform 0.5s; cursor:pointer; }
.fc-card.flipped { transform:rotateY(180deg); }
.fc-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:12px; padding:28px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; overflow-y:auto; }
.fc-back { transform:rotateY(180deg); }
.qc { transition:all .2s; }
.qc:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(61,50,41,.12); }
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-track { background:#EDE8DF; }
::-webkit-scrollbar-thumb { background:#C4B49A; border-radius:5px; }
::selection { background:#DDD3C1; color:#3D3229; }
.ant-table-cell { line-height:1.9 !important; }
.fadein { animation: fadeInUp .6s ease both; }
@keyframes fadeInUp { from { opacity:0; transform:translateY(14px);} to { opacity:1; transform:translateY(0);} }
.pop { display:inline-block; animation: pop .45s ease; }
@keyframes pop { 0% { transform:scale(1.25); color:#8B7355; } 100% { transform:scale(1); } }
.node { transition: all .45s ease; opacity:.4; border-radius:10px; padding:10px 12px; text-align:center; border:2px solid #DDD3C1; background:#FAF7F2; font-size:13px; font-weight:600; color:#3D3229; }
.node.active { opacity:1; transform:scale(1.08); border-color:#A8906C; background:#F3EDDF; box-shadow:0 4px 14px rgba(139,115,85,.35); }
.node.done { opacity:.95; border-color:#5D8A66; background:#EFF5F0; }
.pulse { animation: pulse 1.6s ease infinite; }
@keyframes pulse { 0%,100% { box-shadow:0 0 0 0 rgba(168,144,108,.45);} 50% { box-shadow:0 0 0 10px rgba(168,144,108,0);} }
.step-line { padding:6px 12px; border-left:3px solid #A8906C; margin:6px 0; background:#F0EBE2; border-radius:0 8px 8px 0; }
.bar-anim { transition: height .6s ease, background .4s ease; border-radius:6px 6px 0 0; }
.fill-anim { transition: width .8s ease; }

/* ==== iPad / touch-friendly (injected) ==== */
* { -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
button, .ant-btn, .ant-tabs-tab, .ant-checkbox-wrapper, a, .chcard, .sortitem { touch-action: manipulation; }
.ant-btn { min-height: 40px; }
.ant-tabs-tab { padding: 10px 16px !important; }
/* slider: dragging the handle must NOT scroll the page */
.ant-slider { touch-action: none; padding: 10px 0; }
.ant-slider-handle { width: 22px !important; height: 22px !important; margin-top: -9px !important; }
.ant-slider-handle::after { width: 22px !important; height: 22px !important; }
input[type=range] { touch-action: none; -webkit-appearance: none; appearance: none; height: 8px; border-radius: 5px; background: #DDD3C1; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #A8906C; cursor: pointer; }
.ant-switch { min-width: 48px; height: 26px; }
.ant-checkbox-inner { width: 20px; height: 20px; }
@media (max-width: 820px) {
  .ant-tabs-nav { flex-wrap: wrap; }
  .ant-statistic-content { font-size: 15px !important; }
  .ant-table { font-size: 13px; }
}

<body>
<div id="root"></div>
<script type="text/babel">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button, Row, Col, Divider, Alert, Statistic, Flex, Slider, Switch } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState, useEffect, useRef } = React;

const C = {
  gold: '#A8906C', goldDark: '#8B7355', goldLight: '#C4B49A',
  bg: '#F5F0E8', surface: '#EDE8DF', surface2: '#E5DFD4', surface3: '#F0EBE2',
  border: '#DDD3C1', borderDark: '#C4B49A',
  text: '#3D3229', text2: '#5C4F42', text3: '#7A6E62',
  white: '#FAF7F2',
  green: '#5D8A66', greenBg: '#EFF5F0',
  red: '#B85C5C', redBg: '#F5ECEA',
  purple: '#7B6B8A', purpleBg: '#F0ECF3',
  blue: '#5B7A9E', blueBg: '#ECF0F5',
  cyan: '#5B8A8A', cyanBg: '#ECF2F2',
};
const fmt = (n) => Math.round(n).toLocaleString('en-US');
const fmt2 = (n) => (Math.round(n*100)/100).toLocaleString('en-US');
const Stars = ({n}) => <span>{'⭐'.repeat(n)}</span>;
const Pop = ({v, color, prefix, suffix, f}) => <span key={String(v)} className="pop" style={{fontWeight:700, color: color||C.goldDark}}>{prefix||''}{(f||fmt)(v)}{suffix||''}</span>;
const npvOf = (inv, cf, n, r) => { let s = -inv; for(let t=1;t<=n;t++) s += cf/Math.pow(1+r,t); return s; };
const irrOf = (inv, cf, n) => { let lo=0.0001, hi=1; for(let i=0;i<60;i++){ const mid=(lo+hi)/2; if(npvOf(inv,cf,n,mid)>0) lo=mid; else hi=mid; } return (lo+hi)/2; };

/* ============================================================
   TAB 0 — ปูพื้นก่อน
   ============================================================ */
const TimeMachine = () => {
  const [amt, setAmt] = useState(100);
  const [rate, setRate] = useState(10);
  const [yrs, setYrs] = useState(5);
  const fv = amt*Math.pow(1+rate/100, yrs);
  const pv = amt/Math.pow(1+rate/100, yrs);
  const H = 120, max = Math.max(fv, amt)*1.1;
  const bar = (v, color, label, val) => (
    <div style={{textAlign:'center', width:110}}>
      <div style={{height:H, display:'flex', alignItems:'end', justifyContent:'center'}}>
        <div className="bar-anim" style={{width:56, height:Math.max(6, v/max*H), background:color}}/>
      </div>
      <Text strong style={{color}}>{label}</Text><br/>
      <Text className="pop" key={val} strong style={{color:C.text}}>{val}</Text>
    </div>
  );
  return (
    <Card size="small" style={{background:C.white, borderColor:C.borderDark}}
      title={<Text strong style={{color:C.text}}>⏳ ไทม์แมชชีนการเงิน — เงินก้อนเดียวกัน คนละเวลา ค่าไม่เท่ากัน</Text>}>
      <Row gutter={16} align="middle">
        <Col xs={24} md={10}>
          <Text style={{color:C.text2}}>เงินวันนี้: <Pop v={amt} prefix="฿"/></Text>
          <Slider min={50} max={500} step={10} value={amt} onChange={setAmt}/>
          <Text style={{color:C.text2}}>ดอกเบี้ย/อัตราคิดลด: <Pop v={rate} suffix="%"/> ต่อปี</Text>
          <Slider min={1} max={20} value={rate} onChange={setRate}/>
          <Text style={{color:C.text2}}>ระยะเวลา: <Pop v={yrs}/> ปี</Text>
          <Slider min={1} max={15} value={yrs} onChange={setYrs}/>
        </Col>
        <Col xs={24} md={14}>
          <Flex gap={18} justify="center" align="end">
            {bar(pv, C.purple, `฿${fmt2(amt)} ในอีก ${yrs} ปี`, `มีค่าวันนี้ ฿${fmt2(pv)}`)}
            {bar(amt, C.gold, 'เงินวันนี้', `฿${fmt2(amt)}`)}
            {bar(fv, C.green, `ฝากไว้ ${yrs} ปี`, `โตเป็น ฿${fmt2(fv)}`)}
          </Flex>
        </Col>
      </Row>
      <Alert style={{marginTop:12}} type="info" message={<span>
        มองไปข้างหน้า = <Text strong>ทบต้น</Text> (×(1+r)ⁿ) | ดึงกลับมาปัจจุบัน = <Text strong>คิดลด</Text> (÷(1+r)ⁿ) —
        ตาราง PV ในข้อสอบก็คือค่า "1 ÷ (1+r)ⁿ" คำนวณไว้ให้แล้วนั่นเอง เช่น r 10%, 3 ปี → 0.751</span>}/>
    </Card>
  );
};

const vocab = [
  {key:1, w:'Capital investment decision', m:'ตัดสินใจลงเงินก้อนใหญ่วันนี้ (ซื้อเครื่องจักร สร้างโรงงาน) แลกกระแสเงินสดที่ทยอยกลับมาหลายปี'},
  {key:2, w:'Time value of money (TVM)', m:'เงิน 100 วันนี้ > เงิน 100 ปีหน้า เพราะเอาไปลงทุนต่อได้ — หัวใจของทั้งบท'},
  {key:3, w:'Present value (PV) / Discounting', m:'การ "ดึงเงินอนาคตกลับมาตีค่าเป็นวันนี้" ด้วยการหารด้วย (1+r)ⁿ'},
  {key:4, w:'Annuity', m:'กระแสเงินสดเท่ากันทุกปี — ใช้ตาราง annuity คูณทีเดียวแทนการคิดลดทีละปี'},
  {key:5, w:'Cost of capital / Hurdle rate', m:'ต้นทุนของเงินที่เอามาลงทุน = อัตราขั้นต่ำที่โครงการต้องทำให้ได้'},
  {key:6, w:'NPV', m:'PV ของเงินเข้าทั้งหมด − เงินลงทุน = "ความรวยที่เพิ่มขึ้น" เป็นเงินวันนี้'},
  {key:7, w:'IRR', m:'อัตราผลตอบแทนที่ทำให้ NPV = 0 พอดี = "ดอกเบี้ยที่โครงการนี้จ่ายเรา"'},
  {key:8, w:'Payback period', m:'กี่ปีถึงได้เงินลงทุนคืนครบ — ง่ายแต่ไม่สน TVM และไม่สนเงินหลังคืนทุน'},
  {key:9, w:'Accounting rate of return (ARR)', m:'กำไรสุทธิเฉลี่ย ÷ เงินลงทุน — ตัวเดียวในบทที่ใช้ "กำไรบัญชี" ไม่ใช่กระแสเงินสด'},
  {key:10, w:'Mutually exclusive projects', m:'โครงการที่เลือกได้อันเดียว (แข่งกันเอง) — ต้องจัดอันดับ ไม่ใช่แค่ผ่านเกณฑ์'},
];

const BasicsTab = () => (
  <div>
    <Card className="fadein" style={{marginBottom:16, background:C.white, borderColor:C.border}}
      title={<Text strong style={{color:C.text}}>🤔 บทนี้ตอบคำถามอะไร?</Text>}>
      <Paragraph style={{color:C.text}}>
        ทุกบริษัทเจอโจทย์เดียวกัน: <strong>"มีเงินก้อน ควรทุ่มลงโครงการไหน?"</strong> ซื้อเครื่องจักรใหม่ $1.75M คุ้มไหม?
        ระบบคอมพิวเตอร์ $3M ให้ผลตอบแทนเท่าไร? บทนี้ให้เครื่องมือวัด 4 ตัว — 2 ตัวง่าย (Payback, ARR)
        และ 2 ตัวเทพ (NPV, IRR) ที่คิดเรื่อง "เวลา" ของเงินด้วย
      </Paragraph>
      <Card size="small" style={{background:C.greenBg, borderColor:C.green}}>
        <Text strong style={{color:C.green}}>ไอเดียเดียวที่ต้องเก็ตก่อนเริ่ม:</Text><br/>
        <Text style={{color:C.text, fontSize:16}}>เงิน 100 บาทวันนี้ มีค่ามากกว่า 100 บาทปีหน้า — เพราะเอาไปฝาก/ลงทุนต่อได้
        ดังนั้นจะเทียบเงินคนละปี ต้อง "ดึงทุกก้อนกลับมาเป็นค่าวันนี้" ก่อนเสมอ</Text>
      </Card>
    </Card>
    <div className="fadein" style={{animationDelay:'0.1s'}}><TimeMachine/></div>
    <Card className="fadein" style={{marginTop:16, marginBottom:16, background:C.white, borderColor:C.border, animationDelay:'0.2s'}}
      title={<Text strong style={{color:C.text}}>📖 ศัพท์ที่ต้องรู้ (10 คำ)</Text>}>
      <Table size="small" pagination={false} columns={[
        {title:'คำศัพท์', dataIndex:'w', key:'w', width:260, render:t=><Text strong style={{color:C.goldDark}}>{t}</Text>},
        {title:'ความหมายแบบบ้าน ๆ', dataIndex:'m', key:'m'},
      ]} dataSource={vocab}/>
    </Card>
    <Card className="fadein" style={{background:C.white, borderColor:C.border, animationDelay:'0.3s'}}
      title={<Text strong style={{color:C.text}}>🧭 แผนที่บท + การบ้าน 4 ข้อ</Text>}>
      <Table size="small" pagination={false} columns={[
        {title:'เครื่องมือ', dataIndex:'t', key:'t'},
        {title:'นิสัย', dataIndex:'n', key:'n'},
        {title:'โจทย์', dataIndex:'h', key:'h'},
      ]} dataSource={[
        {key:1, t:'Payback', n:'ง่าย เร็ว ไม่สนเวลาเงิน', h:'ข้อ 1 (Mistral), ข้อ 4A'},
        {key:2, t:'ARR', n:'ใช้กำไรบัญชี ไม่ใช่เงินสด', h:'ข้อ 2 (Brenning), ข้อ 4B'},
        {key:3, t:'NPV', n:'ราชาของบท — วัดความรวยที่เพิ่มเป็นเงินวันนี้', h:'ข้อ 3A (Durrel), ข้อ 4C'},
        {key:4, t:'IRR', n:'% ผลตอบแทนของโครงการ เทียบกับ hurdle rate', h:'ข้อ 3B, ข้อ 4D'},
      ]}/>
    </Card>
  </div>
);

/* ============================================================
   TAB 1 — สรุปเนื้อหา
   ============================================================ */
const flowNodes = [
  {t:'1. คัดกรองโครงการ', d:'โครงการ independent (รับได้หลายอัน ถ้าผ่านเกณฑ์) หรือ mutually exclusive (เลือกได้อันเดียว ต้องจัดอันดับ)', icon:'📋'},
  {t:'2. ประมาณกระแสเงินสด', d:'เงินลงทุนวันนี้ + เงินสดรับสุทธิรายปี — ระวัง: ใช้ "เงินสด" ไม่ใช่กำไรบัญชี (ยกเว้น ARR)', icon:'💵'},
  {t:'3. คิดลดกลับมาวันนี้', d:'ใช้ cost of capital เป็นอัตราคิดลด — เงินปีไหน ๆ ก็เทียบกันได้บนไม้บรรทัดเดียว', icon:'⏳'},
  {t:'4. ตัดสินด้วยเกณฑ์', d:'NPV ≥ 0 รับ | IRR ≥ hurdle รับ | payback/ARR ใช้เป็นตัวคัดกรองเสริม', icon:'⚖️'},
  {t:'5. Postaudit ตามผล', d:'ลงทุนแล้วต้องกลับมาเทียบของจริงกับที่ประมาณไว้ — สร้างวินัยให้คนเสนอโครงการไม่โม้ตัวเลข', icon:'🔍'},
];
const FlowAnimation = () => {
  const [step, setStep] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const timer = useRef(null);
  useEffect(() => {
    if (playing) {
      timer.current = setInterval(() => setStep(s => {
        if (s >= flowNodes.length-1) { setPlaying(false); return s; }
        return s+1;
      }), 1600);
    }
    return () => clearInterval(timer.current);
  }, [playing]);
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>🎬 กระบวนการตัดสินใจลงทุน 5 ขั้น (กด Play)</Text>}>
      <Flex gap={8} style={{marginBottom:12}}>
        <Button type="primary" className={playing?'':'pulse'} disabled={playing} onClick={()=>{setStep(0); setPlaying(true);}}>▶ Play</Button>
        <Button onClick={()=>{setPlaying(false); setStep(-1);}}>รีเซ็ต</Button>
        <Button onClick={()=>{setPlaying(false); setStep(flowNodes.length-1);}}>แสดงทั้งหมด</Button>
      </Flex>
      <Row gutter={[8,8]}>
        {flowNodes.map((n,i)=>(
          <Col xs={12} md={i<3?8:12} key={i}>
            <div className={'node' + (i===step?' active':'') + (i<step?' done':'')}>
              <div style={{fontSize:20}}>{n.icon}</div>{n.t}
            </div>
          </Col>
        ))}
      </Row>
      <div style={{minHeight:56, marginTop:12}}>
        {step>=0
          ? <Alert type="info" message={<span><Text strong>{flowNodes[step].icon} {flowNodes[step].t}: </Text>{flowNodes[step].d}</span>}/>
          : <Alert type="warning" message="Capital budgeting = กระบวนการวางแผนลงทุนระยะยาว — เงินก้อนใหญ่ ผูกพันหลายปี แก้ตัวยาก จึงต้องมีเครื่องมือวัดที่ดี"/>}
      </div>
    </Card>
  );
};

/* ---------- ตารางเทียบ 4 เครื่องมือ (คลิกหัวคอลัมน์เพื่อโฟกัส) ---------- */
const mMeta = [
  {k:'pb', name:'Payback', color:C.blue},
  {k:'arr', name:'ARR', color:C.cyan},
  {k:'npv', name:'NPV', color:C.green},
  {k:'irr', name:'IRR', color:C.purple},
];
const mAspects = [
  {a:'📐 สูตร', pb:'เงินลงทุน ÷ เงินสดรับ/ปี (ถ้าไม่เท่ากันทุกปี: นับสะสมทีละปี)', arr:'กำไรสุทธิเฉลี่ย ÷ เงินลงทุนเริ่มแรก', npv:'PV ของเงินสดรับทั้งหมด − เงินลงทุน', irr:'อัตราที่ทำให้ NPV = 0 (เทียบ discount factor กับตาราง)'},
  {a:'💰 ใช้อะไรวัด', pb:'กระแสเงินสด', arr:'กำไรบัญชี (net income) — ตัวเดียวของบท!', npv:'กระแสเงินสด', irr:'กระแสเงินสด'},
  {a:'⏳ คิดค่าเวลาเงินไหม', pb:'❌ ไม่คิด', arr:'❌ ไม่คิด', npv:'✅ คิด', irr:'✅ คิด'},
  {a:'✅ เกณฑ์รับโครงการ', pb:'สั้นกว่าเกณฑ์บริษัท = ผ่าน', arr:'สูงกว่าเกณฑ์บริษัท = ผ่าน', npv:'NPV ≥ 0 = รับ (เพิ่มความมั่งคั่ง)', irr:'IRR ≥ cost of capital = รับ'},
  {a:'⚠️ จุดอ่อน', pb:'มองข้ามเงินหลังคืนทุน + ไม่สน TVM (ข้อ 1b: เงินปี 5 อีก 150,000 ไม่ถูกนับเลย)', arr:'กำไรบัญชีถูกปรุงแต่งได้ + ไม่สน TVM', npv:'ต้องรู้ cost of capital ที่แม่น', irr:'หลายโครงการขนาด/จังหวะต่างกัน อาจชี้คนละทางกับ NPV'},
  {a:'🧪 ในการบ้าน', pb:'Mistral: 5 ปี (even) / 3.5 ปี (uneven) · Aragon 6.23 ปี', arr:'Brenning 22.9% · Aragon 6.07%', npv:'Durrel: A 19,400 > B 16,561 → เลือก A · Aragon −7,240 → ปฏิเสธ', irr:'Durrel: B ~10% > A ~9% → เลือก B (ขัดกับ NPV!) · Aragon ~ต่ำกว่า 10%'},
];
const MethodCompare = () => {
  const [focus, setFocus] = useState(null);
  const cols = [
    {title:<Text strong style={{color:C.text2}}>ประเด็น</Text>, dataIndex:'a', key:'a', width:140,
      render:t=><Text strong style={{color:C.text2}}>{t}</Text>},
    ...mMeta.map(m => ({

const NPVLab = () => {
  const [inv, setInv] = useState(560290);
  const [cf, setCf] = useState(90000);
  const [yrs, setYrs] = useState(10);
  const [rate, setRate] = useState(10);
  const r = rate/100;
  const npv = npvOf(inv, cf, yrs, r);
  const irr = irrOf(inv, cf, yrs);
  // curve
  const W=440, H=260, ml=64, mr=12, mt=12, mb=32;
  const iw=W-ml-mr, ih=H-mt-mb;
  const rmax = 0.24;
  const pts = [];
  let ymin=Infinity, ymax=-Infinity;
  for(let i=0;i<=24;i++){ const rr=i/100; const v=npvOf(inv,cf,yrs,rr); pts.push([rr,v]); ymin=Math.min(ymin,v); ymax=Math.max(ymax,v); }
  const pad=(ymax-ymin)*0.1; ymin-=pad; ymax+=pad;
  const X = rr => ml + rr/rmax*iw;
  const Y = v => mt + (1-(v-ymin)/(ymax-ymin))*ih;
  const path = pts.map((p,i)=>`${i?'L':'M'}${X(p[0])},${Y(p[1])}`).join(' ');
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>👑 Lab 2: เครื่อง NPV/IRR — เห็นเส้นโค้ง NPV กับจุด IRR ด้วยตาตัวเอง (ค่าเริ่มต้น = Aragon ข้อ 4)</Text>}>
      <Row gutter={24}>
        <Col xs={24} md={10}>
          <Text style={{color:C.text2}}>เงินลงทุน: $<Pop v={inv}/></Text>
          <Slider min={100000} max={1000000} step={10000} value={inv} onChange={setInv}/>
          <Text style={{color:C.text2}}>เงินสดรับ/ปี: $<Pop v={cf} color={C.green}/></Text>
          <Slider min={20000} max={200000} step={5000} value={cf} onChange={setCf}/>
          <Text style={{color:C.text2}}>อายุโครงการ: <Pop v={yrs}/> ปี</Text>
          <Slider min={1} max={15} value={yrs} onChange={setYrs}/>
          <Text style={{color:C.text2}}>Cost of capital: <Pop v={rate} suffix="%"/></Text>
          <Slider min={0} max={24} step={0.5} value={rate} onChange={setRate}/>
          <Row gutter={8} style={{marginTop:8}}>
            <Col span={12}><Statistic title="NPV" value={fmt(npv)} valueStyle={{fontSize:17, color: npv>=0?C.green:C.red}}/></Col>
            <Col span={12}><Statistic title="IRR (คำนวณจริง)" value={(irr*100).toFixed(2)+'%'} valueStyle={{fontSize:17, color:C.purple}}/></Col>
          </Row>
        </Col>
        <Col xs={24} md={14}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', background:C.white, borderRadius:10, border:`1px solid ${C.border}`}}>
            <line x1={ml} y1={Y(0)} x2={W-mr} y2={Y(0)} stroke={C.text3} strokeWidth="1.5"/>
            <line x1={ml} y1={mt} x2={ml} y2={H-mb} stroke={C.text3} strokeWidth="1.5"/>
            {[0,0.06,0.12,0.18,0.24].map((t,i)=><text key={i} x={X(t)} y={H-mb+16} fontSize="10" fill={C.text3} textAnchor="middle">{Math.round(t*100)}%</text>)}
            <path d={path} fill="none" stroke={C.gold} strokeWidth="3"/>
            {irr<=rmax && <g>
              <circle cx={X(irr)} cy={Y(0)} r="6" fill={C.purple}/>
              <text x={X(irr)} y={Y(0)-10} fontSize="11" fontWeight="700" fill={C.purple} textAnchor="middle">IRR = {(irr*100).toFixed(1)}%</text>
            </g>}
            <line x1={X(r)} y1={mt} x2={X(r)} y2={H-mb} stroke={C.blue} strokeWidth="1" strokeDasharray="4 3"/>
            <circle cx={X(r)} cy={Y(npv)} r="6" fill={npv>=0?C.green:C.red}/>
            <text x={X(r)+8} y={Y(npv)+4} fontSize="11" fontWeight="700" fill={npv>=0?C.green:C.red}>NPV {fmt(npv)}</text>
          </svg>
          <Alert style={{marginTop:8}} type={npv>=0?'success':'error'} message={npv>=0
            ? `รับโครงการ — อัตราคิดลด ${rate}% ต่ำกว่า IRR ${(irr*100).toFixed(1)}% (จุดที่เส้นตัดศูนย์)`
            : `ปฏิเสธ — อัตราคิดลด ${rate}% สูงกว่า IRR ${(irr*100).toFixed(1)}% → NPV ติดลบ (Aragon เจอแบบนี้พอดี: −7,240)`}/>
        </Col>
      </Row>
    </Card>
  );
};

const ConflictLab = () => {
  const [rate, setRate] = useState(6);
  const r = rate/100;
  const npvA = 285000/Math.pow(1+r,3) - 220000;
  const npvB = (88500/(1+r)) + (88500/Math.pow(1+r,2)) + (88500/Math.pow(1+r,3)) - 220000;
  const better = npvA>npvB ? 'A' : 'B';
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>⚔️ Lab 3: ศึก A vs B (Durrel ข้อ 3) — ทำไม NPV กับ IRR ถึงเถียงกัน</Text>}>
      <Row gutter={24}>
        <Col xs={24} md={10}>
          <Text style={{color:C.text2}}>อัตราคิดลด: <Pop v={rate} suffix="%"/></Text>
          <Slider min={0} max={14} step={0.5} value={rate} onChange={setRate}/>
          <Card size="small" style={{background:C.surface3, borderColor:C.gold, marginTop:8}}>
            <Text style={{color:C.text}}>Project A (285,000 ปีที่ 3): NPV = <Pop v={npvA} color={better==='A'?C.green:C.text2}/></Text><br/>
            <Text style={{color:C.text}}>Project B (88,500 × 3 ปี): NPV = <Pop v={npvB} color={better==='B'?C.green:C.text2}/></Text><br/>
            <Divider style={{margin:'8px 0'}}/>
            <span key={better+rate} className="pop" style={{fontSize:18, fontWeight:700, color:C.goldDark}}>ที่ {rate}% → {better} ชนะ</span>
          </Card>
        </Col>
        <Col xs={24} md={14}>
          <Flex gap={24} align="end" justify="center" style={{height:170}}>
            {[['A',npvA,C.blue],['B',npvB,C.purple]].map(([n,v,c])=>(
              <div key={n} style={{textAlign:'center'}}>
                <div style={{height:130, display:'flex', alignItems:'end'}}>
                  <div className="bar-anim" style={{width:70, height:Math.max(4, Math.min(130, Math.abs(v)/40000*130)), background: v>=0?c:C.red, opacity: better===n?1:.45}}/>
                </div>
                <Text strong style={{color:c}}>{n}: {fmt(v)}</Text>
              </div>
            ))}
          </Flex>
          <Alert style={{marginTop:8}} type="info" message={<span>
            เลื่อนดู: <Text strong>ต่ำกว่า ~7% A ชนะ / สูงกว่า ~7% B ชนะ</Text> — B ได้เงินเร็วกว่าจึงทนอัตราคิดลดสูงได้ดีกว่า (IRR B 10% &gt; A 9%)
            แต่โจทย์บอก cost of capital = 6% → โลกจริงอยู่ฝั่ง A → <Text strong>เชื่อ NPV เลือก A</Text></span>}/>
        </Col>
      </Row>
    </Card>
  );
};

const FlashcardTab = () => {
  const [filter, setFilter] = useState('all');
  const [order, setOrder] = useState(flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [score, setScore] = useState({ok:0, ng:0});
  const pool = order.map(i=>flashcards[i]).filter(c => filter==='all' ? true : filter==='exam' ? c.exam : c.star===3);
  const card = pool[Math.min(idx, pool.length-1)];
  const shuffle = () => { const a=[...Array(flashcards.length).keys()]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} setOrder(a); setIdx(0); setFlipped(false); setScore({ok:0,ng:0}); };
  const nav = (d) => { setFlipped(false); setIdx(i => (i + d + pool.length) % pool.length); };
  const mark = (good) => { setScore(s => good ? {...s, ok:s.ok+1} : {...s, ng:s.ng+1}); nav(1); };
  const setF = (f) => { setFilter(f); setIdx(0); setFlipped(false); };
  if (!card) return <Alert type="warning" message="ไม่มีการ์ดในโหมดนี้" />;
  return (
    <div>
      <Flex justify="space-between" wrap="wrap" gap={8} style={{marginBottom:12}}>
        <Space wrap>
          <Button type={filter==='all'?'primary':'default'} onClick={()=>setF('all')}>ทั้งหมด ({flashcards.length})</Button>
          <Button type={filter==='exam'?'primary':'default'} onClick={()=>setF('exam')}>เฉพาะแนวข้อสอบ ({flashcards.filter(c=>c.exam).length})</Button>
          <Button type={filter==='star3'?'primary':'default'} onClick={()=>setF('star3')}>⭐⭐⭐ ({flashcards.filter(c=>c.star===3).length})</Button>
        </Space>
        <Button onClick={shuffle}>🔀 สลับการ์ด</Button>
      </Flex>
      <Row gutter={16} style={{marginBottom:12}}>
        <Col span={8}><Statistic title="การ์ดที่" value={`${idx+1} / ${pool.length}`} /></Col>
        <Col span={8}><Statistic title="ตอบถูก" value={score.ok} valueStyle={{color:C.green}} /></Col>
        <Col span={8}><Statistic title="ตอบผิด" value={score.ng} valueStyle={{color:C.red}} /></Col>
      </Row>
      <div className="fc-perspective" onClick={()=>setFlipped(f=>!f)}>
        <div className={'fc-card' + (flipped ? ' flipped' : '')}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.borderDark}`}}>
            <Space direction="vertical" align="center">
              <Space>{card.exam && <Tag color="volcano">แนวข้อสอบ</Tag>}<Stars n={card.star} /></Space>
              <Title level={4} style={{color:C.text, margin:0}}>{card.q}</Title>
              <Text style={{color:C.text3}}>(คลิกเพื่อพลิกดูคำตอบ)</Text>
            </Space>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.gold}`}}>
            <Space direction="vertical" align="center">
              <Title level={4} style={{color:C.goldDark, margin:0}}>{card.a}</Title>
              <Text style={{color:C.text2}}>{card.d}</Text>
            </Space>
          </div>
        </div>
      </div>
      <Flex justify="center" gap={8} style={{marginTop:16}} wrap="wrap">
        <Button onClick={()=>nav(-1)}>← ก่อนหน้า</Button>
        <Button style={{background:C.greenBg, borderColor:C.green, color:C.green}} onClick={()=>mark(true)}>✓ ตอบถูก</Button>
        <Button style={{background:C.redBg, borderColor:C.red, color:C.red}} onClick={()=>mark(false)}>✗ ตอบผิด</Button>
        <Button onClick={()=>nav(1)}>ถัดไป →</Button>
      </Flex>
    </div>
  );
};
