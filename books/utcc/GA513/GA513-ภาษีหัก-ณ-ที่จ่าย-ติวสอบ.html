  { q: 'จ่ายเงินได้ 40(3)-(4) ให้บุคคลธรรมดา ยื่นแบบอะไร?', a: 'ภ.ง.ด.2', d: 'ค่ากู๊ดวิลล์ ลิขสิทธิ์ (40(3)) และดอกเบี้ย เงินปันผล (40(4)) จ่ายให้บุคคลธรรมดา ใช้ ภ.ง.ด.2', star: 3, exam: false },
  { q: 'จ่ายเงินได้ 40(5)-(8) ให้บุคคลธรรมดา ยื่นแบบอะไร?', a: 'ภ.ง.ด.3', d: 'ค่าเช่า วิชาชีพอิสระ รับเหมา เงินได้อื่น ๆ จ่ายให้บุคคลธรรมดา ใช้ ภ.ง.ด.3', star: 3, exam: false },
  { q: 'จ่ายเงินได้ 40(2)-(8) ให้นิติบุคคล ยื่นแบบอะไร?', a: 'ภ.ง.ด.53', d: 'ผู้ถูกหักเป็นนิติบุคคล (บจก., หจก., ห้างหุ้นส่วนสามัญนิติบุคคล, กิจการร่วมค้า, มูลนิธิ/สมาคม) ใช้ ภ.ง.ด.53 เสมอ', star: 3, exam: false },
  { q: 'ผู้ถูกหักเป็นบุคคลธรรมดา ใช้มาตราอะไรบ้าง? ถ้าเป็นนิติบุคคลใช้มาตราอะไร?', a: 'บุคคลธรรมดา: ม.50 + ม.3 เตรส · นิติบุคคล: ม.3 เตรส, 69 ทวิ, 69 ตรี, 70, 70 ทวิ', d: 'ม.50 ใช้กับบุคคลธรรมดาโดยตรง, ม.3 เตรส (ท.ป.4/2528) ใช้ได้ทั้งคู่, ม.69 ทวิ ราชการจ่ายให้นิติบุคคล, ม.69 ตรี ขายอสังหาฯ ของนิติบุคคล', star: 2, exam: false },
  { q: 'ค่าเช่าทรัพย์สิน หักกี่ % ? เช่าเรือเดินทะเลหักกี่ %?', a: 'เช่าทรัพย์สินทุกชนิด 5% / เช่าเรือเดินทะเล 1%', d: 'ม.3 เตรส: 40(5)(ก) การให้เช่าทุกชนิดหัก 5% ยกเว้นเช่าเรือเดินทะเลตามกฎหมายพาณิชยนาวี หัก 1% — ใช้ทั้งผู้ถูกหักบุคคลธรรมดาและนิติบุคคล', star: 3, exam: false },
  { q: 'ค่าวิชาชีพอิสระ และค่ารับเหมา/จ้างทำของ หักกี่ %?', a: 'ทั้งคู่หัก 3%', d: '40(6) วิชาชีพอิสระ 3% และ 40(7)(8) รับเหมาที่ผู้รับเหมาจัดหาสัมภาระ/ค่าจ้างทำของ 3% — จำง่าย ๆ ว่างานบริการวิชาชีพและรับจ้างส่วนใหญ่คือ 3%', star: 3, exam: false },
  { q: 'เงินรางวัลประกวด/แข่งขัน/ชิงโชค และนักแสดงสาธารณะ หักกี่ %?', a: '5% ทั้งคู่', d: '40(8): การประกวด แข่งขัน ชิงโชค หัก 5% · นักแสดงสาธารณะ หัก 5% — กลุ่ม "ความบันเทิง-โชคลาภ" คือ 5%', star: 3, exam: false },
  { q: 'ค่าโฆษณาหักกี่ %? ค่าขนส่ง (ไม่ใช่สาธารณะ) หักกี่ %?', a: 'โฆษณา 2% / ขนส่ง 1%', d: '2 อัตราที่มักสับสน: ค่าโฆษณา 2% เป็นอัตราเฉพาะตัว ส่วนค่าขนส่งที่ไม่ใช่ขนส่งสาธารณะ 1%', star: 3, exam: false },
  { q: 'ดอกเบี้ยและเงินปันผล จ่ายให้บุคคลธรรมดา vs นิติบุคคล หักต่างกันอย่างไร?', a: 'บุคคลธรรมดา: ดอกเบี้ย 15% ปันผล 10% / นิติบุคคล: ดอกเบี้ย 1% ปันผล 10%', d: 'จุดหลอกข้อสอบ: ดอกเบี้ยจ่ายให้นิติบุคคลหักเพียง 1% แต่จ่ายให้บุคคลธรรมดาหัก 15% ส่วนเงินปันผล 10% เท่ากันทั้งคู่', star: 3, exam: false },
  { q: 'ซื้อสินค้าเกษตร 7 ชนิด กับซื้อข้าว นิติบุคคลผู้ขายถูกหักกี่ %?', a: 'สินค้า 7 ชนิด 0.75% / ข้าว 0.50%', d: '7 ชนิด ได้แก่ ยางแผ่น มันสำปะหลัง ปอ ข้าวโพด อ้อย เมล็ดกาแฟ ผลปาล์มน้ำมัน หัก 0.75% ส่วนข้าวหักเพียง 0.50%', star: 2, exam: false },
  { q: 'ผู้รับเงินเป็นมูลนิธิหรือสมาคม ถูกหักกี่ %?', a: '10%', d: 'มูลนิธิ/สมาคม (ที่ไม่ได้รับประกาศเป็นองค์การกุศลสาธารณะ) ถูกหัก ณ ที่จ่าย 10% ของเงินได้ทุกประเภทตามตาราง ยื่นด้วย ภงด.53', star: 2, exam: false },
  { q: 'ส่วนราชการจ่ายเงินให้นิติบุคคล หักอย่างไร? (ม.69 ทวิ)', a: 'หัก 1% เมื่อจ่ายตั้งแต่ 500 บาทขึ้นไป', d: 'เทียบกับกรณีราชการจ่ายให้บุคคลธรรมดา (40(5)-(8)): หัก 1% เมื่อจ่ายตั้งแต่ 10,000 บาทขึ้นไป — เกณฑ์ขั้นต่ำต่างกัน (500 vs 10,000)', star: 2, exam: false },
  { q: 'บุคคลธรรมดาผู้ถูกหักที่ "ไม่อยู่ในไทย" เงินได้ 40(2)-(6) หักกี่ %?', a: '15%', d: 'กรณีผู้มีเงินได้มิได้อยู่ในประเทศไทย เงินได้ ม.40(2)-40(6) หักอัตราเดียว 15% ไม่ใช้อัตราก้าวหน้า', star: 2, exam: false },
  { q: 'ต้องนำส่งภาษีหัก ณ ที่จ่ายภายในกี่วัน? ยื่นออนไลน์ได้สิทธิอะไร?', a: 'ภายใน 7 วันนับแต่วันสิ้นเดือนที่จ่ายเงิน / ออนไลน์ขยายเวลาอีก 8 วัน', d: 'หน้าที่ข้อ 4 ของผู้หัก: ยื่นแบบพร้อมนำส่งภาษีภายใน 7 วันนับแต่วันสิ้นเดือน การยื่นออนไลน์ได้สิทธิพิเศษขยายเวลายื่นและชำระออกไปอีก 8 วัน', star: 3, exam: false },
  { q: 'หนังสือรับรองหัก ณ ที่จ่าย ต้องออกอย่างน้อยกี่ฉบับ? แจกอย่างไร?', a: '4 ฉบับ — ต้นฉบับ+สำเนาแรกให้ผู้ถูกหัก / สำเนา 2-3 ผู้หักเก็บ', d: 'ผู้ถูกหักใช้ขอคืนภาษี 1 + เก็บหลักฐาน 1 · ผู้หักใช้แนบยื่นชำระภาษี 1 + เก็บหลักฐาน 1 และต้องออกให้ทุกครั้งที่หัก', star: 3, exam: false },
  { q: 'นำส่งภาษีล่าช้า เสียเงินเพิ่มเท่าไร? ไม่ยื่นแบบปรับเท่าไร? เจตนาหลีกเลี่ยงโทษเท่าไร?', a: 'เงินเพิ่ม 1.5%/เดือน · ปรับไม่เกิน 2,000 บาท · จำคุกไม่เกิน 1 ปี หรือปรับไม่เกิน 200,000', d: 'สามระดับ: (1) นำส่งช้า = เงินเพิ่ม 1.5% ต่อเดือน เศษของเดือนนับเป็น 1 เดือน (2) ไม่ยื่นแบบใน 7 วัน = ปรับอาญาไม่เกิน 2,000 (3) เจตนาไม่ยื่นเพื่อหลีกเลี่ยง = คุก 1 ปี/ปรับ 200,000 หรือทั้งจำทั้งปรับ และถ้าหักไม่ครบผู้จ่ายร่วมรับผิดกับผู้มีเงินได้', star: 3, exam: false },
  { q: 'สูตรคำนวณ WHT เงินเดือน 40(1) มี 3 ขั้นหลักอะไรบ้าง?', a: '1) รายได้ต่อปี − คชจ. − ลดหย่อน = เงินได้สุทธิ 2) × อัตราภาษี = ภาษีทั้งปี 3) ÷ จำนวนคราวที่จ่าย = ภาษีหักต่อครั้ง', d: 'ตาม ม.50(1) + ม.48(5): เสมือนได้รับทั้งปี หักค่าใช้จ่าย 50% ไม่เกิน 100,000 หักลดหย่อน คำนวณตามขั้นบันได แล้วหารจำนวนคราวที่จ่าย และต้องคำนวณใหม่ทุกครั้งที่มีเงินได้เพิ่ม', star: 3, exam: true },
  { q: '[ตัวอย่าง 1] เงินเดือน 70,000/เดือน ลดหย่อนรวม 379,500 — ภาษีหักต่อเดือนเท่าไร และเดือน ธ.ค. เท่าไร?', a: 'เดือนละ 1,129.16 · ธ.ค. 1,129.24', d: '840,000 − 100,000 (คชจ.) − 379,500 = สุทธิ 360,500 → ภาษีปี (150,000×5%)+(60,500×10%) = 13,550 → ÷12 = 1,129.16 → ธ.ค. = 13,550−(1,129.16×11) = 1,129.24 (เดือนสุดท้ายเก็บเศษ)', star: 3, exam: true },
  { q: '[ตัวอย่าง] ถ้าเดือน ม.ค. มี OT 13,000 บาทเพิ่มจากเงินเดือน — เดือน ม.ค. หักเท่าไร?', a: '2,429.16 (= 1,129.16 ปกติ + 1,300 ภาษีของ OT)', d: 'รวม OT เข้าฐานปี: ภาษีปีใหม่ 14,850 − ภาษีปีเฉพาะเงินเดือน 13,550 = 1,300 คือภาษีของ OT หักทั้งจำนวนในเดือนที่จ่าย บวกกับภาษีเงินเดือนปกติของเดือนนั้น', star: 3, exam: true },
  { q: 'เริ่มงานกลางปี (เช่น 1 เม.ย.) คำนวณ "เสมือนทั้งปี" อย่างไร?', a: 'คูณเฉพาะจำนวนเดือนที่จะได้รับจริงในปีนั้น (เม.ย.–ธ.ค. = ×9) และหารด้วย 9', d: 'ตัวอย่าง 2: 40,000×9 = 360,000 ไม่ใช่ ×12 เพราะกฎหมายให้ประมาณเงินได้ที่คาดว่าจะได้รับจริงทั้งปี ภาษีปี 2,106.25 ÷ 9 = 234.02/เดือน', star: 3, exam: true },
  { q: 'ปรับฐานเงินเดือนระหว่างปี (ต.ค. เป็นต้นไป) ต้องคำนวณเดือน ต.ค.–พ.ย. อย่างไร?', a: '(ภาษีปีฐานใหม่ − ภาษีที่ถูกหักสะสมแล้ว) ÷ จำนวนเดือนที่เหลือ', d: 'ตัวอย่าง 3: ภาษีปีใหม่ 39,425 − หักสะสม 9 เดือน 15,337.44 = 24,087.56 ÷ 3 = 8,029.18 ต่อเดือน (ธ.ค. เก็บเศษ 8,029.20) — ฐานปีใหม่คิดจากเงินเดือนจริงแต่ละช่วง (50,000×9)+(100,000×3)', star: 3, exam: true },
  { q: 'ได้คอมมิชชั่นระหว่างปีหลายครั้ง หักภาษีเดือนที่มีคอมมิชชั่นอย่างไร?', a: 'ภาษีเงินเดือนปกติ + (ภาษีปีรวมคอมฯ สะสม − ภาษีปีก่อนรวมคอมฯ ก้อนนี้)', d: 'ตัวอย่าง 4: มี.ค. คอมฯ 100,000: 31,925−20,450 = 11,475 → หัก 13,179.16 · เม.ย. คอมฯ 30,000: 36,425−31,925 = 4,500 → หัก 6,204.16 — เทียบกับยอดสะสมก่อนหน้าเสมอ ไม่ใช่เทียบกับฐานเงินเดือนเปล่า', star: 3, exam: true },
  { q: 'จ่ายค่านายหน้า 40(2) ให้ผู้ที่ไม่ใช่พนักงานประจำ ครั้งแรกของปี คำนวณอย่างไร?', a: 'ถือจำนวนที่จ่ายจริงเป็นเงินได้เสมือนทั้งปี (ไม่คูณ 12) หัก คชจ. 50% ไม่เกิน 100,000 หักลดหย่อน แล้วคำนวณขั้นบันได', d: 'ตัวอย่างนางรินรภัทร: ม.ค. 400,000 → สุทธิ 240,000 → ภาษีหัก 4,500 · จ่ายครั้งถัดไปรวมยอดสะสมแล้วเครดิตภาษีที่หักไว้แล้ว (ก.ย.: ภาษีปี 73,000−4,500 = 68,500) · ไม่มีลดหย่อนประกันสังคมเพราะไม่ใช่พนักงานประจำ', star: 3, exam: true },
  { q: 'เงินได้จ่ายครั้งเดียวเพราะออกจากงาน มี 4 ประเภทอะไรบ้าง?', a: '1) คำนวณแบบบำเหน็จบำนาญข้าราชการ 2) เงินจากกองทุน (PVD/กบข.) 3) เงินชดเชยตามกฎหมายแรงงาน 4) เงินได้ครั้งเดียวที่คำนวณต่างจาก (1)', d: 'ประเภท (4) รวมถึงเงินก้อนแม้ลาออกสมัครใจ เงินบำเหน็จ Early Retire และค่าจ้างวันหยุดพักผ่อนที่ไม่ได้ใช้', star: 3, exam: false },
  { q: 'ทำงานครบ 5 ปี กับไม่ครบ 5 ปี ต่างกันอย่างไรในการคำนวณเงินก้อนออกจากงาน?', a: 'ครบ 5 ปี: เลือกแยกคำนวณด้วยใบแนบ ภงด.90/91 ได้ / ไม่ครบ: ต้องรวมเป็น 40(1) แยกไม่ได้', d: 'สิทธิแยกคำนวณ (เสียภาษีน้อยกว่ามาก เพราะหัก 7,000×ปี + 50%) ให้เฉพาะผู้ทำงานครบ 5 ปี · การนับปี: เศษเกิน 183 วันปัดขึ้นเป็น 1 ปี', star: 3, exam: false },
  { q: 'สูตรบำเหน็จ และบำนาญข้าราชการ คืออะไร?', a: 'บำเหน็จ = เงินเดือนสุดท้าย × ปีที่ทำงาน · บำนาญ = (เงินเดือนสุดท้าย × ปีที่ทำงาน) ÷ 50', d: 'เศษของปีเกิน 6 เดือนปัดเป็น 1 ปี — สูตรนี้เป็นเกณฑ์ของเงินก้อนประเภท (1)', star: 2, exam: false },

  { divider: '💰 ดอกเบี้ย & เงินปันผล (ภงด.2)' },

  { s: 'ปันผล', t: 'หุ้น vs กองทุน', b: 'ทั้งคู่หัก 10% เลือก Final Tax ได้ · หุ้น BOI ยกเว้น · Capital gain ตลาดฯ + ขายคืนหน่วยลงทุน ยกเว้น · ตั้งแต่ 20 ส.ค. 62 ต้องเลือกทางเดียวกันทั้งสอง และปันผลกองทุนไม่มีเครดิตภาษี', type: 'contrast' },

  { s: 'บันได', t: 'อัตราก้าวหน้า + ภาษีสะสมเต็มขั้น', b: '150k ยกเว้น → 5% → 10% → 15% → 20% → 25% → 30% → 35% · สะสม: ถึง 300k=7,500 · 500k=27,500 · 750k=65,000 · 1M=115,000', type: 'chunk' },

  { s: '1↔2', t: '40(1) vs 40(2) ดูที่ความสัมพันธ์', b: 'มีนายจ้าง-ลูกจ้าง = 40(1) · อิสระ/นายหน้า/เบี้ยประชุม = 40(2) · คอมมิชชั่นของพนักงานประจำ = 40(1) เสมอ · คชจ. 50% ≤100,000 รวมกันทั้งคู่', type: 'contrast' },

/* ============================================================
   COMPONENTS
   ============================================================ */
const Stars = ({ n }) => <span>{'⭐'.repeat(n)}</span>;

const SectionCards = ({ data }) => (
  <div>
    {data.map(sec => (
      <Card key={sec.key} style={{ marginBottom: 20, borderColor: C.border, background: C.white }}
        title={<Space wrap><Text strong style={{ fontSize: 17, color: C.text }}>{sec.title}</Text>
          {sec.tags.map(([label, color], i) => <Tag key={i} color={color}>{label}</Tag>)}</Space>}>
        {sec.content()}
      </Card>
    ))}
  </div>
);

const FoundationTab = () => <SectionCards data={foundationData} />;
const SummaryTab = () => <SectionCards data={summaryData} />;

const FlashcardTab = () => {
  const [mode, setMode] = useState('all');
  const [order, setOrder] = useState(flashcards.map((_, i) => i));
  const [pos, setPos] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [score, setScore] = useState({ ok: 0, no: 0 });

  const filteredIdx = order.filter(i => {
    if (mode === 'exam') return flashcards[i].exam;
    if (mode === 'star3') return flashcards[i].star === 3;
    return true;
  });
  const total = filteredIdx.length;
  const safePos = total === 0 ? 0 : Math.min(pos, total - 1);
  const card = total > 0 ? flashcards[filteredIdx[safePos]] : null;

  const shuffle = () => {
    const arr = [...flashcards.keys()];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    setOrder(arr); setPos(0); setFlipped(false); setScore({ ok: 0, no: 0 });
  };
  const go = (d) => { setFlipped(false); setPos(p => (p + d + total) % total); };
  const mark = (ok) => {
    setScore(s => ok ? { ...s, ok: s.ok + 1 } : { ...s, no: s.no + 1 });
    go(1);
  };
  const switchMode = (m) => { setMode(m); setPos(0); setFlipped(false); setScore({ ok: 0, no: 0 }); };

  return (
    <div>
      <Flex justify="space-between" align="center" wrap="wrap" gap={12} style={{ marginBottom: 16 }}>
        <Space wrap>
          <Button type={mode === 'all' ? 'primary' : 'default'} onClick={() => switchMode('all')}>ทั้งหมด ({flashcards.length})</Button>
          <Button type={mode === 'exam' ? 'primary' : 'default'} onClick={() => switchMode('exam')}>🧮 โจทย์คำนวณ ({flashcards.filter(f => f.exam).length})</Button>
          <Button type={mode === 'star3' ? 'primary' : 'default'} onClick={() => switchMode('star3')}>⭐⭐⭐ สำคัญสุด ({flashcards.filter(f => f.star === 3).length})</Button>
        </Space>
        <Button onClick={shuffle}>🔀 สับไพ่</Button>
      </Flex>
      <Row gutter={12} style={{ marginBottom: 16 }}>
        <Col span={8}><Card size="small" style={{ background: C.surface3, borderColor: C.border, textAlign: 'center' }}><Statistic title="การ์ดที่" value={total === 0 ? 0 : safePos + 1} suffix={`/ ${total}`} valueStyle={{ color: C.text, fontSize: 20 }} /></Card></Col>
        <Col span={8}><Card size="small" style={{ background: C.greenBg, borderColor: C.green, textAlign: 'center' }}><Statistic title="ตอบถูก" value={score.ok} valueStyle={{ color: C.green, fontSize: 20 }} /></Card></Col>
        <Col span={8}><Card size="small" style={{ background: C.redBg, borderColor: C.red, textAlign: 'center' }}><Statistic title="ยังไม่ได้" value={score.no} valueStyle={{ color: C.red, fontSize: 20 }} /></Card></Col>
      </Row>
      {card ? (
        <div>
          <div className="fc-perspective" onClick={() => setFlipped(f => !f)}>
            <div className={'fc-card' + (flipped ? ' flipped' : '')}>
              <div className="fc-face" style={{ background: C.white, border: `2px solid ${C.borderDark}`, boxShadow: '0 4px 14px rgba(122,101,72,0.12)' }}>
                <Space direction="vertical" align="center" style={{ width: '100%' }}>
                  <Space>
                    <Stars n={card.star} />
                    {card.exam && <Tag color="volcano">🧮 โจทย์คำนวณ</Tag>}
                  </Space>
                  <Text strong style={{ fontSize: 19, textAlign: 'center', color: C.text }}>{card.q}</Text>
                  <Text type="secondary" style={{ marginTop: 12 }}>👆 แตะการ์ดเพื่อดูเฉลย</Text>
                </Space>
              </div>
              <div className="fc-face fc-back" style={{ background: C.surface3, border: `2px solid ${C.gold}`, boxShadow: '0 4px 14px rgba(122,101,72,0.12)' }}>
                <Space direction="vertical" align="center" style={{ width: '100%' }}>
                  <Tag color="gold" style={{ fontSize: 13 }}>คำตอบ</Tag>
                  <Text strong style={{ fontSize: 18, textAlign: 'center', color: C.amberDark }}>{card.a}</Text>
                  <Divider style={{ margin: '10px 0', borderColor: C.borderDark }} />
                  <Text style={{ fontSize: 14, textAlign: 'center', color: C.text2 }}>{card.d}</Text>
                </Space>
              </div>
            </div>
          </div>
          <Flex justify="center" gap={12} style={{ marginTop: 20 }} wrap="wrap">
            <Button onClick={() => go(-1)}>← ก่อนหน้า</Button>
            <Button danger onClick={() => mark(false)}>✗ ยังไม่ได้</Button>
            <Button type="primary" style={{ background: C.green }} onClick={() => mark(true)}>✓ ตอบได้</Button>
            <Button onClick={() => go(1)}>ถัดไป →</Button>
          </Flex>
        </div>
      ) : <Alert type="warning" message="ไม่มีการ์ดในโหมดนี้" />}
    </div>
  );
};

const typeStyle = {
  mnem: { color: C.purple, bg: C.purpleBg, label: '🧠 ช่วยจำ' },
  flow: { color: C.cyan, bg: C.cyanBg, label: '🔄 ขั้นตอน' },
  contrast: { color: C.red, bg: C.redBg, label: '⚖️ เทียบ/ระวัง' },
  chunk: { color: C.blue, bg: C.blueBg, label: '📦 จำเป็นกลุ่ม' },
  formula: { color: C.amberDark, bg: '#F3EBDCFF', label: '🧮 สูตร' },
};

const QuickTab = () => (
  <div>
    {quickSections.map((item, idx) => {
      if (item.divider) {
        return <Divider key={idx} orientation="left" style={{ borderColor: C.borderDark }}>
          <Text strong style={{ fontSize: 16, color: C.amberDark }}>{item.divider}</Text>
        </Divider>;
      }
      const st = typeStyle[item.type];
      return (
        <Card key={idx} size="small" className="qc"
          style={{ marginBottom: 10, background: st.bg, borderColor: st.color, borderLeftWidth: 5, borderLeftColor: st.color }}>
          <Flex align="flex-start" gap={12} wrap="wrap">
            <Tag color="default" style={{ background: C.white, borderColor: st.color, color: st.color, fontWeight: 700, minWidth: 64, textAlign: 'center' }}>{item.s}</Tag>
            <div style={{ flex: 1, minWidth: 220 }}>
              <Space size={6} wrap>
                <Text strong style={{ color: C.text }}>{item.t}</Text>
                <Text style={{ fontSize: 12, color: st.color }}>{st.label}</Text>
              </Space>
              <div><Text style={{ color: C.text2 }}>{item.b}</Text></div>
            </div>
          </Flex>
        </Card>
      );
    })}
  </div>
);

/* Print-friendly view: all three tabs flattened into one document.
   Hidden on screen (.print-only), shown only when printing / saving as PDF. */

  <div className="print-only" style={{ maxWidth: 900, margin: '0 auto', padding: 16, background: '#fff' }}>
    <div style={{ textAlign: 'center', marginBottom: 20 }}>
      <Title level={2} style={{ color: C.amberDark, marginBottom: 4 }}>GA513 การภาษีอากร — ภาษีเงินได้หัก ณ ที่จ่าย (Withholding Tax)</Title>
      <Text type="secondary">ชีทติวสอบฉบับพิมพ์ · สรุปจากเอกสารประกอบการสอน ดร.จิรารัช พิพัฒน์นราพงศ์ · UTCC บัญชีมหาบัณฑิต</Text>
    </div>
    <Title level={3} className="pv-section-title" style={{ color: C.amberDark, borderBottom: `3px solid ${C.gold}`, paddingBottom: 6 }}>ส่วนที่ 1 — ปูพื้น</Title>
    {foundationData.map(sec => (
      <div key={sec.key} style={{ marginBottom: 20 }}>
        <Title level={4} className="pv-section-title" style={{ color: C.text, borderBottom: `1px solid ${C.borderDark}`, paddingBottom: 4 }}>{sec.title}</Title>
        {sec.content()}
      </div>
    ))}
    <Title level={3} className="pv-section-title pv-page-start" style={{ color: C.amberDark, borderBottom: `3px solid ${C.gold}`, paddingBottom: 6 }}>ส่วนที่ 2 — สรุปเนื้อหา</Title>
    {summaryData.map(sec => (
      <div key={sec.key} style={{ marginBottom: 20 }}>
        <Title level={4} className="pv-section-title" style={{ color: C.text, borderBottom: `1px solid ${C.borderDark}`, paddingBottom: 4 }}>{sec.title}</Title>
        {sec.content()}
      </div>
    ))}
    <Title level={3} className="pv-section-title pv-page-start" style={{ color: C.amberDark, borderBottom: `3px solid ${C.gold}`, paddingBottom: 6 }}>ส่วนที่ 3 — Flashcard {flashcards.length} ข้อ (ถาม–ตอบ)</Title>
    {flashcards.map((f, i) => (
      <div key={i} className="no-break" style={{ border: `1px solid ${C.border}`, borderRadius: 8, padding: '8px 12px', marginBottom: 8 }}>
        <div>
          <Text strong>{i + 1}. {f.q}</Text>
          <Text> {'⭐'.repeat(f.star)}</Text>
          {f.exam && <Tag color="volcano" style={{ marginLeft: 6 }}>🧮 โจทย์คำนวณ</Tag>}
        </div>
        <div><Text strong style={{ color: C.amberDark }}>ตอบ: {f.a}</Text></div>
        <div><Text style={{ fontSize: 13, color: C.text2 }}>{f.d}</Text></div>
      </div>
    ))}
    <Title level={3} className="pv-section-title pv-page-start" style={{ color: C.amberDark, borderBottom: `3px solid ${C.gold}`, paddingBottom: 6 }}>ส่วนที่ 4 — การ์ดจำด่วน</Title>
    {quickSections.map((item, idx) => {
      if (item.divider) {
        return <Title key={idx} level={4} className="pv-divider" style={{ color: C.amberDark, marginTop: 16 }}>{item.divider}</Title>;
      }
      const st = typeStyle[item.type];
      return (
        <div key={idx} className="no-break" style={{ border: `1px solid ${C.border}`, borderLeft: `4px solid ${st.color}`, borderRadius: 8, padding: '6px 12px', marginBottom: 6 }}>
          <Text strong>[{item.s}] {item.t}</Text>
          <Text style={{ fontSize: 12, color: st.color }}> {st.label}</Text>
          <div><Text style={{ fontSize: 13, color: C.text2 }}>{item.b}</Text></div>
        </div>
      );
    })}
    <div style={{ textAlign: 'center', marginTop: 24, borderTop: `1px solid ${C.border}`, paddingTop: 8 }}>
      <Text type="secondary" style={{ fontSize: 12 }}>GA513 ติวสอบ ภาษีเงินได้หัก ณ ที่จ่าย · โชคดีในการสอบ! 🍀</Text>
    </div>
  </div>
);

const App = () => (
  <ConfigProvider theme={{
    algorithm: theme.defaultAlgorithm,
    token: {
      colorPrimary: C.gold, colorBgBase: C.bg, colorTextBase: C.text,
      colorBgContainer: C.white, colorBorder: C.border, colorBorderSecondary: C.border,
      borderRadius: 10, fontFamily: "'Noto Sans Thai', sans-serif", fontSize: 15,
    },
  }}>
    <Layout className="screen-only" style={{ minHeight: '100vh', background: C.bg }}>
      <Layout.Content style={{ maxWidth: 900, width: '100%', margin: '0 auto', padding: '28px 16px' }}>
        <div style={{ textAlign: 'center', marginBottom: 8 }}>
          <Title level={2} style={{ color: C.amberDark, marginBottom: 4 }}>📚 GA513 การภาษีอากร</Title>
          <Title level={4} style={{ color: C.text2, marginTop: 0, fontWeight: 500 }}>ภาษีเงินได้หัก ณ ที่จ่าย (Withholding Tax)</Title>
          <Text type="secondary">สรุปจากเอกสารประกอบการสอน ดร.จิรารัช พิพัฒน์นราพงศ์ · UTCC บัญชีมหาบัณฑิต · มิ.ย.–ก.ค. 2569</Text>
          <div style={{ marginTop: 12 }}>
            <Button onClick={() => window.print()}>🖨️ พิมพ์ / บันทึกเป็น PDF</Button>
            <div><Text type="secondary" style={{ fontSize: 12 }}>ฉบับพิมพ์รวมเนื้อหาทั้ง 4 แท็บ (ปูพื้น + สรุป + ถาม-ตอบ + การ์ดจำด่วน) พอดีกระดาษ A4</Text></div>
          </div>
        </div>
        <Tabs centered type="card" size="large" style={{ marginTop: 16 }}
          items={[
            { key: 'foundation', label: '🧱 ปูพื้น', children: <FoundationTab /> },
            { key: 'summary', label: '📖 สรุปเนื้อหา', children: <SummaryTab /> },
            { key: 'flash', label: '🃏 Flashcard', children: <FlashcardTab /> },
            { key: 'quick', label: '⚡ การ์ดจำด่วน', children: <QuickTab /> },
          ]} />
        <div style={{ textAlign: 'center', marginTop: 32, paddingTop: 16, borderTop: `1px solid ${C.border}` }}>
          <Text type="secondary" style={{ fontSize: 13 }}>สร้างจากเอกสารประกอบการสอน GA513 (24 หน้า) · ใช้คู่กับรูป JPEG ทั้ง 24 หน้าในโฟลเดอร์ GA513-jpeg · โชคดีในการสอบ! 🍀</Text>
        </div>
      </Layout.Content>
    </Layout>
    <PrintView />
  </ConfigProvider>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
