/* =================== BASICS =================== */
function BasicsTab(){
  const [pw,setPw]=React.useState(null);
  const powers={
    leg:{name:'นิติบัญญัติ',who:'รัฐสภา (สส + สว)',job:'ออกกฎหมายระดับ พ.ร.บ. / ประมวลกฎหมาย + ควบคุมตรวจสอบฝ่ายบริหาร',color:C.blue,ic:'📜'},
    exe:{name:'บริหาร',who:'คณะรัฐมนตรี (ครม.)',job:'กำหนดนโยบาย + บริหารราชการแผ่นดิน + ออกกฎหมายลำดับรอง (กฎ/ข้อบังคับ)',color:C.green,ic:'🏛️'},
    jud:{name:'ตุลาการ',who:'ศาล (4 ศาล)',job:'พิจารณาพิพากษาคดีในพระปรมาภิไธย King อย่างเป็นอิสระ',color:C.purple,ic:'⚖️'},
  };
  return (
  <div className="fadeUp">
    <Alert type="success" showIcon style={{marginBottom:16, borderRadius:12}}
      message="เริ่มจากศูนย์ — อ่านหน้านี้ก่อนถ้ายังไม่มีพื้นรัฐธรรมนูญ"
      description="วิชานี้ว่าด้วย 'กติกาสูงสุดของประเทศ' คือใครมีอำนาจอะไร ใช้อย่างไร ตรวจสอบกันยังไง และคุ้มครองสิทธิประชาชนแค่ไหน หน้านี้ปูแนวคิดหลักก่อนไปเจาะรายมาตรา"/>

    <Card style={{...box(C.blueBg,C.blue)}} bodyStyle={{padding:18}}>
      <Title level={4} style={{marginTop:0,color:C.blue}}>① รัฐธรรมนูญคืออะไร — 2 มุมมอง</Title>
      <Row gutter={12}>
        <Col xs={24} md={12}>
          <div className="diagram-box floaty" style={{borderColor:C.blue}}>
            <div style={{fontSize:28}}>🏔️</div>
            <div style={{color:C.blue,fontSize:17}}>เชิงเนื้อหา = "ลำดับชั้น"</div>
            <Text type="secondary">เป็นกฎหมายสูงสุด ชี้วัดว่ากฎหมายใดชอบ/ไม่ชอบด้วย รธน</Text>

        </Col>
        <Col xs={24} md={12}>
          <div className="diagram-box" style={{borderColor:C.gold}}>
            <div style={{fontSize:28}}>⚙️</div>

    <Card style={{...box(C.purpleBg,C.purple)}} bodyStyle={{padding:18}}>

          <Col xs={24} md={i<2?12:8} key={i}>
            <div style={box(C.white,C.border)}>

              <div style={{color:C.text2,fontSize:13,marginTop:2}}>{x[1]}</div>

          </Col>

    <Card style={{...box(C.cyanBg,C.cyan)}} bodyStyle={{padding:18}}>
      <Title level={4} style={{marginTop:0,color:C.cyan}}>③ ลองเล่น: อำนาจอธิปไตย 3 ฝ่าย (คลิกดูใครใช้)</Title>
      <Text type="secondary">{M('3')} อำนาจอธิปไตยเป็นของปวงชนชาวไทย King ทรงใช้ผ่าน 3 องค์กรนี้</Text>
      <Row gutter={10} style={{marginTop:12}}>
        {Object.keys(powers).map(k=>(
          <Col xs={8} key={k}>
            <div className="diagram-box qc" onClick={()=>setPw(k)}
              style={{borderColor:pw===k?powers[k].color:C.border, background:pw===k?powers[k].color:C.white, color:pw===k?'#fff':C.text, cursor:'pointer'}}>
              <div style={{fontSize:26}}>{powers[k].ic}</div>
              <div style={{fontSize:14}}>{powers[k].name}</div>
            </div>
          </Col>
        ))}
      </Row>
      {pw && <div key={pw} className="fadeUp" style={{...box(C.white,powers[pw].color),marginTop:12}}>
        <Tag color="blue">{powers[pw].name}</Tag> <b>ผู้ใช้: {powers[pw].who}</b>
        <div style={{marginTop:4,color:C.text2}}>{powers[pw].job}</div>
      </div>}
    </Card>

    <Card style={{...box(C.gold2,C.gold)}} bodyStyle={{padding:18}}>
      <Title level={4} style={{marginTop:0,color:C.goldDark}}>④ วิธีเขียนตอบข้อสอบรัฐธรรมนูญ (อัตนัย)</Title>
      <Steps direction="vertical" size="small" current={-1} items={[
        {title:<b>วางหลัก (นิยาม/มาตรา)</b>,description:'อธิบายความหมาย/หลักการ + อ้างมาตราให้ตรง เช่น ม.5 รธน สูงสุด'},
        {title:<b>อธิบายเหตุผล/องค์ประกอบ</b>,description:'ขยายว่าทำไม + แยกเงื่อนไข/ขั้นตอนให้ครบ'},
        {title:<b>ยกตัวอย่างประกอบ</b>,description:'ข้อสอบรัฐธรรมนูญมักสั่ง "อธิบายพร้อมยกตัวอย่าง" → ต้องมีตัวอย่าง'},
        {title:<b>สรุปตอบคำถาม</b>,description:'ฟันธงให้ตรงประเด็นที่ถาม'},
      ]}/>
      <Alert type="success" showIcon style={{borderRadius:10}} message="วิชานี้เน้น 'อธิบาย + ยกตัวอย่าง' มากกว่าวินิจฉัยเคส — ท่องมาตราหลัก + ตัวเลของค์กรให้แม่น"/>
    </Card>
  </div>);
}

/* =================== SUMMARY =================== */
const summaryData=[
  {key:'map',title:'🗺️ ภาพรวมวิชา + รธน 2560',tags:[['ต้องรู้','volcano']],content:()=>(
    <div>
      <Alert style={{marginBottom:12,borderRadius:10}} type="info" showIcon
        message="รธน แห่งราชอาณาจักรไทย พ.ศ.2560 · 16 หมวด 279 มาตรา · ข้อสอบอัตนัย 4 ข้อ ข้อละ 25 คะแนน (เน้นอธิบาย+ยกตัวอย่าง)"/>
      <Table size="small" pagination={false} bordered
        columns={[{title:'กลุ่มเนื้อหา',dataIndex:'t'},{title:'มาตรา/คีย์',dataIndex:'m'},{title:'ออกบ่อย',dataIndex:'s',width:80,render:v=><Stars n={v}/>}]}
        dataSource={[
          {key:1,t:'หลักประชาธิปไตย · เสมอภาค/เสรีภาพ',m:'ม.4, 25, 26, 27',s:3},
          {key:2,t:'อำนาจอธิปไตย · แบ่งแยกอำนาจ · The King Can Do No Wrong',m:'ม.2, 3, 5, 6',s:3},

          {key:4,t:'รัฐสภา · องค์กรอิสระ · แก้ไข รธน · ประชามติ',m:'ม.79–165, 256',s:2},
        ]}/>
      <div style={{...box(C.gold2,C.gold),marginTop:12}}>
        <b>จากข้อสอบจริง 2/2567:</b> ข้อ 1 = เสมอภาค vs เสรีภาพ (+Positive Discrimination) · ข้อ 2 = อำนาจอธิปไตย / veto ร่างกฎหมาย · ข้อ 3 = ม.5+ม.50(7) ทำไม King ไม่ต้องเลือกตั้ง · ข้อ 4 = คำวินิจฉัยศาล รธน 3/2567 (ม.112) + The King Can Do No Wrong / Supreme Law
      </div>
    </div>
  )},
  {key:'p1',title:'⚖️ พาร์ท 1 · การปกครองไทย + สิทธิเสรีภาพ (ม.1–6, 25–27)',tags:[['ข้อ 1,3','geekblue'],['ออกบ่อย','volcano']],content:()=>(
    <div>
      <Table size="small" pagination={false} bordered style={{marginBottom:12}}

          {key:1,m:'ม.1',d:'ประเทศไทยเป็นรัฐเดี่ยว (ราชอาณาจักรอันหนึ่งอันเดียว แบ่งแยกไม่ได้)'},
          {key:2,m:'ม.2',d:'ปกครองระบอบประชาธิปไตยอันมีพระมหากษัตริย์ทรงเป็นประมุข'},

          {key:6,m:'ม.6',d:'องค์พระมหากษัตริย์ทรงดำรงอยู่ในฐานะอันเป็นที่เคารพสักการะ ผู้ใดจะละเมิดมิได้ = The King Can Do No Wrong'},
        ]}/>
      <div style={box(C.greenBg,C.green)}>
        <b>เสมอภาค vs เสรีภาพ (ข้อสอบ 2/67 ข้อ 1):</b> ทั้งสองสัมพันธ์กัน — เสรีภาพคือการทำได้ตามใจในกรอบกฎหมาย ส่วนเสมอภาคคือทุกคนได้รับการปฏิบัติเท่าเทียมกันภายใต้กฎหมายเดียวกัน · <span className="hl">การเลือกปฏิบัติที่เป็นธรรม (Positive Discrimination)</span> = ปฏิบัติต่างกันได้ ถ้ามีเหตุผลอันสมควรเพื่อช่วยผู้ด้อยโอกาสให้เท่าเทียม (เช่น สิ่งอำนวยความสะดวกคนพิการ) ไม่ถือว่าขัดหลักเสมอภาค

      <div style={box(C.blueBg,C.blue)}>

      </div>
      <div style={box(C.redBg,C.red)}>

        แม้ {M('50(7)')} กำหนดหน้าที่ปวงชนชาวไทยต้องไปใช้สิทธิเลือกตั้ง แต่ King ทรงดำรงสถานะ <span className="hl">เป็นกลางทางการเมือง อยู่เหนือการเมือง</span> ตาม {M('6')} (The King Can Do No Wrong) · การไปเลือกตั้งย่อมแสดงการฝักใฝ่ฝ่ายใดฝ่ายหนึ่ง ขัดกับความเป็นกลาง → จึงไม่ต้องไปใช้สิทธิ และไม่ถือว่าขัด/แย้งต่อ รธน

function FlashDeck(){
  const [filter,setFilter]=React.useState('ทั้งหมด');
  const pool=React.useMemo(()=>{let p=flashcards.map((c,i)=>({...c,i}));
    if(filter==='ข้อสอบจริง')p=p.filter(c=>c.exam); if(filter==='★★★')p=p.filter(c=>c.star===3); return p;},[filter]);
  const [idx,setIdx]=React.useState(0); const [flip,setFlip]=React.useState(false); const [score,setScore]=React.useState({c:0,w:0});
  React.useEffect(()=>{setIdx(0);setFlip(false);},[filter]);
  const list=pool; const card=list[idx]||list[0];
  const next=(d)=>{setFlip(false);setTimeout(()=>setIdx(p=>(p+d+list.length)%list.length),120);};
  const mark=(ok)=>{setScore(s=>({c:s.c+(ok?1:0),w:s.w+(ok?0:1)}));next(1);};
  if(!card)return <Alert message="ไม่มีการ์ดในหมวดนี้"/>;
  return (<div>
    <Flex justify="space-between" align="center" wrap gap={8} style={{marginBottom:12}}>
      <Segmented value={filter} onChange={setFilter} options={['ทั้งหมด','ข้อสอบจริง','★★★']}/>
      <Space><Tag color="green">ถูก {score.c}</Tag><Tag color="red">ผิด {score.w}</Tag><Button size="small" onClick={()=>setScore({c:0,w:0})}>รีเซ็ต</Button></Space>
    </Flex>
    <Text type="secondary">การ์ด {idx+1}/{list.length} · แตะเพื่อพลิกดูเฉลย</Text>
    <div className="fc-perspective" style={{marginTop:10}}>
      <div className={'fc-card'+(flip?' flipped':'')} onClick={()=>setFlip(f=>!f)}>
        <div className="fc-face" style={{background:C.white,border:'2px solid '+C.border}}>
          <Space style={{marginBottom:8}}>{card.exam&&<Tag color="volcano">ข้อสอบจริง</Tag>}<Stars n={card.star}/></Space>
          <div className="serif" style={{fontSize:19,color:C.text,lineHeight:1.7}}>{card.q}</div>
          <Text type="secondary" style={{marginTop:14}}>👆 แตะเพื่อดูคำตอบ</Text>
        </div>
        <div className="fc-face fc-back" style={{background:C.blueBg,border:'2px solid '+C.blue}}>
          <Tag color="blue" style={{alignSelf:'flex-start'}}>คำตอบ</Tag>
          <div style={{fontSize:18,fontWeight:700,color:C.blue,margin:'6px 0'}}>{card.a}</div>
          <Text style={{color:C.text2}}>{card.d}</Text>
        </div>
      </div>
    </div>
    <Flex justify="center" gap={10} style={{marginTop:16}} wrap>
      <Button onClick={()=>next(-1)}>◀ ก่อนหน้า</Button>
      <Button danger onClick={()=>mark(false)}>ยังไม่แม่น</Button>
      <Button type="primary" style={{background:C.green,borderColor:C.green}} onClick={()=>mark(true)}>จำได้ ✓</Button>
      <Button onClick={()=>next(1)}>ถัดไป ▶</Button>
    </Flex>
  </div>);
}
const matchPairs=[
  {m:'1',t:'ประเทศไทยเป็นรัฐเดี่ยว'},
  {m:'2',t:'ประชาธิปไตยอันมีพระมหากษัตริย์ทรงเป็นประมุข'},

  {m:'148',t:'ตรวจสอบร่าง พ.ร.บ. ก่อนประกาศใช้'},
  {m:'151',t:'อภิปรายไม่ไว้วางใจ (มีลงมติ)'},
  {m:'213',t:'การกระทำละเมิดสิทธิ ยื่นผู้ตรวจการใน 90 วัน'},
  {m:'256',t:'หลักเกณฑ์การแก้ไขเพิ่มเติมรัฐธรรมนูญ'},
];
function MatchGame(){
  const [key,setKey]=React.useState(0);
  const [pool]=React.useState(()=>matchPairs.slice().sort(()=>Math.random()-.5).slice(0,6));
  const [rights]=React.useState(()=>pool.map(p=>p.t).sort(()=>Math.random()-.5));
  const [sel,setSel]=React.useState(null); const [matched,setMatched]=React.useState({}); const [wrong,setWrong]=React.useState(null);
  const done=Object.keys(matched).length===pool.length;
  const pick=(t)=>{if(!sel)return; if(sel.t===t){setMatched(m=>({...m,[sel.m]:true}));setSel(null);}else{setWrong(t);setTimeout(()=>setWrong(null),500);setSel(null);}};
  return (<div>
    <Alert type="info" showIcon style={{borderRadius:10,marginBottom:12}} message="คลิก 'เลขมาตรา' ซ้าย แล้วคลิก 'หลัก' ขวาที่คู่กัน จับให้ครบ"/>
    {done&&<Result status="success" title="จับคู่ครบแล้ว! 🎉" extra={<Button type="primary" style={{background:C.blue,borderColor:C.blue}} onClick={()=>setKey(k=>k+1)} key="r">เล่นชุดใหม่</Button>}/>}
    {!done&&<Row gutter={12}>
      <Col span={7}><Space direction="vertical" style={{width:'100%'}}>
        {pool.map(p=>(<div key={p.m} onClick={()=>!matched[p.m]&&setSel(p)}
          style={{...box(matched[p.m]?C.greenBg:(sel&&sel.m===p.m?C.blue:C.white),matched[p.m]?C.green:(sel&&sel.m===p.m?C.blue:C.border)),cursor:matched[p.m]?'default':'pointer',textAlign:'center',opacity:matched[p.m]?.55:1,marginBottom:0,color:sel&&sel.m===p.m?'#fff':C.text}}>
          <span className="mnum" style={sel&&sel.m===p.m?{background:'#fff',color:C.blue}:{}}>ม.{p.m}</span> {matched[p.m]&&'✓'}
        </div>))}
      </Space></Col>
      <Col span={17}><Space direction="vertical" style={{width:'100%'}}>
        {rights.map((t,i)=>{const isM=Object.keys(matched).some(k=>pool.find(p=>p.m===k&&p.t===t));
          return(<div key={i} onClick={()=>!isM&&pick(t)} style={{...box(isM?C.greenBg:(wrong===t?C.redBg:C.white),isM?C.green:(wrong===t?C.red:C.border)),cursor:isM?'default':'pointer',opacity:isM?.55:1,marginBottom:0,fontSize:13}}>{t} {isM&&'✓'}</div>);})}
      </Space></Col>
    </Row>}
  </div>);
}

function DiagnosisTab(){
  const [topic,setTopic]=React.useState(null); const [nodeId,setNodeId]=React.useState(null);
  const [path,setPath]=React.useState([]); const [result,setResult]=React.useState(null);
  const start=(k)=>{setTopic(k);setNodeId(trees[k].start);setPath([]);setResult(null);};
  const choose=(o)=>{const t=trees[topic];setPath(p=>[...p,{q:t.nodes[nodeId].q,a:o.t}]); o.go.startsWith('r')?setResult(t.results[o.go]):setNodeId(o.go);};
  const reset=()=>{setTopic(null);setNodeId(null);setPath([]);setResult(null);};
  if(!topic)return(<div className="fadeUp">
    <Alert type="success" showIcon style={{borderRadius:12,marginBottom:16}} message="ผังช่วยจำกระบวนการ — ตอบทีละขั้น ระบบจะบอกมาตรา + ช่องทาง + แนวเขียนตอบ"/>
    <Row gutter={12}>{Object.keys(trees).map(k=>(<Col xs={24} md={8} key={k} style={{marginBottom:12}}>
      <Card hoverable className="qc" onClick={()=>start(k)} style={{borderRadius:16,border:'2px solid '+C.border,background:C.white,textAlign:'center'}}>
        <div style={{fontSize:34}}>{trees[k].name.split(' ')[0]}</div>
        <Title level={5} style={{margin:'8px 0 0'}}>{trees[k].name.substring(trees[k].name.indexOf(' ')+1)}</Title>
        <Text type="secondary">เริ่ม →</Text>
      </Card></Col>))}</Row>
  </div>);
  const t=trees[topic];
  return(<div className="fadeUp">
    <Flex justify="space-between" align="center" style={{marginBottom:12}}>
      <Tag color="blue" style={{fontSize:14,padding:'4px 10px'}}>{t.name}</Tag>
      <Button size="small" onClick={reset}>↺ เลือกหัวข้อใหม่</Button>
    </Flex>
    {path.length>0&&<Card style={box(C.surface,C.border)} bodyStyle={{padding:12}}>
      <Steps direction="vertical" size="small" current={path.length} items={path.map(p=>({title:p.q,description:<Tag color="blue">{p.a}</Tag>,status:'finish'}))}/>
    </Card>}
    {!result&&<Card className="fadeUp pulse" style={{...box(C.white,C.blue),marginTop:12}} bodyStyle={{padding:18}}>
      <Title level={5} style={{marginTop:0}}>{t.nodes[nodeId].q}</Title>
      <Space direction="vertical" style={{width:'100%'}}>
        {t.nodes[nodeId].opts.map((o,i)=>(<Button key={i} block size="large" onClick={()=>choose(o)} style={{textAlign:'left',height:'auto',whiteSpace:'normal',padding:'10px 14px',borderColor:C.border}}>{o.t}</Button>))}
      </Space>
    </Card>}
    {result&&<div className="fadeUp">
      <Result status={result.color===C.green?'success':'error'} title={result.v} subTitle={<Tag color={result.color===C.green?'green':'red'} style={{fontSize:15,marginTop:6}}>{result.law}</Tag>}/>
      <Card style={box(C.gold2,C.gold)} bodyStyle={{padding:16}}>
        <Text strong style={{color:C.goldDark}}>📝 แนวเขียนตอบ:</Text>
        <Paragraph style={{marginTop:8,marginBottom:0,color:C.text2}}>{result.irac}</Paragraph>
      </Card>
      <Flex gap={10} style={{marginTop:14}} justify="center">
        <Button onClick={()=>start(topic)}>↻ เริ่มหัวข้อนี้ใหม่</Button>
        <Button type="primary" style={{background:C.blue,borderColor:C.blue}} onClick={reset}>เลือกหัวข้ออื่น</Button>
      </Flex>
    </div>}
  </div>);
}

      key:'(เหมือนซ่อมข้อ 3) King ทรงเป็นกลางทางการเมือง อยู่เหนือการเมือง เป็นที่เคารพสักการะ ผู้ใดละเมิดมิได้ ตาม ม.6 · การไปเลือกตั้ง = แสดงการฝักใฝ่ทางการเมือง ขัดความเป็นกลาง · จึงเป็นข้อยกเว้นตามหลักการของ รธน เอง ไม่ขัด/แย้งต่อ รธน · ตัวอย่าง: เช่นเดียวกับที่ King ไม่ทรงแสดงความเห็นทางการเมืองหรือฝักใฝ่พรรคใด เพื่อรักษาสถานะประมุขที่เป็นกลางของคนทั้งชาติ'},

function ExamSimTab(){
  const [setKey,setSetKey]=React.useState(null); const [qi,setQi]=React.useState(0);
  const [reveal,setReveal]=React.useState(false); const [secs,setSecs]=React.useState(0); const [running,setRunning]=React.useState(false);
  React.useEffect(()=>{if(!running)return; const t=setInterval(()=>setSecs(s=>s+1),1000); return ()=>clearInterval(t);},[running]);
  const begin=(k)=>{setSetKey(k);setQi(0);setReveal(false);setSecs(0);setRunning(true);};
  const fmt=(s)=>String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  if(!setKey)return(<div className="fadeUp">
    <Alert type="warning" showIcon style={{borderRadius:12,marginBottom:16}} message="โหมดจำลองข้อสอบจริง LAW2104 — จับเวลา (จริง 2.5 ชม./4 ข้อ ≈ 37 นาที/ข้อ) เขียนตอบในกระดาษก่อน แล้วกด 'ดูแนวคำตอบ'"/>
    <Row gutter={12}>{Object.keys(examSets).map(k=>(<Col xs={24} md={12} key={k} style={{marginBottom:12}}>
      <Card hoverable className="qc" onClick={()=>begin(k)} style={{borderRadius:16,border:'2px solid '+C.blue,background:C.white}}>
        <Flex align="center" gap={12}><div style={{fontSize:34}}>📝</div><div>
          <Title level={4} style={{margin:0}}>ข้อสอบ {k}</Title>
          <Text type="secondary">อัตนัย 4 ข้อ · LAW2104 ม.รามคำแหง</Text>
        </div></Flex>
      </Card></Col>))}</Row>
  </div>);
  const set=examSets[setKey]; const cur=set[qi];
  return(<div className="fadeUp">
    <Flex justify="space-between" align="center" wrap gap={8} style={{marginBottom:12}}>
      <Space><Tag color="blue">{setKey}</Tag><Tag>ข้อ {cur.n}/4</Tag></Space>
      <Space><Tag color={running?'green':'default'} style={{fontSize:15,fontFamily:'monospace'}}>⏱ {fmt(secs)}</Tag>
        <Button size="small" onClick={()=>setRunning(r=>!r)}>{running?'พัก':'เดินเวลา'}</Button>
        <Button size="small" danger onClick={()=>{setSetKey(null);setRunning(false);}}>ออก</Button></Space>
    </Flex>
    <Card style={box(C.white,C.border)} bodyStyle={{padding:20}}>
      <Tag color="purple" style={{marginBottom:8}}>{cur.topic}</Tag>
      <Paragraph className="serif" style={{fontSize:17,lineHeight:1.9,color:C.text}}>{cur.q}</Paragraph>
    </Card>
    {!reveal&&<Card style={{...box(C.surface,C.border),marginTop:12}} bodyStyle={{padding:16}}>
      <Text strong>✍️ เขียนตอบ: วางหลัก(มาตรา) → อธิบายเหตุผล → ยกตัวอย่าง → สรุป</Text>
      <div><Button type="primary" style={{background:C.blue,borderColor:C.blue,marginTop:12}} onClick={()=>setReveal(true)}>ดูแนวคำตอบ ▼</Button></div>
    </Card>}
    {reveal&&<Card className="fadeUp" style={{...box(C.blueBg,C.blue),marginTop:12}} bodyStyle={{padding:18}}>
      <Text strong style={{color:C.blue,fontSize:15}}>🏳️ แนวคำตอบ</Text>
      <Paragraph style={{marginTop:8,marginBottom:0,color:C.text2,fontSize:15}}>{cur.key}</Paragraph>
    </Card>}
    <Flex justify="space-between" style={{marginTop:16}}>
      <Button disabled={qi===0} onClick={()=>{setQi(q=>q-1);setReveal(false);}}>◀ ข้อก่อน</Button>
      {qi<set.length-1?<Button type="primary" style={{background:C.goldDark,borderColor:C.goldDark}} onClick={()=>{setQi(q=>q+1);setReveal(false);}}>ข้อถัดไป ▶</Button>
        :<Button type="primary" style={{background:C.green,borderColor:C.green}} onClick={()=>setRunning(false)}>จบชุด · หยุดเวลา ✓</Button>}
    </Flex>
  </div>);
}
