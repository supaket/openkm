{id:1,q:'กฎหมายมหาชน คืออะไร?',a:'กฎหมายที่บัญญัติให้อำนาจและหน้าที่แก่รัฐ หน่วยงานทางปกครอง เจ้าหน้าที่ของรัฐ ในทางปกครองและการบริการสาธารณะ เพื่อประโยชน์ ปชช.ส่วนใหญ่ ในฐานที่ฝ่ายปกครองมีอำนาจเหนือผู้ใต้ปกครอง',star:2,exam:false},
{id:2,q:'ลักษณะ 4 ประการของ ก.ม.มหาชน?',a:'1.ใช้ในการปฏิรูป(รธน.2560 ม.258) 2.เพื่อสาธารณประโยชน์(ตอบสนอง ปชช.ส่วนใหญ่) 3.ไม่เสมอภาค(บังคับเองได้ รัฐมีอำนาจเหนือ) 4.ควบคุมอำนาจของรัฐ(ควบคุมหน่วยงาน+จนท.)',star:3,exam:true},

{id:4,q:'ความแตกต่าง มหาชน vs เอกชน 6 ด้าน?',a:'1.องค์กร(รัฐvsเอกชน/เอกชนvsเอกชน) 2.เนื้อหา(สาธารณะ/กำไร) 3.ความสัมพันธ์(ไม่เสมอภาค/เสมอภาค) 4.นิติวิธี(สร้างหลักมหาชน/ใช้หลักเอกชน) 5.ปรัชญา(ประสานสมดุล/ยุติธรรมเท่าเทียม) 6.ศาล(พิเศษ/ยุติธรรม)',star:3,exam:true},
{id:5,q:'หลักประโยชน์สาธารณะ?',a:'ใช้อำนาจรัฐเพื่อตอบสนองความต้องการ ปชช.ส่วนใหญ่ ไม่ใช่เพื่อปัจเจก',star:3,exam:true},
{id:6,q:'4 หลักการบริการสาธารณะ?',a:'1.ต่อเนื่อง(สม่ำเสมอ) 2.เสมอภาค(ไม่เลือกปฏิบัติ) 3.ปรับปรุงเปลี่ยนแปลง(ทันสมัย) 4.กำกับดูแลโดยรัฐ',star:3,exam:true},
{id:7,q:'3 องค์กรจัดทำบริการสาธารณะ?',a:'1.นิติบัญญัติ(รัฐสภา): บัญญัติ ก.ม.+ควบคุมบริหาร 2.บริหาร(ครม.): บริหารราชการ+จัดทำบริการ 3.ตุลาการ(ศาล): พิจารณาพิพากษา+คุ้มครองสิทธิ',star:2,exam:true},
{id:8,q:'เหตุใดต้องควบคุมอำนาจรัฐ?',a:'ก.ม.มหาชนไม่เสมอภาค รัฐมีอำนาจเหนือ ปชช. หากไม่ควบคุม อาจใช้ดุลพินิจไม่ชอบ กระทบสิทธิเสรีภาพ',star:3,exam:true},
{id:9,q:'อำนาจผูกพัน vs ดุลพินิจ?',a:'ผูกพัน: ต้องปฏิบัติตาม ก.ม. ไม่มีทางเลือก (จดทะเบียนสมรส) / ดุลพินิจ: เลือกตัดสินใจได้ ก.ม.เปิดช่องให้อิสระ',star:2,exam:false},
{id:10,q:'ควบคุมอำนาจรัฐ 2 รูปแบบ?',a:'1.ป้องกัน(ก่อนทำ): แย้ง/ปรึกษา/ไต่สวน/แจ้งสิทธิ ตาม พ.ร.บ.วิธีปฏิบัติฯ2539 / 2.แก้ไข(หลังทำ): องค์กรภายใน+ภายนอก(รัฐสภา/ปปช.)+ศาล',star:3,exam:true},
{id:11,q:'6 กรณีดุลพินิจไม่ชอบ?',a:'1.ข้ามขั้นตอน 2.ปราศจากอำนาจ 3.ผิดแบบ 4.นอกวัตถุประสงค์ 5.สร้างภาระ ปชช. 6.อคติ/ไม่สุจริต',star:2,exam:false},
{id:12,q:'ราชการ 3 ส่วน ตาม พ.ร.บ.2534?',a:'1.กลาง(กระทรวง ทบวง กรม)=รวมอำนาจ 2.ภูมิภาค(จังหวัด อำเภอ)=แบ่งอำนาจ 3.ท้องถิ่น(อบต. อบจ. เทศบาล กทม. พัทยา)=กระจายอำนาจ',star:3,exam:true},
{id:13,q:'บังคับบัญชา vs กำกับดูแล?',a:'บังคับบัญชา(กลาง+ภูมิภาค): ปรับ แก้ ยกเลิก เพิกถอนได้ / กำกับดูแล(ท้องถิ่น): อำนาจมีเงื่อนไข ใช้เมื่อ ก.ม.มอบอำนาจ',star:2,exam:false},

{id:15,q:'หลักใช้อำนาจ 3 หลัก?',a:'1.ชอบด้วย ก.ม.(ใช้เฉพาะอำนาจที่กำหนด) 2.ประโยชน์สาธารณะ(เพื่อคนส่วนใหญ่) 3.ยุติธรรม(ใช้กับทุกคนเสมอ)',star:3,exam:false},
{id:16,q:'ปฏิรูป 7 ด้าน (รธน.2560 ม.258)?',a:'ก.การเมือง ข.การบริหาร ค.กฎหมาย ง.ยุติธรรม จ.การศึกษา ฉ.เศรษฐกิจ ช.อื่นๆ',star:2,exam:true},
{id:17,q:'นิติวิธี ก.ม.มหาชน 2 ประเภท?',a:'1.เชิงปฏิเสธ: ไม่เอาหลัก ก.ม.เอกชนมาใช้ 2.เชิงสร้างสรรค์: สร้างหลัก ก.ม.มหาชนจากประสานประโยชน์สาธารณะ+สิทธิเสรีภาพ',star:2,exam:false},
{id:18,q:'ศาลเดี่ยว vs ศาลคู่? ไทยใช้?',a:'เดี่ยว: วินิจฉัยทุกคดี(Common Law: UK USA) / คู่: แยกศาลปกครอง(Civil Law) / ไทย=ศาลคู่ 4 ระบบ: รธน. ยุติธรรม ปกครอง ทหาร',star:2,exam:false},
{id:19,q:'อปท. มีอะไรบ้าง? สถานะ?',a:'อบจ. เทศบาล อบต. กทม. พัทยา — นิติบุคคลตาม ก.ม.มหาชน ฐานะฝ่ายปกครอง หลักกระจายอำนาจ',star:2,exam:true},
{id:20,q:'นิติบุคคลมหาชน vs เอกชน?',a:'มหาชน: จัดตั้งโดย ก.ม.(กระทรวง กรม) มุ่งบริการสาธารณะ / เอกชน: จดทะเบียน ป.แพ่งฯ(บริษัท ห้างฯ) มุ่งผลกำไร',star:2,exam:false},
{id:21,q:'(สอบ2567 ข้อ1) ควบคุมอำนาจรัฐ+จัดระเบียบบริหาร',a:'เหตุผล(ไม่เสมอภาค) → ผูกพัน/ดุลพินิจ → 2 แบบ(ป้องกัน+แก้ไข) → พ.ร.บ.3ฉบับ → ราชการ 3 ส่วน → บังคับบัญชา vs กำกับดูแล',star:3,exam:true},
{id:22,q:'(สอบ2567 ข้อ2) ความหมาย ลักษณะ ขอบเขต ก.ม.มหาชน',a:'ขอบเขต 5 ข้อ + ลักษณะ 4(ปฏิรูป สาธารณะ ไม่เสมอ ควบคุม) + แตกต่าง 6 ด้าน',star:3,exam:true},

{type:'contrast',title:'มหาชน vs เอกชน (6 ด้าน)',body:'🏛️ มหาชน → รัฐvsเอกชน | สาธารณะ | ไม่เสมอภาค | นิติวิธีมหาชน | ประสานสมดุล | ศาลพิเศษ\n👤 เอกชน → เอกชนvsเอกชน | กำไร | เสมอภาค | นิติวิธีเอกชน | ยุติธรรมเท่าเทียม | ศาลยุติธรรม'},
{divider:'🏛️ ประโยชน์สาธารณะ + บริการสาธารณะ'},
{type:'mnem',title:'4 หลักบริการสาธารณะ',body:'ต่อ-เสมอ-ปรับ-กำกับ\n🔹 ต่อ = ความต่อเนื่อง\n🔹 เสมอ = ความเสมอภาค\n🔹 ปรับ = ปรับปรุงเปลี่ยนแปลง\n🔹 กำกับ = กำกับดูแลโดยรัฐ'},
{type:'flow',title:'3 องค์กร บริการสาธารณะ',body:'นิติบัญญัติ(รัฐสภา) → ออก ก.ม.+ควบคุมบริหาร\n↓\nบริหาร(ครม.) → บริหาร+จัดทำบริการ\n↓\nตุลาการ(ศาล) → พิจารณา+คุ้มครองสิทธิ'},
{divider:'🔒 การควบคุมอำนาจรัฐ'},
{type:'contrast',title:'ผูกพัน vs ดุลพินิจ',body:'⚡ ผูกพัน → ต้องปฏิบัติตาม ก.ม. ไม่มีทางเลือก\n⚡ ดุลพินิจ → เลือกตัดสินใจได้ ก.ม.เปิดช่อง'},
{type:'flow',title:'ควบคุม 2 รูปแบบ',body:'🛡️ ป้องกัน(ก่อนทำ) → แย้ง → ปรึกษา → ไต่สวน → แจ้งสิทธิ\n🔧 แก้ไข(หลังทำ) → ภายใน(บังคับบัญชา) → ภายนอก(รัฐสภา/ปปช.) → ศาล'},
{type:'mnem',title:'6 กรณีดุลพินิจไม่ชอบ',body:'ข้าม-ปราศ-ผิด-นอก-ภาระ-อคติ\n🔹 ข้าม=ข้ามขั้นตอน 🔹 ปราศ=ปราศจากอำนาจ\n🔹 ผิด=ผิดแบบ 🔹 นอก=นอกวัตถุประสงค์\n🔹 ภาระ=สร้างภาระ ปชช. 🔹 อคติ=อคติ/ไม่สุจริต'},
{divider:'🏗️ ราชการ 3 ส่วน'},

{type:'chunk',title:'พ.ร.บ.สำคัญ 4 ฉบับ',body:'📜 ความผิดทางละเมิดของ จนท.รัฐ 2539\n📜 วิธีปฏิบัติราชการทางปกครอง 2539\n📜 จัดตั้งศาลปกครองฯ 2542\n📜 ระเบียบบริหารราชการแผ่นดิน 2534'},
{divider:'⚖️ นิติรัฐ + ใช้อำนาจ + ปฏิรูป'},

{type:'mnem',title:'ใช้อำนาจ 3 หลัก',body:'ชอบ-สาธารณะ-ยุติธรรม\n🔹 ชอบ=ชอบด้วย ก.ม.\n🔹 สาธารณะ=ประโยชน์สาธารณะ\n🔹 ยุติธรรม=ความยุติธรรม'},
{type:'chunk',title:'ปฏิรูป 7 ด้าน (ม.258)',body:'ก.การเมือง | ข.การบริหาร | ค.กฎหมาย\nง.ยุติธรรม | จ.การศึกษา | ฉ.เศรษฐกิจ | ช.อื่นๆ'},
{type:'flow',title:'นิติวิธี 2 ประเภท',body:'เชิงปฏิเสธ → ไม่เอาหลัก ก.ม.เอกชน\n↓\nเชิงสร้างสรรค์ → สร้างหลัก ก.ม.มหาชนใหม่'},
{divider:'📝 โครงสร้างคำตอบ'},
{type:'formula',title:'ตอบข้อ 1 (ควบคุม+บริหาร)',body:'เหตุผลควบคุม → ผูกพัน/ดุลพินิจ → 2 แบบ(ป้องกัน+แก้ไข)\n→ พ.ร.บ.(2539+2539+2542) → ราชการ 3 ส่วน → บังคับบัญชา vs กำกับดูแล'},
