function SummaryTab() {
  return summaryData.map(s=>(
    <Card key={s.key} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:16,boxShadow:'0 1px 6px rgba(61,50,41,0.04)'}}
      title={<Flex align="center" gap={8} wrap="wrap">
        <Text strong style={{color:C.amberDark,fontSize:15}}>{s.title}</Text>
        {s.tags && s.tags.map(([l,c],i)=><Tag key={i} color={c} style={{fontSize:11}}>{l}</Tag>)}
      </Flex>}
      headStyle={{borderBottom:`1px solid ${C.border}`,background:C.surface}}
    >{s.content()}</Card>
  ));
}

function Stars({n}){return <span style={{color:'#C4A35A',fontSize:14,letterSpacing:2}}>{'⭐'.repeat(n)}</span>;}

function FlashcardTab() {
  const [mode,setMode]=useState('all');
  const getFiltered=m=>{
    if(m==='exam') return flashcards.filter(c=>c.exam);
    if(m==='star3') return flashcards.filter(c=>c.star===3);
    return flashcards;
  };
  const [cards,setCards]=useState(()=>[...flashcards].sort(()=>Math.random()-0.5));
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [correct,setCorrect]=useState(0);
  const [wrong,setWrong]=useState(0);
  const [showCheck,setShowCheck]=useState(false);
  const card=cards[idx]||cards[0];
  const flip=()=>{setFlipped(f=>!f);setShowCheck(true);};
  const next=()=>{if(idx<cards.length-1){setIdx(i=>i+1);setFlipped(false);setShowCheck(false);}};
  const prev=()=>{if(idx>0){setIdx(i=>i-1);setFlipped(false);setShowCheck(false);}};
  const markOk=()=>{setCorrect(c=>c+1);setShowCheck(false);setTimeout(next,200);};
  const markNo=()=>{setWrong(c=>c+1);setShowCheck(false);setTimeout(next,200);};
  const doShuffle=(m)=>{const f=getFiltered(m||mode);setCards([...f].sort(()=>Math.random()-0.5));setIdx(0);setFlipped(false);setShowCheck(false);};
  const reset=()=>{setCorrect(0);setWrong(0);doShuffle();};
  const changeMode=(m)=>{setMode(m);setCorrect(0);setWrong(0);doShuffle(m);};

  const examCount=flashcards.filter(c=>c.exam).length;
  const star3Count=flashcards.filter(c=>c.star===3).length;

  return (
    <div>
      <Flex gap={8} style={{marginBottom:16}} wrap="wrap">
        <Button type={mode==='all'?'primary':'default'} onClick={()=>changeMode('all')}>ทั้งหมด ({flashcards.length})</Button>
        <Button type={mode==='exam'?'primary':'default'} onClick={()=>changeMode('exam')} style={mode==='exam'?{background:'#8B6F47',borderColor:'#8B6F47'}:{}}>📝 เกร็งข้อสอบ ({examCount})</Button>
        <Button type={mode==='star3'?'primary':'default'} onClick={()=>changeMode('star3')} style={mode==='star3'?{background:'#8B6F47',borderColor:'#8B6F47'}:{}}>⭐⭐⭐ ออกชัวร์ ({star3Count})</Button>
      </Flex>

      <Flex gap={16} justify="center" style={{marginBottom:16}}>
        <Card size="small" style={{background:C.greenBg,border:`1px solid ${C.border}`,borderRadius:12,minWidth:100,textAlign:'center'}}>
          <Statistic title={<Text style={{color:C.green,fontSize:12}}>✓ ถูก</Text>} value={correct} valueStyle={{color:C.green,fontSize:24}} />
        </Card>
        <Card size="small" style={{background:C.redBg,border:`1px solid ${C.border}`,borderRadius:12,minWidth:100,textAlign:'center'}}>
          <Statistic title={<Text style={{color:C.red,fontSize:12}}>✗ ผิด</Text>} value={wrong} valueStyle={{color:C.red,fontSize:24}} />
        </Card>
      </Flex>
      <Flex gap={12} align="center" style={{marginBottom:16}} wrap="wrap">
        <Button onClick={()=>doShuffle()}>🔀 สุ่มใหม่</Button>
        <Button onClick={reset}>↻ รีเซ็ต</Button>
        <Text style={{color:C.text3,marginLeft:'auto'}}>ข้อ <strong style={{color:C.amberDark}}>{idx+1}</strong> / {cards.length}</Text>
      </Flex>

      <div className="fc-perspective" style={{marginBottom:20}}>
        <div className={`fc-card ${flipped?'flipped':''}`} onClick={flip}>
          <div className="fc-face" style={{background:`linear-gradient(145deg,${C.surface3},${C.surface})`,border:`1px solid ${C.border}`,boxShadow:'0 2px 12px rgba(61,50,41,0.06)'}}>
            <Flex gap={8} align="center" style={{marginBottom:12}}>
              <Stars n={card.star||1} />
              {card.exam && <Tag color="volcano" style={{fontSize:11,fontWeight:700,margin:0}}>📝 เกร็งข้อสอบ</Tag>}
            </Flex>
            <Text style={{color:C.gold,fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',marginBottom:14}}>โจทย์ — เดามาตรา</Text>
            <Text style={{color:C.text,fontSize:16,lineHeight:1.9,maxWidth:620}}>{card.q}</Text>
            <Text style={{color:C.text3,fontSize:12,marginTop:20}}>👆 คลิกเพื่อเฉลย</Text>
          </div>
          <div className="fc-face fc-back" style={{background:`linear-gradient(145deg,#F0EBE2,#EDE8DF)`,border:`1px solid ${C.goldDark}`,boxShadow:'0 2px 12px rgba(61,50,41,0.08)'}}>
            <Flex gap={8} align="center" style={{marginBottom:8}}>
              <Stars n={card.star||1} />
              {card.exam && <Tag color="volcano" style={{fontSize:11,fontWeight:700,margin:0}}>📝 เกร็งข้อสอบ</Tag>}
            </Flex>
            <Tag color="gold" style={{fontSize:15,fontWeight:700,padding:'4px 16px',marginBottom:12}}>{card.a}</Tag>
            <Text style={{color:C.text2,fontSize:14,lineHeight:1.9,maxWidth:620}}>{card.d}</Text>
            <Text style={{color:C.text3,fontSize:12,marginTop:16}}>👆 คลิกเพื่อกลับด้านหน้า</Text>
          </div>
        </div>
      </div>

      {showCheck && flipped && (
        <Flex gap={12} justify="center" style={{marginBottom:16}}>
          <Button type="primary" style={{background:C.green,borderColor:C.green,minWidth:120}} onClick={markOk}>✓ จำได้</Button>
          <Button danger style={{minWidth:120}} onClick={markNo}>✗ ยังไม่แม่น</Button>
        </Flex>
      )}

      <Flex gap={12} justify="center">
        <Button onClick={prev} disabled={idx===0}>← ก่อนหน้า</Button>
        <Button onClick={next} disabled={idx===cards.length-1}>ถัดไป →</Button>
      </Flex>
    </div>
  );
}

function Mnem({children}){return <Tag color="gold" style={{fontWeight:700,fontSize:16,padding:'2px 10px',letterSpacing:3}}>{children}</Tag>;}
function Flow({steps}){return <Flex wrap="wrap" gap={4} align="center">{steps.map((s,i)=><React.Fragment key={i}>{i>0&&<Text style={{color:C.gold,fontWeight:700}}>→</Text>}<Tag style={{background:C.surface3,border:`1px solid ${C.border}`,color:C.text,fontSize:12}}>{s}</Tag></React.Fragment>)}</Flex>;}

function QuickTab() {
  const typeColors = {
    mnem: {bg:C.purpleBg,border:'#D5CFE0',accent:C.purple},
    flow: {bg:C.cyanBg,border:'#C8DEDE',accent:C.cyan},
    contrast: {bg:C.redBg,border:'#E8D4D0',accent:C.red},
    chunk: {bg:C.blueBg,border:'#BFDBFE',accent:C.blue},
    formula: {bg:'#FFF8EB',border:'#E8D5A8',accent:'#8B6F47'},
  };

  return (
    <div>
      <Alert showIcon message={<span>🧠 <strong>Brain-Optimized</strong> — เทคนิคจำแบบ Mnemonic + Visual Flow + Contrast Pairs + Chunking + 30-Second Formula</span>} style={{marginBottom:16}} />
      {quickSections.map((item,i)=>{
        if(item.divider) return <Divider key={i} orientation="left" style={{color:C.amberDark,borderColor:C.borderDark,fontSize:14,fontWeight:600}}>{item.divider}</Divider>;
        const tc = typeColors[item.type] || {bg:C.surface3,border:C.border,accent:C.gold};
        return (
          <Card key={i} className="qc" size="small" style={{background:tc.bg,border:`1px solid ${tc.border}`,borderRadius:12,marginBottom:10,borderLeft:`4px solid ${tc.accent}`}}>
            <Flex gap={12} align="start">
              <Tag color="gold" style={{fontWeight:700,fontSize:13,flexShrink:0}}>{item.s}</Tag>
              <div style={{flex:1}}>
                <Text strong style={{color:C.text,fontSize:14}}>{item.t}</Text>
                <br/>
                <Text style={{color:C.text2,fontSize:13,lineHeight:1.9}}>{item.b}</Text>
              </div>
            </Flex>
          </Card>
        );
      })}
    </div>
  );
}

function App() {
  return (
    <ConfigProvider theme={{
      algorithm: theme.defaultAlgorithm,
      token: {
        colorPrimary: C.gold,
        colorBgBase: C.bg,
        colorBgContainer: C.white,
        fontFamily: "'Noto Sans Thai', sans-serif",
        borderRadius: 12,
        colorBorder: C.border,
        colorText: C.text,
        colorTextSecondary: C.text2,
        fontSize: 14,
        lineHeight: 1.8,
      }
    }}>
      <Layout style={{background:C.bg,minHeight:'100vh'}}>
        <Content style={{maxWidth:900,margin:'0 auto',padding:'32px 16px'}}>
          <div style={{textAlign:'center',marginBottom:28}}>
            <Title level={2} style={{color:C.amberDark,marginBottom:4,letterSpacing:1}}>LAW2112 ประกันภัย</Title>
            <Text style={{color:C.text3,fontSize:13}}>กฎหมายแพ่งและพาณิชย์ว่าด้วยประกันภัย — ม.861-897</Text>
          </div>

          <Tabs
            defaultActiveKey="summary"
            centered
            type="card"
            items={[
              {key:'summary',label:'📖 สรุปเนื้อหา',children:<SummaryTab />},
              {key:'flashcard',label:'🃏 Flashcard',children:<FlashcardTab />},
              {key:'quick',label:'⚡ การ์ดจำด่วน',children:<QuickTab />},
            ]}
            style={{
              '--ant-tabs-card-bg': C.surface,
            }}
          />

          <div style={{textAlign:'center',marginTop:24,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
            <Text style={{color:C.text3,fontSize:11}}>LAW2112 Review — Ramkhamhaeng University — Sepia Theme for 4h+ reading</Text>
          </div>
        </Content>
      </Layout>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script src="../../assets/ink-tool.js" defer></script>
</body>
</html>
