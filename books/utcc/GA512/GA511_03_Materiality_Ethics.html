<script type="text/babel" data-presets="env,react">
const { Tabs, Card, Collapse, Tag, Button, Row, Col, Progress, Alert, Steps, Drawer, FloatButton, Segmented, Radio, InputNumber } = antd;
const { useState } = React;

/* ============ TAB 1 : Materiality ============ */
function MaterialityTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">1.1</span>ความมีสาระสำคัญคืออะไร</h3>
      <p><b>ความมีสาระสำคัญ (Materiality)</b> = รายการหรือเหตุการณ์ทางบัญชี ซึ่งหากผู้ใช้งบการเงินไม่ได้ทราบ อาจตัดสินใจผิดไปจากถ้าทราบ</p>
      <div className="analogy">💡 จำสั้นๆ: <b>"ถ้ารู้ จะเปลี่ยนใจ"</b> — ข้อมูลที่ถ้าเปิดเผยแล้วทำให้ผู้ใช้ตัดสินใจต่างออกไป = มีสาระสำคัญ</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.2</span>ระดับความมีสาระสำคัญ 3 ระดับ</h3>
      <Row gutter={[10,10]}>
        <Col xs={24} md={8}><Card size="small" title="① งบการเงินโดยรวม" style={{height:'100%',background:'#f0edf8'}}>
          Materiality for the financial statements as a whole — ระดับภาพรวมทั้งงบ</Card></Col>
        <Col xs={24} md={8}><Card size="small" title="② รายการ/ยอด/การเปิดเผยเฉพาะ" style={{height:'100%',background:'#f0edf8'}}>
          สำหรับประเภทรายการ ยอดคงเหลือ หรือการเปิดเผยข้อมูลเฉพาะบางรายการที่ผู้ใช้คาดหวังเป็นพิเศษ</Card></Col>
        <Col xs={24} md={8}><Card size="small" title="③ ในการปฏิบัติงาน" style={{height:'100%',background:'#f0edf8'}}>
          Performance materiality — กำหนดให้<b>ต่ำกว่า</b>ระดับงบโดยรวม</Card></Col>
      </Row>
      <div className="kbox">🎯 <b>Performance materiality (ในการปฏิบัติงาน):</b> กำหนดให้ต่ำกว่า materiality ของงบโดยรวม เพื่อ<b>ลดโอกาส</b>ที่ผลรวมของการแสดงข้อมูลที่ขัดต่อข้อเท็จจริงที่<b>ยังไม่ถูกแก้ไขและยังตรวจไม่พบ</b> จะรวมกันสูงเกินระดับความมีสาระสำคัญ</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.3</span>การกำหนดระดับ (ใช้ดุลยพินิจ + benchmark)</h3>
      <p>ผู้สอบใช้<b>ดุลยพินิจเยี่ยงผู้ประกอบวิชาชีพ</b> โดยมักใช้<b>อัตราส่วนร้อยละ</b>เป็นข้อมูลอ้างอิงเริ่มต้น (benchmark) ปัจจัยที่กระทบการเลือก benchmark:</p>
      <table className="fin"><tbody>
        <tr><td>①</td><td><b>องค์ประกอบของงบการเงิน</b> (สินทรัพย์ หนี้สิน ส่วนของเจ้าของ รายได้ ค่าใช้จ่าย)</td></tr>
        <tr><td>②</td><td><b>รายการที่ผู้ใช้สนใจเป็นพิเศษ</b> — เช่น เพื่อประเมินผลการดำเนินงาน อาจเน้นที่กำไร รายได้ หรือสินทรัพย์สุทธิ</td></tr>
        <tr><td>③</td><td><b>ลักษณะกิจการ</b> ช่วงเวลาของวงจรธุรกิจ สภาพอุตสาหกรรมและเศรษฐกิจ</td></tr>
        <tr><td>④</td><td><b>โครงสร้างเจ้าของและวิธีจัดหาเงินทุน</b> — เช่น ถ้าจัดหาทุนด้วยการกู้ยืมอย่างเดียว ผู้ใช้อาจให้ความสำคัญกับสินทรัพย์และสิทธิเรียกร้องเหนือสินทรัพย์มากกว่ากำไร</td></tr>
        <tr><td>⑤</td><td><b>ความผันผวนของ benchmark</b> ที่เกี่ยวข้อง</td></tr>
      </tbody></table>
      <div className="warn">⚠️ หมายเหตุ: สไลด์ระบุว่า "อัตราส่วนร้อยละใช้เป็นจุดเริ่มต้น" แต่<b>ไม่ได้กำหนดตัวเลข % ตายตัว</b> เพราะขึ้นกับดุลยพินิจและ benchmark ที่เลือก (ไฟล์นี้จึงไม่ใส่ % ที่สไลด์ไม่ได้ระบุ)</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.4</span>เมื่อไรต้องกำหนดระดับเฉพาะรายการ</h3>
      <table className="fin"><tbody>
        <tr><td>①</td><td>กฎหมาย/ข้อบังคับ/แม่บทฯ กระทบการคาดการณ์ของผู้ใช้เกี่ยวกับการวัดมูลค่า/การเปิดเผย เช่น <b>รายการบุคคลหรือกิจการที่เกี่ยวข้องกัน</b>, <b>ค่าตอบแทนผู้บริหารและผู้กำกับดูแล</b>, การวิเคราะห์ความอ่อนไหวของมูลค่ายุติธรรมของประมาณการที่มีความไม่แน่นอนสูง</td></tr>
        <tr><td>②</td><td>การเปิดเผยข้อมูลสำคัญที่สัมพันธ์กับอุตสาหกรรม เช่น <b>ต้นทุนวิจัยและพัฒนา (R&D) ของบริษัทยา</b></td></tr>
        <tr><td>③</td><td>ด้านที่เน้นเป็นพิเศษซึ่งเปิดเผยแยกต่างหาก เช่น <b>ข้อมูลส่วนงาน (segment)</b> หรือ<b>การรวมธุรกิจ</b>ที่สำคัญ</td></tr>
      </tbody></table>
    </div>
  </div>;
}

/* ============ TAB 2 : Subsequent Events ============ */
function SubsequentTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">2.1</span>3 วันสำคัญ (ไทม์ไลน์)</h3>
      <svg viewBox="0 0 720 130" style={{width:'100%',maxWidth:720}}>
        <line x1="40" y1="70" x2="690" y2="70" stroke="#8a7ab5" strokeWidth="2"/>
        {[{x:110,t:'วันที่ในงบการเงิน',s:'Date of FS',u:'วันสิ้นรอบล่าสุด'},{x:370,t:'วันที่ในรายงานผู้สอบ',s:"Auditor's report",u:'วันที่ลงในรายงาน'},{x:630,t:'วันที่เผยแพร่งบ',s:'FS issued',u:'พร้อมเผยแพร่ต่อบุคคลภายนอก'}].map((p,i)=><g key={i}>
          <circle cx={p.x} cy="70" r="7" fill="#5b4b8a"/>
          <text x={p.x} y="40" textAnchor="middle" fontSize="13" fontWeight="700" fill="#463a6b">{p.t}</text>
          <text x={p.x} y="92" textAnchor="middle" fontSize="11" fill="#7a6ea0">{p.s}</text>
          <text x={p.x} y="108" textAnchor="middle" fontSize="10.5" fill="#8a7fa8">{p.u}</text>
        </g>)}
      </svg>
      <div className="kbox">🧪 กดปุ่มลอย "ทดลอง" → <b>ไทม์ไลน์เหตุการณ์ภายหลัง</b> เพื่อดูหน้าที่ของผู้สอบในแต่ละช่วงเวลาแบบโต้ตอบ</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">2.2</span>เหตุการณ์กระทบงบได้ 2 ทาง</h3>
      <Row gutter={[10,10]}>
        <Col xs={24} md={12}><Card size="small" title="① สภาพมีอยู่แล้ว ณ วันที่ในงบ" style={{height:'100%',background:'#eef7ee'}}>
          เหตุการณ์ที่มีหลักฐานยืนยันว่า<b>สภาพนั้นมีอยู่แล้ว ณ วันที่ในงบการเงิน</b> → ตามหลักการควร<b>ปรับปรุงตัวเลข</b>ในงบ (adjusting)</Card></Col>
        <Col xs={24} md={12}><Card size="small" title="② สภาพเกิดขึ้นหลังวันที่ในงบ" style={{height:'100%',background:'#fbf3ec'}}>
          เหตุการณ์ที่มีหลักฐานยืนยันว่า<b>เกิดขึ้นภายหลังวันที่ในงบการเงิน</b> → ตามหลักการควร<b>เปิดเผยข้อมูล</b> (non-adjusting)</Card></Col>
      </Row>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">2.3</span>3 ประเภทตามช่วงเวลาที่ผู้สอบทราบ + หน้าที่</h3>
      <Collapse items={[
        {key:'1',label:'① ระหว่างวันที่ในงบ ถึง วันที่ในรายงานผู้สอบ',children:<div>
          <p>ผู้สอบ<b>ต้องใช้วิธีการตรวจสอบ</b>เพื่อให้ได้หลักฐานเพียงพอว่าเหตุการณ์ที่ต้องปรับปรุง/เปิดเผยถูกระบุครบ (แต่ไม่ต้องตรวจซ้ำสิ่งที่สรุปแล้ว)</p>
          <p><b>วิธีตรวจ:</b> เข้าใจ/สอบถามวิธีที่ฝ่ายบริหารระบุเหตุการณ์ภายหลัง | อ่านรายงานการประชุมผู้ถือหุ้น/ฝ่ายบริหาร/ผู้กำกับดูแล | อ่านงบการเงินระหว่างกาลล่าสุด | ทำ cutoff ตรวจรับ-จ่ายเงินหลังวันสิ้นงวด | ขอ written representations | ขอข้อมูลจากฝ่ายกฎหมายเรื่องคดีความ</p>
          <p><b>ถามผู้บริหารเรื่อง:</b> ข้อตกลง/กู้ยืม/ค้ำประกันใหม่ | ซื้อ-ขายสินทรัพย์ | เพิ่มทุน/ออกหุ้นกู้/ควบรวม/เลิกกิจการ | สินทรัพย์ถูกยึดหรือเสียหาย (ไฟไหม้ น้ำท่วม) | ความคืบหน้าหนี้สินที่อาจเกิดขึ้น | การปรับปรุงบัญชีผิดปกติ | เหตุการณ์กระทบความเหมาะสมของนโยบายบัญชี/going concern | กระทบประมาณการ | กระทบการเก็บหนี้</p></div>},
        {key:'2',label:'② หลังวันที่ในรายงาน แต่ก่อนเผยแพร่งบ',children:<div>
          <p>ผู้สอบ<b>ไม่มีหน้าที่ตรวจสอบต่อ</b> แต่ถ้าทราบข้อเท็จจริงที่หากพบ ณ วันที่รายงานอาจทำให้ต้องเปลี่ยนรายงาน → ผู้สอบต้อง:</p>
          <table className="fin"><tbody>
            <tr><td>1</td><td>หารือกับผู้บริหาร (และผู้กำกับดูแลหากเหมาะสม)</td></tr>
            <tr><td>2</td><td>พิจารณาว่าต้องแก้ไขงบหรือไม่ และถ้าต้องแก้ ถามผู้บริหารว่าจะดำเนินการอย่างไร</td></tr>
            <tr><td>3</td><td>ถ้าแก้งบ → ใช้วิธีตรวจที่จำเป็น + <b>ขยายวิธีตรวจถึงวันที่ในรายงานฉบับใหม่</b> + ออกรายงานฉบับใหม่ (ไม่ลงวันก่อนวันที่งบแก้ไขได้รับอนุมัติ)</td></tr>
          </tbody></table></div>},
        {key:'3',label:'③ หลังเผยแพร่งบไปแล้ว',children:<div>
          <p>ผู้สอบ<b>ไม่มีหน้าที่</b> แต่ถ้าทราบข้อเท็จจริงที่มีอยู่ ณ วันที่รายงาน ซึ่งอาจทำให้ต้องเปลี่ยนรายงาน → หารือ/พิจารณาแก้/ถามผู้บริหาร เช่นเดียวกับข้อ ② และถ้าแก้งบใหม่:</p>
          <table className="fin"><tbody>
            <tr><td>1</td><td>ใช้วิธีตรวจที่จำเป็น + สอบทานว่าผู้ที่เคยได้รับงบเดิมได้รับแจ้งสถานการณ์แล้ว</td></tr>
            <tr><td>2</td><td>ขยายวิธีตรวจถึงวันที่รายงานฉบับใหม่ (ไม่ลงวันก่อนอนุมัติงบแก้ไข) + ออกรายงานฉบับใหม่</td></tr>
            <tr><td>3</td><td>เพิ่ม<b>วรรคเน้นหรือวรรคอธิบายอื่น</b> อ้างถึงหมายเหตุที่อธิบายเหตุผลของการแก้ไข</td></tr>
            <tr><td>4</td><td>ถ้าผู้บริหารไม่ดำเนินการแจ้ง/ไม่แก้ทั้งที่จำเป็น → ผู้สอบต้องดำเนินการเพื่อ<b>ป้องกันไม่ให้ผู้อื่นใช้รายงาน</b>ในอนาคต</td></tr>
          </tbody></table></div>},
      ]}/>
    </div>
  </div>;
}

/* ============ TAB 3 : Written Representations ============ */
function WrittenRepTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">3.1</span>หนังสือรับรอง (Written Representations) คืออะไร</h3>
      <p>คำรับรอง<b>เป็นลายลักษณ์อักษร</b>จากผู้บริหารให้ผู้สอบบัญชี เพื่อ<b>ยืนยันเรื่องบางอย่าง</b>หรือ<b>สนับสนุนหลักฐานอื่น</b> — ไม่รวมตัวงบการเงิน สิ่งที่ผู้บริหารรับรอง (assertions) หรือสมุดบัญชี/เอกสารสนับสนุน</p>

        <tr><td>②</td><td>ให้ข้อมูลและการเข้าถึงที่เกี่ยวข้องทั้งหมดตามที่ตกลงในเงื่อนไขการรับงาน</td></tr>
        <tr><td>③</td><td>รับรองว่ารายการทั้งหมดได้ถูกบันทึกและสะท้อนในงบการเงิน</td></tr>
      </tbody></table>

      <p>อาจให้ผู้เชี่ยวชาญร่วมรับรอง เช่น <b>นักคณิตศาสตร์ประกันภัย (actuary)</b>, <b>วิศวกร</b> (ภาระผูกพันสิ่งแวดล้อม), <b>ที่ปรึกษากฎหมายภายใน</b> (ประมาณการคดีความ)</p>

      <p>ถ้าหนังสือรับรองไม่น่าเชื่อถือ หรือผู้บริหารไม่ให้บางเรื่องที่ขอ ผู้สอบต้องพิจารณาผลกระทบที่อาจมีต่อความเห็นในรายงาน</p>

function FlashTab(){
  const [order,setOrder]=useState(CARDS.map((_,i)=>i));
  const [flipped,setFlipped]=useState({});
  const [score,setScore]=useState({know:0,dunno:0});
  const shuffle=()=>{setOrder([...order].sort(()=>Math.random()-.5));setFlipped({});setScore({know:0,dunno:0});};
  return <div>
    <div style={{marginBottom:12,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <Button type="primary" style={{background:'#5b4b8a'}} onClick={shuffle}>🔀 สับการ์ด</Button>
      <Tag color="green">รู้แล้ว {score.know}</Tag><Tag color="red">ยังไม่รู้ {score.dunno}</Tag>
      <Progress percent={Math.round((score.know+score.dunno)/CARDS.length*100)} size="small" style={{width:180}} strokeColor="#5b4b8a"/>
    </div>
    <Row gutter={[10,10]}>
      {order.map(i=><Col xs={24} sm={12} lg={8} key={i}>
        <div className={'flip-card'+(flipped[i]?' flipped':'')} onClick={()=>setFlipped({...flipped,[i]:!flipped[i]})}>
          <div className="flip-inner">
            <div className="flip-face flip-front">{CARDS[i].q}</div>
            <div className="flip-face flip-back"><div>{CARDS[i].a}
              <div style={{marginTop:8}} onClick={e=>e.stopPropagation()}>
                <Button size="small" style={{marginRight:6}} onClick={()=>setScore(s=>({...s,know:s.know+1}))}>✅</Button>
                <Button size="small" danger onClick={()=>setScore(s=>({...s,dunno:s.dunno+1}))}>❌</Button>
              </div></div></div>
          </div>
        </div>
      </Col>)}
    </Row>
  </div>;
}

    1:{title:'① ระหว่างวันที่ในงบ → วันที่ในรายงาน',color:'#237804',duty:'ผู้สอบมีหน้าที่เชิงรุก — ต้องใช้วิธีตรวจสอบเพื่อให้ได้หลักฐานว่าเหตุการณ์ที่ต้องปรับปรุง/เปิดเผยถูกระบุครบ',how:'อ่านรายงานการประชุม · อ่านงบระหว่างกาลล่าสุด · ทำ cutoff ตรวจรับ-จ่ายเงิน · ขอ written representations · ถามฝ่ายกฎหมายเรื่องคดีความ · สอบถามผู้บริหารเรื่องกู้ยืม/ซื้อขายสินทรัพย์/เพิ่มทุน/สินทรัพย์เสียหาย'},
    2:{title:'② หลังวันที่ในรายงาน → ก่อนเผยแพร่งบ',color:'#ad6800',duty:'ไม่มีหน้าที่ตรวจสอบต่อ แต่ถ้าทราบข้อเท็จจริงที่อาจทำให้ต้องเปลี่ยนรายงาน ต้องจัดการ',how:'หารือผู้บริหาร → พิจารณาแก้งบ → ถ้าแก้: ตรวจเพิ่ม + ขยายวิธีตรวจถึงวันที่รายงานฉบับใหม่ + ออกรายงานฉบับใหม่ (ไม่ลงวันก่อนงบแก้ไขได้รับอนุมัติ)'},
    3:{title:'③ หลังเผยแพร่งบไปแล้ว',color:'#391085',duty:'ไม่มีหน้าที่ แต่ถ้าทราบข้อเท็จจริงที่มีอยู่ ณ วันที่รายงาน ซึ่งอาจเปลี่ยนรายงาน ต้องจัดการ',how:'หารือ/พิจารณาแก้ → ถ้าแก้: ตรวจเพิ่ม + สอบทานว่าผู้ที่ได้งบเดิมได้รับแจ้ง + ออกรายงานใหม่พร้อมวรรคเน้นอ้างหมายเหตุ | ถ้าผู้บริหารไม่ยอมแก้/ไม่แจ้ง → ผู้สอบต้องดำเนินการกันไม่ให้ผู้อื่นใช้รายงาน'},
  };
  const c=info[p];
  return <div>
    <Alert type="info" showIcon style={{marginBottom:12}} message="เลือกช่วงเวลาที่ผู้สอบทราบเหตุการณ์ แล้วดูหน้าที่"/>
    <svg viewBox="0 0 520 90" style={{width:'100%',marginBottom:10}}>
      <line x1="30" y1="55" x2="490" y2="55" stroke="#c3b9dd" strokeWidth="2"/>
      {[{x:90,l:'วันงบ'},{x:260,l:'วันรายงาน'},{x:430,l:'วันเผยแพร่'}].map((m,i)=><g key={i}>
        <circle cx={m.x} cy="55" r="6" fill="#5b4b8a"/><text x={m.x} y="78" textAnchor="middle" fontSize="11" fill="#5b4b8a">{m.l}</text></g>)}
      {[{x:175,p:1},{x:345,p:2},{x:470,p:3}].map(z=><g key={z.p} onClick={()=>setP(z.p)} style={{cursor:'pointer'}}>
        <rect x={z.x-28} y="18" width="56" height="22" rx="11" fill={p===z.p?info[z.p].color:'#e5def2'}/>
        <text x={z.x} y="33" textAnchor="middle" fontSize="12" fontWeight="700" fill={p===z.p?'#fff':'#5b4b8a'}>ช่วง {z.p}</text></g>)}
    </svg>
    <Radio.Group value={p} onChange={e=>setP(e.target.value)} optionType="button" buttonStyle="solid" style={{marginBottom:12}}
      options={[{label:'ช่วง 1',value:1},{label:'ช่วง 2',value:2},{label:'ช่วง 3',value:3}]}/>
    <div style={{padding:'14px',borderRadius:10,background:'#f0edf8',border:'2px solid '+c.color}}>
      <div style={{fontSize:15,fontWeight:700,color:c.color,marginBottom:6}}>{c.title}</div>
      <div style={{fontSize:13.5,marginBottom:8}}><b>หน้าที่:</b> {c.duty}</div>
      <div style={{fontSize:13}}><b>ทำอย่างไร:</b> {c.how}</div>
    </div>
  </div>;
}

/* ============ LAB 2 : Fee dependency ============ */
function FeeLab(){
  const [pie,setPie]=useState('PIE');
  const [fee,setFee]=useState(20);
  const [years,setYears]=useState(2);
  let result,color;
  if(pie==='PIE'){
    if(fee>15 && years>=5){result='เกิน 15% ต่อเนื่องถึง 5 ปี → สำนักงานต้อง "ยุติการเป็นผู้สอบบัญชี" หลังแสดงความเห็นในปีที่ 5 (และต้องมีการสอบทานคุณภาพงานมาตั้งแต่ปีที่ 2)';color:'#a8071a';}
    else if(fee>15 && years>=2){result='เกิน 15% ต่อเนื่อง 2 ปี → ต้องจัดให้มี "การสอบทานคุณภาพงาน" โดยผู้ที่ไม่ใช่สมาชิกสำนักงาน ก่อนแสดงความเห็นในปีที่ 2';color:'#ad6800';}
    else if(fee>15){result='เกิน 15% แต่ยังปีแรก → ยังไม่ถึงเกณฑ์บังคับ แต่ต้องเฝ้าระวัง ถ้าเกินต่อเนื่องถึงปีที่ 2 ต้องจัดสอบทานคุณภาพงาน';color:'#237804';}
    else result='ไม่เกิน 15% → ยังไม่เข้าเงื่อนไขบังคับเรื่องการพึ่งพิงค่าธรรมเนียม';
  } else {
    if(fee>30 && years>=5){result='เกิน 30% ต่อเนื่องถึง 5 ปี → ต้องจัดให้มี "ผู้สอบทานจากภายนอกสำนักงาน" ในปีที่ 5';color:'#a8071a';}
    else if(fee>30){result='เกิน 30% แต่ยังไม่ครบ 5 ปีต่อเนื่อง → เฝ้าระวัง ถ้าเกินต่อเนื่องถึงปีที่ 5 ต้องมีผู้สอบทานภายนอก';color:'#ad6800';}
    else result='ไม่เกิน 30% → ยังไม่เข้าเงื่อนไขบังคับ (เกณฑ์ NPAE คือ 30%)';
  }
  if(!color) color='#237804';
  return <div>
    <Alert type="info" showIcon style={{marginBottom:12}} message="ตรวจการพึ่งพิงค่าธรรมเนียม (ตามเกณฑ์ในสไลด์)" description="PIE เพดาน 15% · NPAE เพดาน 30%"/>
    <Radio.Group value={pie} onChange={e=>setPie(e.target.value)} optionType="button" buttonStyle="solid" style={{marginBottom:12}}
      options={[{label:'ลูกค้า PIE (มีส่วนได้เสียสาธารณะ)',value:'PIE'},{label:'ลูกค้า NPAE (ไม่มี)',value:'NPAE'}]}/>
    <Row gutter={[10,10]} style={{marginBottom:12}}>
      <Col span={12}><div style={{fontSize:13}}>ค่าธรรมเนียม (% ของทั้งสำนักงาน)</div><InputNumber style={{width:'100%'}} value={fee} min={0} max={100} onChange={v=>setFee(v||0)} formatter={v=>v+'%'}/></Col>
      <Col span={12}><div style={{fontSize:13}}>จำนวนปีที่เกินเพดานต่อเนื่อง</div><InputNumber style={{width:'100%'}} value={years} min={1} max={10} onChange={v=>setYears(v||1)}/></Col>
    </Row>
    <div style={{padding:'14px',borderRadius:10,background:'#f0edf8',border:'2px solid '+color}}>
      <div style={{fontSize:13,color:'#666',marginBottom:4}}>เพดานของ {pie} = {pie==='PIE'?'15%':'30%'}</div>
      <div style={{fontSize:14.5,fontWeight:600,color:color}}>{result}</div>
    </div>
  </div>;
}

/* ============ LAB 3 : Threat matcher ============ */
const TQUIZ=[
  {s:'ผู้สอบบัญชีถือหุ้นอยู่ในบริษัทที่ตนตรวจสอบ',ans:0},
  {s:'ค่าสอบบัญชีขึ้นอยู่กับว่างบทำให้ธนาคารอนุมัติเงินกู้ให้ลูกค้าหรือไม่',ans:0},
  {s:'สำนักงานสอบบัญชีงบการเงินที่สำนักงานตัวเองเป็นผู้จัดทำบัญชีให้',ans:1},
  {s:'ผู้สอบเป็นตัวแทนลูกค้าในการเจรจากับบุคคลภายนอก/ส่งเสริมการขายหุ้นของลูกค้า',ans:2},
  {s:'ญาติสนิทของผู้สอบดำรงตำแหน่งสำคัญ (เช่น CFO) ในบริษัทลูกค้า',ans:3},
  {s:'เป็นผู้สอบบัญชีให้ลูกค้ารายเดิมต่อเนื่องเป็นเวลานานมากจนสนิทสนม',ans:3},
  {s:'ลูกค้าขู่ว่าจะเปลี่ยนผู้สอบบัญชีถ้าผู้สอบไม่ยอมตามที่ลูกค้าต้องการ',ans:4},
];
function ThreatLab(){
  const [i,setI]=useState(0);const [picked,setPicked]=useState(null);const [score,setScore]=useState(0);const [done,setDone]=useState(false);
  const q=TQUIZ[i];
  const choose=(n)=>{if(picked!==null)return;setPicked(n);if(n===q.ans)setScore(score+1);};
  const next=()=>{if(i+1<TQUIZ.length){setI(i+1);setPicked(null);}else setDone(true);};
  if(done)return <div style={{textAlign:'center',padding:20}}><div style={{fontSize:40}}>🎯</div>
    <div style={{fontSize:18,fontWeight:700,margin:'8px 0'}}>ได้ {score} / {TQUIZ.length}</div>
    <Button type="primary" style={{background:'#5b4b8a'}} onClick={()=>{setI(0);setPicked(null);setScore(0);setDone(false);}}>เริ่มใหม่</Button></div>;
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><Tag color="purple">ข้อ {i+1}/{TQUIZ.length}</Tag><Tag color="green">คะแนน {score}</Tag></div>
    <Alert type="info" showIcon style={{marginBottom:10}} message="สถานการณ์นี้เป็นภัยคุกคามประเภทใด?" description={q.s}/>
    <Row gutter={[6,6]}>
      {THREATS.map((t,n)=>{let b='#d9d9d9',bg='#fff';if(picked!==null){if(n===q.ans){b='#237804';bg='#eaf6ea';}else if(n===picked){b='#c0564a';bg='#fff1f0';}}
        return <Col xs={12} md={8} key={n}><div onClick={()=>choose(n)} style={{cursor:picked!==null?'default':'pointer',padding:'8px 6px',borderRadius:8,border:'2px solid '+b,background:bg,textAlign:'center',fontSize:12.5,fontWeight:600,minHeight:46,display:'flex',alignItems:'center',justifyContent:'center'}}>{t.th}</div></Col>;})}
    </Row>
    {picked!==null && <div className={picked===q.ans?'analogy':'warn'} style={{marginTop:10,fontSize:13}}>
      <div style={{fontWeight:700}}>{picked===q.ans?'✅ ถูกต้อง — '+THREATS[q.ans].th:'❌ คำตอบคือ '+THREATS[q.ans].th+' ('+THREATS[q.ans].en+')'}</div>
      <div style={{marginTop:6}}><Button type="primary" size="small" style={{background:'#5b4b8a'}} onClick={next}>{i+1<TQUIZ.length?'ข้อถัดไป →':'ดูคะแนน'}</Button></div>
    </div>}
  </div>;
}

/* ============ FLOATING ============ */
function FloatingLab(){
  const [open,setOpen]=useState(false);const [seg,setSeg]=useState('sub');
  const w=typeof window!=='undefined'?Math.min(560,window.innerWidth-16):560;
  return <React.Fragment>
    <FloatButton type="primary" onClick={()=>setOpen(true)} description="ทดลอง" shape="square" style={{right:24,bottom:24,width:58,height:58}} icon={<span style={{fontSize:20}}>🧪</span>}/>
    <Drawer open={open} onClose={()=>setOpen(false)} width={w} title="🧪 ห้องทดลองแบบโต้ตอบ" styles={{body:{paddingTop:12}}}>
      <Segmented block value={seg} onChange={setSeg} style={{marginBottom:14}} options={[{label:'📅 เหตุการณ์ภายหลัง',value:'sub'},{label:'💰 พึ่งพิงค่าธรรมเนียม',value:'fee'},{label:'⚖️ จับภัยคุกคาม',value:'threat'}]}/>
      {seg==='sub'&&<SubEventLab/>}
      {seg==='fee'&&<FeeLab/>}
      {seg==='threat'&&<ThreatLab/>}
    </Drawer>
  </React.Fragment>;
}
