function FlashcardTab(){
  const [mode,setMode]=useState('all');
  const [order,setOrder]=useState(()=>flashcards.map((_,i)=>i));
  const [idx,setIdx]=useState(0);
  const [flip,setFlip]=useState(false);
  const [score,setScore]=useState({c:0,w:0});

  const pool = useMemo(()=>{
    let f=flashcards.map((c,i)=>({...c,_i:i}));
    if(mode==='exam') f=f.filter(c=>c.exam);
    if(mode==='star3') f=f.filter(c=>c.star===3);
    return f;
  },[mode]);

  const list = useMemo(()=>{
    const ids = order.filter(i=>pool.some(p=>p._i===i));
    return ids.length?ids.map(i=>flashcards[i]):pool;
  },[order,pool]);

  const card = list[idx] || pool[0];
  const reset=(m)=>{ setMode(m); setIdx(0); setFlip(false); setScore({c:0,w:0}); setOrder(flashcards.map((_,i)=>i)); };
  const shuffle=()=>{ const o=[...order]; for(let i=o.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]];} setOrder(o); setIdx(0); setFlip(false); };
  const next=()=>{ setFlip(false); setIdx(i=>Math.min(i+1,list.length-1)); };
  const prev=()=>{ setFlip(false); setIdx(i=>Math.max(i-1,0)); };
  if(!card) return <Text>ไม่มีการ์ด</Text>;

  return (
    <div>
      <Flex justify="space-between" align="center" wrap="wrap" gap={8} style={{marginBottom:14}}>
        <Space wrap>
          <Button type={mode==='all'?'primary':'default'} onClick={()=>reset('all')}>ทั้งหมด ({flashcards.length})</Button>
          <Button type={mode==='exam'?'primary':'default'} onClick={()=>reset('exam')}>เฉพาะข้อสอบ</Button>
          <Button type={mode==='star3'?'primary':'default'} onClick={()=>reset('star3')}>⭐⭐⭐ สำคัญสุด</Button>
        </Space>
        <Space>
          <Button onClick={shuffle}>🔀 สลับ</Button>
          <Tag color="green">ถูก {score.c}</Tag>
          <Tag color="red">ผิด {score.w}</Tag>
        </Space>
      </Flex>
      <div className="fc-perspective" style={{marginBottom:14}}>
        <div className={"fc-card"+(flip?" flipped":"")} onClick={()=>setFlip(f=>!f)}>
          <div className="fc-face" style={{background:C.white,border:`2px solid ${C.borderDark}`,padding:24,display:'flex',flexDirection:'column',justifyContent:'center'}}>
            <Space style={{marginBottom:10}}><Stars n={card.star}/>{card.exam&&<Tag color="volcano">ข้อสอบ</Tag>}</Space>
            <Text style={{fontSize:20,fontWeight:600,color:C.text}}>{card.q}</Text>
            <Text type="secondary" style={{marginTop:16}}>👆 แตะเพื่อดูคำตอบ</Text>
          </div>
          <div className="fc-face fc-back" style={{background:C.greenBg,border:`2px solid ${C.green}`,padding:24,display:'flex',flexDirection:'column',justifyContent:'center'}}>
            <Text style={{fontSize:22,fontWeight:700,color:C.green}}>{card.a}</Text>
            <Divider style={{margin:'12px 0'}}/>
            <Text style={{color:C.text2}}>{card.d}</Text>
          </div>
        </div>
      </div>
      <Flex justify="space-between" align="center" wrap="wrap" gap={8}>
        <Button onClick={prev} disabled={idx===0}>← ก่อนหน้า</Button>
        <Space>
          <Button style={{background:C.green,color:'#fff',border:'none'}} onClick={()=>{setScore(s=>({...s,c:s.c+1}));next();}}>✓ ถูก</Button>
          <Button style={{background:C.red,color:'#fff',border:'none'}} onClick={()=>{setScore(s=>({...s,w:s.w+1}));next();}}>✗ ผิด</Button>
        </Space>
        <Button onClick={next} disabled={idx>=list.length-1}>ถัดไป →</Button>
      </Flex>
      <div style={{textAlign:'center',marginTop:12}}><Text type="secondary">การ์ดที่ {idx+1} / {list.length}</Text></div>
    </div>
  );
}

const qcColor = {
