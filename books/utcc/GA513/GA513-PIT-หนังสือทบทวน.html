const FlashcardTab = () => {
  const [mode, setMode] = useState('all');
  const [order, setOrder] = useState(flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [score, setScore] = useState({ok:0, no:0});

  const pool = useMemo(()=> order.filter(i => mode==='all' ? true : mode==='exam' ? flashcards[i].exam : flashcards[i].star===3), [order, mode]);
  const cur = flashcards[pool[Math.min(idx, pool.length-1)]] || flashcards[0];

  const shuffle = () => {
    const a=[...Array(flashcards.length).keys()];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    setOrder(a); setIdx(0); setFlipped(false); setScore({ok:0,no:0});
  };
  const nav = (d) => { setFlipped(false); setIdx(p => (p+d+pool.length)%pool.length); };
  const mark = (ok) => { setScore(s=>({ok:s.ok+(ok?1:0), no:s.no+(ok?0:1)})); nav(1); };

  return (
    <div>
      <Flex gap={8} wrap="wrap" style={{marginBottom:14}} align="center">
        <Button.Group>
          <Button type={mode==='all'?'primary':'default'} onClick={()=>{setMode('all');setIdx(0);setFlipped(false);}}>ทั้งหมด ({flashcards.length})</Button>
          <Button type={mode==='exam'?'primary':'default'} onClick={()=>{setMode('exam');setIdx(0);setFlipped(false);}}>แนวข้อสอบ ({flashcards.filter(f=>f.exam).length})</Button>
          <Button type={mode==='star3'?'primary':'default'} onClick={()=>{setMode('star3');setIdx(0);setFlipped(false);}}>⭐⭐⭐ ({flashcards.filter(f=>f.star===3).length})</Button>
        </Button.Group>
        <Button onClick={shuffle}>🔀 สับไพ่</Button>
        <Tag color="green" style={{fontSize:14, padding:'4px 10px'}}>รู้แล้ว {score.ok}</Tag>
        <Tag color="red" style={{fontSize:14, padding:'4px 10px'}}>ยังไม่รู้ {score.no}</Tag>
      </Flex>
      <div className="fc-perspective">
        <div className={'fc-card'+(flipped?' flipped':'')} onClick={()=>setFlipped(f=>!f)}>
          <div className="fc-face" style={{background:C.white, border:'2px solid '+C.borderDark, boxShadow:'0 4px 14px rgba(61,50,41,.08)'}}>
            <Flex gap={6} style={{position:'absolute', top:14, left:14}}>
              <Stars n={cur.star}/>{cur.exam && <Tag color="volcano">แนวข้อสอบ</Tag>}
            </Flex>
            <Text style={{position:'absolute', top:14, right:16, color:C.text3}}>{Math.min(idx+1,pool.length)}/{pool.length}</Text>
            <Title level={4} style={{color:C.text, marginTop:12}}>{cur.q}</Title>
            <Text style={{color:C.text3}}>👆 แตะเพื่อดูคำตอบ</Text>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:'2px solid '+C.gold}}>
            <Title level={4} style={{color:C.goldDark, marginTop:0}}>{cur.a}</Title>
            <Paragraph style={{color:C.text2, fontSize:14.5, marginBottom:0}}>{cur.d}</Paragraph>
          </div>
        </div>
      </div>
      <Flex gap={8} justify="center" style={{marginTop:16}} wrap="wrap">
        <Button size="large" onClick={()=>nav(-1)}>← ก่อนหน้า</Button>
        <Button size="large" danger onClick={()=>mark(false)}>✗ ยังไม่แม่น</Button>
        <Button size="large" type="primary" style={{background:C.green}} onClick={()=>mark(true)}>✓ รู้แล้ว</Button>
        <Button size="large" onClick={()=>nav(1)}>ถัดไป →</Button>
      </Flex>
    </div>
  );
};
