<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button,
        Row, Col, Divider, Alert, Statistic, Flex, Segmented, Radio, Progress,
        Collapse, Result, Tooltip, Badge, Empty } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState, useEffect, useRef, useMemo } = React;

/* ============ PALETTE — โทน "อินดิโก้" ประจำวิชาว่าด้วยหนี้ ============ */
const C = {
  primary:'#4B5CA6', primaryDark:'#333E7C', primaryLight:'#8C97CC',
  amber:'#B0894F', amberDark:'#8A6836',
  bg:'#EEEFF7', surface:'#E3E5F1', surface2:'#D9DCEC', surface3:'#EAECF6',
  border:'#CCD0E4', borderDark:'#A6ADD0',
  text:'#2A2E44', text2:'#4A4F6B', text3:'#6E7391',
  white:'#FAFBFE',
  green:'#4F8A61', greenBg:'#EBF4EE',
  red:'#B25757', redBg:'#F6ECEA',
  purple:'#75689B', purpleBg:'#EFEDF6',
  blue:'#4E77A8', blueBg:'#EAF0F7',
  cyan:'#4E8A8A', cyanBg:'#EAF3F3',
};

/* ============ SHARED HELPERS ============ */
const Stars = ({n}) => <span style={{color:C.amber, letterSpacing:1}}>{'★'.repeat(n)}<span style={{color:C.border}}>{'★'.repeat(3-n)}</span></span>;

const Sec = ({children}) => (
  <span className="sec-badge" style={{background:C.surface2, color:C.primaryDark, padding:'1px 8px', borderRadius:7, border:`1px solid ${C.border}`, whiteSpace:'nowrap'}}>ม.{children}</span>
);

const Pill = ({color, bg, children}) => (
  <span className="tag-chip" style={{background:bg, color:color, border:`1px solid ${color}33`}}>{children}</span>
);

const Box = ({tone='primary', title, icon, children, style}) => {
  const map = {
    green:[C.green,C.greenBg], red:[C.red,C.redBg], blue:[C.blue,C.blueBg],
    purple:[C.purple,C.purpleBg], cyan:[C.cyan,C.cyanBg], primary:[C.primaryDark,C.surface3],
    amber:[C.amberDark,'#F5EFE3']
  };
  const [cc,bb] = map[tone]||map.primary;
  return (
    <div className="lesson-body" style={{background:bb, border:`1px solid ${cc}33`, borderLeft:`4px solid ${cc}`, borderRadius:12, padding:'13px 16px', margin:'10px 0', ...style}}>
      {title && <div style={{fontWeight:700, color:cc, marginBottom:6, fontSize:15}}>{icon} {title}</div>}
      <div style={{color:C.text2, fontSize:14.5}}>{children}</div>
    </div>
  );
};

/* ============ ANIMATED SVG DIAGRAM ENGINE ============ */
function DiaNode({x, y, w=158, h=62, title, sub, color, active, onClick}) {
  return (
    <g style={{cursor:onClick?'pointer':'default'}} onClick={onClick} className={active?'node-pulse':''}>
      <rect x={x-w/2} y={y-h/2} width={w} height={h} rx={14}
        fill={active ? color : C.white}
        stroke={color} strokeWidth={active?3:2}
        style={{filter: active?`drop-shadow(0 4px 10px ${color}55)`:'none', transition:'all .4s'}} />
      <text x={x} y={sub? y-6 : y+5} textAnchor="middle"
        fontFamily="'Noto Sans Thai'" fontWeight="700" fontSize="15.5"
        fill={active ? C.white : color}>{title}</text>
      {sub && <text x={x} y={y+14} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="11.5"
        fill={active ? C.white : C.text3}>{sub}</text>}
    </g>
  );
}

function DiaEdge({id, d, color, label, labelX, labelY, dashed, animate, dur=2.6, reverse, width=3, dim}) {
  const op = dim ? 0.18 : 1;
  return (
    <g style={{opacity:op, transition:'opacity .4s'}}>
      <path id={id} d={d} fill="none" stroke={color} strokeWidth={width}
        strokeDasharray={dashed?'7 7':'none'} strokeLinecap="round"
        markerEnd={`url(#arrow-${id})`} />
      <defs>
        <marker id={`arrow-${id}`} markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L7,3 L0,6 Z" fill={color}/>
        </marker>
      </defs>
      {animate && !dim &&
        <circle r="6.5" fill={color}>
          <animateMotion dur={`${dur}s`} repeatCount="indefinite" keyPoints={reverse?'1;0':'0;1'} keyTimes="0;1" rotate="0">
            <mpath href={`#${id}`}/>
          </animateMotion>
        </circle>}
      {label &&
        <g>
          <rect x={labelX-label.length*4.1-8} y={labelY-13} width={label.length*8.2+16} height={22} rx={11}
            fill={C.white} stroke={color+'55'} />
          <text x={labelX} y={labelY+2} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5"
            fontWeight="600" fill={color}>{label}</text>
        </g>}
    </g>
  );
}

/* ความสัมพันธ์แห่งหนี้ — 3 โหมด: ผิดนัด / รับช่วงสิทธิ / ลูกหนี้ร่วม */
function DebtScene() {
  const modes = {
    delay: {
      label:'การผิดนัด', color:C.red,
      desc:'หนี้ถึงกำหนดชำระ — ถ้าหนี้ไม่มีกำหนดเวลาแน่นอน เจ้าหนี้ต้อง "เตือน" ก่อน ลูกหนี้ไม่ชำระจึงผิดนัด (ม.203, 204 ว.1) แต่ถ้ากำหนดเวลาไว้แน่นอนตามปฏิทิน ลูกหนี้ไม่ชำระตามกำหนด ผิดนัดทันทีโดยมิพักต้องเตือน (ม.204 ว.2) — ผลของลูกหนี้ผิดนัด: ต้องรับผิดในความเสียหายระหว่างผิดนัด แม้เกิดจากเหตุสุดวิสัย (ม.217) กลับกัน ถ้าลูกหนี้ขอชำระโดยชอบแล้วเจ้าหนี้ไม่ยอมรับ เจ้าหนี้ตกเป็นผู้ผิดนัด (ม.207)'
    },
    subro: {
      label:'รับช่วงสิทธิ', color:C.cyan,
      desc:'บุคคลที่สาม (เช่น ผู้ค้ำประกัน หรือผู้มีส่วนได้เสีย) ชำระหนี้แทนลูกหนี้ให้แก่เจ้าหนี้ → ย่อม "เข้ารับช่วงสิทธิ" ของเจ้าหนี้เดิมโดยผลของกฎหมาย (ม.229) แล้วสวมสิทธิทั้งหลายบรรดาที่เจ้าหนี้เคยมี (รวมประกัน/จำนอง/ค้ำประกัน) ไปไล่เบี้ยเอาจากลูกหนี้ได้ (ม.226)'
    },
    joint: {
      label:'ลูกหนี้ร่วม', color:C.purple,
      desc:'ลูกหนี้หลายคนผูกพันชำระหนี้ร่วมกัน → เจ้าหนี้เรียกให้ลูกหนี้ร่วมคนใดคนหนึ่งชำระหนี้ "สิ้นเชิง" หรือแต่บางส่วนก็ได้ตามแต่จะเลือก จนกว่าจะได้รับชำระเต็ม (ม.291) เมื่อลูกหนี้ร่วมคนหนึ่งชำระครบแล้ว หนี้ระงับสำหรับทุกคน (ม.292) และผู้ที่ชำระย่อมไล่เบี้ยเอาจากลูกหนี้ร่วมคนอื่นได้ตามส่วนเท่า ๆ กัน (ม.296)'
    }
  };
  const [m, setM] = useState('delay');
  const M = modes[m];
  const CR = {x:130, y:90}, DB = {x:530, y:90}, TP = {x:330, y:290};
  return (
    <div>
      <div style={{textAlign:'center', marginBottom:12}}>
        <Segmented value={m} onChange={setM} size="large"
          options={Object.keys(modes).map(k=>({label:modes[k].label, value:k}))} />
      </div>
      <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:16, padding:'8px 4px'}}>
        <svg viewBox="0 0 660 350" style={{width:'100%', height:'auto', maxHeight:400}}>
          <DiaEdge id="mainhead" d={`M ${CR.x+60} ${CR.y+16} Q 330 26 ${DB.x-62} ${DB.y+16}`} color={C.amber}
            label="มูลหนี้ (นิติกรรม/ละเมิด)" labelX={330} labelY={34} dashed animate dur={3.2} />
          {m==='delay' && <g>
            <DiaEdge id="d-remind" d={`M ${CR.x+70} ${CR.y+6} L ${DB.x-72} ${DB.y+6}`} color={C.blue}
              label="เตือนให้ชำระ (ม.203/204)" labelX={330} labelY={104} animate dur={2.2} width={3.2} />
            <DiaEdge id="d-nopay" d={`M ${DB.x-72} ${DB.y+30} L ${CR.x+70} ${CR.y+30}`} color={C.red}
              label="ไม่ชำระ → ผิดนัด (ม.204)" labelX={330} labelY={140} animate dur={2.4} width={3.5} reverse />
            <DiaEdge id="d-risk" d={`M ${DB.x} ${DB.y+40} L ${TP.x+70} ${TP.y-34}`} color={C.red}
              label="รับผิดแม้พ้นวิสัย (ม.217)" labelX={500} labelY={226} animate dur={2.6} width={3.5} />
            <DiaNode {...TP} title="ผลของการผิดนัด" sub="ค่าเสียหาย + ดอกเบี้ย" color={C.red} active />
          </g>}
          {m==='subro' && <g>
            <DiaEdge id="s-pay" d={`M ${TP.x-70} ${TP.y-34} L ${DB.x-8} ${DB.y+42}`} color={C.green}
              label="ชำระหนี้แทน" labelX={492} labelY={228} animate dur={2.2} width={3.5} />
            <DiaEdge id="s-sub" d={`M ${DB.x-72} ${DB.y+8} L ${CR.x+72} ${CR.y+8}`} color={C.cyan}
              label="รับช่วงสิทธิ (ม.226,229)" labelX={330} labelY={110} animate dur={2.5} width={3.5} />
            <DiaEdge id="s-recur" d={`M ${TP.x-72} ${TP.y-34} L ${CR.x+8} ${CR.y+44}`} color={C.purple}
              label="ไล่เบี้ยลูกหนี้เดิม" labelX={170} labelY={226} animate dur={2.6} width={3} dashed />
            <DiaNode {...TP} title="ผู้ชำระแทน" sub="ผู้ค้ำ/ผู้มีส่วนได้เสีย" color={C.cyan} active />
          </g>}
          {m==='joint' && <g>
            <DiaEdge id="j-claim" d={`M ${DB.x-72} ${DB.y+8} L ${CR.x+72} ${CR.y+8}`} color={C.purple}
              label="เรียกคนเดียวเต็มจำนวน (ม.291)" labelX={330} labelY={110} animate dur={2.4} width={4} reverse />
            <DiaEdge id="j-recur1" d={`M ${CR.x} ${CR.y+40} L ${TP.x-72} ${TP.y-34}`} color={C.cyan}
              label="ไล่เบี้ยตามส่วน (ม.296)" labelX={172} labelY={226} animate dur={2.6} width={3} dashed />
            <DiaEdge id="j-recur2" d={`M ${CR.x+40} ${CR.y+44} L ${TP.x+20} ${TP.y-34}`} color={C.cyan} width={2.5} dashed />
            <DiaNode {...TP} title="ลูกหนี้ร่วมคนอื่น" sub="รับผิดส่วนเท่า ๆ กัน" color={C.purple} active />
          </g>}
          <DiaNode {...CR} title={m==='joint'?'ลูกหนี้ร่วมคนหนึ่ง':(m==='subro'?'ลูกหนี้':'ลูกหนี้')} sub="Debtor" color={C.primary} active />
          <DiaNode {...DB} title="เจ้าหนี้" sub="Creditor" color={M.color} active />
        </svg>
      </div>
      <Box tone={m==='joint'?'purple':(m==='subro'?'cyan':'red')} title={`โหมด: ${M.label}`} icon="🎬" style={{marginTop:12}}>
        {M.desc}
      </Box>
    </div>
  );
}

/* แถบ Flow แนวนอน */
function FlowStrip({steps, color=C.primary}) {
  return (
    <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:14, padding:'16px 10px', overflowX:'auto'}}>
      <svg viewBox={`0 0 ${steps.length*180} 130`} style={{width:'100%', minWidth:steps.length*150, height:'auto'}}>
        {steps.map((s,i)=>{
          const x = 90 + i*180;
          return (
            <g key={i}>
              {i<steps.length-1 &&
                <DiaEdge id={`fs-${color.slice(1)}-${i}`} d={`M ${x+62} 55 L ${x+118} 55`} color={color} animate dur={1.8} width={2.5}/>}
              <circle cx={x} cy={55} r={34} fill={s.bg||C.surface3} stroke={color} strokeWidth={2.5} className="node-pulse"/>
              <text x={x} y={60} textAnchor="middle" fontSize="24">{s.icon}</text>
              <text x={x} y={112} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5" fontWeight="600" fill={C.text2}>
                {s.t}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ============ TAB 1: FOUNDATIONS (ปูพื้นฐาน) ============ */
function FoundationsTab() {
  const vocab = [
    ['เจ้าหนี้ / ลูกหนี้', 'Creditor / Debtor', 'เจ้าหนี้ = ผู้มีสิทธิเรียกให้ชำระหนี้ · ลูกหนี้ = ผู้มีหน้าที่ชำระหนี้', C.primary],
    ['วัตถุแห่งหนี้', 'Object of Obligation', 'สิ่งที่ลูกหนี้ต้องกระทำ: ส่งมอบทรัพย์ · กระทำการ · งดเว้นกระทำการ', C.blue],
    ['การผิดนัด', 'Default (Delay)', 'ลูกหนี้ผิดนัด = ไม่ชำระเมื่อถึงกำหนด (203-206) · เจ้าหนี้ผิดนัด = ไม่ยอมรับชำระโดยชอบ (207)', C.red],
    ['พ้นวิสัย', 'Impossibility', 'ชำระหนี้ไม่ได้ — โทษลูกหนี้ (218 ต้องใช้ค่าสินไหม) / ไม่โทษลูกหนี้ (219 หลุดพ้น)', C.amberDark],
    ['รับช่วงสิทธิ', 'Subrogation', 'ผู้ชำระหนี้แทนเข้าสวมสิทธิของเจ้าหนี้เดิมไปไล่เบี้ยลูกหนี้ (226-229)', C.cyan],
    ['หักกลบลบหนี้', 'Set-off', 'สองฝ่ายต่างเป็นเจ้าหนี้ลูกหนี้กัน หนี้ถึงกำหนด → หักกลบกันได้ (341)', C.purple],
  ];
  return (
    <div className="fade-up">
      <Alert type="info" showIcon style={{marginBottom:18, background:C.blueBg, border:`1px solid ${C.blue}44`}}
        message={<span style={{fontWeight:700, color:C.blue, fontSize:16}}>เริ่มจากศูนย์ก็เข้าใจได้ 👋</span>}
        description={<span style={{color:C.text2}}>วิชานี้ตอบว่า <strong>"เมื่อลูกหนี้ไม่ยอมชำระหนี้ หรือชำระไม่ได้ กฎหมายให้เครื่องมืออะไรแก่เจ้าหนี้บ้าง?"</strong> — 4 หัวข้อออกสอบ: (1) การผิดนัด (2) พ้นวิสัย + รับช่วงสิทธิ (3) ควบคุมกองทรัพย์สินลูกหนี้ (ใช้สิทธิเรียกร้อง + เพิกถอนฉ้อฉล) (4) ลูกหนี้ร่วม + หักกลบลบหนี้</span>} />

      <Card style={{marginBottom:18, borderColor:C.border, background:C.surface3}} bodyStyle={{padding:'18px 20px'}}>
        <Title level={4} style={{marginTop:0, color:C.text}}>💵 นึกภาพง่าย ๆ ด้วยชีวิตจริง</Title>
        <Paragraph style={{color:C.text2, fontSize:15}}>

function IracCard({c}) {
  const [step, setStep] = useState(0);
  const parts = [
    {k:'Issue', th:'ประเด็น (I)', color:C.blue, body:c.issue},
    {k:'Rule', th:'หลักกฎหมาย (R)', color:C.purple, body:<span>{c.rule.map(x=><span key={x} style={{marginRight:6}}><Sec>{x}</Sec></span>)}<div style={{marginTop:8}}>{c.ruleText}</div></span>},
    {k:'Application', th:'ปรับข้อเท็จจริง (A)', color:C.amberDark, body:c.application},
    {k:'Conclusion', th:'สรุป (C)', color:C.green, body:c.conclusion},
  ];
  return (
    <Card style={{marginBottom:18, borderColor:C.border}} bodyStyle={{padding:'18px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:10}}>
        <Tag color="geekblue" style={{fontWeight:700}}>{c.tag}</Tag>
        <span style={{fontWeight:700, fontSize:16, color:C.text}}>{c.topic}</span>
        <Stars n={c.star}/>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3}}>
        <strong style={{color:C.primaryDark}}>ข้อเท็จจริง: </strong>{c.facts}
      </div>
      <div style={{margin:'14px 0 6px'}}>
        {parts.slice(0,step).map((p,i)=>(
          <div key={i} className="fade-up" style={{borderLeft:`4px solid ${p.color}`, background:p.color+'12', borderRadius:'0 10px 10px 0', padding:'11px 15px', marginBottom:10}}>
            <div style={{fontWeight:700, color:p.color, marginBottom:3}}>{p.th}</div>
            <div style={{color:C.text2, fontSize:14.3}}>{p.body}</div>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center', marginTop:6}}>
        {step<4
          ? <Button type="primary" size="large" onClick={()=>setStep(step+1)}
              style={{background:parts[step].color, borderColor:parts[step].color}}>
              เปิดขั้น {parts[step].th} ▸</Button>
          : <Space>
              <Tag color="green" style={{padding:'6px 14px', fontSize:14}}>✅ ครบ IRAC แล้ว</Tag>
              <Button onClick={()=>setStep(0)}>เริ่มใหม่</Button>
            </Space>}
      </div>
    </Card>
  );
}

function LabCard({c}) {
  const [pick, setPick] = useState(null);
  const revealed = pick!==null;
  const correct = revealed && pick===c.answer;
  return (
    <Card className={revealed?'':'hoverlift'} style={{marginBottom:16, borderColor: revealed?(correct?C.green:C.red):C.border, borderWidth:revealed?2:1}} bodyStyle={{padding:'18px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:8}}>
        <span style={{fontSize:24}}>{c.icon}</span>
        <span style={{fontWeight:700, fontSize:16, color:C.text}}>{c.title}</span>
        <span style={{marginLeft:'auto', display:'flex', gap:4, flexWrap:'wrap'}}>{c.secs.map(s=><Sec key={s}>{s}</Sec>)}</span>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3, marginBottom:12}}>
        {c.scenario}
      </div>
      <div style={{display:'flex', alignItems:'center', gap:12, flexWrap:'wrap'}}>
        <span style={{fontWeight:700, color:C.primaryDark, fontSize:15}}>🔮 ทำนาย: {c.question}</span>
        {!revealed &&
          <Space>
            <Button size="large" style={{borderColor:C.green, color:C.green, fontWeight:700}} onClick={()=>setPick(true)}>{c.yesLabel}</Button>
            <Button size="large" style={{borderColor:C.red, color:C.red, fontWeight:700}} onClick={()=>setPick(false)}>{c.noLabel}</Button>
          </Space>}
        {revealed &&
          <Tag color={correct?'green':'red'} style={{fontSize:14, padding:'4px 14px', fontWeight:700}}>
            {correct?'🎯 ทำนายถูก!':'❌ ทำนายพลาด'} — คำตอบ: {c.answer?c.yesLabel:c.noLabel}
          </Tag>}
      </div>
      {revealed && (
        <div className="fade-up">
          <div style={{marginTop:12, background:(correct?C.greenBg:C.redBg), borderRadius:12, padding:'13px 16px', border:`1px solid ${(correct?C.green:C.red)}33`}}>
            <div style={{fontSize:12.5, color:C.text3, fontWeight:700, marginBottom:4}}>คำวินิจฉัย</div>
            <div style={{color:C.text2, fontSize:14.6, lineHeight:1.85}}>{c.verdict}</div>
          </div>
          <div style={{marginTop:10, display:'flex', gap:8, alignItems:'flex-start', background:'#F5EFE3', border:`1px dashed ${C.amberDark}66`, borderRadius:10, padding:'9px 13px'}}>
            <span>⚠️</span>
            <span style={{color:C.amberDark, fontSize:13.5, fontWeight:600}}>กับดัก: {c.trap}</span>
          </div>
          <div style={{textAlign:'right', marginTop:8}}>
            <Button size="small" onClick={()=>setPick(null)}>ลองใหม่</Button>
          </div>
        </div>
      )}
    </Card>
  );
}

function Quiz() {
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const Qd = quizData[i];
  const choose = (k)=>{ if(picked!==null) return; setPicked(k); if(k===Qd.correct) setScore(s=>s+1); };
  const next = ()=>{ if(i+1>=quizData.length){ setDone(true); } else { setI(i+1); setPicked(null);} };
  const restart = ()=>{ setI(0); setPicked(null); setScore(0); setDone(false); };

  if(done) return (
    <Result status={score>=9?'success':'info'}
      title={`ได้ ${score} / ${quizData.length} คะแนน`}
      subTitle={score>=9?'เยี่ยมมาก! มาตราแม่นระดับพร้อมสอบแล้ว 🎉':'ทบทวนแท็บบทเรียน & เดินเคส IRAC อีกรอบแล้วลองใหม่นะ 💪'}
      extra={<Button type="primary" style={{background:C.primary, borderColor:C.primary}} onClick={restart}>ทำใหม่อีกครั้ง</Button>}/>
  );
  return (
    <div>
      <Flex justify="space-between" align="center" style={{marginBottom:10}}>
        <Text style={{color:C.text3}}>ข้อ {i+1} / {quizData.length}</Text>
        <Tag color="blue">คะแนน {score}</Tag>
      </Flex>
      <Progress percent={Math.round((i)/quizData.length*100)} showInfo={false} strokeColor={C.green} trailColor={C.surface2} style={{marginBottom:16}}/>
      <div style={{fontSize:17, fontWeight:600, color:C.text, marginBottom:16, lineHeight:1.7}}>{Qd.q}</div>
      <Space direction="vertical" style={{width:'100%'}} size={10}>
        {Qd.opts.map((o,k)=>{
          let bg=C.white, bd=C.border, cc=C.text;
          if(picked!==null){
            if(k===Qd.correct){ bg=C.greenBg; bd=C.green; cc=C.green; }
            else if(k===picked){ bg=C.redBg; bd=C.red; cc=C.red; }
          }
          return (
            <div key={k} onClick={()=>choose(k)} className={picked===null?'hoverlift':''}
              style={{cursor:picked===null?'pointer':'default', background:bg, border:`1.5px solid ${bd}`, borderRadius:10, padding:'12px 16px', color:cc, fontSize:15, fontWeight:500, transition:'all .25s'}}>
              <span style={{fontWeight:700, marginRight:8}}>{'กขคง'[k]}.</span>{o}
              {picked!==null && k===Qd.correct && <span style={{float:'right'}}>✅</span>}
              {picked===k && k!==Qd.correct && <span style={{float:'right'}}>❌</span>}
            </div>
          );
        })}
      </Space>
      {picked!==null && (
        <div className="fade-up">
          <Box tone={picked===Qd.correct?'green':'red'} title={picked===Qd.correct?'ถูกต้อง!':'ยังไม่ใช่'} icon={picked===Qd.correct?'🎯':'📖'} style={{marginTop:14}}>
            {Qd.exp}
          </Box>
          <div style={{textAlign:'center', marginTop:12}}>
            <Button type="primary" size="large" style={{background:C.green, borderColor:C.green}} onClick={next}>
              {i+1>=quizData.length?'ดูผลคะแนน':'ข้อถัดไป ▸'}</Button>
          </div>
        </div>
      )}
    </div>
  );
}

  const [idx, setIdx] = useState(0);
  const [flip, setFlip] = useState(false);
  const [score, setScore] = useState({c:0,w:0});

  useEffect(()=>{ setOrder(pool.map((_,i)=>i)); setIdx(0); setFlip(false); setScore({c:0,w:0}); },[mode]);

  const card = pool[order[idx]] || pool[0];
  const go = (dir)=>{ setFlip(false); setTimeout(()=>setIdx(i=>Math.max(0,Math.min(pool.length-1,i+dir))),120); };
  const shuffle = ()=>{ const o=[...Array(pool.length).keys()]; for(let i=o.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]];} setOrder(o); setIdx(0); setFlip(false); };
  const mark = (ok)=>{ setScore(s=>({c:s.c+(ok?1:0), w:s.w+(ok?0:1)})); go(1); };

  if(!card) return <Empty description="ไม่มีการ์ด"/>;
  return (
    <div className="fade-up">
      <Flex justify="space-between" align="center" wrap="wrap" gap={10} style={{marginBottom:14}}>
        <Segmented value={mode} onChange={setMode}
          options={[{label:`ทั้งหมด (${flashcards.length})`,value:'all'},{label:`ออกสอบ (${flashcards.filter(c=>c.exam).length})`,value:'exam'},{label:`★★★ (${flashcards.filter(c=>c.star===3).length})`,value:'star3'}]}/>
        <Space>
          <Tag color="green">ถูก {score.c}</Tag>
          <Tag color="red">ผิด {score.w}</Tag>
          <Button size="small" onClick={shuffle}>🔀 สุ่ม</Button>
        </Space>
      </Flex>
      <div style={{textAlign:'center', color:C.text3, marginBottom:8}}>การ์ด {idx+1} / {pool.length}</div>
      <Progress percent={Math.round((idx+1)/pool.length*100)} showInfo={false} strokeColor={C.primary} trailColor={C.surface2} style={{marginBottom:14}}/>
      <div className="fc-perspective" style={{maxWidth:640, margin:'0 auto', minHeight:290}}>
        <div className={'fc-card'+(flip?' flipped':'')} style={{minHeight:290}} onClick={()=>setFlip(f=>!f)}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.primary}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:290}}>
            <div style={{position:'absolute', top:14, left:16}}><Stars n={card.star}/></div>
            {card.exam && <Tag color="geekblue" style={{position:'absolute', top:12, right:12}}>ข้อสอบ</Tag>}
            <div style={{fontSize:12.5, color:C.text3, marginBottom:10}}>❓ คำถาม (แตะเพื่อพลิก)</div>
            <div style={{fontSize:18, fontWeight:600, color:C.text, textAlign:'center', lineHeight:1.7}}>{card.q}</div>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.green}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:290}}>
            <div style={{fontSize:12.5, color:C.green, marginBottom:8, fontWeight:700}}>✅ คำตอบ</div>
            <div style={{fontSize:21, fontWeight:800, color:C.green, textAlign:'center', marginBottom:card.d?12:0}}>{card.a}</div>
            {card.d && <div style={{fontSize:14.5, color:C.text2, textAlign:'center', lineHeight:1.8}}>{card.d}</div>}
          </div>
        </div>
      </div>
      <Flex justify="center" align="center" gap={10} style={{marginTop:20}} wrap="wrap">
        <Button onClick={()=>go(-1)} disabled={idx===0}>◂ ก่อนหน้า</Button>
        {flip
          ? <Space>
              <Button danger onClick={()=>mark(false)}>✗ ยังไม่แม่น</Button>
              <Button type="primary" style={{background:C.green, borderColor:C.green}} onClick={()=>mark(true)}>✓ จำได้</Button>
            </Space>
          : <Button type="primary" style={{background:C.primary, borderColor:C.primary}} onClick={()=>setFlip(true)}>พลิกดูคำตอบ</Button>}
        <Button onClick={()=>go(1)} disabled={idx===pool.length-1}>ถัดไป ▸</Button>
      </Flex>
    </div>
  );
}
