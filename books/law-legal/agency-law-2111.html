<style>
  * { -webkit-font-smoothing: antialiased; }
  body {
    background:#F5F0E8;
    line-height:1.85;
    font-family:'Noto Sans Thai', -apple-system, sans-serif;
    color:#3D3229;
    margin:0;
  }
  h1,h2,h3,h4 { font-family:'Noto Serif Thai','Noto Sans Thai',serif; }
  ::selection { background:#DDD3C1; color:#3D3229; }
  ::-webkit-scrollbar { width:11px; height:11px; }
  ::-webkit-scrollbar-track { background:#EDE8DF; }
  ::-webkit-scrollbar-thumb { background:#C4B49A; border-radius:6px; }
  ::-webkit-scrollbar-thumb:hover { background:#A8906C; }
  .ant-table-cell { line-height:1.9 !important; }

  /* Flip card */
  .fc-perspective { perspective:1600px; }
  .fc-card { position:relative; width:100%; transform-style:preserve-3d; transition:transform .55s cubic-bezier(.4,.2,.2,1); cursor:pointer; }
  .fc-card.flipped { transform:rotateY(180deg); }
  .fc-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:16px; display:flex; flex-direction:column; }

  /* Quick card hover */
  .qc { transition:transform .18s ease, box-shadow .18s ease; }

  /* Reveal animation */
  @keyframes fadeUp { from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .fade-up { animation:fadeUp .5s ease both; }

  /* Diagram animations */
  @keyframes dash { to { stroke-dashoffset:0; } }
  @keyframes pulseNode { 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.06);} }
  @keyframes floatY { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-6px);} }
  .flow-dot { animation:moveDot 2.4s linear infinite; }
  .node-pulse { animation:pulseNode 2.6s ease-in-out infinite; transform-origin:center; }

  /* Token travelling along a path handled in JS via offset */
  .breathe { animation:floatY 3.4s ease-in-out infinite; }

  .lesson-body strong { color:#7A5C36; }
  .tag-chip { display:inline-block; padding:1px 9px; border-radius:20px; font-size:12px; font-weight:600; margin:2px 4px 2px 0; }
  .sec-badge { font-family:'Noto Serif Thai'; font-weight:700; }

  .hoverlift { transition:transform .16s ease, box-shadow .16s ease; }
  .hoverlift:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(120,100,70,.16); }

  @keyframes glowRing { 0%,100%{ box-shadow:0 0 0 0 rgba(168,144,108,.35);} 50%{ box-shadow:0 0 0 8px rgba(168,144,108,0);} }
  .glow { animation:glowRing 2.2s ease-in-out infinite; }

<body>
<div id="root"></div>
<script type="text/babel">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button,
        Row, Col, Divider, Alert, Statistic, Flex, Segmented, Radio, Progress, Steps,
        Collapse, Switch, Select, Result, Tooltip, Badge, Empty } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState, useEffect, useRef, useMemo } = React;

/* ============ PALETTE ============ */
const C = {
  gold:'#A8906C', goldDark:'#8B7355', goldLight:'#C4B49A',
  amber:'#B5986A', amberDark:'#7A6548',
  bg:'#F5F0E8', surface:'#EDE8DF', surface2:'#E5DFD4', surface3:'#F0EBE2',
  border:'#DDD3C1', borderDark:'#C4B49A',
  text:'#3D3229', text2:'#5C4F42', text3:'#7A6E62',
  white:'#FAF7F2',
  green:'#5D8A66', greenBg:'#EFF5F0',
  red:'#B85C5C', redBg:'#F5ECEA',
  purple:'#7B6B8A', purpleBg:'#F0ECF3',
  blue:'#5B7A9E', blueBg:'#ECF0F5',
  cyan:'#5B8A8A', cyanBg:'#ECF2F2',
};

/* ============ SHARED HELPERS ============ */
const Stars = ({n}) => <span style={{color:C.amber, letterSpacing:1}}>{'★'.repeat(n)}<span style={{color:C.border}}>{'★'.repeat(3-n)}</span></span>;

const Sec = ({children}) => (
  <span className="sec-badge" style={{background:C.surface2, color:C.goldDark, padding:'1px 8px', borderRadius:7, border:`1px solid ${C.border}`, whiteSpace:'nowrap'}}>ม.{children}</span>
);

const Pill = ({color, bg, children}) => (
  <span className="tag-chip" style={{background:bg, color:color, border:`1px solid ${color}33`}}>{children}</span>
);

const Box = ({tone='gold', title, icon, children, style}) => {
  const map = {
    green:[C.green,C.greenBg], red:[C.red,C.redBg], blue:[C.blue,C.blueBg],
    purple:[C.purple,C.purpleBg], cyan:[C.cyan,C.cyanBg], gold:[C.goldDark,C.surface3]
  };
  const [cc,bb] = map[tone]||map.gold;
  return (
    <div className="lesson-body" style={{background:bb, border:`1px solid ${cc}33`, borderLeft:`4px solid ${cc}`, borderRadius:12, padding:'13px 16px', margin:'10px 0', ...style}}>
      {title && <div style={{fontWeight:700, color:cc, marginBottom:6, fontSize:15}}>{icon} {title}</div>}
      <div style={{color:C.text2, fontSize:14.5}}>{children}</div>
    </div>
  );
};

/* ============ ANIMATED SVG DIAGRAM ENGINE ============ */
// A node = rounded rect with a title + subtitle
function DiaNode({x, y, w=150, h=62, title, sub, color, active, onClick}) {
  return (
    <g style={{cursor:onClick?'pointer':'default'}} onClick={onClick} className={active?'node-pulse':''}>
      <rect x={x-w/2} y={y-h/2} width={w} height={h} rx={14}
        fill={active ? color : C.white}
        stroke={color} strokeWidth={active?3:2}
        style={{filter: active?`drop-shadow(0 4px 10px ${color}55)`:'none', transition:'all .4s'}} />
      <text x={x} y={sub? y-6 : y+5} textAnchor="middle"
        fontFamily="'Noto Sans Thai'" fontWeight="700" fontSize="16"
        fill={active ? C.white : color}>{title}</text>
      {sub && <text x={x} y={y+14} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="11.5"
        fill={active ? C.white : C.text3}>{sub}</text>}
    </g>
  );
}

// An edge with optional animated travelling token
function DiaEdge({id, d, color, label, labelX, labelY, dashed, animate, dur=2.6, reverse, width=3, dim}) {
  const op = dim ? 0.18 : 1;
  return (
    <g style={{opacity:op, transition:'opacity .4s'}}>
      <path id={id} d={d} fill="none" stroke={color} strokeWidth={width}
        strokeDasharray={dashed?'7 7':'none'} strokeLinecap="round"
        markerEnd={`url(#arrow-${id})`} />
      <defs>
        <marker id={`arrow-${id}`} markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L7,3 L0,6 Z" fill={color}/>
        </marker>
      </defs>
      {animate && !dim &&
        <circle r="6.5" fill={color}>
          <animateMotion dur={`${dur}s`} repeatCount="indefinite" keyPoints={reverse?'1;0':'0;1'} keyTimes="0;1" rotate="0">
            <mpath href={`#${id}`}/>
          </animateMotion>
        </circle>}
      {label &&
        <g>
          <rect x={labelX-label.length*4.1-8} y={labelY-13} width={label.length*8.2+16} height={22} rx={11}
            fill={C.white} stroke={color+'55'} />
          <text x={labelX} y={labelY+2} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5"
            fontWeight="600" fill={color}>{label}</text>
        </g>}
    </g>
  );
}

// The core Principal–Agent–ThirdParty triangle, with 3 comparison modes
function AgencyTriangle() {
  const modes = {
    agent: {
      label:'ตัวแทนธรรมดา', color:C.blue,
      desc:'ตัวแทนทำนิติกรรม "ในนามของตัวการ" → ผลของสัญญาตกที่ตัวการกับบุคคลภายนอก "โดยตรง" ตัวแทนไม่ผูกพันเป็นการส่วนตัว',
      bindPT:true, bindAT:false, actLabel:'ทำการในนามตัวการ (ม.820)'
    },
    komma: {
      label:'ตัวแทนค้าต่าง', color:C.purple,
      desc:'ตัวแทนค้าต่างทำการ "ในนามของตนเอง" แต่เพื่อประโยชน์ตัวการ → ตัวแทนค้าต่างผูกพันกับบุคคลภายนอกเอง (ม.837) บุคคลภายนอกไม่รู้จักตัวการ',
      bindPT:false, bindAT:true, actLabel:'ทำการในนามตนเอง (ม.833)'
    },
    broker: {
      label:'นายหน้า', color:C.green,
      desc:'นายหน้าเป็นเพียง "คนชี้ช่อง/จัดการให้ได้ทำสัญญา" ไม่ได้เป็นคู่สัญญาเลย เมื่อคู่สัญญาตกลงกันสำเร็จเพราะผลงานนายหน้า → นายหน้าได้บำเหน็จ (ม.845)',
      bindPT:true, bindAT:false, broker:true, actLabel:'ชี้ช่องให้ 2 ฝ่ายมาเจอกัน (ม.845)'
    }
  };
  const [m, setM] = useState('agent');
  const M = modes[m];
  // node coords
  const P = {x:130, y:90}, A = {x:530, y:90}, T = {x:330, y:290};
  return (
    <div>
      <div style={{textAlign:'center', marginBottom:12}}>
        <Segmented value={m} onChange={setM} size="large"
          options={Object.keys(modes).map(k=>({label:modes[k].label, value:k}))} />
      </div>
      <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:16, padding:'8px 4px'}}>
        <svg viewBox="0 0 660 350" style={{width:'100%', height:'auto', maxHeight:400}}>
          {/* internal relationship P<->A */}
          <DiaEdge id="pa" d={`M ${P.x+50} ${P.y+18} Q 330 30 ${A.x-60} ${A.y+18}`} color={C.gold}
            label={M.broker?'จ้างชี้ช่อง':'สัญญาตัวแทน / มอบอำนาจ'} labelX={330} labelY={38} dashed animate dur={3}
            dim={false} />
          {/* Agent -> Third party (the act) */}
          <DiaEdge id="at" d={`M ${A.x-30} ${A.y+40} L ${T.x+70} ${T.y-40}`} color={M.color}
            label={M.actLabel} labelX={480} labelY={215} animate dur={2.4} width={3}
            dim={M.broker} />
          {/* Binding line: who is bound to third party */}
          {M.bindPT &&
            <DiaEdge id="pt" d={`M ${P.x+8} ${P.y+42} L ${T.x-70} ${T.y-38}`} color={C.red}
              label="ผูกพันโดยตรง" labelX={175} labelY={215} animate dur={2.2} width={4} />}
          {M.bindAT &&
            <DiaEdge id="atb" d={`M ${A.x-8} ${A.y+42} L ${T.x+82} ${T.y-30}`} color={C.red}
              label="ผูกพันกันเอง" labelX={505} labelY={235} animate dur={2.2} width={4} />}
          {M.broker &&
            <DiaEdge id="brk" d={`M ${P.x+8} ${P.y+44} L ${A.x-8} ${A.y+44}`} color={C.red}
              label="ทำสัญญากันเอง 2 ฝ่าย" labelX={330} labelY={92} animate dur={2.6} width={4} />}

          <DiaNode {...P} title="ตัวการ" sub={M.broker?'ผู้ว่าจ้าง':'Principal'} color={C.blue} active />
          <DiaNode {...A} title={M.broker?'นายหน้า':(m==='komma'?'ตัวแทนค้าต่าง':'ตัวแทน')} sub={M.broker?'Broker':'Agent'} color={M.color} active />
          <DiaNode {...T} title="บุคคลภายนอก" sub="Third Party" color={C.cyan} active />
        </svg>
      </div>
      <Box tone={m==='broker'?'green':(m==='komma'?'purple':'blue')} title={`โหมด: ${M.label}`} icon="🎬" style={{marginTop:12}}>
        {M.desc}
      </Box>
    </div>
  );
}

// Money / liability flow strip — a horizontal animated pipeline of steps
function FlowStrip({steps, color=C.gold}) {
  return (
    <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:14, padding:'16px 10px', overflowX:'auto'}}>
      <svg viewBox={`0 0 ${steps.length*180} 130`} style={{width:'100%', minWidth:steps.length*150, height:'auto'}}>
        {steps.map((s,i)=>{
          const x = 90 + i*180;
          return (
            <g key={i}>
              {i<steps.length-1 &&
                <DiaEdge id={`fs${i}`} d={`M ${x+62} 55 L ${x+118} 55`} color={color} animate dur={1.8} width={2.5}/>}
              <circle cx={x} cy={55} r={34} fill={s.bg||C.surface3} stroke={color} strokeWidth={2.5} className="node-pulse"/>
              <text x={x} y={60} textAnchor="middle" fontSize="24">{s.icon}</text>
              <text x={x} y={112} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5" fontWeight="600" fill={C.text2}>
                {s.t}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ============ TAB 1: FOUNDATIONS (ปูพื้นฐาน) ============ */
function FoundationsTab() {
  const vocab = [
    ['ตัวการ', 'Principal', 'คนที่ "มอบหมาย" ให้คนอื่นไปทำแทน — เจ้าของงานตัวจริง', C.blue],
    ['ตัวแทน', 'Agent', 'คนที่ "รับไปทำแทน" ตัวการ ในนามของตัวการ', C.gold],
    ['บุคคลภายนอก', 'Third Party', 'คนที่มาทำสัญญาด้วย เช่น คนขาย/คนซื้อ', C.cyan],
    ['ตัวแทนค้าต่าง', 'Commission Agent', 'ตัวแทนที่ทำการซื้อขาย "ในนามตนเอง" แต่เพื่อตัวการ', C.purple],
    ['นายหน้า', 'Broker', 'คนกลางที่ "ชี้ช่อง" ให้ 2 ฝ่ายมาทำสัญญากัน แล้วรับบำเหน็จ', C.green],
    ['บำเหน็จ', 'Remuneration', 'ค่าตอบแทนของตัวแทน/นายหน้า', C.amberDark],
  ];
  return (
    <div className="fade-up">
      <Alert type="info" showIcon style={{marginBottom:18, background:C.blueBg, border:`1px solid ${C.blue}44`}}
        message={<span style={{fontWeight:700, color:C.blue, fontSize:16}}>เริ่มจากศูนย์ก็เข้าใจได้ 👋</span>}
        description={<span style={{color:C.text2}}>วิชานี้ว่าด้วยเรื่องเดียว: <strong>"เมื่อเราให้คนอื่นไปทำธุระแทนเรา ผลทางกฎหมายจะตกที่ใคร?"</strong> ทุกมาตราในเล่มนี้ตอบคำถามนี้จากมุมต่าง ๆ ค่อย ๆ อ่านตามลำดับด้านล่างนะ</span>} />

      <Card style={{marginBottom:18, borderColor:C.border, background:C.surface3}} bodyStyle={{padding:'18px 20px'}}>
        <Title level={4} style={{marginTop:0, color:C.text}}>🍜 นึกภาพง่าย ๆ ด้วยชีวิตจริง</Title>
        <Paragraph style={{color:C.text2, fontSize:15}}>
          สมมติคุณอยากได้ก๋วยเตี๋ยว แต่ไม่อยากไปเอง เลยฝากเงินให้ <strong>เพื่อน</strong> ไปซื้อให้
          — คุณคือ <Pill color={C.blue} bg={C.blueBg}>ตัวการ</Pill>
          เพื่อนคือ <Pill color={C.gold} bg={C.surface3}>ตัวแทน</Pill>
          ร้านก๋วยเตี๋ยวคือ <Pill color={C.cyan} bg={C.cyanBg}>บุคคลภายนอก</Pill>.
          เพื่อนบอกร้านว่า "ซื้อให้เพื่อนนะ" (ในนามคุณ) → ของและภาระตกที่คุณ ไม่ใช่เพื่อน. นี่คือหัวใจของ "ตัวแทน" ทั้งเล่ม
        </Paragraph>
        <FlowStrip color={C.gold} steps={[
          {icon:'🙋', t:'ตัวการมอบหมาย', bg:C.blueBg},
          {icon:'🏃', t:'ตัวแทนไปทำแทน', bg:C.surface3},
          {icon:'🤝', t:'ทำสัญญากับร้าน', bg:C.cyanBg},
          {icon:'📦', t:'ผลตกที่ตัวการ', bg:C.redBg},
        ]}/>
      </Card>

      <Title level={4} style={{color:C.text}}>🎬 แผนภาพเคลื่อนไหว: ผลของสัญญาตกที่ใคร?</Title>
      <Paragraph style={{color:C.text3, marginTop:-4}}>กดสลับโหมดเพื่อดูว่า "เส้นสีแดง" (ใครผูกพันกับบุคคลภายนอก) ย้ายไปที่ใคร — นี่คือจุดตายของข้อสอบ</Paragraph>
      <AgencyTriangle/>

      <Divider/>
      <Title level={4} style={{color:C.text}}>📚 คำศัพท์แกนหลัก 6 คำ (จำให้ได้ก่อนเลย)</Title>
      <Row gutter={[12,12]}>
        {vocab.map((v,i)=>(
          <Col xs={24} sm={12} key={i}>
            <Card className="hoverlift" size="small" style={{borderLeft:`4px solid ${v[3]}`, borderColor:C.border, height:'100%'}} bodyStyle={{padding:'12px 14px'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                <span style={{fontWeight:700, fontSize:16.5, color:v[3]}}>{v[0]}</span>
                <span style={{fontSize:12, color:C.text3, fontStyle:'italic'}}>{v[1]}</span>
              </div>
              <div style={{color:C.text2, fontSize:14, marginTop:2}}>{v[2]}</div>
            </Card>
          </Col>
        ))}
      </Row>

      <Divider/>
      <Title level={4} style={{color:C.text}}>⚖️ 3 ตัวละครที่คนสับสนที่สุด (ต้องแยกให้ออก!)</Title>
      <Table pagination={false} size="middle" style={{marginTop:8}}
        columns={[
          {title:'', dataIndex:'k', width:130, render:t=><strong style={{color:C.goldDark}}>{t}</strong>},
          {title:<span style={{color:C.blue}}>ตัวแทน</span>, dataIndex:'agent'},
          {title:<span style={{color:C.purple}}>ตัวแทนค้าต่าง</span>, dataIndex:'komma'},
          {title:<span style={{color:C.green}}>นายหน้า</span>, dataIndex:'broker'},
        ]}
        dataSource={[
          {key:1, k:'ทำในนามใคร', agent:'นามตัวการ', komma:'นามตนเอง', broker:'ไม่ทำสัญญาเอง'},

const YN = ({value, onChange}) => (
  <Radio.Group value={value} onChange={e=>onChange(e.target.value)} optionType="button" buttonStyle="solid"
    options={[{label:'ใช่',value:true},{label:'ไม่',value:false}]} />

function verdictEngine(s) {
  // returns {secs:[], title, tone, ruling, who}
  if (s.type==='agent') {
    if (s.excess) {
      if (s.ratify) return {secs:['823','820'], tone:'green', title:'ตัวการให้สัตยาบัน → ผูกพัน',
        ruling:'แม้ตัวแทนทำนอก/ปราศจากอำนาจ แต่ตัวการ "ให้สัตยาบัน" การนั้นย่อมผูกพันตัวการเสมือนทำในขอบอำนาจ (ม.823 ประกอบ ม.820)', who:'ตัวการผูกพันบุคคลภายนอก'};
      return {secs:['823'], tone:'red', title:'ทำปราศจากอำนาจ + ไม่สัตยาบัน',
        ruling:'ตัวแทนทำการปราศจากอำนาจ/นอกเหนืออำนาจ และตัวการไม่ให้สัตยาบัน → ไม่ผูกพันตัวการ ตัวแทนต้องรับผิดต่อบุคคลภายนอกโดยลำพังตนเอง (ม.823 ว.2)', who:'ตัวแทนรับผิดเอง'};
    }
    if (s.proNeg) return {secs:['807','659','812'], tone:'red', title:'ตัวแทนอาชีพเฉพาะ ประมาทเลินเล่อ',
      ruling:'ตัวแทนเป็นผู้มีอาชีพเฉพาะ ต้องใช้ความระมัดระวัง+ฝีมือตามมาตรฐานอาชีพนั้น (ม.807 ว.2 + ม.659 ว.3) เมื่อทำโดยประมาท เกิดความเสียหาย → รับผิดชดใช้แก่ตัวการ (ม.812)', who:'ตัวแทนรับผิดต่อตัวการ'};
    if (s.thirdDefault) return {secs:['820'], tone:'blue', title:'บุคคลภายนอกผิดนัด',
      ruling:'ตัวแทนทำในนามตัวการ → ตัวการเป็นคู่สัญญา/เจ้าหนี้เอง ต้องไปว่ากล่าวเรียกร้องเอาจากบุคคลภายนอกโดยตรง ตัวแทนไม่ต้องรับผิดแทน (ม.820)', who:'ตัวการ ↔ บุคคลภายนอก โดยตรง'};
    return {secs:['820'], tone:'green', title:'ตัวแทนทำในขอบอำนาจโดยชอบ',
      ruling:'ตัวแทนทำนิติกรรมในนามตัวการภายในขอบอำนาจ → ผลตกที่ตัวการกับบุคคลภายนอกโดยตรง ตัวแทนไม่ผูกพันเป็นส่วนตัว (ม.820)', who:'ตัวการผูกพันบุคคลภายนอก'};
  }
  if (s.type==='komma') {
    if (s.thirdDefault) {
      if (s.delc) return {secs:['838','837'], tone:'purple', title:'ตัวแทนฐานประกัน (del credere)',
        ruling:'คู่สัญญาไม่ชำระ โดยหลักตัวแทนค้าต่างไม่ต้องรับผิด แต่เมื่อเข้ารับประกันการชำระหนี้ = ตัวแทนฐานประกัน → ต้องรับผิดต่อตัวการ และมีสิทธิได้บำเหน็จพิเศษ (ม.838 ว.ท้าย)', who:'ตัวแทนค้าต่างรับผิดต่อตัวการ'};
      return {secs:['838','837'], tone:'blue', title:'คู่สัญญาไม่ชำระ — หลักทั่วไป',
        ruling:'ตัวแทนค้าต่างทำในนามตนเอง ผูกพันคู่สัญญาเอง (ม.837) แต่เมื่อคู่สัญญาไม่ชำระ ตัวแทนค้าต่าง "ไม่ต้องรับผิด" ต่อตัวการเพื่อชำระหนี้นั้นเอง (ม.838) เว้นเข้าข้อยกเว้น', who:'ตัวการรับความเสี่ยงเอง'};
    }
    return {secs:['837','833','844'], tone:'green', title:'ตัวแทนค้าต่างทำการปกติ',
      ruling:'ตัวแทนค้าต่างทำการซื้อขายในนามตนเองต่างตัวการ (ม.833) ย่อมได้สิทธิและผูกพันต่อคู่สัญญาอีกฝ่ายด้วยตนเอง (ม.837) ระหว่างตัวการกับตัวแทนถือเสมือนทำในนามตัวการโดยตรง (ม.844)', who:'ตัวแทนค้าต่าง ↔ บุคคลภายนอก'};
  }
  // broker
  if (!s.hasContract) return {secs:['845'], tone:'red', title:'ไม่มีสัญญานายหน้า',
    ruling:'แม้ช่วยชี้ช่อง/พามาเจอกันจนซื้อขายสำเร็จ แต่เมื่อ "ไม่เคยมีสัญญาหรือข้อตกลงเป็นนายหน้าต่อกันมาก่อน" นายหน้าย่อม "ไม่มีสิทธิได้บำเหน็จ" (ม.845)', who:'นายหน้าไม่ได้บำเหน็จ'};
  if (!s.success) return {secs:['845'], tone:'blue', title:'สัญญายังไม่สำเร็จ / มีเงื่อนไข',
    ruling:'บำเหน็จนายหน้าจะเรียกได้ต่อเมื่อสัญญาที่มุ่งหมายได้ทำสำเร็จ "เนื่องแต่ผลแห่งการที่นายหน้าชี้ช่อง" ถ้ายังไม่สำเร็จ/มีเงื่อนไขบังคับก่อนที่ยังไม่สำเร็จ → ยังเรียกบำเหน็จไม่ได้ (ม.845)', who:'ยังไม่ได้บำเหน็จ'};
  if (s.dualDisloyal) return {secs:['847'], tone:'red', title:'นายหน้าสองฝ่ายโดยฝ่าฝืนหน้าที่',
    ruling:'นายหน้าไปทำการให้บุคคลภายนอกด้วย หรือรับคำมั่นบำเหน็จจากอีกฝ่ายโดยฝ่าฝืนหน้าที่ที่ตนรับทำ → หมดสิทธิได้รับบำเหน็จและค่าใช้จ่าย (ม.847)', who:'นายหน้าเสียสิทธิบำเหน็จ'};
  return {secs:['845','846'], tone:'green', title:'นายหน้าได้บำเหน็จ',
    ruling:'มีสัญญานายหน้า + สัญญาที่มุ่งหมายทำสำเร็จเพราะผลชี้ช่องของนายหน้า → นายหน้ามีสิทธิได้บำเหน็จ จำนวนตามที่ตกลง หรือตามธรรมเนียมโดยปริยาย (ม.845, 846)', who:'นายหน้าได้บำเหน็จ'};
}

function CaseLab() {
  const [type, setType] = useState('agent');
  const [f, setF] = useState({});
  const set = (k,v)=>setF(p=>({...p,[k]:v}));
  const s = {type, ...f};
  const v = verdictEngine(s);
  const toneColor = {green:C.green, red:C.red, blue:C.blue, purple:C.purple}[v.tone];

  const Q = ({label, k}) => (
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, padding:'11px 14px', background:C.white, border:`1px solid ${C.border}`, borderRadius:10, marginBottom:9}}>
      <span style={{color:C.text2, fontSize:14.5, flex:1}}>{label}</span>
      <YN value={f[k]===undefined?false:f[k]} onChange={val=>set(k,val)} />
    </div>
  );

  return (
    <div className="fade-up">
      <Alert type="warning" showIcon style={{marginBottom:16, background:C.surface3, border:`1px solid ${C.amber}66`}}
        message={<span style={{fontWeight:700, color:C.amberDark}}>🧪 ห้องทดลองเคส — ปรับข้อเท็จจริงแล้วดูคำวินิจฉัยเปลี่ยนทันที</span>}
        description={<span style={{color:C.text2}}>เลือกว่า "คนกลาง" เป็นแบบไหน แล้วตอบคำถามข้อเท็จจริง ระบบจะบอก <strong>มาตราที่ใช้</strong> และ <strong>ผลทางกฎหมาย</strong> เหมือนอาจารย์ค่อย ๆ ซักในห้องเรียน</span>} />
      <Row gutter={[16,16]}>
        <Col xs={24} md={11}>
          <Card title={<span style={{color:C.text}}>1️⃣ เลือกประเภทคนกลาง</span>} style={{borderColor:C.border}} bodyStyle={{padding:16}}>
            <Segmented block value={type} onChange={(val)=>{setType(val); setF({});}} size="large"
              options={[{label:'ตัวแทน',value:'agent'},{label:'ตัวแทนค้าต่าง',value:'komma'},{label:'นายหน้า',value:'broker'}]} />
            <Divider style={{margin:'16px 0 12px'}}/>
            <div style={{color:C.text3, fontSize:13, marginBottom:10}}>2️⃣ ตอบข้อเท็จจริง</div>
            {type==='agent' && <>
              <Q label="บุคคลภายนอกผิดนัดไม่ชำระหนี้?" k="thirdDefault"/>
              <Q label="ตัวแทนเป็นผู้มีอาชีพเฉพาะ และทำโดยประมาทเลินเล่อ?" k="proNeg"/>
              <Q label="ตัวแทนทำการเกิน/ปราศจากอำนาจ?" k="excess"/>
              {f.excess && <Q label="…ตัวการให้สัตยาบันการนั้น?" k="ratify"/>}
            </>}
            {type==='komma' && <>
              <Q label="คู่สัญญา (บุคคลภายนอก) ผิดนัดไม่ชำระ?" k="thirdDefault"/>
              {f.thirdDefault && <Q label="…ตัวแทนค้าต่างเข้ารับประกันการชำระหนี้ (ตัวแทนฐานประกัน)?" k="delc"/>}
            </>}
            {type==='broker' && <>
              <Q label="มีสัญญา/ข้อตกลงเป็นนายหน้ากันมาก่อน?" k="hasContract"/>
              <Q label="สัญญาที่มุ่งหมายทำสำเร็จเพราะผลการชี้ช่องของนายหน้า?" k="success"/>
              <Q label="นายหน้าไปรับใช้/รับคำมั่นจากอีกฝ่ายโดยฝ่าฝืนหน้าที่ด้วย?" k="dualDisloyal"/>
            </>}
          </Card>
        </Col>
        <Col xs={24} md={13}>
          <Card className="glow" style={{borderColor:toneColor, borderWidth:2, background:C.white, height:'100%'}}
            bodyStyle={{padding:20}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:6}}>
              <span style={{fontSize:26}}>⚖️</span>
              <span style={{fontWeight:800, fontSize:19, color:toneColor}}>{v.title}</span>
            </div>
            <div style={{marginBottom:14}}>
              {v.secs.map(sec=><span key={sec} style={{display:'inline-block', margin:'3px 6px 3px 0', background:toneColor, color:C.white, padding:'3px 12px', borderRadius:8, fontWeight:700, fontFamily:"'Noto Serif Thai'"}}>มาตรา {sec}</span>)}
            </div>
            <div style={{background:C.surface3, borderRadius:12, padding:'14px 16px', border:`1px solid ${C.border}`}}>
              <div style={{fontSize:12.5, color:C.text3, fontWeight:700, marginBottom:4}}>คำวินิจฉัย</div>
              <div style={{color:C.text2, fontSize:14.8, lineHeight:1.85}}>{v.ruling}</div>
            </div>
            <div style={{marginTop:14, textAlign:'center'}}>
              <span style={{display:'inline-block', background:toneColor+'1a', color:toneColor, border:`1.5px dashed ${toneColor}`, borderRadius:30, padding:'8px 20px', fontWeight:700, fontSize:15}}>
                🎯 ผล: {v.who}</span>
            </div>
          </Card>
        </Col>
      </Row>
      <Box tone="cyan" title="ลองเล่นแบบนี้สิ" icon="💡" style={{marginTop:16}}>
        เลือก <strong>นายหน้า</strong> → ตอบ "ไม่มีสัญญานายหน้า" ดู แล้วสลับเป็น "มี" + "สำเร็จเพราะชี้ช่อง" — สังเกตว่าผลพลิกจาก <i>ไม่ได้บำเหน็จ</i> เป็น <i>ได้บำเหน็จ</i> ทันที นี่คือแกนของข้อ 3 ทุกปี
      </Box>
    </div>
  );
}

function IracCard({c}) {
  const [step, setStep] = useState(0); // 0=facts only, 1..4 reveal I R A C
  const parts = [
    {k:'Issue', th:'ประเด็น (I)', color:C.blue, body:c.issue},
    {k:'Rule', th:'หลักกฎหมาย (R)', color:C.purple, body:<span>{c.rule.map(x=><span key={x} style={{marginRight:6}}><Sec>{x}</Sec></span>)}<div style={{marginTop:8}}>{c.ruleText}</div></span>},
    {k:'Application', th:'ปรับข้อเท็จจริง (A)', color:C.amberDark, body:c.application},
    {k:'Conclusion', th:'สรุป (C)', color:C.green, body:c.conclusion},
  ];
  return (
    <Card style={{marginBottom:18, borderColor:C.border}} bodyStyle={{padding:'18px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:10}}>
        <Tag color="volcano" style={{fontWeight:700}}>{c.tag}</Tag>
        <span style={{fontWeight:700, fontSize:16, color:C.text}}>{c.topic}</span>
        <Stars n={c.star}/>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3}}>
        <strong style={{color:C.goldDark}}>ข้อเท็จจริง: </strong>{c.facts}
      </div>
      <div style={{margin:'14px 0 6px'}}>
        {parts.slice(0,step).map((p,i)=>(
          <div key={i} className="fade-up" style={{borderLeft:`4px solid ${p.color}`, background:p.color+'12', borderRadius:'0 10px 10px 0', padding:'11px 15px', marginBottom:10}}>
            <div style={{fontWeight:700, color:p.color, marginBottom:3}}>{p.th}</div>
            <div style={{color:C.text2, fontSize:14.3}}>{p.body}</div>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center', marginTop:6}}>
        {step<4
          ? <Button type="primary" size="large" onClick={()=>setStep(step+1)}
              style={{background:parts[step].color, borderColor:parts[step].color}}>
              เปิดขั้น {parts[step].th} ▸</Button>
          : <Space>
              <Tag color="green" style={{padding:'6px 14px', fontSize:14}}>✅ ครบ IRAC แล้ว</Tag>
              <Button onClick={()=>setStep(0)}>เริ่มใหม่</Button>
            </Space>}
      </div>
    </Card>
  );
}

function FlashcardTab() {
  const [mode, setMode] = useState('all');
  const pool = useMemo(()=>{
    let p = flashcards;
    if (mode==='exam') p = flashcards.filter(c=>c.exam);
    if (mode==='star3') p = flashcards.filter(c=>c.star===3);
    return p;
  },[mode]);
  const [order, setOrder] = useState(()=>flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flip, setFlip] = useState(false);
  const [score, setScore] = useState({c:0,w:0});

  useEffect(()=>{ setOrder(pool.map((_,i)=>i)); setIdx(0); setFlip(false); setScore({c:0,w:0}); },[mode]);

  const card = pool[order[idx]] || pool[0];
  const go = (dir)=>{ setFlip(false); setTimeout(()=>setIdx(i=>Math.max(0,Math.min(pool.length-1,i+dir))),120); };
  const shuffle = ()=>{ const o=[...Array(pool.length).keys()]; for(let i=o.length-1;i>0;i--){const j=Math.floor(((i*7+3)%(i+1)));[o[i],o[j]]=[o[j],o[i]];} setOrder(o); setIdx(0); setFlip(false); };
  const mark = (ok)=>{ setScore(s=>({c:s.c+(ok?1:0), w:s.w+(ok?0:1)})); go(1); };

  if(!card) return <Empty description="ไม่มีการ์ด"/>;
  return (
    <div className="fade-up">
      <Flex justify="space-between" align="center" wrap="wrap" gap={10} style={{marginBottom:14}}>
        <Segmented value={mode} onChange={setMode}
          options={[{label:`ทั้งหมด (${flashcards.length})`,value:'all'},{label:`ออกสอบ (${flashcards.filter(c=>c.exam).length})`,value:'exam'},{label:`★★★ (${flashcards.filter(c=>c.star===3).length})`,value:'star3'}]}/>
        <Space>
          <Tag color="green">ถูก {score.c}</Tag>
          <Tag color="red">ผิด {score.w}</Tag>
          <Button size="small" onClick={shuffle}>🔀 สุ่ม</Button>
        </Space>
      </Flex>
      <div style={{textAlign:'center', color:C.text3, marginBottom:8}}>การ์ด {idx+1} / {pool.length}</div>
      <Progress percent={Math.round((idx+1)/pool.length*100)} showInfo={false} strokeColor={C.gold} trailColor={C.surface2} style={{marginBottom:14}}/>
      <div className="fc-perspective" style={{maxWidth:640, margin:'0 auto', minHeight:280}}>
        <div className={'fc-card'+(flip?' flipped':'')} style={{minHeight:280}} onClick={()=>setFlip(f=>!f)}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.gold}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:280}}>
            <div style={{position:'absolute', top:14, left:16}}><Stars n={card.star}/></div>
            {card.exam && <Tag color="volcano" style={{position:'absolute', top:12, right:12}}>ข้อสอบ</Tag>}
            <div style={{fontSize:12.5, color:C.text3, marginBottom:10}}>❓ คำถาม (แตะเพื่อพลิก)</div>
            <div style={{fontSize:19, fontWeight:600, color:C.text, textAlign:'center', lineHeight:1.7}}>{card.q}</div>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.green}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:280}}>
            <div style={{fontSize:12.5, color:C.green, marginBottom:8, fontWeight:700}}>✅ คำตอบ</div>
            <div style={{fontSize:21, fontWeight:800, color:C.green, textAlign:'center', marginBottom:card.d?12:0}}>{card.a}</div>
            {card.d && <div style={{fontSize:14.5, color:C.text2, textAlign:'center', lineHeight:1.8}}>{card.d}</div>}
          </div>
        </div>
      </div>
      <Flex justify="center" align="center" gap={10} style={{marginTop:20}} wrap="wrap">
        <Button onClick={()=>go(-1)} disabled={idx===0}>◂ ก่อนหน้า</Button>
        {flip
          ? <Space>
              <Button danger onClick={()=>mark(false)}>✗ ยังไม่แม่น</Button>
              <Button type="primary" style={{background:C.green, borderColor:C.green}} onClick={()=>mark(true)}>✓ จำได้</Button>
            </Space>
          : <Button type="primary" style={{background:C.gold, borderColor:C.gold}} onClick={()=>setFlip(true)}>พลิกดูคำตอบ</Button>}
        <Button onClick={()=>go(1)} disabled={idx===pool.length-1}>ถัดไป ▸</Button>
      </Flex>
    </div>
  );
}

function Quiz() {
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const Qd = quizData[i];
  const choose = (k)=>{ if(picked!==null) return; setPicked(k); if(k===Qd.correct) setScore(s=>s+1); };
  const next = ()=>{ if(i+1>=quizData.length){ setDone(true); } else { setI(i+1); setPicked(null);} };
  const restart = ()=>{ setI(0); setPicked(null); setScore(0); setDone(false); };

  if(done) return (
    <Result status={score>=6?'success':'info'}
      title={`ได้ ${score} / ${quizData.length} คะแนน`}
      subTitle={score>=6?'เก่งมาก! พร้อมสอบระดับหนึ่งแล้ว 🎉':'ทบทวนแท็บบทเรียน & เดินเคสอีกรอบแล้วลองใหม่นะ 💪'}
      extra={<Button type="primary" style={{background:C.gold, borderColor:C.gold}} onClick={restart}>ทำใหม่อีกครั้ง</Button>}/>
  );
  return (
    <div>
      <Flex justify="space-between" align="center" style={{marginBottom:10}}>
        <Text style={{color:C.text3}}>ข้อ {i+1} / {quizData.length}</Text>
        <Tag color="gold">คะแนน {score}</Tag>
      </Flex>
      <Progress percent={Math.round((i)/quizData.length*100)} showInfo={false} strokeColor={C.green} trailColor={C.surface2} style={{marginBottom:16}}/>
      <div style={{fontSize:17, fontWeight:600, color:C.text, marginBottom:16, lineHeight:1.7}}>{Qd.q}</div>
      <Space direction="vertical" style={{width:'100%'}} size={10}>
        {Qd.opts.map((o,k)=>{
          let bg=C.white, bd=C.border, cc=C.text;
          if(picked!==null){
            if(k===Qd.correct){ bg=C.greenBg; bd=C.green; cc=C.green; }
            else if(k===picked){ bg=C.redBg; bd=C.red; cc=C.red; }
          }
          return (
            <div key={k} onClick={()=>choose(k)} className={picked===null?'hoverlift':''}
              style={{cursor:picked===null?'pointer':'default', background:bg, border:`1.5px solid ${bd}`, borderRadius:10, padding:'12px 16px', color:cc, fontSize:15, fontWeight:500, transition:'all .25s'}}>
              <span style={{fontWeight:700, marginRight:8}}>{'กขคง'[k]}.</span>{o}
              {picked!==null && k===Qd.correct && <span style={{float:'right'}}>✅</span>}
              {picked===k && k!==Qd.correct && <span style={{float:'right'}}>❌</span>}
            </div>
          );
        })}
      </Space>
      {picked!==null && (
        <div className="fade-up">
          <Box tone={picked===Qd.correct?'green':'red'} title={picked===Qd.correct?'ถูกต้อง!':'ยังไม่ใช่'} icon={picked===Qd.correct?'🎯':'📖'} style={{marginTop:14}}>
            {Qd.exp}
          </Box>
          <div style={{textAlign:'center', marginTop:12}}>
            <Button type="primary" size="large" style={{background:C.green, borderColor:C.green}} onClick={next}>
              {i+1>=quizData.length?'ดูผลคะแนน':'ข้อถัดไป ▸'}</Button>
          </div>
        </div>
      )}
    </div>
  );
}

          <div style={{color:'#FFF4E4', fontSize:14.5}}>ห้องเรียนอินเทอร์แอกทีฟ · เรียนจากศูนย์ถึงเขียนตอบข้อสอบได้ · สไตล์ Case Method</div>
        </div>
        <Layout.Content style={{padding:'22px 16px 10px'}}>
          <div style={{maxWidth:940, margin:'0 auto'}}>
            <Tabs activeKey={tab} onChange={setTab} items={items} centered type="card" size="large"/>

        <Layout.Footer style={{textAlign:'center', background:'transparent', color:C.text3, fontSize:13}}>
          จัดทำเพื่อการทบทวนของนักศึกษา · อ้างอิงประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 797–849 (และ ม.456, 659) · แนวคำตอบยึดตามแนวข้อสอบรามคำแหง
        </Layout.Footer>
      </Layout>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
