<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button,
        Row, Col, Divider, Alert, Statistic, Flex, Segmented, Radio, Progress,
        Collapse, Result, Tooltip, Badge, Empty } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState, useEffect, useRef, useMemo } = React;

/* ============ PALETTE — โทนพลัม-ไวโอเล็ตเชิงวิชาการ (ต่างจากต้นแบบสีทอง) ============ */
const C = {
  prim:'#8A6B87', primDark:'#6E4E6B', primLight:'#B7A0B4',
  plum:'#9A7195', plumDark:'#5C3F59',
  bg:'#F4F0F3', surface:'#ECE5EA', surface2:'#E4DAE1', surface3:'#F0E9EE',
  border:'#DCD0DA', borderDark:'#B7A0B4',
  text:'#372E3A', text2:'#554A57', text3:'#786C7A',
  white:'#FBF8FA',
  green:'#5D8A66', greenBg:'#EFF5F0',
  red:'#B85C5C', redBg:'#F5ECEA',
  gold:'#A8906C', goldBg:'#F5F1E8',
  blue:'#5B7A9E', blueBg:'#ECF0F5',
  cyan:'#5B8A8A', cyanBg:'#ECF2F2',
};

/* ============ SHARED HELPERS ============ */
const Stars = ({n}) => <span style={{color:C.gold, letterSpacing:1}}>{'★'.repeat(n)}<span style={{color:C.border}}>{'★'.repeat(3-n)}</span></span>;

const Sec = ({children}) => (
  <span className="sec-badge" style={{background:C.surface2, color:C.primDark, padding:'1px 8px', borderRadius:7, border:`1px solid ${C.border}`, whiteSpace:'nowrap'}}>ม.{children}</span>
);

const Pill = ({color, bg, children}) => (
  <span className="tag-chip" style={{background:bg, color:color, border:`1px solid ${color}33`}}>{children}</span>
);

const Box = ({tone='prim', title, icon, children, style}) => {
  const map = {
    green:[C.green,C.greenBg], red:[C.red,C.redBg], blue:[C.blue,C.blueBg],
    gold:[C.gold,C.goldBg], cyan:[C.cyan,C.cyanBg], prim:[C.primDark,C.surface3]
  };
  const [cc,bb] = map[tone]||map.prim;
  return (
    <div className="lesson-body" style={{background:bb, border:`1px solid ${cc}33`, borderLeft:`4px solid ${cc}`, borderRadius:12, padding:'13px 16px', margin:'10px 0', ...style}}>
      {title && <div style={{fontWeight:700, color:cc, marginBottom:6, fontSize:15}}>{icon} {title}</div>}
      <div style={{color:C.text2, fontSize:14.5}}>{children}</div>
    </div>
  );
};

/* ============ ANIMATED SVG DIAGRAM ENGINE ============ */
function DiaNode({x, y, w=150, h=62, title, sub, color, active, dim}) {
  return (
    <g className={active?'node-pulse':''} style={{opacity:dim?0.22:1, transition:'opacity .4s'}}>
      <rect x={x-w/2} y={y-h/2} width={w} height={h} rx={14}
        fill={active ? color : C.white}
        stroke={color} strokeWidth={active?3:2}
        style={{filter: active?`drop-shadow(0 4px 10px ${color}55)`:'none', transition:'all .4s'}} />
      <text x={x} y={sub? y-6 : y+5} textAnchor="middle"
        fontFamily="'Noto Sans Thai'" fontWeight="700" fontSize="15.5"
        fill={active ? C.white : color}>{title}</text>
      {sub && <text x={x} y={y+14} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="11"
        fill={active ? C.white : C.text3}>{sub}</text>}
    </g>
  );
}

function DiaEdge({id, d, color, label, labelX, labelY, dashed, animate, dur=2.6, reverse, width=3, dim}) {
  const op = dim ? 0.15 : 1;
  return (
    <g style={{opacity:op, transition:'opacity .4s'}}>
      <path id={id} d={d} fill="none" stroke={color} strokeWidth={width}
        strokeDasharray={dashed?'7 7':'none'} strokeLinecap="round"
        markerEnd={`url(#arrow-${id})`} />
      <defs>
        <marker id={`arrow-${id}`} markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L7,3 L0,6 Z" fill={color}/>
        </marker>
      </defs>
      {animate && !dim &&
        <circle r="6.5" fill={color}>
          <animateMotion dur={`${dur}s`} repeatCount="indefinite" keyPoints={reverse?'1;0':'0;1'} keyTimes="0;1" rotate="0">
            <mpath href={`#${id}`}/>
          </animateMotion>
        </circle>}
      {label &&
        <g>
          <rect x={labelX-label.length*4.1-8} y={labelY-13} width={label.length*8.2+16} height={22} rx={11}
            fill={C.white} stroke={color+'55'} />
          <text x={labelX} y={labelY+2} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5"
            fontWeight="600" fill={color}>{label}</text>
        </g>}
    </g>
  );
}

/* แผนที่ชะตากรรมของนิติกรรม — สมบูรณ์ / โมฆะ / โมฆียะ */
function FateMap() {
  const modes = {
    valid: {
      label:'สมบูรณ์', color:C.green,
      desc:'แสดงเจตนาครบ 5 องค์ประกอบตาม ม.149 ไม่มีเหตุบกพร่องใด ๆ → นิติกรรมสมบูรณ์ ก่อ เปลี่ยนแปลง โอน สงวน หรือระงับสิทธิได้ทันที บังคับกันได้ตามกฎหมาย'
    },
    void: {
      label:'โมฆะ', color:C.red,
      desc:'สะดุดด่าน ม.150 (วัตถุประสงค์ต้องห้าม/พ้นวิสัย/ขัดความสงบเรียบร้อย) หรือ ม.152 (ไม่ทำตามแบบ) หรือ ม.155 ว.1 (เจตนาลวง) → เสียเปล่าตั้งแต่ต้น ใครก็ยกขึ้นอ้างได้ ให้สัตยาบันไม่ได้ ทรัพย์ที่ส่งมอบกันไปต้องคืนตามหลักลาภมิควรได้ (ม.172)'
    },
    voidable: {
      label:'โมฆียะ', color:C.plumDark,
      desc:'สะดุดเหตุบกพร่องแห่งเจตนา — ผู้เยาว์ (ม.153+21) สำคัญผิด (ม.156, 157) กลฉ้อฉลถึงขนาด (ม.159) หรือข่มขู่ (ม.164) → นิติกรรมยัง "สมบูรณ์" อยู่ แต่รอชี้ชะตา 2 ทาง: บอกล้าง (ม.175) แล้วกลายเป็นโมฆะมาตั้งแต่แรก (ม.176) หรือให้สัตยาบันหลังเหตุบกพร่องหมดไป (ม.177) แล้วสมบูรณ์ถาวร'
    }
  };
  const [m, setM] = useState('valid');
  const M = modes[m];
  // node coords
  const N1 = {x:110, y:80}, N2 = {x:340, y:80}, N3 = {x:575, y:80};
  const NV = {x:190, y:290}, NB = {x:490, y:290};
  return (
    <div>
      <div style={{textAlign:'center', marginBottom:12}}>
        <Segmented value={m} onChange={setM} size="large"
          options={Object.keys(modes).map(k=>({label:modes[k].label, value:k}))} />
      </div>
      <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:16, padding:'8px 4px'}}>
        <svg viewBox="0 0 690 360" style={{width:'100%', height:'auto', maxHeight:410}}>
          {/* เจตนา -> นิติกรรม (เสมอ) */}
          <DiaEdge id="e12" d={`M ${N1.x+72} ${N1.y} L ${N2.x-78} ${N2.y}`} color={C.prim}
            label="ครบ 5 องค์ประกอบ ม.149" labelX={225} labelY={42} animate dur={2.6} />
          {/* นิติกรรม -> สิทธิ (โหมดสมบูรณ์) */}
          <DiaEdge id="e23" d={`M ${N2.x+78} ${N2.y} L ${N3.x-72} ${N3.y}`} color={C.green}
            label={m==='voidable'?'สัตยาบัน ม.177':'ผูกพันบังคับได้'} labelX={462} labelY={42} animate dur={2.2} width={4}
            dim={m==='void'} />
          {/* นิติกรรม -> โมฆะ */}
          <DiaEdge id="e2v" d={`M ${N2.x-40} ${N2.y+32} L ${NV.x+40} ${NV.y-34}`} color={C.red}
            label="ม.150 / 152 / 155 ว.1" labelX={210} labelY={188} animate dur={2.2} width={4}
            dim={m!=='void'} />
          {/* นิติกรรม -> โมฆียะ */}
          <DiaEdge id="e2b" d={`M ${N2.x+40} ${N2.y+32} L ${NB.x-40} ${NB.y-34}`} color={C.plumDark}
            label="ม.153 / 156 / 159 / 164" labelX={470} labelY={188} animate dur={2.2} width={4}
            dim={m!=='voidable'} />
          {/* โมฆียะ -> โมฆะ (บอกล้าง) */}
          <DiaEdge id="ebv" d={`M ${NB.x-88} ${NB.y} L ${NV.x+88} ${NV.y}`} color={C.red}
            label="บอกล้าง ม.175 → 176" labelX={340} labelY={318} dashed animate dur={2.6} width={3}
            dim={m!=='voidable'} />
          {/* โมฆียะ -> สมบูรณ์ (สัตยาบัน) */}
          {m==='voidable' &&
            <DiaEdge id="ebs" d={`M ${NB.x+40} ${NB.y-34} L ${N3.x} ${N3.y+34}`} color={C.green}
              label="สัตยาบัน ม.177" labelX={588} labelY={195} dashed animate dur={2.6} width={3} />}
          {/* โมฆะ -> คืนทรัพย์ */}
          {m==='void' &&
            <DiaEdge id="evr" d={`M ${NV.x-70} ${NV.y-10} Q 40 220 ${N1.x-30} ${N1.y+38}`} color={C.gold}
              label="คืนทรัพย์ ม.172 ลาภมิควรได้" labelX={118} labelY={195} dashed animate dur={3} width={3} />}

          <DiaNode {...N1} title="การแสดงเจตนา" sub="ชัดแจ้ง/ปริยาย/นิ่ง" color={C.prim} active />
          <DiaNode {...N2} title="นิติกรรม" sub="ม.149" color={m==='valid'?C.green:(m==='void'?C.red:C.plumDark)} active />
          <DiaNode {...N3} title="สิทธิเคลื่อนไหว" sub="ก่อ/เปลี่ยน/โอน/สงวน/ระงับ" color={C.green} active={m!=='void'} dim={m==='void'} />
          <DiaNode {...NV} title="โมฆะ" sub="เสียเปล่าตั้งแต่ต้น" color={C.red} active={m==='void'} dim={m==='valid'} />
          <DiaNode {...NB} title="โมฆียะ" sub="สมบูรณ์…แต่รอชี้ชะตา" color={C.plumDark} active={m==='voidable'} dim={m!=='voidable'} />
        </svg>
      </div>
      <Box tone={m==='valid'?'green':(m==='void'?'red':'prim')} title={`โหมด: ${M.label}`} icon="🎬" style={{marginTop:12}}>
        {M.desc}
      </Box>
    </div>
  );
}

/* แถบขั้นตอนแนวนอนแบบเคลื่อนไหว */
function FlowStrip({steps, color=C.prim}) {
  return (
    <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:14, padding:'16px 10px', overflowX:'auto'}}>
      <svg viewBox={`0 0 ${steps.length*180} 130`} style={{width:'100%', minWidth:steps.length*150, height:'auto'}}>
        {steps.map((s,i)=>{
          const x = 90 + i*180;
          return (
            <g key={i}>
              {i<steps.length-1 &&
                <DiaEdge id={`fs${color.slice(1)}${i}`} d={`M ${x+62} 55 L ${x+118} 55`} color={color} animate dur={1.8} width={2.5}/>}
              <circle cx={x} cy={55} r={34} fill={s.bg||C.surface3} stroke={color} strokeWidth={2.5} className="node-pulse"/>
              <text x={x} y={60} textAnchor="middle" fontSize="24">{s.icon}</text>
              <text x={x} y={112} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5" fontWeight="600" fill={C.text2}>
                {s.t}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ============ TAB 1: FOUNDATIONS (ปูพื้นฐาน) ============ */
function FoundationsTab() {
  const vocab = [
    ['นิติกรรม', 'Juristic Act', 'การกระทำโดยชอบด้วยกฎหมาย ด้วยใจสมัคร มุ่งผูกนิติสัมพันธ์ เพื่อก่อ/เปลี่ยน/โอน/สงวน/ระงับสิทธิ (ม.149)', C.prim],
    ['โมฆะ', 'Void', 'เสียเปล่าตั้งแต่ต้น (0%) ใครก็อ้างได้ ให้สัตยาบันไม่ได้ — คืนทรัพย์ตามลาภมิควรได้ ม.172', C.red],
    ['โมฆียะ', 'Voidable', 'สมบูรณ์อยู่จนกว่าจะถูกบอกล้าง (100% → 0%) — บอกล้าง ม.175 / สัตยาบัน ม.177', C.plumDark],
    ['คำเสนอ', 'Offer', 'ข้อความชัดเจนแน่นอน มุ่งหมายว่าถ้าสนองแล้วสัญญาเกิดทันที (ม.354-356)', C.blue],
    ['คำสนอง', 'Acceptance', 'การตอบรับที่ต้องตรงกับคำเสนอทุกประการ — ถ้ามีข้อแก้ไข = คำเสนอใหม่ (ม.359 ว.2)', C.cyan],
    ['มัดจำ', 'Earnest', 'ทรัพย์ที่ส่งมอบวันทำสัญญา เป็นพยานหลักฐาน+ประกันการปฏิบัติ (ม.377-378)', C.gold],
  ];
  return (
    <div className="fade-up">
      <Alert type="info" showIcon style={{marginBottom:18, background:C.blueBg, border:`1px solid ${C.blue}44`}}
        message={<span style={{fontWeight:700, color:C.blue, fontSize:16}}>เริ่มจากศูนย์ก็เข้าใจได้ 👋</span>}
        description={<span style={{color:C.text2}}>วิชานี้ตอบคำถามเดียวจากหลายมุม: <strong>"การกระทำนี้ผูกพันทางกฎหมายหรือไม่ และผูกพันแค่ไหน?"</strong> ทุกอย่างเริ่มจาก "การแสดงเจตนา" แล้วไหลผ่านด่านตรวจทีละด่าน — ครบองค์ประกอบไหม? มีเหตุโมฆะ/โมฆียะไหม? ถ้าเป็นสัญญา คำเสนอกับคำสนองตรงกันไหม? อ่านตามลำดับด้านล่างนะ</span>} />

      <Card style={{marginBottom:18, borderColor:C.border, background:C.surface3}} bodyStyle={{padding:'18px 20px'}}>
        <Title level={4} style={{marginTop:0, color:C.text}}>🍰 นึกภาพง่าย ๆ ด้วยชีวิตจริง</Title>
        <Paragraph style={{color:C.text2, fontSize:15}}>
          คุณเดินไปร้านเค้ก บอกแม่ค้าว่า "ขอชิ้นนี้ครับ" แม่ค้าตอบ "ได้ค่ะ 45 บาท" คุณยื่นเงิน —
          แค่นี้ก็เกิด <Pill color={C.prim} bg={C.surface3}>นิติกรรม</Pill> สองฝ่าย (สัญญาซื้อขาย) แล้ว
          เพราะมี <Pill color={C.blue} bg={C.blueBg}>คำเสนอ</Pill> + <Pill color={C.cyan} bg={C.cyanBg}>คำสนอง</Pill> ตรงกัน.
          แต่ถ้าคุณถูกจ่อมีดบังคับให้ซื้อ (ข่มขู่ ม.164) นิติกรรมจะกลายเป็น <Pill color={C.plumDark} bg={C.surface2}>โมฆียะ</Pill> —
          และถ้าสิ่งที่ตกลงกันคือ "จ้างไปทำร้ายคน" มันจะ <Pill color={C.red} bg={C.redBg}>โมฆะ</Pill> ตั้งแต่ต้นเลย (ม.150)
        </Paragraph>

function IracCard({c}) {
  const [step, setStep] = useState(0);
  const parts = [
    {k:'Issue', th:'ประเด็น (I)', color:C.blue, body:c.issue},
    {k:'Rule', th:'หลักกฎหมาย (R)', color:C.plumDark, body:<span>{c.rule.map(x=><span key={x} style={{marginRight:6}}><Sec>{x}</Sec></span>)}<div style={{marginTop:8}}>{c.ruleText}</div></span>},
    {k:'Application', th:'ปรับข้อเท็จจริง (A)', color:C.gold, body:c.application},
    {k:'Conclusion', th:'สรุป (C)', color:C.green, body:c.conclusion},
  ];
  return (
    <Card style={{marginBottom:18, borderColor:C.border}} bodyStyle={{padding:'18px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:10}}>
        <Tag color="volcano" style={{fontWeight:700}}>{c.tag}</Tag>
        <span style={{fontWeight:700, fontSize:16, color:C.text}}>{c.topic}</span>
        <Stars n={c.star}/>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3}}>
        <strong style={{color:C.primDark}}>ข้อเท็จจริง: </strong>{c.facts}
      </div>
      <div style={{margin:'14px 0 6px'}}>
        {parts.slice(0,step).map((p,i)=>(
          <div key={i} className="fade-up" style={{borderLeft:`4px solid ${p.color}`, background:p.color+'12', borderRadius:'0 10px 10px 0', padding:'11px 15px', marginBottom:10}}>
            <div style={{fontWeight:700, color:p.color, marginBottom:3}}>{p.th}</div>
            <div style={{color:C.text2, fontSize:14.3}}>{p.body}</div>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center', marginTop:6}}>
        {step<4
          ? <Button type="primary" size="large" onClick={()=>setStep(step+1)}
              style={{background:parts[step].color, borderColor:parts[step].color}}>
              เปิดขั้น {parts[step].th} ▸</Button>
          : <Space>
              <Tag color="green" style={{padding:'6px 14px', fontSize:14}}>✅ ครบ IRAC แล้ว</Tag>
              <Button onClick={()=>setStep(0)}>เริ่มใหม่</Button>
            </Space>}
      </div>
    </Card>
  );
}

function PredictCard({c}) {
  const [picked, setPicked] = useState(null); // null | true | false
  const toneColor = {green:C.green, red:C.red, blue:C.blue, prim:C.plumDark, cyan:C.cyan, gold:C.gold}[c.tone];
  const correct = picked===c.answer;
  return (
    <Card style={{marginBottom:16, borderColor:C.border}} bodyStyle={{padding:'16px 18px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:8}}>
        <span style={{fontSize:22}}>{c.icon}</span>
        <span style={{fontWeight:700, fontSize:15.5, color:C.text}}>{c.topic}</span>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'11px 14px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.2}}>
        {c.facts}
      </div>
      <div style={{display:'flex', alignItems:'center', gap:12, flexWrap:'wrap', marginTop:12}}>
        <span style={{fontWeight:700, color:C.primDark, fontSize:14.5}}>🔮 ทำนายก่อน: {c.question}</span>
        <Radio.Group value={picked} onChange={e=>setPicked(e.target.value)} optionType="button" buttonStyle="solid"
          options={[{label:'ใช่', value:true},{label:'ไม่', value:false}]} disabled={picked!==null} />
      </div>
      {picked!==null && (
        <div className="fade-up" style={{marginTop:12}}>
          <div style={{marginBottom:8}}>
            {correct
              ? <Tag color="green" style={{padding:'4px 12px', fontSize:14, fontWeight:700}}>🎯 ทำนายถูก! คำตอบคือ "{c.answer?'ใช่':'ไม่'}"</Tag>
              : <Tag color="red" style={{padding:'4px 12px', fontSize:14, fontWeight:700}}>📖 ยังไม่ใช่ — คำตอบคือ "{c.answer?'ใช่':'ไม่'}"</Tag>}
          </div>
          <div className="glow" style={{background:C.white, border:`2px solid ${toneColor}`, borderRadius:12, padding:'13px 16px'}}>
            <div style={{marginBottom:8}}>
              {c.secs.map(s=><span key={s} style={{display:'inline-block', margin:'2px 6px 2px 0', background:toneColor, color:C.white, padding:'2px 12px', borderRadius:8, fontWeight:700, fontFamily:"'Noto Serif Thai'"}}>มาตรา {s}</span>)}
            </div>
            <div style={{fontSize:12.5, color:C.text3, fontWeight:700, marginBottom:3}}>คำวินิจฉัย</div>
            <div style={{color:C.text2, fontSize:14.4, lineHeight:1.85}}>{c.ruling}</div>
            <div style={{marginTop:10, textAlign:'center'}}>
              <span style={{display:'inline-block', background:toneColor+'1a', color:toneColor, border:`1.5px dashed ${toneColor}`, borderRadius:30, padding:'6px 18px', fontWeight:700, fontSize:14.5}}>
                ⚖️ ผล: {c.who}</span>
            </div>
          </div>
          <div style={{textAlign:'right', marginTop:8}}>
            <Button size="small" onClick={()=>setPicked(null)}>ลองใหม่</Button>
          </div>
        </div>
      )}
    </Card>
  );
}

function Quiz() {
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const Qd = quizData[i];
  const choose = (k)=>{ if(picked!==null) return; setPicked(k); if(k===Qd.correct) setScore(s=>s+1); };
  const next = ()=>{ if(i+1>=quizData.length){ setDone(true); } else { setI(i+1); setPicked(null);} };
  const restart = ()=>{ setI(0); setPicked(null); setScore(0); setDone(false); };

  if(done) return (
    <Result status={score>=9?'success':'info'}
      title={`ได้ ${score} / ${quizData.length} คะแนน`}
      subTitle={score>=9?'ยอดเยี่ยม! พร้อมเข้าห้องสอบแล้ว 🎉':'กลับไปทวนแท็บบทเรียน & Case Lab แล้วลองใหม่นะ 💪'}
      extra={<Button type="primary" style={{background:C.prim, borderColor:C.prim}} onClick={restart}>ทำใหม่อีกครั้ง</Button>}/>
  );
  return (
    <div>
      <Flex justify="space-between" align="center" style={{marginBottom:10}}>
        <Text style={{color:C.text3}}>ข้อ {i+1} / {quizData.length}</Text>
        <Tag color="purple">คะแนน {score}</Tag>
      </Flex>
      <Progress percent={Math.round((i)/quizData.length*100)} showInfo={false} strokeColor={C.green} trailColor={C.surface2} style={{marginBottom:16}}/>
      <div style={{fontSize:17, fontWeight:600, color:C.text, marginBottom:16, lineHeight:1.7}}>{Qd.q}</div>
      <Space direction="vertical" style={{width:'100%'}} size={10}>
        {Qd.opts.map((o,k)=>{
          let bg=C.white, bd=C.border, cc=C.text;
          if(picked!==null){
            if(k===Qd.correct){ bg=C.greenBg; bd=C.green; cc=C.green; }
            else if(k===picked){ bg=C.redBg; bd=C.red; cc=C.red; }
          }
          return (
            <div key={k} onClick={()=>choose(k)} className={picked===null?'hoverlift':''}
              style={{cursor:picked===null?'pointer':'default', background:bg, border:`1.5px solid ${bd}`, borderRadius:10, padding:'12px 16px', color:cc, fontSize:15, fontWeight:500, transition:'all .25s'}}>
              <span style={{fontWeight:700, marginRight:8}}>{'กขคง'[k]}.</span>{o}
              {picked!==null && k===Qd.correct && <span style={{float:'right'}}>✅</span>}
              {picked===k && k!==Qd.correct && <span style={{float:'right'}}>❌</span>}
            </div>
          );
        })}
      </Space>
      {picked!==null && (
        <div className="fade-up">
          <Box tone={picked===Qd.correct?'green':'red'} title={picked===Qd.correct?'ถูกต้อง!':'ยังไม่ใช่'} icon={picked===Qd.correct?'🎯':'📖'} style={{marginTop:14}}>
            {Qd.exp}
          </Box>
          <div style={{textAlign:'center', marginTop:12}}>
            <Button type="primary" size="large" style={{background:C.green, borderColor:C.green}} onClick={next}>
              {i+1>=quizData.length?'ดูผลคะแนน':'ข้อถัดไป ▸'}</Button>
          </div>
        </div>
      )}
    </div>
  );
}

  {q:'นับระยะเวลาเป็นวัน/เดือน/ปี เริ่มนับวันไหน และสิ้นสุดวันไหน?', a:'ม.193/3 ว.2 ไม่นับวันแรก / ม.193/5 ว.2 สิ้นสุดวันก่อนหน้าวันตรงกัน', d:'เริ่ม 15 มี.ค. นับ 1 เดือน → สิ้นสุด 14 เม.ย. · วันสุดท้ายตรงวันหยุด → ขยายถึงวันทำการถัดไป (ม.193/7)', star:3, exam:true},
  {q:'หนี้ขาดอายุความแล้ว ลูกหนี้เผลอชำระไป เรียกคืนได้ไหม?', a:'ไม่ได้ (ม.193/35)', d:'แม้ไม่รู้ว่าขาดอายุความ — เพราะครบอายุความลูกหนี้ได้แค่สิทธิปฏิเสธ (ม.193/12) หนี้ไม่สูญสิ้น', star:3, exam:true},
];

function FlashcardTab() {
  const [mode, setMode] = useState('all');
  const pool = useMemo(()=>{
    let p = flashcards;
    if (mode==='exam') p = flashcards.filter(c=>c.exam);
    if (mode==='star3') p = flashcards.filter(c=>c.star===3);
    return p;
  },[mode]);
  const [order, setOrder] = useState(()=>flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flip, setFlip] = useState(false);
  const [score, setScore] = useState({c:0,w:0});

  useEffect(()=>{ setOrder(pool.map((_,i)=>i)); setIdx(0); setFlip(false); setScore({c:0,w:0}); },[mode]);

  const card = pool[order[idx]] || pool[0];
  const go = (dir)=>{ setFlip(false); setTimeout(()=>setIdx(i=>Math.max(0,Math.min(pool.length-1,i+dir))),120); };
  const shuffle = ()=>{ const o=[...Array(pool.length).keys()]; for(let i=o.length-1;i>0;i--){const j=Math.floor(((i*7+3)%(i+1)));[o[i],o[j]]=[o[j],o[i]];} setOrder(o); setIdx(0); setFlip(false); };
  const mark = (ok)=>{ setScore(s=>({c:s.c+(ok?1:0), w:s.w+(ok?0:1)})); go(1); };

  if(!card) return <Empty description="ไม่มีการ์ด"/>;
  return (
    <div className="fade-up">
      <Flex justify="space-between" align="center" wrap="wrap" gap={10} style={{marginBottom:14}}>
        <Segmented value={mode} onChange={setMode}
          options={[{label:`ทั้งหมด (${flashcards.length})`,value:'all'},{label:`ออกสอบ (${flashcards.filter(c=>c.exam).length})`,value:'exam'},{label:`★★★ (${flashcards.filter(c=>c.star===3).length})`,value:'star3'}]}/>
        <Space>
          <Tag color="green">ถูก {score.c}</Tag>
          <Tag color="red">ผิด {score.w}</Tag>
          <Button size="small" onClick={shuffle}>🔀 สุ่ม</Button>
        </Space>
      </Flex>
      <div style={{textAlign:'center', color:C.text3, marginBottom:8}}>การ์ด {idx+1} / {pool.length}</div>
      <Progress percent={Math.round((idx+1)/pool.length*100)} showInfo={false} strokeColor={C.prim} trailColor={C.surface2} style={{marginBottom:14}}/>
      <div className="fc-perspective" style={{maxWidth:640, margin:'0 auto', minHeight:290}}>
        <div className={'fc-card'+(flip?' flipped':'')} style={{minHeight:290}} onClick={()=>setFlip(f=>!f)}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.prim}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:290}}>
            <div style={{position:'absolute', top:14, left:16}}><Stars n={card.star}/></div>
            {card.exam && <Tag color="volcano" style={{position:'absolute', top:12, right:12}}>ข้อสอบ</Tag>}
            <div style={{fontSize:12.5, color:C.text3, marginBottom:10}}>❓ คำถาม (แตะเพื่อพลิก)</div>
            <div style={{fontSize:18.5, fontWeight:600, color:C.text, textAlign:'center', lineHeight:1.7}}>{card.q}</div>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.green}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:290}}>
            <div style={{fontSize:12.5, color:C.green, marginBottom:8, fontWeight:700}}>✅ คำตอบ</div>
            <div style={{fontSize:19.5, fontWeight:800, color:C.green, textAlign:'center', marginBottom:card.d?12:0}}>{card.a}</div>
            {card.d && <div style={{fontSize:14.5, color:C.text2, textAlign:'center', lineHeight:1.8}}>{card.d}</div>}
          </div>
        </div>
      </div>
      <Flex justify="center" align="center" gap={10} style={{marginTop:20}} wrap="wrap">
        <Button onClick={()=>go(-1)} disabled={idx===0}>◂ ก่อนหน้า</Button>
        {flip
          ? <Space>
              <Button danger onClick={()=>mark(false)}>✗ ยังไม่แม่น</Button>
              <Button type="primary" style={{background:C.green, borderColor:C.green}} onClick={()=>mark(true)}>✓ จำได้</Button>
            </Space>
          : <Button type="primary" style={{background:C.prim, borderColor:C.prim}} onClick={()=>setFlip(true)}>พลิกดูคำตอบ</Button>}
        <Button onClick={()=>go(1)} disabled={idx===pool.length-1}>ถัดไป ▸</Button>
      </Flex>
    </div>
  );
}

/* ============ APP SHELL ============ */

  const [tab, setTab] = useState('found');
  const items = [

      <Layout style={{minHeight:'100vh', background:C.bg}}>

          <div style={{color:C.white, fontSize:13, letterSpacing:3, opacity:.9}}>LAW 1103 · มหาวิทยาลัยรามคำแหง</div>
          <h1 style={{color:C.white, margin:'6px 0 4px', fontSize:30, fontWeight:800}}>นิติกรรมและสัญญา</h1>
          <div style={{color:'#F3E9F1', fontSize:14.5}}>ห้องเรียนอินเทอร์แอกทีฟ · เรียนจากศูนย์ถึงเขียนตอบข้อสอบได้ · สไตล์ Harvard</div>
        </div>
        <Layout.Content style={{padding:'22px 16px 10px'}}>
          <div style={{maxWidth:940, margin:'0 auto'}}>
            <Tabs activeKey={tab} onChange={setTab} items={items} centered type="card" size="large"/>
          </div>
        </Layout.Content>
        <Layout.Footer style={{textAlign:'center', background:'transparent', color:C.text3, fontSize:13}}>
          จัดทำเพื่อการทบทวนของนักศึกษา · อ้างอิงประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 149-193/35 และ 354-391 (ประกอบ ม.21, 29, 172, 406, 456) · แนวคำตอบยึดตามแนวข้อสอบรามคำแหง
        </Layout.Footer>
      </Layout>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
