<script type="text/babel" data-presets="env,react">
const { Tabs, Card, Collapse, Tag, Button, Row, Col, Progress, Alert, Steps, Drawer, FloatButton, Segmented, Slider, Switch, Radio, InputNumber, Statistic, Divider } = antd;
const { useState } = React;
const money = (x)=> x.toLocaleString('en-US',{maximumFractionDigits:2});

/* ============ TAB 1 : สรุปปูพื้น + เงินสด ============ */
function CashTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">1.1</span>Current Assets คืออะไร</h3>
      <p><b>สินทรัพย์หมุนเวียน</b> คือสินทรัพย์ที่เข้าเงื่อนไขข้อใดข้อหนึ่ง:</p>
      <table className="fin"><tbody>
        <tr><td>①</td><td>คาดว่าจะได้รับประโยชน์ภายใน<b>วงจรการดำเนินงานปกติ</b> (normal operating cycle)</td></tr>
        <tr><td>②</td><td>ถือไว้เพื่อ<b>ค้า</b> (trading) เป็นหลัก</td></tr>
        <tr><td>③</td><td>คาดว่าจะได้รับประโยชน์ภายใน <b>12 เดือน</b>หลังวันสิ้นรอบรายงาน</td></tr>
        <tr><td>④</td><td>เป็น<b>เงินสดหรือรายการเทียบเท่าเงินสด</b> (ที่ไม่ติดข้อจำกัดการใช้)</td></tr>
      </tbody></table>
      <div className="kbox">ตัวหลักในบทนี้ 3 ตัว: <Tag color="blue">เงินสด (Cash)</Tag><Tag color="green">ลูกหนี้ (Receivables)</Tag><Tag color="orange">สินค้าคงเหลือ (Inventory)</Tag> — เรียงตามสภาพคล่องจากมากไปน้อย</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.2</span>เงินสดและรายการเทียบเท่าเงินสด</h3>
      <Row gutter={[10,10]}>
        <Col xs={24} md={12}><Card size="small" title="💵 เงินสด (Cash)" style={{height:'100%',background:'#eef3fa'}}>
          สินทรัพย์ที่<b>สภาพคล่องสูงสุด</b> ได้แก่ เหรียญ ธนบัตร เช็ค ธนาณัติ (money order) เงินฝากธนาคารประเภทจ่ายคืนเมื่อทวงถาม (demand deposits)</Card></Col>
        <Col xs={24} md={12}><Card size="small" title="🏦 รายการเทียบเท่าเงินสด (Cash Equivalents)" style={{height:'100%',background:'#eef7ee'}}>
          เงินลงทุนระยะสั้นสภาพคล่องสูง แปลงเป็นเงินสดจำนวนแน่นอนได้ทันที ความเสี่ยงเปลี่ยนมูลค่าต่ำ — เกณฑ์ทั่วไป: <b>อายุครบกำหนดเดิมไม่เกิน 3 เดือน</b> เช่น ตั๋วเงินคลัง (treasury bills), commercial paper, กองทุนตลาดเงิน — ปกติแสดงรวมกับเงินสด</Card></Col>
      </Row>
      <div className="analogy">🧠 จำง่ายๆ: "3 เดือนแปลงเป็นเงินได้แน่ๆ = เทียบเท่าเงินสด" ฝากประจำ 12 เดือน ไม่ใช่!</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.3</span>งบพิสูจน์ยอดเงินฝากธนาคาร (Bank Reconciliation)</h3>
      <p>ยอดเงินสดตามบัญชีกิจการ (book) มักไม่ตรงกับยอดตาม statement ธนาคาร (bank) เพราะ<b>ความต่างของจังหวะเวลา</b>และ<b>ข้อผิดพลาด</b> จึงต้องพิสูจน์ยอดทั้งสองข้างให้มาบรรจบที่ "ยอดเงินสดที่ถูกต้อง" เดียวกัน</p>
      <Row gutter={[10,10]}>
        <Col xs={24} md={12}>
          <table className="fin">
            <thead><tr><th colSpan={2}>ฝั่งธนาคาร (Bank side)</th></tr></thead>
            <tbody>
              <tr><td>ยอดตาม bank statement</td><td className="num">XX</td></tr>
              <tr><td>+ เงินฝากระหว่างทาง (Deposit in transit)</td><td className="num">+</td></tr>
              <tr><td>− เช็คค้างจ่าย (Outstanding checks)</td><td className="num">−</td></tr>
              <tr><td>± ข้อผิดพลาดของธนาคาร</td><td className="num">±</td></tr>
              <tr className="total"><td>= ยอดเงินสดที่ถูกต้อง</td><td className="num">XX</td></tr>
            </tbody>
          </table>
        </Col>
        <Col xs={24} md={12}>
          <table className="fin">
            <thead><tr><th colSpan={2}>ฝั่งบัญชีกิจการ (Book side)</th></tr></thead>
            <tbody>
              <tr><td>ยอดตามบัญชีกิจการ</td><td className="num">XX</td></tr>
              <tr><td>+ ตั๋วเงินที่ธนาคารเรียกเก็บให้ (Notes collected)</td><td className="num">+</td></tr>
              <tr><td>− เช็คคืน NSF (เงินในบัญชีผู้จ่ายไม่พอ)</td><td className="num">−</td></tr>
              <tr><td>− ค่าธรรมเนียมธนาคาร (Service charges)</td><td className="num">−</td></tr>
              <tr><td>± ข้อผิดพลาดของกิจการ</td><td className="num">±</td></tr>
              <tr className="total"><td>= ยอดเงินสดที่ถูกต้อง (ต้องเท่ากัน!)</td><td className="num">XX</td></tr>
            </tbody>
          </table>
        </Col>
      </Row>
      <Collapse items={[
        {key:'1',label:'🔍 เข้าใจแต่ละรายการ — ทำไมต้องบวก/ลบข้างนั้น',children:<div>
          <p><b>Deposit in transit:</b> กิจการนำฝากปลายเดือนและบันทึกแล้ว แต่ธนาคารยังไม่ได้บันทึก (จะเข้าเดือนถัดไป) → ธนาคารยังไม่รู้ → บวกฝั่งธนาคาร</p>
          <p><b>Outstanding check:</b> กิจการเขียนเช็คจ่ายและบันทึกแล้ว แต่ผู้รับยังไม่นำไปขึ้นเงิน → ธนาคารยังไม่หัก → ลบฝั่งธนาคาร</p>
          <p><b>NSF check:</b> เช็คที่ลูกค้าจ่ายเรามา แต่เด้ง (เช่น เขียน $200 แต่บัญชีมี $175) — กิจการเคยบันทึกรับเงินไว้ ต้องเอาออก → ลบฝั่งบัญชีกิจการ</p>
          <p><b>Notes collected / ดอกเบี้ยรับ:</b> ธนาคารเก็บเงินให้เราแล้วแต่เรายังไม่รู้ → บวกฝั่งบัญชีกิจการ</p>
          <div className="kbox">💡 หลักจำ: <b>"ใครยังไม่รู้ ปรับฝั่งคนนั้น"</b> — รายการที่กิจการทำแต่ธนาคารยังไม่เห็น ปรับฝั่งธนาคาร | รายการที่ธนาคารทำแต่กิจการยังไม่รู้ ปรับฝั่งกิจการ และ<b>เฉพาะฝั่งกิจการเท่านั้นที่ต้องบันทึกบัญชีปรับปรุง</b> (เพราะสมุดเราผิด/ไม่ครบ)</div></div>},
      ]}/>
      <div className="kbox">🛡️ Use the bank = การควบคุมภายในที่ดีเรื่องเงินสด: ลดเงินสดในมือ สร้างบันทึกซ้ำสองทาง (กิจการ+ธนาคาร) และเปิดทางให้ทำ bank reconciliation ตรวจสอบกันได้</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.4</span>เงินสดรับ มาจากไหนได้บ้าง (จากสไลด์)</h3>
      <p>ขายสด | เก็บเงินจากลูกหนี้ | รับดอกเบี้ย ค่าเช่า เงินปันผล | เจ้าของลงทุน | กู้ธนาคาร | ขายสินทรัพย์ไม่หมุนเวียน — สังเกตว่าโยงกลับ 3 กิจกรรมของงบกระแสเงินสด (ดำเนินงาน/ลงทุน/จัดหาเงิน) ที่เรียนใน GA510</p>
    </div>
  </div>;
}

/* ============ TAB 2 : ลูกหนี้ ============ */
function ARTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">2.1</span>ลูกหนี้มี 3 ประเภท</h3>
      <table className="fin"><tbody>
        <tr><td><b>ลูกหนี้การค้า (Accounts Receivable)</b></td><td>เงินที่ลูกค้าค้างจากการขายสินค้า/บริการ — ไม่มีสัญญาเป็นลายลักษณ์อักษร ไม่มีดอกเบี้ย</td></tr>
        <tr><td><b>ตั๋วเงินรับ (Notes Receivable)</b></td><td>สิทธิเรียกร้องที่มี<b>ตราสารเครดิตอย่างเป็นทางการ</b> โอนเปลี่ยนมือได้ และมักมีดอกเบี้ย</td></tr>
        <tr><td><b>ลูกหนี้อื่น (Other Receivables)</b></td><td>ไม่ใช่จากการค้า เช่น ดอกเบี้ยค้างรับ เงินให้กู้กรรมการ เงินทดรองพนักงาน ภาษีรอขอคืน</td></tr>
      </tbody></table>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">2.2</span>บันทึกลูกหนี้ + เงื่อนไข 2/10, n/30 (ตัวอย่าง UTCC ขายให้ BKK)</h3>
      <div className="kbox">📖 อ่านรหัสก่อน: <b>2/10, n/30</b> = จ่ายภายใน 10 วัน ได้ส่วนลด 2% | ไม่ทันก็จ่ายเต็มภายใน 30 วัน | <b>FOB shipping point</b> = กรรมสิทธิ์โอนเมื่อของขึ้นรถ/เรือ (ผู้ซื้อรับความเสี่ยงระหว่างทาง)</div>
      <Steps direction="vertical" size="small" current={-1} items={[
        {title:'3 ธ.ค. ขายเชื่อ $500,000',description:'Dr ลูกหนี้การค้า 500,000 / Cr รายได้จากการขาย 500,000'},
        {title:'8 ธ.ค. ลดหนี้ให้ (allowance) $27,000',description:'Dr รับคืนและส่วนลดจ่าย (Sales Returns and Allowances) 27,000 / Cr ลูกหนี้การค้า 27,000 → ลูกหนี้เหลือ 473,000'},
        {title:'13 ธ.ค. รับชำระภายใน 10 วัน → ได้ส่วนลด 2%',description:'ส่วนลด = 473,000 × 2% = 9,460 | เงินสดรับ = 473,000 − 9,460 = 463,540 | Dr เงินสด 463,540 + Dr ส่วนลดจ่าย (Sales Discounts) 9,460 / Cr ลูกหนี้การค้า 473,000'},
      ]}/>
      <div className="warn">⚠️ กับดัก: ส่วนลด 2% คิดจากยอด<b>หลังหักลดหนี้</b> (473,000) ไม่ใช่ยอดขายเดิม 500,000 | ยอดขายสุทธิ = 500,000 − 27,000 − 9,460 = 463,540</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">2.3</span>หนี้สงสัยจะสูญ — Allowance Method</h3>
      <p>กิจการต้องแสดงลูกหนี้ด้วย<b>มูลค่าที่คาดว่าจะเก็บได้จริง (cash realizable value)</b> จึงต้องประมาณหนี้เสียล่วงหน้าตั้งแต่ปีที่ขาย:</p>
      <div className="je">Dr หนี้สงสัยจะสูญ (Bad Debt Expense) XX — เป็นค่าใช้จ่ายดำเนินงานในงบกำไรขาดทุน<br/>&nbsp;&nbsp;Cr ค่าเผื่อหนี้สงสัยจะสูญ (Allowance for Doubtful Accounts) XX — บัญชี<b>ปรับมูลค่า (contra)</b> หักจากลูกหนี้ในงบฐานะการเงิน</div>
      <Row gutter={[10,10]}>
        <Col xs={24} lg={12}><Card size="small" title="วิธี ① % ของยอดขายเชื่อ (มองงบกำไรขาดทุน)" style={{height:'100%'}}>
          <p>ประมาณจากยอดขายเชื่อปีนี้ → ค่าที่ได้คือ <b>ค่าใช้จ่ายทั้งก้อน</b> ไม่สนยอดค่าเผื่อเดิม</p>
          <p><b>ตัวอย่าง Lema:</b> ขายเชื่อสุทธิ 525,000 สถิติหนี้เสีย 2%</p>
          <div className="je">Bad Debt Expense = 2% × 525,000 = <b>10,500</b><br/>Dr หนี้สงสัยจะสูญ 10,500 / Cr ค่าเผื่อฯ 10,500</div>
          <p>มูลค่าที่คาดว่าจะเก็บได้ = 525,000 − 10,500 = <span className="hl">514,500</span></p></Card></Col>
        <Col xs={24} lg={12}><Card size="small" title="วิธี ② % ของยอดลูกหนี้ (มองงบฐานะการเงิน)" style={{height:'100%'}}>
          <p>ประมาณ<b>ยอดค่าเผื่อปลายงวดที่ควรมี</b> → ค่าใช้จ่าย = ยอดที่ควรมี − ยอดค่าเผื่อที่มีอยู่แล้ว</p>
          <p><b>ตัวอย่าง Weir:</b> ลูกหนี้ 475,000 สถิติ 4% ค่าเผื่อคงเหลือ (เครดิต) 4,500</p>
          <div className="je">ค่าเผื่อที่ควรมี = 4% × 475,000 = 19,000<br/>Bad Debt Expense = 19,000 − 4,500 = <b>14,500</b></div>
          <p>มูลค่าที่คาดว่าจะเก็บได้ = 475,000 − 19,000 = <span className="hl">456,000</span></p></Card></Col>
      </Row>
      <div className="warn">⚠️ จุดสอบยอดฮิต: วิธี % ยอดขายเชื่อ → คำตอบคือค่าใช้จ่ายตรงๆ | วิธี % ลูกหนี้ → ต้อง<b>หักยอดค่าเผื่อเดิม</b>ก่อน (ถ้าค่าเผื่อเดิมเป็นเดบิต ให้บวกเพิ่มแทน)</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">2.4</span>ขายลูกหนี้ (Factoring)</h3>
      <p>ทำไมขาย? ① ต้องการเงินสดทันที ② งานติดตามทวงหนี้เสียเวลาและแพง</p>
      <p><b>ตัวอย่างสไลด์:</b> ขายลูกหนี้ 80,000 ให้บริษัท factor แบบไม่รับประกัน — factor กัน 10% ไว้เผื่อปรับปรุง และคิดค่านายหน้า 15% ของยอดลูกหนี้:</p>
      <table className="fin"><tbody>

/* ============ TAB 5 : สูตร & แทนค่า ============ */
function FormulaTab(){
  const F = ({t,f,s})=> <div className="sec-card"><h3>{t}</h3><div className="je"><b>สูตร:</b> {f}</div><div className="kbox"><b>แทนค่า (จากตัวอย่างสไลด์):</b> {s}</div></div>;
  return <div>
    <F t="① ยอดเงินสดที่ถูกต้อง (ฝั่งธนาคาร)" f="ยอด bank statement + เงินฝากระหว่างทาง − เช็คค้างจ่าย ± ข้อผิดพลาดธนาคาร" s="ทั้งสองฝั่งต้องจบที่ตัวเลขเดียวกัน = Correct Cash Balance"/>
    <F t="② ยอดเงินสดที่ถูกต้อง (ฝั่งกิจการ)" f="ยอดตามบัญชี + ตั๋วที่ธนาคารเก็บให้ − เช็ค NSF − ค่าธรรมเนียม ± ข้อผิดพลาดกิจการ" s="เฉพาะรายการฝั่งนี้ที่ต้องบันทึกปรับปรุงบัญชี"/>
    <F t="③ ยอดขายสุทธิ" f="ขาย − รับคืนและลดหนี้ − ส่วนลดจ่าย" s="UTCC: 500,000 − 27,000 − 9,460 = 463,540 (ส่วนลด = 2% × 473,000)"/>
    <F t="④ หนี้สงสัยจะสูญ วิธี % ขายเชื่อ" f="ค่าใช้จ่าย = % × ยอดขายเชื่อสุทธิ (ไม่สนค่าเผื่อเดิม)" s="Lema: 2% × 525,000 = 10,500"/>
    <F t="⑤ หนี้สงสัยจะสูญ วิธี % ลูกหนี้" f="ค่าใช้จ่าย = (% × ลูกหนี้ปลายงวด) − ค่าเผื่อคงเหลือ (เครดิต)" s="Weir: (4% × 475,000) − 4,500 = 19,000 − 4,500 = 14,500"/>
    <F t="⑥ มูลค่าที่คาดว่าจะเก็บได้" f="ลูกหนี้ − ค่าเผื่อหนี้สงสัยจะสูญ" s="Weir: 475,000 − 19,000 = 456,000"/>
    <F t="⑦ ขายลูกหนี้ (Factoring)" f="เงินสด = ลูกหนี้ − เงินกัน % − ค่านายหน้า % | ขาดทุน = ค่านายหน้า" s="80,000 − (10%)8,000 − (15%)12,000 = 60,000 | ขาดทุน 12,000"/>
    <F t="⑧ ดอกเบี้ยตั๋วเงินรับ" f="เงินต้น × อัตรา/ปี × เวลา (เดือน/12 หรือ วัน/360)" s="15,000×10%×2/12=250 | 6,750×8%×20/360=30 | 4,000×9%×15/360=15 → รวม 295"/>
    <F t="⑨ ต้นทุนสินค้าที่มีไว้ขาย" f="สินค้าต้นงวด + ซื้อสุทธิ = COGS + สินค้าปลายงวด" s="UTCC: 1,000 + 990 + 720 = 2,710 → เช็คทุกวิธี cost flow ต้องรวมได้ 2,710"/>
    <F t="⑩ Weighted Average ต่อหน่วย" f="มูลค่าที่มีไว้ขาย ÷ จำนวนหน่วยที่มีไว้ขาย" s="2,710 ÷ 250 = 10.84 → COGS 160×10.84 = 1,734.40 | ปลายงวด 90×10.84 = 975.60"/>
    <F t="⑪ ส่วนลดซื้อ Net Method" f="บันทึกซื้อที่ราคา × (1 − % ส่วนลด) | พลาดส่วนลด → Purchase Discount Lost" s="500,000 × 98% = 490,000 | จ่ายช้า: Discount Lost 10,000"/>
    <F t="⑫ กำไรขั้นต้น" f="รายได้ขาย − COGS" s="FIFO: 3,520 − 1,660 = 1,860 | WA: 3,520 − 1,734.40 = 1,785.60"/>

function FlashTab(){
  const [order,setOrder] = useState(CARDS.map((_,i)=>i));
  const [flipped,setFlipped] = useState({});
  const [score,setScore] = useState({know:0,dunno:0});
  const shuffle=()=>{ setOrder([...order].sort(()=>Math.random()-.5)); setFlipped({}); setScore({know:0,dunno:0}); };
  return <div>
    <div style={{marginBottom:12,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <Button type="primary" style={{background:'#31556e'}} onClick={shuffle}>🔀 สับการ์ด</Button>
      <Tag color="green">รู้แล้ว {score.know}</Tag><Tag color="red">ยังไม่รู้ {score.dunno}</Tag>
      <Progress percent={Math.round((score.know+score.dunno)/CARDS.length*100)} size="small" style={{width:180}} strokeColor="#31556e"/>
      <span style={{fontSize:12.5,color:'#557'}}>แตะการ์ดเพื่อพลิกดูคำตอบ</span>
    </div>
    <Row gutter={[10,10]}>
      {order.map(i=><Col xs={24} sm={12} lg={8} key={i}>
        <div className={'flip-card'+(flipped[i]?' flipped':'')} onClick={()=>setFlipped({...flipped,[i]:!flipped[i]})}>
          <div className="flip-inner">
            <div className="flip-face flip-front">{CARDS[i].q}</div>
            <div className="flip-face flip-back"><div>{CARDS[i].a}
              <div style={{marginTop:8}} onClick={e=>e.stopPropagation()}>
                <Button size="small" style={{marginRight:6}} onClick={()=>setScore(s=>({...s,know:s.know+1}))}>✅ รู้แล้ว</Button>
                <Button size="small" danger onClick={()=>setScore(s=>({...s,dunno:s.dunno+1}))}>❌ ทวนอีก</Button>
              </div></div></div>
          </div>
        </div>
      </Col>)}
    </Row>
  </div>;
}

/* ============ INTERACTIVE LAB 1 : Cost Flow Visualizer ============ */
function CostFlowLab(){
  const layers=[
    {d:'1 พ.ค. ยกมา',u:100,c:10,color:'#6aa9d8'},
    {d:'11 พ.ค. ซื้อ',u:90,c:11,color:'#7bc47f'},
    {d:'25 พ.ค. ซื้อ',u:60,c:12,color:'#e0a458'},
  ];
  const totalU=250, totalC=2710, price=22;
  const [sold,setSold]=useState(160);
  const [method,setMethod]=useState('FIFO');
  // FIFO peel from oldest (bottom) layer
  let rem=sold, fifoCOGS=0; const consumed=[];
  for(const L of layers){ const take=Math.max(0,Math.min(rem,L.u)); fifoCOGS+=take*L.c; consumed.push(take); rem-=take; }
  const wa=totalC/totalU;                    // 10.84
  const waCOGS=sold*wa;
  const cogs = method==='FIFO'? fifoCOGS : waCOGS;
  const ending = totalC - cogs;
  const revenue = sold*price;
  const gp = revenue - cogs;
  // geometry
  const H=250, y0=270, scale=H/totalU;
  let acc=0; const rects=layers.map(L=>{ const yb=y0-acc*scale; const h=L.u*scale; acc+=L.u; return {...L,y:yb-h,h,ytop:yb-h,ybot:yb}; });
  const yCut = y0 - sold*scale;
  return <div>
    <div style={{marginBottom:10}}>
      <Radio.Group value={method} onChange={e=>setMethod(e.target.value)} optionType="button" buttonStyle="solid"
        options={[{label:'FIFO (เข้าก่อนออกก่อน)',value:'FIFO'},{label:'ถัวเฉลี่ย (Weighted Avg)',value:'WA'}]}/>
    </div>
    <div style={{fontSize:13.5,marginBottom:6}}>ลากปรับ <b>จำนวนที่ขาย</b> (หน่วย): <b style={{color:'#31556e'}}>{sold}</b> จาก {totalU}</div>
    <Slider min={0} max={250} value={sold} onChange={setSold} tooltip={{formatter:v=>v+' หน่วย'}}/>
    <div style={{display:'flex',gap:6,flexWrap:'wrap',margin:'2px 0 12px'}}>
      {[100,160,190,250].map(v=><Button key={v} size="small" onClick={()=>setSold(v)}>{v}</Button>)}
    </div>
    <Row gutter={[12,12]}>
      <Col xs={24} md={11}>
        <svg viewBox="0 0 300 300" style={{width:'100%',background:'#fbfaf5',borderRadius:10,border:'1px solid #e3d9c2'}}>
          <defs><pattern id="hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
            <rect width="6" height="6" fill="#31556e" opacity="0.10"/><line x1="0" y1="0" x2="0" y2="6" stroke="#31556e" strokeWidth="2" opacity="0.35"/></pattern></defs>
          {rects.map((r,i)=><g key={i}>
            <rect x="70" y={r.ytop} width="150" height={r.h} fill={r.color} opacity={method==='WA'?0.55:0.9} stroke="#fff"/>
            <text x="145" y={r.ytop+r.h/2+4} textAnchor="middle" fontSize="12" fill="#20303c">{r.u} @ ${r.c}</text>
            <text x="64" y={r.ytop+r.h/2+4} textAnchor="end" fontSize="10.5" fill="#6a6250">{r.d}</text>
          </g>)}
          {/* COGS overlay (bottom sold units) */}
          <rect x="70" y={yCut} width="150" height={y0-yCut} fill="url(#hatch)"/>
          <line x1="60" y1={yCut} x2="230" y2={yCut} stroke="#a8071a" strokeWidth="2" strokeDasharray="5 3"/>
          <text x="225" y={yCut-4} textAnchor="end" fontSize="10.5" fill="#a8071a">เส้นแบ่งที่ขาย</text>
          <text x="145" y={(yCut+y0)/2} textAnchor="middle" fontSize="11.5" fill="#a8071a" fontWeight="700">COGS ({sold} หน่วย)</text>
          {yCut>26 && <text x="145" y={(20+yCut)/2} textAnchor="middle" fontSize="11.5" fill="#237804" fontWeight="700">ปลายงวด ({totalU-sold})</text>}
        </svg>
      </Col>
      <Col xs={24} md={13}>
        <Row gutter={[8,8]}>
          <Col span={12}><Card size="small"><Statistic title="ต้นทุนขาย (COGS)" value={money(cogs)} prefix="$" valueStyle={{color:'#a8071a',fontSize:18}}/></Card></Col>
          <Col span={12}><Card size="small"><Statistic title="สินค้าปลายงวด" value={money(ending)} prefix="$" valueStyle={{color:'#237804',fontSize:18}}/></Card></Col>
          <Col span={12}><Card size="small"><Statistic title="รายได้ขาย" value={money(revenue)} prefix="$" valueStyle={{fontSize:18}}/></Card></Col>
          <Col span={12}><Card size="small"><Statistic title="กำไรขั้นต้น" value={money(gp)} prefix="$" valueStyle={{color:'#31556e',fontSize:18}}/></Card></Col>
        </Row>
        <div className="kbox" style={{marginTop:10,fontSize:13}}>
          {method==='FIFO'
            ? <span>FIFO ปอกจากล็อตเก่าสุดก่อน: {consumed.map((t,i)=>t>0?`${t}×$${layers[i].c}`:null).filter(Boolean).join(' + ')} = <b>${money(fifoCOGS)}</b></span>
            : <span>ถัวเฉลี่ย: ต้นทุนต่อหน่วย = $2,710 ÷ 250 = <b>${money(wa)}</b> → COGS = {sold} × ${money(wa)} = <b>${money(waCOGS)}</b></span>}
        </div>
        <div className={Math.abs(cogs+ending-totalC)<0.01?'analogy':'warn'} style={{fontSize:13}}>
          ✅ เช็ค: COGS + ปลายงวด = ${money(cogs)} + ${money(ending)} = <b>${money(cogs+ending)}</b> (ต้อง = $2,710 เสมอ)
        </div>
        <div className="kbox" style={{fontSize:12.5}}>เทียบ ณ ขาย {sold} หน่วย: FIFO COGS ${money(fifoCOGS)} vs ถัวเฉลี่ย ${money(waCOGS)} — {fifoCOGS<waCOGS?'FIFO ให้กำไรสูงกว่า (ราคาขาขึ้น)':'ใกล้เคียงกัน'}</div>
      </Col>
    </Row>
  </div>;
}

}

/* ============ INTERACTIVE LAB 3 : Bad Debt ============ */
function BadDebtLab(){
  const [method,setMethod]=useState('sales');
  const [creditSales,setCreditSales]=useState(525000);
  const [rateS,setRateS]=useState(2);
  const [recv,setRecv]=useState(475000);
  const [rateR,setRateR]=useState(4);
  const [allow,setAllow]=useState(4500);
  const [allowSide,setAllowSide]=useState('credit');
  let expense, target, crv, detail;
  if(method==='sales'){
    expense = creditSales*rateS/100;
    detail = `${rateS}% × ${money(creditSales)} = ${money(expense)} (บันทึกเป็นค่าใช้จ่ายทั้งก้อน ไม่สนค่าเผื่อเดิม)`;
    crv = null;
  } else {
    target = recv*rateR/100;
    expense = allowSide==='credit'? target-allow : target+allow;
    crv = recv-target;
    detail = allowSide==='credit'
      ? `เป้าหมายค่าเผื่อ = ${rateR}% × ${money(recv)} = ${money(target)} แล้วหักค่าเผื่อเดิม (เครดิต) ${money(allow)} → ${money(expense)}`
      : `เป้าหมายค่าเผื่อ = ${money(target)} บวกค่าเผื่อเดิม (เดบิต) ${money(allow)} → ${money(expense)}`;
  }
  return <div>
    <Radio.Group value={method} onChange={e=>setMethod(e.target.value)} optionType="button" buttonStyle="solid" style={{marginBottom:12}}
      options={[{label:'① % ของยอดขายเชื่อ',value:'sales'},{label:'② % ของลูกหนี้',value:'recv'}]}/>
    {method==='sales'
      ? <Row gutter={[10,10]}>
          <Col span={12}><div style={{fontSize:13}}>ยอดขายเชื่อสุทธิ</div><InputNumber style={{width:'100%'}} value={creditSales} step={5000} min={0} onChange={v=>setCreditSales(v||0)} formatter={v=>`$ ${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>
          <Col span={12}><div style={{fontSize:13}}>อัตราหนี้เสีย (%)</div><InputNumber style={{width:'100%'}} value={rateS} step={0.5} min={0} onChange={v=>setRateS(v||0)}/></Col>
        </Row>
      : <Row gutter={[10,10]}>
          <Col xs={12} md={6}><div style={{fontSize:13}}>ลูกหนี้ปลายงวด</div><InputNumber style={{width:'100%'}} value={recv} step={5000} min={0} onChange={v=>setRecv(v||0)} formatter={v=>`$ ${v}`.replace(/\B(?=(\d{3})+(?!\d))/g,',')}/></Col>
          <Col xs={12} md={6}><div style={{fontSize:13}}>อัตรา (%)</div><InputNumber style={{width:'100%'}} value={rateR} step={0.5} min={0} onChange={v=>setRateR(v||0)}/></Col>
          <Col xs={12} md={6}><div style={{fontSize:13}}>ค่าเผื่อคงเหลือเดิม</div><InputNumber style={{width:'100%'}} value={allow} step={500} min={0} onChange={v=>setAllow(v||0)}/></Col>
          <Col xs={12} md={6}><div style={{fontSize:13}}>ยอดเดิมเป็น</div><Radio.Group size="small" value={allowSide} onChange={e=>setAllowSide(e.target.value)} options={[{label:'เครดิต',value:'credit'},{label:'เดบิต',value:'debit'}]}/></Col>
        </Row>}
    <Row gutter={[8,8]} style={{marginTop:12}}>
      <Col xs={24} md={crv!=null?8:24}><Card size="small"><Statistic title="หนี้สงสัยจะสูญ (Bad Debt Expense)" value={money(expense)} prefix="$" valueStyle={{color:'#a8071a',fontSize:20}}/></Card></Col>
      {crv!=null && <Col xs={12} md={8}><Card size="small"><Statistic title="ค่าเผื่อฯ ปลายงวด" value={money(target)} prefix="$" valueStyle={{fontSize:20}}/></Card></Col>}
      {crv!=null && <Col xs={12} md={8}><Card size="small"><Statistic title="มูลค่าที่คาดว่าจะเก็บได้" value={money(crv)} prefix="$" valueStyle={{color:'#237804',fontSize:20}}/></Card></Col>}
    </Row>
    <div className="je" style={{marginTop:10}}>Dr หนี้สงสัยจะสูญ {money(expense)} / Cr ค่าเผื่อหนี้สงสัยจะสูญ {money(expense)}</div>
    <div className="kbox" style={{fontSize:13}}>{detail}</div>
    <div className="warn" style={{fontSize:12.5}}>ลองสลับสองวิธีด้วยตัวเลขชุดเดียวกัน จะเห็นว่า "% ขายเชื่อ" ได้ค่าใช้จ่ายตรงๆ ส่วน "% ลูกหนี้" ต้องหักค่าเผื่อเดิมก่อน — นี่คือจุดที่ข้อสอบชอบหลอก</div>
  </div>;
}

/* ============ TAB 8 : เฉลยแบบทดสอบ 15 ข้อ ============ */

        <tr><td>− เช็คค้างจ่าย (ยังไม่มีใครนำไปขึ้นเงิน)</td><td className="neg">(5,200)</td></tr>

    </Q>

    <Q no="2" q="Wellington — ยอดค่าเผื่อหนี้สงสัยจะสูญหลังปรับปรุง (วิธี % ของยอดขายเชื่อ)?" ans="€122,000">
      <p><b>หลักการ (แท็บ 2.3 วิธี ①):</b> % ของยอดขายเชื่อ → ตัวเลขที่ได้คือ "ค่าใช้จ่าย" ทั้งก้อน ไม่สนค่าเผื่อเดิม แต่<b>ยอดคงเหลือปลายปี</b>ต้องรวมค่าเผื่อเดิมด้วย</p>
      <div className="je">Bad Debt Expense = 1% × 12,800,000 = 128,000<br/>ค่าเผื่อเดิมเป็น<b>เดบิต</b> 6,000 → ยอดปลายปี = 128,000 − 6,000 = <b>122,000 เครดิต</b></div>
      <div className="warn">⚠️ ตัวหลอก: 134,000 = คนบวก 6,000 (ลืมว่าเดบิตต้องหักล้างกับเครดิต) | 25,400 = คนคิด 1% ของลูกหนี้ 2.54M (ผิดวิธี)</div>
    </Q>

    <Q no="3" q="Vivian — มูลค่าที่คาดว่าจะเก็บได้ (cash realizable value)?" ans="€122,500">
      <p><b>หลักการ (แท็บ 2.3 วิธี ②):</b> % ของลูกหนี้ → ได้ "ยอดค่าเผื่อเป้าหมาย" และ CRV = ลูกหนี้ − ค่าเผื่อเป้าหมาย</p>
      <div className="je">ค่าเผื่อที่ควรมี = 2% × 125,000 = 2,500 → CRV = 125,000 − 2,500 = <b>122,500</b></div>
      <div className="kbox">💡 ค่าเผื่อเดิมเดบิต 1,200 กระทบเฉพาะ "ค่าใช้จ่าย" (2,500 + 1,200 = 3,700) ไม่กระทบ CRV เพราะยอดค่าเผื่อปลายงวดต้องจบที่ 2,500 อยู่ดี | ยอดขาย 700,000 เป็นตัวหลอก ไม่ได้ใช้</div>
    </Q>

    <Q no="4" q="ยอดเงินสดที่ถูกต้อง (เริ่มจากยอดตามบัญชี 45,000)?" ans="$45,548">
      <p><b>หลักการ:</b> โจทย์เริ่มจากยอด book → ปรับเฉพาะสิ่งที่<b>กิจการยังไม่รู้/บันทึกผิด</b> ส่วนเงินฝากระหว่างทาง 2,300 เป็นเรื่องฝั่งธนาคาร ไม่เกี่ยว</p>
      <table className="fin"><tbody>
        <tr><td>ยอดตามบัญชีกิจการ</td><td className="num">45,000</td></tr>
        <tr><td>+ ธนาคารเก็บเงินให้ (collection)</td><td className="num">940</td></tr>
        <tr><td>− เช็ค NSF</td><td className="neg">(320)</td></tr>
        <tr><td>− แก้เช็ครับ: บันทึก 540 ของจริง 450 (รับเกินไว้ 90)</td><td className="neg">(90)</td></tr>
        <tr><td>+ แก้เช็คจ่าย: บันทึก 97 ของจริง 79 (จ่ายเกินไว้ 18)</td><td className="num">18</td></tr>
        <tr className="total"><td>ยอดเงินสดที่ถูกต้อง</td><td className="num">45,548</td></tr>
      </tbody></table>
    </Q>

    <Q no="5" q="ของระหว่างทางแบบ FOB shipping point อยู่ใน inventory ของใคร?" ans="ผู้ซื้อ (included in the inventory of the buyer)">
      <p><b>หลักการ (แท็บ 3.3):</b> FOB shipping point = กรรมสิทธิ์โอนทันทีที่ของขึ้นยานพาหนะ → ระหว่างทางเป็นของผู้ซื้อแล้ว (เคส UTCC-ภูเก็ตในสไลด์)</p>
    </Q>

    <Q no="6" q="ข้อใดเป็น product cost ของสินค้าคงเหลือ?" ans="Raw materials (วัตถุดิบ)">
      <p><b>หลักการ (แท็บ 3.4):</b> Product cost = ต้นทุนที่ทำให้ได้สินค้ามาพร้อมขาย | Selling costs = period cost | Interest = ต้นทุนการเงิน | ของเสียเกินปกติ = ค่าใช้จ่ายงวด ไม่เข้าสินค้า</p>
    </Q>

    <Q no="7" q="Elkins (perpetual) จ่ายเงิน 9 มี.ค. ควรเครดิตอะไร?" ans="Inventory $180">
      <p><b>วิธีคิด:</b> ค้างจ่าย = 10,000 − ส่งคืน 1,000 = 9,000 | จ่ายใน 10 วัน → ส่วนลด 2% × 9,000 = 180</p>
      <div className="je">Dr เจ้าหนี้ 9,000 / Cr เงินสด 8,820 + Cr <b>สินค้าคงเหลือ 180</b></div>
      <div className="warn">⚠️ จุดชี้ขาด: ระบบ <b>perpetual</b> ส่วนลดซื้อลดเข้า "Inventory" โดยตรง (แท็บ 3.2/3.5 — สไลด์เขียน "Purchase Discounts / Inventory") | "Purchase discounts" ใช้กับ periodic | ฐานคิดคือ 9,000 หลังหักของคืน (ตัวหลอก $200 มาจากลืมหักของคืน)</div>
    </Q>

    <Q no="8" q="June Corp. — COGS วิธี FIFO?" ans="$900">
      <div className="je">ทุกล็อตต้นทุน $20 เท่ากันหมด → COGS = 45 × 20 = <b>900</b></div>
      <div className="kbox">💡 ราคาขาย $43 คือตัวหลอก (45 × 43 = 1,935 โผล่เป็นตัวเลือกท้ายพอดี) — COGS ใช้ต้นทุน ไม่ใช่ราคาขาย</div>
    </Q>

    <Q no="9" q="Chess Top (periodic, average) — สินค้าปลายงวด?" ans="$10,131">
      <table className="fin"><tbody>
        <tr><td>มีไว้ขาย: 200×65 + 300×68 + 150×70</td><td className="num">43,900 (650 หน่วย)</td></tr>
        <tr><td>ถัวเฉลี่ย = 43,900 ÷ 650</td><td className="num">67.5385 /หน่วย</td></tr>
        <tr><td>ปลายงวด = (650 − 500) × 67.5385</td><td className="num">10,130.77 ≈ 10,131</td></tr>
      </tbody></table>
      <div className="kbox">✅ เช็คแบบแท็บ 4: COGS 33,769 + ปลายงวด 10,131 = 43,900 พอดี | ตัวหลอก 33,770 คือ COGS ไม่ใช่ปลายงวด</div>
    </Q>

    <Q no="10" q="Cash equivalents = อายุเดิมไม่เกิน 6 เดือน?" ans="False">
      <p><b>หลักการ (แท็บ 1.2):</b> เกณฑ์คือ <b>3 เดือนหรือน้อยกว่า</b> (original maturities of three months or less)</p>
    </Q>

    <Q no="11" q="ตั้งค่าเผื่อ 10% ของลูกหนี้ — จำนวนที่ปรับปรุง?" ans="€3,540">
      <p><b>หลักการ (แท็บ 2.3 วิธี ② แบบเดียวกับ Weir):</b> ได้ยอดเป้าหมายแล้วต้องหักค่าเผื่อเดิมฝั่งเครดิต</p>
      <div className="je">เป้าหมาย = 10% × 43,000 = 4,300 → ปรับปรุง = 4,300 − 760 = <b>3,540</b></div>
      <div className="warn">⚠️ ตัวหลอก: 4,300 = ลืมหักค่าเผื่อเดิม | 5,060 = บวกแทนหัก | Sales 425,000 / returns 14,000 ไม่ได้ใช้เลย (โจทย์ให้ใช้ % ของลูกหนี้)</div>
    </Q>

    <Q no="12" q="Lawson — inventories ในงบฐานะการเงิน?" ans="$178,000">
      <p><b>หลักการ (แท็บ 3.1):</b> กิจการผลิตมี inventory 3 บัญชี: วัตถุดิบ + งานระหว่างทำ + สำเร็จรูป</p>
      <div className="je">27,000 + 59,000 + 92,000 = <b>178,000</b></div>
      <div className="kbox">💡 Supplies 4,000 กับ Prepaid insurance 6,000 เป็นสินทรัพย์หมุนเวียนตัวอื่น ไม่ใช่ inventories (รวมหมดจะได้ 182,000 ติดกับดัก)</div>
    </Q>

    <Q no="13" q="ค่าขนส่ง $24,000 ที่ผู้ขายจ่ายตอนขายของ ปฏิบัติอย่างไร?" ans="ผู้ขายลงเป็น operating expenses ในงบกำไรขาดทุน">
      <p><b>หลักการ (แท็บ 3.4):</b> ค่าขนส่ง<b>ออก</b> (freight-out) เกิดจากการ<b>ขาย</b> = selling expense = period cost | เฉพาะ freight-<b>in</b> (ขนของเข้าตอนซื้อ) เท่านั้นที่เป็น product cost รวมเข้าสินค้า | ผู้ซื้อ (Sandcastles) ไม่เกี่ยวกับเงินก้อนนี้</p>
    </Q>

    <Q no="14" q="ของระหว่างทางที่เพิ่งซื้อแบบ FOB destination แสดงที่ไหนในงบผู้ซื้อ?" ans="ไม่แสดงในงบ (Not on the statement of financial position)">
      <p><b>หลักการ (แท็บ 3.3):</b> FOB destination = กรรมสิทธิ์ยังอยู่กับ<b>ผู้ขาย</b>จนของถึงมือ → ผู้ซื้อยังไม่มีทั้งสินค้าและเจ้าหนี้ ยังไม่บันทึกอะไรเลย</p>
    </Q>

    <Q no="15" q="เงินฝากออมทรัพย์จัดเป็นเงินสดในงบฐานะการเงิน?" ans="True">
      <p><b>หลักการ (แท็บ 1.2):</b> เงินสดรวมเงินฝากธนาคารที่เบิกใช้ได้ทันที — ออมทรัพย์ถอนได้เมื่อต้องการ จึงจัดเป็นเงินสด (ต่างจากฝากประจำที่ติดเงื่อนไขเวลา)</p>
    </Q>

    <div className="sec-card">

/* ============ FLOATING TOGGLE TOOL ============ */
function FloatingLab(){
  const [open,setOpen]=useState(false);
  const [seg,setSeg]=useState('cost');
  const w = typeof window!=='undefined'? Math.min(560, window.innerWidth-16) : 560;
  return <>
    <FloatButton type="primary" onClick={()=>setOpen(true)} description="ทดลอง" shape="square"
      style={{right:24,bottom:24,width:58,height:58}} icon={<span style={{fontSize:20}}>🧪</span>}/>
    <Drawer open={open} onClose={()=>setOpen(false)} width={w} title="🧪 ห้องทดลองแบบโต้ตอบ — ลากปรับค่าแล้วดูภาพอัปเดตสด"
      styles={{body:{paddingTop:12}}}>
      <Segmented block value={seg} onChange={setSeg} style={{marginBottom:14}}
        options={[{label:'📦 Cost Flow',value:'cost'},{label:'🏦 Bank Rec',value:'bank'},{label:'🎯 หนี้สงสัยจะสูญ',value:'bad'}]}/>
      {seg==='cost' && <CostFlowLab/>}
      {seg==='bank' && <BankRecLab/>}
      {seg==='bad' && <BadDebtLab/>}
    </Drawer>
  </>;
}
