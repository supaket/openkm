<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA511 — ตรวจสอบรายได้และค่าใช้จ่าย (Revenue & Expense)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/antd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/reset.min.css">

  table.fin td { padding:6px 8px; border:1px solid #ecd9df; vertical-align:top; }
  table.fin tr.total td { background:#f5e6ea; font-weight:700; }
  table.fin tr.head td { background:#f7ecf0; font-weight:600; }
  .hl { background:#fff3bf; padding:0 4px; border-radius:4px; font-weight:600; }
  .kbox { background:#f5e6ea; border-left:4px solid #9b3b57; border-radius:8px; padding:10px 14px; margin:10px 0; font-size:14px; }

  .warn { background:#fdf1f0; border-left:4px solid #c0564a; border-radius:8px; padding:10px 14px; margin:10px 0; font-size:14px; }

  .flip-front { background:#fffdf9; border:2px solid #d9a9b8; color:#6e2439; font-weight:600; font-size:14.5px; }
  .flip-back { background:#9b3b57; color:#fdeef2; transform:rotateY(180deg); font-size:12.5px; line-height:1.5; overflow:auto; }
  .qcard { border-radius:12px; padding:14px 16px; color:#fff; margin-bottom:10px; }
  .qcard h4 { color:#fff; margin:0 0 6px; font-size:15.5px; }
  .qcard div { font-size:13.5px; line-height:1.6; }
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { Tabs, Card, Collapse, Tag, Button, Row, Col, Progress, Alert, Steps, Drawer, FloatButton, Segmented, Radio } = antd;
const { useState } = React;

/* ============ TAB 1 : overview + assertion ============ */
function OverviewTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">1.1</span>บัญชีที่เกี่ยวข้อง</h3>
      <Row gutter={[8,8]}>
        {[['รายได้','รายได้จากการขาย/บริการ · รายได้อื่น · ดอกเบี้ยรับ · เงินปันผลรับ'],['ค่าใช้จ่าย','ต้นทุนขาย/บริการ · ค่าใช้จ่ายในการขาย · ค่าใช้จ่ายในการบริหาร · ค่าใช้จ่ายทางการเงิน · ภาษีจ่าย']].map((r,i)=>
          <Col xs={24} md={12} key={i}><Card size="small" title={r[0]} style={{height:'100%',background:'#f7ecf0'}}>{r[1]}</Card></Col>)}
      </Row>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.2</span>Assertion ที่เน้น — จำให้แม่น!</h3>
      <div className="warn">🔥 <b>รายได้เป็นพื้นที่เสี่ยงสูง</b> — เสี่ยงทั้ง<b>ทุจริต</b>และ<b>การบันทึกผิดงวด</b> (wrong-period recognition)</div>
      <Row gutter={[10,10]}>
        <Col xs={24} md={12}><Card size="small" title="💰 รายได้ → Occurrence (เกิดขึ้นจริง)" style={{height:'100%',background:'#f7ecf0'}}>
          กังวลว่ารายได้ที่บันทึก<b>เกิดขึ้นจริงไหม</b> (กลัวแสดง<b>เกินจริง</b> / รายได้ผี / บันทึกเร็วเกินไป)</Card></Col>
        <Col xs={24} md={12}><Card size="small" title="🧾 ค่าใช้จ่าย → Completeness (ครบถ้วน)" style={{height:'100%',background:'#eef7ee'}}>
          กังวลว่าค่าใช้จ่าย<b>บันทึกครบไหม</b> (กลัวแสดง<b>ต่ำเกินจริง</b> / ซ่อนค่าใช้จ่ายเพื่อให้กำไรดูดี)</Card></Col>
      </Row>
      <div className="kbox">🧠 คู่ตรงข้าม: <b>รายได้กลัวเกิน (occurrence) · ค่าใช้จ่ายกลัวขาด (completeness)</b> — เพราะกิจการอยากให้<b>กำไรดูดี</b> (รายได้สูง ค่าใช้จ่ายต่ำ)<br/>🧪 กดปุ่มลอย "ทดลอง" → <b>Occurrence/Completeness + Vouch/Trace</b></div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">1.3</span>Test of Control — ตรวจวงจรไหน</h3>
      <table className="fin"><tbody>
        <tr><td><b>รายได้</b></td><td>ตรวจการควบคุมภายในของ<b>วงจรขายและรับชำระเงิน</b> (sales & collection cycle)</td></tr>
        <tr><td><b>ค่าใช้จ่าย & ต้นทุนขาย</b></td><td>ตรวจ<b>วงจรซื้อและชำระเงิน · วงจรเงินเดือน · วงจรสินค้าคงเหลือ</b> (acquisition &amp; payment, payroll, inventory cycles)</td></tr>
      </tbody></table>
    </div>
  </div>;
}

/* ============ TAB 2 : sales controls ============ */
function ControlTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">2.1</span>กิจกรรมควบคุมสำคัญของการขาย</h3>
      <Collapse items={[
        {key:'1',label:'① แบ่งแยกหน้าที่ให้เพียงพอ (Separation of duties)',children:<div style={{fontSize:13.5}}>
          <b>ผู้เข้าถึงเงินสด ≠ ผู้บันทึกการรับเงิน</b> (cash access vs recording receipts)<br/><b>ผู้ให้เครดิต ≠ ฝ่ายขาย</b> (credit granting vs sales)</div>},
        {key:'2',label:'② การอนุมัติที่เหมาะสม (Proper authorization)',children:<div style={{fontSize:13.5}}>
          อนุมัติ<b>เครดิตก่อนขาย</b> · อนุมัติ<b>การส่งของก่อนส่ง</b> · <b>ราคา เงื่อนไข ส่วนลด</b> ต้องได้รับอนุมัติ</div>},
        {key:'3',label:'③ เอกสารระบุเลขที่ล่วงหน้า (Pre-numbered documents)',children:<div style={{fontSize:13.5}}>
          ป้องกันทั้ง<b>การลืมออกบิล/ลืมบันทึก</b> และ<b>การออกบิล/บันทึกซ้ำ</b> (prevent failure to bill/record AND duplicate)</div>},
        {key:'4',label:'④ ส่ง statement รายเดือนให้ลูกค้า',children:<div style={{fontSize:13.5}}>
          ส่งโดย<b>บุคคลที่เป็นอิสระ</b> (ไม่รับผิดชอบเงินสดหรือบันทึกขาย/ลูกหนี้)</div>},
        {key:'5',label:'⑤ วิธีตรวจสอบภายใน (Internal verification)',children:<div style={{fontSize:13.5}}>
          โดยโปรแกรมคอมพิวเตอร์หรือบุคคลอิสระ · มีเอกสารและบันทึกที่เพียงพอ (adequate documents and records)</div>},
      ]}/>
    </div>
  </div>;
}

/* ============ TAB 3 : tests of details - revenue ============ */
function RevDetailTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">3.1</span>Tests of Details — รายได้</h3>
      <Row gutter={[8,8]}>
        {['ส่งจดหมายยืนยันยอดลูกหนี้','ทำ sales cut-off (ตัดยอดขาย)','ทดสอบการคำนวณและการรวมยอด','ตรวจเอกสารประกอบรายได้อื่น','คำนวณกำไรต่อหุ้น (EPS) ใหม่','อ่านรายงานการประชุม','เรียงเลขที่รายการขายดูว่ามีบันทึกซ้ำไหม','เทียบราคาขายในใบแจ้งหนี้กับ price list','เทียบยอดในใบแจ้งหนี้กับใบส่งของ','ตรวจการบันทึกเข้า stock card','ค่าเช่า → ดูสัญญาเช่า','ชนยอดกับงบทดลองและ GL'].map((t,i)=>
          <Col xs={24} md={12} key={i}><div style={{fontSize:13,padding:'6px 10px',background:'#f7ecf0',borderRadius:6,border:'1px solid #ecd9df'}}>✓ {t}</div></Col>)}
      </Row>
      <div className="kbox">🎯 <b>2 ทิศทางที่ต้องแยก:</b><br/>• <b>Vouch</b> รายการในสมุดขาย → เอกสารส่งของ/สนับสนุน = ทดสอบ <b>Occurrence</b> (เกิดจริง กันบันทึกเกิน)<br/>• <b>Trace</b> เอกสารส่งของ → สมุดขาย = ทดสอบ <b>Completeness</b> (ครบถ้วน กันบันทึกขาด)</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">3.2</span>เอกสารสนับสนุนรายได้เฉพาะประเภท</h3>
      <table className="fin">
        <thead><tr><th>ประเภทรายได้</th><th>เอกสารที่ต้องตรวจ</th></tr></thead>
        <tbody>
          <tr><td><b>เงินปันผลรับ</b></td><td>ประกาศจ่ายเงินปันผล (dividend announcement) · หนังสือรับรองหักภาษี ณ ที่จ่าย · pay-in slip · bank statement (เงินต้องเข้าจริง)</td></tr>
          <tr><td><b>ดอกเบี้ยรับ</b></td><td>bank statement หรือ pay-in slip · หนังสือรับรองหักภาษี ณ ที่จ่าย</td></tr>
          <tr><td><b>กำไร/ขาดทุนจากการขาย PPE</b></td><td>การอนุมัติการจำหน่ายก่อนขาย · คำนวณกำไร/ขาดทุนใหม่ · ใบเสร็จ/ใบแจ้งหนี้ (สำเนา) · ใบนำฝาก (pay-in slip)</td></tr>
          <tr><td><b>ค่าเช่ารับ</b></td><td>สัญญาเช่า (rental agreement)</td></tr>
        </tbody>
      </table>
      <div className="kbox">💡 ถ้าลูกค้าจ่ายเงินแล้ว → ตรวจกับ bank statement ว่า<b>เงินเข้าจริง</b> · 🧪 กดปุ่มลอย → <b>จับคู่เอกสารรายได้</b></div>
    </div>
  </div>;
}

/* ============ TAB 4 : revenue concerns ============ */
function ConcernTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">4.1</span>ประเด็นที่ควรระวังเกี่ยวกับรายได้</h3>
      <Row gutter={[10,10]}>
        <Col xs={24} md={12}><Card size="small" title="👻 Fictitious revenue" style={{height:'100%',background:'#fbf3f5'}}>รายได้ที่ไม่ได้เกิดขึ้นจริง (บันทึกรายการขายปลอม)</Card></Col>
        <Col xs={24} md={12}><Card size="small" title="↩️ Return on sales" style={{height:'100%',background:'#fbf3f5'}}>การส่งคืนสินค้า — ระวังไม่บันทึกรับคืนเพื่อให้ยอดขายดูสูง</Card></Col>
        <Col xs={24} md={12}><Card size="small" title="🔗 Related party transactions" style={{height:'100%',background:'#fbf3f5'}}>รายการขายกับกิจการที่เกี่ยวข้องกัน (อาจไม่ใช่รายการค้าปกติ)</Card></Col>
        <Col xs={24} md={12}><Card size="small" title="📦 Channel stuffing" style={{height:'100%',background:'#fbf3f5'}}>ยัดสินค้าให้ช่องทางจัดจำหน่าย/ลูกค้าเกินความต้องการช่วงปลายงวด เพื่อดันยอดขาย (มักตามด้วยการรับคืนงวดถัดไป)</Card></Col>
      </Row>
      <div className="warn">⚠️ ทั้ง 4 ประเด็นโยงกับ<b>การแสดงรายได้เกินจริง / ผิดงวด</b> ซึ่งเป็นเหตุผลที่รายได้เน้น assertion <b>Occurrence</b> และต้องทำ <b>sales cut-off</b> ให้ดี</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">4.2</span>ตรวจซ้ำ (duplicate) และ cut-off</h3>
      <table className="fin"><tbody>
        <tr><td><b>ตรวจบันทึกซ้ำ</b></td><td>เรียงเลขที่รายการขายที่บันทึก ดูว่ามีเลขซ้ำหรือไม่ (กันการบันทึกขายมากกว่าหนึ่งครั้ง)</td></tr>
        <tr><td><b>Sales cut-off</b></td><td>ตรวจว่ารายได้บันทึกตรงงวด ไม่รับรู้เร็วเกินไป (โยงกับ A/R และ inventory cut-off)</td></tr>
      </tbody></table>
    </div>
  </div>;
}

/* ============ TAB 5 : expense details ============ */
function ExpDetailTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">5.1</span>Tests of Details — ค่าใช้จ่ายและต้นทุน</h3>
      <Row gutter={[8,8]}>
        {['ส่งจดหมายยืนยันยอดเจ้าหนี้','ทำ purchase cut-off','ทดสอบการคำนวณและการรวมยอด','ตรวจเอกสารประกอบค่าใช้จ่ายอื่น','อ่านรายงานการประชุม','สอบสวนค่าใช้จ่ายที่ติดลบ (negative expenses)','สอบทานการจ่ายให้บุคคลที่เกี่ยวข้องกัน','ค่าจ้างทั้งหมด กระทบยอดกับ ภงด.1 และรายงานเงินเดือน','ตรวจการจ่ายเงินออกจากธนาคารว่าตรงกับบัญชี','รายได้ขาย/บริการ กระทบยอดกับ ภพ.30 (VAT)','สอบทานค่ารับรอง (entertainment)','สอบทานการคำนวณภาษี + ใบเสร็จจากสรรพากร'].map((t,i)=>
          <Col xs={24} md={12} key={i}><div style={{fontSize:13,padding:'6px 10px',background:'#f7ecf0',borderRadius:6,border:'1px solid #ecd9df'}}>✓ {t}</div></Col>)}
      </Row>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">5.2</span>3-Way vs 2-Way Matching</h3>
      <Row gutter={[10,10]}>
        <Col xs={24} md={12}><Card size="small" title="📦 ซื้อสินค้า → 3-Way Matching" style={{height:'100%',background:'#eef7ee'}}>
          จับคู่ 3 เอกสาร:<br/>① <b>ใบสั่งซื้อ (Purchase Order)</b><br/>② <b>ใบแจ้งหนี้ผู้ขาย (Vendor's Invoice)</b><br/>③ <b>ใบรับสินค้า (GRN / Receiving Report)</b></Card></Col>
        <Col xs={24} md={12}><Card size="small" title="🛠️ ซื้อบริการ → 2-Way Matching" style={{height:'100%',background:'#f0f5fa'}}>
          จับคู่ 2 เอกสาร: <b>ใบสั่งซื้อ + ใบแจ้งหนี้</b><br/><span style={{fontSize:12.5,color:'#666'}}>ไม่มีใบรับสินค้า เพราะบริการไม่มีของให้รับเข้าคลัง</span></Card></Col>
      </Row>
      <div className="kbox">🔑 เหตุผล: ซื้อ<b>ของ</b>ต้องมีหลักฐาน "ได้รับของจริง" (GRN) จึงจับ 3 ทาง | ซื้อ<b>บริการ</b>ไม่มีของเข้าคลัง จับแค่ 2 ทาง<br/>🧪 กดปุ่มลอย → <b>3-way / 2-way matching</b></div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">5.3</span>ควบคุมการจ่ายเงินและบัญชีต้องสงสัย</h3>
      <table className="fin"><tbody>
        <tr><td>①</td><td>ตรวจ<b>ลายเซ็นอนุมัติในใบสั่งซื้อ</b> (อนุมัติก่อนซื้อ) · เทียบยอดใบแจ้งหนี้กับ GRN · ตรวจการบันทึกรับเข้า stock card</td></tr>
        <tr><td>②</td><td>ใบสำคัญจ่าย (payment voucher) ต้องมี<b>ใบเสร็จตัวจริง</b>แนบ · ประทับตรา <b>"PAID / จ่ายแล้ว"</b> บนเอกสารทุกใบ (กันจ่ายซ้ำ)</td></tr>

/* ============ LAB 1 : occurrence/completeness + vouch/trace ============ */
const AQUIZ=[
  {q:'ตรวจสอบรายได้จากการขาย ผู้สอบกังวล assertion ใดเป็นหลัก?',opts:['Occurrence','Completeness'],ans:0,ex:'รายได้เสี่ยงแสดงเกินจริง/บันทึกเร็วเกินไป → เน้น Occurrence'},
  {q:'ตรวจสอบค่าใช้จ่าย ผู้สอบกังวล assertion ใดเป็นหลัก?',opts:['Occurrence','Completeness'],ans:1,ex:'ค่าใช้จ่ายเสี่ยงถูกซ่อน/แสดงต่ำเกิน → เน้น Completeness'},
  {q:'Vouch จากรายการในสมุดขาย → ไปหาเอกสารส่งของ ทดสอบ assertion ใด?',opts:['Occurrence','Completeness'],ans:0,ex:'เริ่มจากบัญชีย้อนไปเอกสาร = พิสูจน์ว่ารายการเกิดจริง (Occurrence) กันบันทึกเกิน'},
  {q:'Trace จากเอกสารส่งของ → ไปหารายการในสมุดขาย ทดสอบ assertion ใด?',opts:['Occurrence','Completeness'],ans:1,ex:'เริ่มจากเอกสารต้นทางตามไปบัญชี = พิสูจน์ว่าบันทึกครบ (Completeness) กันบันทึกขาด'},
  {q:'อยากตรวจว่ามี "รายได้ผี" (fictitious) ที่บันทึกเกินหรือไม่ ควรทดสอบทิศทางใด?',opts:['Vouch (Occurrence)','Trace (Completeness)'],ans:0,ex:'รายได้ผี = บันทึกเกิน → Vouch สมุดขายไปหาเอกสาร (Occurrence)'},
];
function AssertLab(){
  const [i,setI]=useState(0);const [picked,setPicked]=useState(null);const [score,setScore]=useState(0);const [done,setDone]=useState(false);
  const q=AQUIZ[i];
  const choose=(n)=>{if(picked!==null)return;setPicked(n);if(n===q.ans)setScore(score+1);};
  const next=()=>{if(i+1<AQUIZ.length){setI(i+1);setPicked(null);}else setDone(true);};
  if(done)return <div style={{textAlign:'center',padding:20}}><div style={{fontSize:40}}>🎯</div>
    <div style={{fontSize:18,fontWeight:700,margin:'8px 0'}}>ได้ {score} / {AQUIZ.length}</div>
    <Button type="primary" style={{background:'#9b3b57'}} onClick={()=>{setI(0);setPicked(null);setScore(0);setDone(false);}}>เริ่มใหม่</Button></div>;
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><Tag color="magenta">ข้อ {i+1}/{AQUIZ.length}</Tag><Tag color="green">คะแนน {score}</Tag></div>
    <div className="sec-card" style={{marginBottom:10}}><b>{q.q}</b></div>
    <Row gutter={[8,8]}>{q.opts.map((o,n)=>{let b='#d9d9d9',bg='#fff';if(picked!==null){if(n===q.ans){b='#237804';bg='#eaf6ea';}else if(n===picked){b='#c0564a';bg='#fff1f0';}}
      return <Col xs={12} key={n}><div onClick={()=>choose(n)} style={{cursor:picked!==null?'default':'pointer',padding:'12px',borderRadius:8,border:'2px solid '+b,background:bg,textAlign:'center',fontWeight:700,fontSize:13.5}}>{o}</div></Col>;})}</Row>
    {picked!==null && <div className={picked===q.ans?'analogy':'warn'} style={{marginTop:10,fontSize:13}}>
      <div style={{fontWeight:700,marginBottom:4}}>{picked===q.ans?'✅ ถูกต้อง':'❌ คำตอบคือ '+q.opts[q.ans]}</div>{q.ex}
      <div style={{marginTop:8}}><Button type="primary" size="small" style={{background:'#9b3b57'}} onClick={next}>{i+1<AQUIZ.length?'ข้อถัดไป →':'ดูคะแนน'}</Button></div>
    </div>}
  </div>;
}

    <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><Tag color="magenta">ข้อ {i+1}/{MQUIZ.length}</Tag><Tag color="green">คะแนน {score}</Tag></div>
    <div className="sec-card" style={{marginBottom:10,textAlign:'center',fontSize:15,fontWeight:600}}>{q.s}</div>
    <Row gutter={[8,8]}>{opts.map(v=>{let b='#d9d9d9',bg='#fff';if(picked){if(v===q.ans){b='#237804';bg='#eaf6ea';}else if(v===picked){b='#c0564a';bg='#fff1f0';}}
      return <Col xs={12} key={v}><div onClick={()=>choose(v)} style={{cursor:picked?'default':'pointer',padding:'14px',borderRadius:8,border:'2px solid '+b,background:bg,textAlign:'center',fontWeight:700,fontSize:15}}>{v==='3-way'?'📦 3-way':'🛠️ 2-way'}</div></Col>;})}</Row>
    {picked && <div className={picked===q.ans?'analogy':'warn'} style={{marginTop:10,fontSize:13}}>
      <div style={{fontWeight:700}}>{picked===q.ans?'✅ ถูกต้อง — '+q.ans:'❌ คำตอบคือ '+q.ans}</div>
      <div style={{marginTop:4}}>{q.ans==='3-way'?'ซื้อของมีการรับเข้าคลัง → ต้องมี GRN → จับ 3 ทาง':'ซื้อบริการไม่มีของเข้าคลัง → ไม่มี GRN → จับ 2 ทาง'}</div>
      <div style={{marginTop:8}}><Button type="primary" size="small" style={{background:'#9b3b57'}} onClick={next}>{i+1<MQUIZ.length?'ข้อถัดไป →':'ดูคะแนน'}</Button></div>
    </div>}
  </div>;
}

/* ============ LAB 3 : revenue doc matcher ============ */
const DQUIZ=[
  {s:'เงินปันผลรับ',ans:'ประกาศจ่ายปันผล + หนังสือหักภาษี ณ ที่จ่าย + เงินเข้าบัญชี'},
  {s:'ดอกเบี้ยรับ',ans:'bank statement / pay-in slip + หนังสือหักภาษี ณ ที่จ่าย'},
  {s:'กำไรจากการขายสินทรัพย์ถาวร',ans:'อนุมัติการจำหน่าย + คำนวณกำไร/ขาดทุนใหม่ + ใบเสร็จ/ใบแจ้งหนี้ + ใบนำฝาก'},
  {s:'ค่าเช่ารับ',ans:'สัญญาเช่า (rental agreement)'},
];
function DocLab(){
  const [i,setI]=useState(0);const [picked,setPicked]=useState(null);const [score,setScore]=useState(0);const [done,setDone]=useState(false);
  const q=DQUIZ[i];const opts=DQUIZ.map(x=>x.ans);
  const choose=(v)=>{if(picked)return;setPicked(v);if(v===q.ans)setScore(score+1);};
  const next=()=>{if(i+1<DQUIZ.length){setI(i+1);setPicked(null);}else setDone(true);};
  if(done)return <div style={{textAlign:'center',padding:20}}><div style={{fontSize:40}}>📄</div>
    <div style={{fontSize:18,fontWeight:700,margin:'8px 0'}}>ได้ {score} / {DQUIZ.length}</div>
    <Button type="primary" style={{background:'#9b3b57'}} onClick={()=>{setI(0);setPicked(null);setScore(0);setDone(false);}}>เริ่มใหม่</Button></div>;
  return <div>
    <Alert type="info" showIcon style={{marginBottom:10}} message="รายได้นี้ตรวจด้วยเอกสารสนับสนุนชุดใด?" description={q.s}/>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}><Tag color="green">คะแนน {score} · ข้อ {i+1}/{DQUIZ.length}</Tag></div>
    <Row gutter={[8,8]}>{opts.map((v,n)=>{let b='#d9d9d9',bg='#fff';if(picked){if(v===q.ans){b='#237804';bg='#eaf6ea';}else if(v===picked){b='#c0564a';bg='#fff1f0';}}
      return <Col xs={24} key={n}><div onClick={()=>choose(v)} style={{cursor:picked?'default':'pointer',padding:'10px 12px',borderRadius:8,border:'2px solid '+b,background:bg,fontSize:12.5,fontWeight:500}}>{v}</div></Col>;})}</Row>
    {picked && <div className={picked===q.ans?'analogy':'warn'} style={{marginTop:10,fontSize:13}}>
      <div style={{fontWeight:700}}>{picked===q.ans?'✅ ถูกต้อง':'❌ ยังไม่ใช่'}</div>
      <div style={{marginTop:8}}><Button type="primary" size="small" style={{background:'#9b3b57'}} onClick={next}>{i+1<DQUIZ.length?'ข้อถัดไป →':'ดูคะแนน'}</Button></div>
    </div>}
  </div>;
}

function FloatingLab(){
  const [open,setOpen]=useState(false);const [seg,setSeg]=useState('assert');
  const w=typeof window!=='undefined'?Math.min(560,window.innerWidth-16):560;
  return <React.Fragment>
    <FloatButton type="primary" onClick={()=>setOpen(true)} description="ทดลอง" shape="square" style={{right:24,bottom:24,width:58,height:58}} icon={<span style={{fontSize:20}}>🧪</span>}/>
    <Drawer open={open} onClose={()=>setOpen(false)} width={w} title="🧪 ห้องทดลองแบบโต้ตอบ" styles={{body:{paddingTop:12}}}>
      <Segmented block value={seg} onChange={setSeg} style={{marginBottom:14}} options={[{label:'🎯 Assertion/ทิศ',value:'assert'},{label:'🔗 Matching',value:'match'},{label:'📄 เอกสารรายได้',value:'doc'}]}/>
      {seg==='assert'&&<AssertLab/>}
      {seg==='match'&&<MatchLab/>}
      {seg==='doc'&&<DocLab/>}
    </Drawer>
  </React.Fragment>;
}

function App(){
  return <div className="wrap">
    <div className="hero">
      <h1>💰 GA511 — ตรวจสอบรายได้และค่าใช้จ่าย</h1>
      <p>Note 7: รายได้=Occurrence / ค่าใช้จ่าย=Completeness → คุมการขาย → Tests of details → ประเด็นระวัง → 3-way/2-way → Analytical | อิงสไลด์ GA511</p>
      <p style={{marginTop:8,fontSize:13.5,background:'rgba(255,255,255,0.15)',padding:'6px 12px',borderRadius:8,display:'inline-block'}}>🧪 ปุ่มลอย "ทดลอง" — Assertion/ทิศทาง · 3-way/2-way · จับคู่เอกสารรายได้</p>
    </div>
    <Tabs size="large" items={[
      {key:'1',label:'💰 ภาพรวม & Assertion',children:<OverviewTab/>},
      {key:'2',label:'🔒 คุมการขาย',children:<ControlTab/>},
      {key:'3',label:'🔍 Tests รายได้',children:<RevDetailTab/>},
      {key:'4',label:'⚠️ ระวังรายได้',children:<ConcernTab/>},
      {key:'5',label:'🧾 Tests ค่าใช้จ่าย',children:<ExpDetailTab/>},
      {key:'6',label:'📊 Analytical',children:<AnalyticalTab/>},
      {key:'7',label:'🃏 Flashcard',children:<FlashTab/>},
      {key:'8',label:'⚡ การ์ดจำด่วน',children:<QuickTab/>},
    ]}/>
  </div>;
}
function Root(){ return <React.Fragment><App/><FloatingLab/></React.Fragment>; }
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
