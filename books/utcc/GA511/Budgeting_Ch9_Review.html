<body>
<div id="root"></div>
<script type="text/babel">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button, Row, Col, Divider, Alert, Statistic, Flex, Slider, InputNumber } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState, useEffect, useRef } = React;

const C = {
  gold: '#A8906C', goldDark: '#8B7355', goldLight: '#C4B49A',
  amber: '#B5986A', amberDark: '#7A6548',
  bg: '#F5F0E8', surface: '#EDE8DF', surface2: '#E5DFD4', surface3: '#F0EBE2',
  border: '#DDD3C1', borderDark: '#C4B49A',
  text: '#3D3229', text2: '#5C4F42', text3: '#7A6E62',
  white: '#FAF7F2',
  green: '#5D8A66', greenBg: '#EFF5F0',
  red: '#B85C5C', redBg: '#F5ECEA',
  purple: '#7B6B8A', purpleBg: '#F0ECF3',
  blue: '#5B7A9E', blueBg: '#ECF0F5',
  cyan: '#5B8A8A', cyanBg: '#ECF2F2',
};
const fmt = (n) => Math.round(n).toLocaleString('en-US');
const Stars = ({n}) => <span>{'⭐'.repeat(n)}</span>;
const Pop = ({v, color, prefix}) => <span key={v} className="pop" style={{fontWeight:700, color: color||C.goldDark}}>{prefix||''}{fmt(v)}</span>;

/* ============================================================
   TAB 0 — พื้นฐานสำหรับคนไม่มีพื้น
   ============================================================ */
const vocab = [
  {key:1, w:'Budget (งบประมาณ)', m:'"แผนการเงินล่วงหน้า" เขียนเป็นตัวเลขว่าปีหน้าจะขาย/ผลิต/จ่ายเงินเท่าไร'},
  {key:2, w:'Inventory (สินค้าคงเหลือ)', m:'ของที่ค้างอยู่ในโกดัง — ต้นงวด (BI) = ของที่มีตอนเริ่ม, ปลายงวด (EI) = ของที่อยากเหลือตอนจบ'},
  {key:3, w:'DM / DL / OH', m:'ส่วนผสมของต้นทุนการผลิต: วัตถุดิบทางตรง (Direct Materials), ค่าแรงทางตรง (Direct Labor), โสหุ้ยการผลิต (Overhead เช่น ค่าไฟโรงงาน ค่าเสื่อมเครื่องจักร)'},
  {key:4, w:'COGS (ต้นทุนขาย)', m:'ต้นทุนของสินค้า "เฉพาะชิ้นที่ขายออกไป" ในงวดนั้น'},
  {key:5, w:'ขายเชื่อ / A/R', m:'ขายของแล้วยังไม่ได้เงินทันที ลูกค้าติดหนี้เราไว้ = ลูกหนี้การค้า (Accounts Receivable)'},
  {key:6, w:'ซื้อเชื่อ / A/P', m:'ซื้อของแล้วยังไม่จ่ายเงินทันที เราติดหนี้ผู้ขาย = เจ้าหนี้การค้า (Accounts Payable)'},
  {key:7, w:'Depreciation (ค่าเสื่อมราคา)', m:'การทยอยรับรู้ต้นทุนเครื่องจักร/อาคารเป็นค่าใช้จ่ายรายงวด — เป็นค่าใช้จ่ายแต่ "ไม่มีเงินสดออกจริง"'},
  {key:8, w:'Fixed / Variable cost', m:'ต้นทุนคงที่ไม่เปลี่ยนตามปริมาณ (ค่าเช่า) vs ต้นทุนผันแปรเพิ่มตามจำนวนที่ผลิต/ขาย (ค่าผ้าต่อตัว) — พื้นเดียวกับบท CVP ที่ทำไปแล้ว'},
  {key:9, w:'Pro forma', m:'คำเรียกงบการเงิน "ฉบับประมาณการล่วงหน้า" เช่น pro forma income statement = งบกำไรขาดทุนที่คาดว่าจะเกิด'},
  {key:10, w:'Fiscal year (ปีงบประมาณ)', m:'รอบ 12 เดือนที่บริษัทใช้ปิดบัญชี ไม่จำเป็นต้องตรงปีปฏิทิน'},
];

const TankVisual = () => {
  const [bi, setBi] = useState(180);
  const [inQ, setInQ] = useState(1060);
  const [out, setOut] = useState(1000);
  const ei = bi + inQ - out;
  const max = 1600;
  const H = 140;
  const bar = (v, color) => <div style={{width:54, display:'flex', flexDirection:'column', justifyContent:'flex-end', height:H, background:C.surface2, borderRadius:8, overflow:'hidden', border:`1px solid ${C.border}`}}>
    <div className="tank" style={{height: Math.max(4, Math.min(H, v/max*H)), background:color}}/></div>;
  return (
    <Card size="small" style={{background:C.white, borderColor:C.borderDark}} title={<Text strong style={{color:C.text}}>🫙 ลองเลื่อนดู: สมการ "ถังสินค้า" — ต้นงวด + เข้า − ออก = ปลายงวด</Text>}>
      <Row gutter={16} align="middle">
        <Col xs={24} md={10}>
          <Text style={{color:C.text2}}>ของต้นงวด (BI): <Pop v={bi}/></Text>
          <Slider min={0} max={800} value={bi} onChange={setBi}/>
          <Text style={{color:C.text2}}>ผลิตเข้าถัง: <Pop v={inQ} color={C.green}/></Text>
          <Slider min={0} max={1600} value={inQ} onChange={setInQ}/>
          <Text style={{color:C.text2}}>ขายออกจากถัง: <Pop v={out} color={C.red}/></Text>
          <Slider min={0} max={1600} value={out} onChange={setOut}/>
        </Col>
        <Col xs={24} md={14}>
          <Flex gap={18} justify="center" align="end">
            <div style={{textAlign:'center'}}>{bar(bi, C.goldLight)}<Text style={{color:C.text3}}>ต้นงวด</Text></div>
            <Title level={4} style={{color:C.text3}}>+</Title>
            <div style={{textAlign:'center'}}>{bar(inQ, C.green)}<Text style={{color:C.text3}}>ผลิต</Text></div>
            <Title level={4} style={{color:C.text3}}>−</Title>
            <div style={{textAlign:'center'}}>{bar(out, C.red)}<Text style={{color:C.text3}}>ขาย</Text></div>
            <Title level={4} style={{color:C.text3}}>=</Title>
            <div style={{textAlign:'center'}}>{bar(Math.max(ei,0), ei<0?C.red:C.blue)}<Text strong style={{color: ei<0?C.red:C.blue}}>เหลือ {fmt(ei)}</Text></div>
          </Flex>
          {ei < 0 && <Alert style={{marginTop:8}} type="error" message="ของไม่พอขาย! ต้องผลิตเพิ่มหรือขายน้อยลง — นี่คือเหตุผลที่ต้องทำ production budget ล่วงหน้า"/>}
        </Col>
      </Row>
      <Alert style={{marginTop:12}} type="info" message={<span>พลิกสมการนี้ = สูตรหลักของบท: <Text strong>ต้องผลิต = ขาย + ปลายงวดที่อยากได้ − ต้นงวดที่มีอยู่</Text> (ใช้ทั้งกับสินค้าและวัตถุดิบ)</span>}/>
    </Card>
  );
};

const BasicsTab = () => (
  <div>
    <Card className="fadein" style={{marginBottom:16, background:C.white, borderColor:C.border}}
      title={<Text strong style={{color:C.text}}>🏭 เข้าใจธุรกิจผลิตใน 1 นาที (เรื่องราวของ Texas Rex)</Text>}>
      <Paragraph style={{color:C.text}}>
        หนังสือใช้บริษัทสมมติ <strong>Texas Rex</strong> ขายเสื้อยืดสกรีนลาย ตัวละ $10 ทั้งบทคือการวางแผนล่วงหน้า 1 ปีของธุรกิจนี้:
      </Paragraph>
      <Flex gap={8} wrap="wrap" justify="center">
        {['1️⃣ คาดว่าจะขายได้กี่ตัว','2️⃣ ต้องผลิตกี่ตัว','3️⃣ ต้องซื้อผ้า/จ้างคน/จ่ายค่าโรงงานเท่าไร','4️⃣ กำไรที่คาดหวังเท่าไร','5️⃣ เงินสดจะพอหมุนไหม'].map((t,i)=>(
          <Card key={i} size="small" className="fadein" style={{background:C.surface3, borderColor:C.borderDark, animationDelay:`${i*0.15}s`}}>
            <Text strong style={{color:C.text2}}>{t}</Text>
          </Card>
        ))}
      </Flex>
      <Paragraph style={{color:C.text, marginTop:12}}>
        คำถาม 5 ข้อนี้ = โครงของ <strong>Master Budget</strong> ทั้งบทนั่นเอง ถ้าเข้าใจ 5 ข้อนี้ ที่เหลือคือรายละเอียด
      </Paragraph>
    </Card>

    <Card className="fadein" style={{marginBottom:16, background:C.white, borderColor:C.border}}
      title={<Text strong style={{color:C.text}}>📖 ศัพท์ที่ต้องรู้ก่อนอ่านบทนี้ (10 คำ)</Text>}>
      <Table size="small" pagination={false} columns={[
        {title:'คำศัพท์', dataIndex:'w', key:'w', width:220, render:t=><Text strong style={{color:C.goldDark}}>{t}</Text>},
        {title:'ความหมายแบบบ้าน ๆ', dataIndex:'m', key:'m'},
      ]} dataSource={vocab}/>
    </Card>

    <div className="fadein"><TankVisual/></div>

    <Card className="fadein" style={{marginTop:16, background:C.white, borderColor:C.border}}
      title={<Text strong style={{color:C.text}}>💡 แนวคิดสำคัญ: ทำไม "กำไร" ไม่เท่ากับ "เงินสด"</Text>}>
      <Row gutter={12}>
        <Col xs={24} md={12}>
          <Card size="small" style={{background:C.greenBg, borderColor:C.green, height:'100%'}}>
            <Text strong style={{color:C.green}}>กำไร (ทางบัญชี)</Text><br/>
            <Text style={{color:C.text}}>รับรู้ตอน "ขายได้" แม้ยังไม่ได้เงิน และหักค่าเสื่อมที่ไม่มีเงินออกจริง</Text>
          </Card>
        </Col>
        <Col xs={24} md={12}>
          <Card size="small" style={{background:C.blueBg, borderColor:C.blue, height:'100%'}}>
            <Text strong style={{color:C.blue}}>เงินสด</Text><br/>
            <Text style={{color:C.text}}>นับตอน "เงินเข้า-ออกจริง" ลูกค้าจ่ายช้า = กำไรมีแต่เงินไม่มี → เจ๊งได้ทั้งที่กำไรดี</Text>
          </Card>
        </Col>
      </Row>
      <Alert style={{marginTop:12}} type="warning" message={<span>เพราะเหตุนี้บทนี้จึงต้องมีทั้ง <Text strong>งบกำไรขาดทุนล่วงหน้า</Text> (operating budget) และ <Text strong>งบเงินสด</Text> (cash budget) แยกกัน — สไลด์เน้นว่า "ธุรกิจจำนวนมากขายดีแต่ล้มเพราะจังหวะเงินสด"</span>}/>
    </Card>
  </div>
);

/* ============================================================
   TAB 1 — สรุปเนื้อหา + FLOW ANIMATION
   ============================================================ */
const flowNodes = [
  {t:'Sales Budget', d:'จุดเริ่มต้นของทุกอย่าง: คาดยอดขาย (หน่วย × ราคา) — ต้องแม่นที่สุดเพราะงบอื่นทั้งหมดพิงตัวนี้', icon:'🛒'},
  {t:'Production Budget', d:'ต้องผลิตกี่หน่วย = ขาย + EI ที่อยากได้ − BI ที่มีอยู่', icon:'🏭'},
  {t:'DM Purchases', d:'ซื้อวัตถุดิบ = ที่ใช้ผลิต + EI วัตถุดิบ − BI วัตถุดิบ (× ราคาต่อหน่วย)', icon:'🧵'},
  {t:'Direct Labor', d:'ชั่วโมงแรงงาน = หน่วยผลิต × ชม./หน่วย × ค่าแรง/ชม.', icon:'👷'},
  {t:'Overhead', d:'VOH ตามชั่วโมงแรงงาน + FOH คงที่ (มีค่าเสื่อมซ่อนอยู่)', icon:'⚙️'},
  {t:'Ending FG + COGS', d:'คิดต้นทุนต่อหน่วย → มูลค่าสต็อกปลายงวด และต้นทุนขาย', icon:'📦'},
  {t:'S&A Expenses', d:'ค่าใช้จ่ายขาย/บริหาร (แยกผันแปร-คงที่เหมือนเดิม)', icon:'🗂️'},
  {t:'Budgeted Income Statement', d:'ปลายทางของ Operating Budget: กำไรที่คาดหวัง', icon:'📈'},
  {t:'Cash Budget', d:'เริ่ม Financial Budget: เงินรับ − เงินจ่าย ± กู้/คืนเงิน', icon:'💵'},
  {t:'Budgeted Balance Sheet', d:'ฐานะการเงินปลายงวดที่คาดหวัง — จบ Master Budget', icon:'🧾'},
];

const FlowAnimation = () => {
  const [step, setStep] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const timer = useRef(null);
  useEffect(() => {
    if (playing) {
      timer.current = setInterval(() => {
        setStep(s => {
          if (s >= flowNodes.length - 1) { setPlaying(false); return s; }
          return s + 1;
        });
      }, 1400);
    }
    return () => clearInterval(timer.current);
  }, [playing]);
  const start = () => { setStep(0); setPlaying(true); };
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>🎬 Master Budget ต่อกันเป็นสายพานอย่างไร (กด Play ดูทีละขั้น)</Text>}>
      <Flex gap={8} style={{marginBottom:12}}>
        <Button type="primary" className={playing?'':'pulse'} onClick={start} disabled={playing}>▶ Play ลำดับการทำงบ</Button>
        <Button onClick={()=>{setPlaying(false); setStep(-1);}}>รีเซ็ต</Button>
        <Button onClick={()=>{setPlaying(false); setStep(flowNodes.length-1);}}>แสดงทั้งหมด</Button>
      </Flex>
      <Row gutter={[8,8]}>
        {flowNodes.map((n,i)=>(
          <Col xs={12} md={i<8?6:12} key={i}>
            <div className={'node' + (i===step?' active':'') + (i<step||( !playing && step===flowNodes.length-1 && i<=step)?' done':'')}>
              <div style={{fontSize:20}}>{n.icon}</div>{i+1}. {n.t}
            </div>
          </Col>
        ))}
      </Row>
      <div style={{minHeight:64, marginTop:12}}>
        {step>=0 && <Alert type="info" message={<span><Text strong>{flowNodes[step].icon} {flowNodes[step].t}: </Text>{flowNodes[step].d}</span>}/>}
        {step<0 && <Alert type="warning" message='ข้อสอบชอบถาม "งบไหนต้องทำก่อน" — ลำดับคือหัวใจ: เริ่มที่ Sales เสมอ และ Operating ก่อน Financial'/>}
      </div>
    </Card>
  );
};

const texasCols = [
  {title:'', dataIndex:'r', key:'r'},
  {title:'Q1', dataIndex:'q1', key:'q1', align:'right'},
  {title:'Q2', dataIndex:'q2', key:'q2', align:'right'},
  {title:'Q3', dataIndex:'q3', key:'q3', align:'right'},
  {title:'Q4', dataIndex:'q4', key:'q4', align:'right'},
  {title:'ทั้งปี', dataIndex:'y', key:'y', align:'right', render:t=><Text strong>{t}</Text>},
];

const summaryData = [
  {
    key:'lo1', title:'📋 LO-1: Budget คืออะไร ทำไมต้องทำ', tags:[['ทฤษฎีออกบ่อย','volcano']],
    content: () => (
      <div>
        <Row gutter={12}>
          <Col xs={24} md={12}><Card size="small" style={{background:C.blueBg, borderColor:C.blue, height:'100%'}}>
            <Text strong style={{color:C.blue}}>Planning (มองไปข้างหน้า)</Text><br/>
            <Text style={{color:C.text}}>กำหนดเป้าหมายและการกระทำที่จะไปให้ถึง — budget คือ "แผนการเงิน" ของ planning</Text>
          </Card></Col>
          <Col xs={24} md={12}><Card size="small" style={{background:C.purpleBg, borderColor:C.purple, height:'100%'}}>
            <Text strong style={{color:C.purple}}>Control (มองย้อนกลับ)</Text><br/>
            <Text style={{color:C.text}}>เทียบ "ของจริง vs งบ" เพื่อหาจุดผิดปกติแล้วแก้ไข</Text>
          </Card></Col>

const BudgetExplorer = () => {
  const [bk, setBk] = useState('prod');
  const [sel, setSel] = useState(null); // {r, c, text}
  const B = beBudgets[bk];
  const pick = (k) => { setBk(k); setSel(null); };
  const colNames = ['Q1','Q2','Q3','Q4','ทั้งปี'];
  const cols = [
    {title:'', dataIndex:'label', key:'label', width:150, render:t=><Text strong style={{color:C.text2}}>{t}</Text>},
    ...colNames.map((cn,ci)=>({
      title:cn, key:cn, align:'right',
      render:(_,row,ri)=>{
        const cell = row.cells[ci];
        const on = sel && sel.r===ri && sel.c===ci;
        return <span onClick={()=>setSel({r:ri, c:ci, text:cell[1], label:`${row.label} · ${cn} = ${cell[0]}`})}
          style={{cursor:'pointer', padding:'2px 6px', borderRadius:6, fontWeight: on?700:500, transition:'all .25s',
            background: on ? C.gold : 'transparent', color: on ? '#FAF7F2' : C.text,
            borderBottom:`2px dotted ${C.borderDark}`}}>{cell[0]}</span>;
      },
    })),
  ];
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>🔍 ตารางแบบจิ้มได้ — เลือกงบ แล้ว "คลิกที่ตัวเลข" เพื่อดูว่าเลขก้อนนั้นมาจากไหน</Text>}>
      <Flex gap={6} wrap="wrap" style={{marginBottom:10}}>
        {Object.entries(beBudgets).map(([k,b])=>(
          <Button key={k} size="small" type={bk===k?'primary':'default'} onClick={()=>pick(k)}>{b.name}</Button>
        ))}
      </Flex>
      <Table size="small" pagination={false} columns={cols}
        dataSource={B.rows.map((r,i)=>({...r, key:i}))} footer={()=><Text style={{color:C.text3}}>{B.unit} · ตัวเลขทั้งหมดตรงกับ Cornerstone ในหนังสือ</Text>}/>
      <div style={{minHeight:60, marginTop:10}}>
        {sel

};

const ProdLab = () => {
  const [sales, setSales] = useState(1000);
  const [nextSales, setNextSales] = useState(1200);
  const [eiPct, setEiPct] = useState(20);
  const [bi, setBi] = useState(180);
  const ei = Math.round(nextSales * eiPct / 100);
  const prod = sales + ei - bi;
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>🏭 Lab 1: Production Budget — ต้องผลิตกี่ตัว?</Text>}>
      <Row gutter={24}>
        <Col xs={24} md={12}>
          <Text style={{color:C.text2}}>ยอดขายไตรมาสนี้: <Pop v={sales}/> ตัว</Text>
          <Slider min={0} max={3000} step={50} value={sales} onChange={setSales}/>
          <Text style={{color:C.text2}}>ยอดขายไตรมาสหน้า: <Pop v={nextSales}/> ตัว</Text>
          <Slider min={0} max={3000} step={50} value={nextSales} onChange={setNextSales}/>
          <Text style={{color:C.text2}}>นโยบาย EI = <Pop v={eiPct}/>% ของยอดขายไตรมาสหน้า</Text>
          <Slider min={0} max={50} value={eiPct} onChange={setEiPct}/>
          <Text style={{color:C.text2}}>ของต้นงวด (BI): <Pop v={bi}/> ตัว</Text>
          <Slider min={0} max={1000} step={10} value={bi} onChange={setBi}/>
        </Col>
        <Col xs={24} md={12}>
          <Card size="small" style={{background:C.surface3, borderColor:C.gold}}>
            <div style={{fontSize:15, color:C.text}}>
              ขาย <Pop v={sales}/> ตัว<br/>
              + EI ที่อยากได้ ({eiPct}% × {fmt(nextSales)}) = <Pop v={ei} color={C.green}/><br/>
              − BI ที่มีแล้ว = <Pop v={bi} color={C.red}/><br/>
              <Divider style={{margin:'8px 0'}}/>
              <Text strong style={{fontSize:20, color:C.goldDark}}>ต้องผลิต = </Text><span key={prod} className="pop" style={{fontSize:26, fontWeight:700, color: prod<0?C.red:C.goldDark}}>{fmt(prod)}</span><Text strong style={{fontSize:18, color:C.goldDark}}> ตัว</Text>
            </div>
          </Card>
          <Alert style={{marginTop:8}} type="info" message="ลองตั้งค่าตามหนังสือ: ขาย 1,000 / หน้า 1,200 / EI 20% / BI 180 → ต้องได้ 1,060 ตรงกับ Cornerstone 9.2"/>
          {prod<0 && <Alert style={{marginTop:8}} type="error" message="ติดลบ = ของเก่าล้นสต็อกจนไม่ต้องผลิตเลย (ในทางปฏิบัติคือ 0)"/>}
        </Col>
      </Row>
    </Card>
  );
};

const CollectLab = () => {
  const [cashPct, setCashPct] = useState(25);
  const [nowPct, setNowPct] = useState(90);
  const [s1, setS1] = useState(10000);
  const [s2, setS2] = useState(12000);
  const credit1 = s1 * (100-cashPct)/100, credit2 = s2 * (100-cashPct)/100;
  const q2cash = s2 * cashPct/100;
  const q2own = credit2 * nowPct/100;
  const q2prev = credit1 * (100-nowPct)/100;
  const total = q2cash + q2own + q2prev;
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>💵 Lab 2: Cash Collections — ไตรมาส 2 จะเก็บเงินได้เท่าไร?</Text>}>
      <Row gutter={24}>
        <Col xs={24} md={12}>
          <Text style={{color:C.text2}}>ยอดขาย Q1: $<Pop v={s1}/></Text>
          <Slider min={0} max={30000} step={500} value={s1} onChange={setS1}/>
          <Text style={{color:C.text2}}>ยอดขาย Q2: $<Pop v={s2}/></Text>
          <Slider min={0} max={30000} step={500} value={s2} onChange={setS2}/>
          <Text style={{color:C.text2}}>สัดส่วนขายสด: <Pop v={cashPct}/>%</Text>
          <Slider min={0} max={100} value={cashPct} onChange={setCashPct}/>
          <Text style={{color:C.text2}}>ลูกหนี้จ่ายในไตรมาสที่ขาย: <Pop v={nowPct}/>% (ที่เหลือจ่ายไตรมาสถัดไป)</Text>
          <Slider min={0} max={100} value={nowPct} onChange={setNowPct}/>
        </Col>
        <Col xs={24} md={12}>
          <Card size="small" style={{background:C.surface3, borderColor:C.gold}}>
            <div style={{fontSize:15, color:C.text}}>
              ขายสด Q2 ({cashPct}% × {fmt(s2)}) = <Pop v={q2cash} color={C.green}/><br/>
              เก็บลูกหนี้ Q2 เอง ({nowPct}% × {fmt(credit2)}) = <Pop v={q2own} color={C.blue}/><br/>
              เก็บค้างจาก Q1 ({100-nowPct}% × {fmt(credit1)}) = <Pop v={q2prev} color={C.purple}/><br/>
              <Divider style={{margin:'8px 0'}}/>
              <Text strong style={{fontSize:18, color:C.goldDark}}>เงินรับ Q2 = $</Text><span key={total} className="pop" style={{fontSize:26, fontWeight:700, color:C.goldDark}}>{fmt(total)}</span>
            </div>
          </Card>
          <Alert style={{marginTop:8}} type="info" message="ค่าตามหนังสือ: ขายสด 25%, เก็บทันงวด 90% → เงินรับ Q2 = $11,850 ตรงกับ Cornerstone 9.10 · ลองลด % เก็บทันงวดดู จะเห็นว่าขายเท่าเดิมแต่เงินสดหด!"/>
        </Col>
      </Row>
    </Card>
  );
};

const CashLab = () => {
  const [begin, setBegin] = useState(5200);
  const [receipts, setReceipts] = useState(10600);
  const [disb, setDisb] = useState(15777);
  const [minCash, setMinCash] = useState(1000);
  const avail = begin + receipts;
  const excess = avail - disb;
  const borrow = excess < minCash ? (minCash - excess) : 0;
  const ending = excess + borrow;
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>🏦 Lab 3: Cash Budget — ต้องกู้ไหม?</Text>}>
      <Row gutter={24}>
        <Col xs={24} md={12}>
          <Text style={{color:C.text2}}>เงินสดต้นงวด: $<Pop v={begin}/></Text>
          <Slider min={0} max={20000} step={100} value={begin} onChange={setBegin}/>
          <Text style={{color:C.text2}}>เงินรับรวม: $<Pop v={receipts} color={C.green}/></Text>
          <Slider min={0} max={40000} step={100} value={receipts} onChange={setReceipts}/>
          <Text style={{color:C.text2}}>เงินจ่ายรวม: $<Pop v={disb} color={C.red}/></Text>
          <Slider min={0} max={40000} step={100} value={disb} onChange={setDisb}/>
          <Text style={{color:C.text2}}>เงินสดขั้นต่ำตามนโยบาย: $<Pop v={minCash}/></Text>
          <Slider min={0} max={5000} step={100} value={minCash} onChange={setMinCash}/>
        </Col>
        <Col xs={24} md={12}>
          <Card size="small" style={{background:C.surface3, borderColor:C.gold}}>
            <div style={{fontSize:15, color:C.text}}>
              เงินสดที่มีให้ใช้ = {fmt(begin)} + {fmt(receipts)} = <Pop v={avail}/><br/>
              − เงินจ่าย = <Pop v={disb} color={C.red}/><br/>
              = เกิน/(ขาด) : <span key={excess} className="pop" style={{fontWeight:700, color: excess<minCash?C.red:C.green}}>{fmt(excess)}</span> (ขั้นต่ำต้องมี {fmt(minCash)})<br/>
              {borrow>0 ? <span>→ <Text strong style={{color:C.red}}>ต้องกู้ ${fmt(borrow)}</Text><br/></span> : <span>→ <Text strong style={{color:C.green}}>ไม่ต้องกู้ (เงินเกินเอาไปคืนหนี้/ลงทุนชั่วคราว)</Text><br/></span>}
              <Divider style={{margin:'8px 0'}}/>
              <Text strong style={{fontSize:18, color:C.goldDark}}>เงินสดปลายงวด = $</Text><span key={ending} className="pop" style={{fontSize:26, fontWeight:700, color:C.goldDark}}>{fmt(ending)}</span>
            </div>
          </Card>
          <Alert style={{marginTop:8}} type="info" message="ค่าเริ่มต้นคือ Q1 ของ Texas Rex: เงินขาดเหลือแค่ $23 ทั้งที่ขายดี (เพราะซื้อเครื่องจักร $6,500) → ต้องกู้ $1,000 — ธุรกิจกำไรดีแต่เงินสดขาดได้จริง"/>
        </Col>
      </Row>
    </Card>
  );
};

const FlashcardTab = () => {
  const [filter, setFilter] = useState('all');
  const [order, setOrder] = useState(flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [score, setScore] = useState({ok:0, ng:0});
  const pool = order.map(i=>flashcards[i]).filter(c => filter==='all' ? true : filter==='exam' ? c.exam : c.star===3);
  const card = pool[Math.min(idx, pool.length-1)];
  const shuffle = () => { const a=[...Array(flashcards.length).keys()]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} setOrder(a); setIdx(0); setFlipped(false); setScore({ok:0,ng:0}); };
  const nav = (d) => { setFlipped(false); setIdx(i => (i + d + pool.length) % pool.length); };
  const mark = (good) => { setScore(s => good ? {...s, ok:s.ok+1} : {...s, ng:s.ng+1}); nav(1); };
  const setF = (f) => { setFilter(f); setIdx(0); setFlipped(false); };
  if (!card) return <Alert type="warning" message="ไม่มีการ์ดในโหมดนี้" />;
  return (
    <div>
      <Flex justify="space-between" wrap="wrap" gap={8} style={{marginBottom:12}}>
        <Space wrap>
          <Button type={filter==='all'?'primary':'default'} onClick={()=>setF('all')}>ทั้งหมด ({flashcards.length})</Button>
          <Button type={filter==='exam'?'primary':'default'} onClick={()=>setF('exam')}>เฉพาะแนวข้อสอบ ({flashcards.filter(c=>c.exam).length})</Button>
          <Button type={filter==='star3'?'primary':'default'} onClick={()=>setF('star3')}>⭐⭐⭐ ({flashcards.filter(c=>c.star===3).length})</Button>
        </Space>
        <Button onClick={shuffle}>🔀 สลับการ์ด</Button>
      </Flex>
      <Row gutter={16} style={{marginBottom:12}}>
        <Col span={8}><Statistic title="การ์ดที่" value={`${idx+1} / ${pool.length}`} /></Col>
        <Col span={8}><Statistic title="ตอบถูก" value={score.ok} valueStyle={{color:C.green}} /></Col>
        <Col span={8}><Statistic title="ตอบผิด" value={score.ng} valueStyle={{color:C.red}} /></Col>
      </Row>
      <div className="fc-perspective" onClick={()=>setFlipped(f=>!f)}>
        <div className={'fc-card' + (flipped ? ' flipped' : '')}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.borderDark}`}}>
            <Space direction="vertical" align="center">
              <Space>{card.exam && <Tag color="volcano">แนวข้อสอบ</Tag>}<Stars n={card.star} /></Space>
              <Title level={4} style={{color:C.text, margin:0}}>{card.q}</Title>
              <Text style={{color:C.text3}}>(คลิกเพื่อพลิกดูคำตอบ)</Text>
            </Space>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.gold}`}}>
            <Space direction="vertical" align="center">
              <Title level={4} style={{color:C.goldDark, margin:0}}>{card.a}</Title>
              <Text style={{color:C.text2}}>{card.d}</Text>
            </Space>
          </div>
        </div>
      </div>
      <Flex justify="center" gap={8} style={{marginTop:16}} wrap="wrap">
        <Button onClick={()=>nav(-1)}>← ก่อนหน้า</Button>
        <Button style={{background:C.greenBg, borderColor:C.green, color:C.green}} onClick={()=>mark(true)}>✓ ตอบถูก</Button>
        <Button style={{background:C.redBg, borderColor:C.red, color:C.red}} onClick={()=>mark(false)}>✗ ตอบผิด</Button>
        <Button onClick={()=>nav(1)}>ถัดไป →</Button>
      </Flex>
    </div>
  );
};
