<script type="text/babel">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button, Row, Col, Divider, Alert, Statistic, Flex, Segmented, Progress, Radio, Steps, Result, Collapse, Slider, Tooltip, Badge } = antd;

const { Header, Content, Footer } = Layout;

const C = {
  gold:'#A8906C', goldDark:'#8B7355', goldLight:'#C4B49A',
  amber:'#B5986A', amberDark:'#7A6548',
  bg:'#F5F0E8', surface:'#EDE8DF', surface2:'#E5DFD4', surface3:'#F0EBE2',
  border:'#DDD3C1', borderDark:'#C4B49A',
  text:'#3D3229', text2:'#5C4F42', text3:'#7A6E62', white:'#FAF7F2',

  blue:'#5B7A9E', blueBg:'#ECF0F5',

const M = (n) => <span className="mnum">ม.{n}</span>;
const box = (bg,bd) => ({background:bg, border:'1px solid '+bd, borderRadius:14, padding:'14px 16px', marginBottom:12});
const Stars = ({n}) => <span style={{color:C.amber,letterSpacing:1}}>{'★'.repeat(n)}<span style={{color:C.border}}>{'★'.repeat(3-n)}</span></span>;

/* =================== BASICS TAB (ปูพื้น) =================== */
function BasicsTab(){
  const [ex,setEx]=React.useState('house');
  const svarn = {
    house:{title:'บ้าน + ที่ดิน', parts:'ตัวบ้าน (โรงเรือน) ติดตรึงถาวรกับที่ดิน', res:'บ้านเป็น "ส่วนควบ" ของที่ดิน โดยจารีตประเพณี → เจ้าของที่ดินเป็นเจ้าของบ้าน', law:'144, 146', is:true},
    watch:{title:'นาฬิกา + เข็ม/ลาน', parts:'ถอดเข็ม/ลานออก นาฬิกาเดินไม่ได้', res:'เข็ม/ลาน เป็นส่วนควบโดยสภาพ → ขาดแล้วทรัพย์เสียสภาวะ', law:'144', is:true},
    tree:{title:'ที่ดิน + ต้นมะม่วง', parts:'ไม้ยืนต้น (อายุขัยเกิน 3 ปี)', res:'เป็นส่วนควบกับที่ดิน แม้เพิ่งปลูก 1 ปี (ดูอายุ "พันธุ์ไม้")', law:'145 ว.1', is:true},
    rice:{title:'ที่ดิน + ต้นข้าว', parts:'ไม้ล้มลุก/ธัญชาติ เก็บเกี่ยวรายปี', res:'ไม่เป็นส่วนควบ → เจ้าของต้นข้าวไม่ใช่เจ้าของที่ดิน', law:'145 ว.2', is:false},
    ac:{title:'บ้าน + เครื่องปรับอากาศ', parts:'ของประดับ/อำนวยความสะดวก', res:'ไม่เป็นส่วนควบ เพราะไม่ใช่สาระสำคัญในความเป็นอยู่ของบ้าน', law:'144', is:false}
  };
  const cur = svarn[ex];
  return (
  <div className="fadeUp">
    <Alert type="success" showIcon style={{marginBottom:16, borderRadius:12}}
      message="เริ่มจากศูนย์ — อ่านหน้านี้ก่อนถ้ายังไม่มีพื้นกฎหมาย"
      description="วิชานี้คือ 'กฎหมายทรัพย์' (ป.พ.พ. บรรพ 4) ว่าด้วยว่า 'ของ' เป็นของใคร ได้มายังไง และใครเถียงใครได้ หน้านี้ปูศัพท์+ตรรกะพื้นฐานให้ก่อน แล้วค่อยไปแท็บสรุป"/>

        </Col>
        <Col xs={24} md={12}>
          <div className="diagram-box" style={{borderColor:C.gold}}>
            <div style={{fontSize:30}}>⌚📱🚗</div>

            <Text type="secondary">ทรัพย์ที่เหลือทั้งหมด (เคลื่อนที่ได้)<br/>เช่น นาฬิกา, รถ, โทรศัพท์</Text>

        </Col>

    </Card>

    <Card style={{...box(C.purpleBg,C.purple), marginBottom:16}} bodyStyle={{padding:18}}>
      <Title level={4} style={{marginTop:0,color:C.purple}}>② หัวใจที่ออกสอบทุกปี: บุคคลสิทธิ ⚔ ทรัพยสิทธิ</Title>
      <Row gutter={12}>
        <Col xs={24} md={12}>
          <div style={box(C.white,C.border)}>
            <Tag color="purple">บุคคลสิทธิ</Tag>
            <div style={{fontWeight:600,margin:'6px 0'}}>สิทธิเหนือ "ตัวบุคคล"</div>
            <Text>ใช้ยันได้เฉพาะ <span className="hl">คู่สัญญา/ลูกหนี้</span> เท่านั้น<br/>เกิดจากสัญญา/ละเมิด เช่น สิทธิเจ้าหนี้เงินกู้, สิทธิผู้เช่า</Text>
          </div>
        </Col>
        <Col xs={24} md={12}>
          <div style={box(C.greenBg,C.green)}>
            <Tag color="green">ทรัพยสิทธิ</Tag>
            <div style={{fontWeight:600,margin:'6px 0'}}>สิทธิเหนือ "ตัวทรัพย์"</div>
            <Text>ใช้ยันได้กับ <span className="hl">คนทั้งโลก</span> (ตกติดตัวทรัพย์)<br/>ก่อตั้งได้เฉพาะที่กฎหมายรับรอง เช่น กรรมสิทธิ์, ครอบครอง, จำนอง, ภาระจำยอม</Text>
          </div>
        </Col>
      </Row>
      <Alert style={{marginTop:10,borderRadius:10}} type="warning" showIcon
        message="สูตรทองข้อสอบ: ได้อสังหาฯ 'โดยนิติกรรม' แต่ไม่จดทะเบียน → ยังไม่บริบูรณ์เป็น 'ทรัพยสิทธิ' แต่ยังใช้เป็น 'บุคคลสิทธิ' ยันคู่สัญญาได้"/>
    </Card>

    <Card style={{...box(C.cyanBg,C.cyan)}} bodyStyle={{padding:18}}>
      <Title level={4} style={{marginTop:0,color:C.cyan}}>③ ลองเล่น: อะไรเป็น "ส่วนควบ" (ทดลองคลิกดู)</Title>
      <Text type="secondary">ส่วนควบ = สิ่งที่รวมกับทรัพย์จนเป็น "สาระสำคัญ" แยกไม่ได้เว้นแต่ทำลาย → เจ้าของทรัพย์หลักได้กรรมสิทธิ์ในส่วนควบด้วย {M('144')}</Text>
      <div style={{margin:'12px 0'}}>
        <Space wrap>
          {Object.keys(svarn).map(k=>(
            <Button key={k} type={ex===k?'primary':'default'} onClick={()=>setEx(k)}
              style={ex===k?{background:C.gold,borderColor:C.gold}:{}}>{svarn[k].title}</Button>
          ))}
        </Space>
      </div>
      <div key={ex} className="fadeUp" style={box(cur.is?C.greenBg:C.redBg, cur.is?C.green:C.red)}>
        <Flex align="center" gap={10} wrap>
          <div className="stepdot" style={{background:cur.is?C.green:C.red, minWidth:34}}>{cur.is?'✓':'✕'}</div>
          <div style={{flex:1,minWidth:220}}>
            <div style={{fontWeight:700,fontSize:16,color:cur.is?C.green:C.red}}>{cur.is?'เป็นส่วนควบ':'ไม่เป็นส่วนควบ'}</div>
            <Text>{cur.res}</Text>
          </div>
          <Tag color={cur.is?'green':'red'}>มาตรา {cur.law}</Tag>
        </Flex>
      </div>
    </Card>

    <Card style={{...box(C.gold2,C.gold), marginTop:16}} bodyStyle={{padding:18}}>
      <Title level={4} style={{marginTop:0,color:C.goldDark}}>④ วิธีอ่านคำถามข้อสอบ (IRAC) — เข็มทิศตอบทุกข้อ</Title>
      <Steps direction="vertical" size="small" current={-1} items={[
        {title:<b>I — Issue (ประเด็น)</b>, description:'ข้อเท็จจริงนี้มีปัญหากฎหมายอะไร? เช่น "อนันต์ต้องรื้อบ้านที่รุกล้ำหรือไม่"'},
        {title:<b>R — Rule (หลักกฎหมาย)</b>, description:'ยกตัวบท/มาตราที่เกี่ยว + อธิบายหลัก เช่น ม.1312 สร้างรุกล้ำโดยสุจริต'},
        {title:<b>A — Application (ปรับบท)</b>, description:'เอาข้อเท็จจริงจับกับหลัก ทีละองค์ประกอบ (สุจริตไหม? รุกล้ำส่วนน้อยไหม?)'},
        {title:<b>C — Conclusion (สรุป)</b>, description:'ฟันธงคำตอบให้ตรงคำถาม + ระบุผลทางกฎหมาย'},
      ]}/>
      <Alert type="success" showIcon style={{borderRadius:10}} message="ไปแท็บ '🔍 วินิจฉัยเคส' เพื่อฝึกเดินตาม IRAC แบบมีระบบช่วยไกด์"/>
    </Card>
  </div>);
}

/* =================== SUMMARY DATA =================== */

  {
    key:'map', title:'🗺️ แผนที่วิชา + โครงข้อสอบ (อ่านก่อนเสมอ)',

        <Table size="small" pagination={false} bordered

            {title:'ข้อ', dataIndex:'q', width:56},

            {key:1,q:'ข้อ 1',t:'ได้มาซึ่งอสังหาฯ / บุคคลสิทธิ-ทรัพยสิทธิ / ส่วนควบ',m:'1299 (144–146)',s:3},
            {key:2,q:'ข้อ 2',t:'กรรมสิทธิ์: สาธารณสมบัติ · สร้าง/รุกล้ำ · ซื้อสุจริต · กรรมสิทธิ์รวม',m:'1304–1332, 1358–1362',s:3},
            {key:3,q:'ข้อ 3',t:'ครอบครองปรปักษ์ / สิทธิครอบครอง',m:'1367, 1382, 1384',s:3},

        </div>
      </div>

  {

    tags:[['ข้อ 1','geekblue'],['ออกบ่อย','volcano']],
    content:()=>(
      <div>
        <Title level={5} style={{color:C.green}}>ก. ส่วนควบ {M('144')}{M('145')}{M('146')}</Title>
        <div style={box(C.greenBg,C.green)}>

          columns={[{title:'กรณี',dataIndex:'a',width:150},{title:'เป็นส่วนควบ?',dataIndex:'b',width:120,render:v=><Tag color={v==='ใช่'?'green':'red'}>{v}</Tag>},{title:'มาตรา',dataIndex:'c'}]}
          dataSource={[

function FlashDeck(){

    if(filter==='ข้อสอบจริง') p=p.filter(c=>c.exam);
    if(filter==='★★★') p=p.filter(c=>c.star===3);
    return p;
  },[filter]);
  const [order,setOrder]=React.useState(()=>flashcards.map((_,i)=>i));
  const [idx,setIdx]=React.useState(0);
  const [flip,setFlip]=React.useState(false);
  const [score,setScore]=React.useState({c:0,w:0});
  React.useEffect(()=>{setIdx(0);setFlip(false);},[filter]);
  const list = pool;
  const card = list[idx] || list[0];
  const shuffle=()=>{const a=[...list].sort(()=>Math.random()-0.5);/*noop keep*/ setIdx(0);setFlip(false);};
  const next=(dir)=>{setFlip(false);setTimeout(()=>setIdx(p=>(p+dir+list.length)%list.length),120);};

      <div className="fc-perspective" style={{marginTop:10}}>
        <div className={'fc-card'+(flip?' flipped':'')} onClick={()=>setFlip(f=>!f)}>

            <Text type="secondary" style={{marginTop:14}}>👆 แตะเพื่อดูคำตอบ</Text>
          </div>
          <div className="fc-face fc-back" style={{background:C.greenBg,border:'2px solid '+C.green}}>

            <div style={{fontSize:18,fontWeight:700,color:C.green,margin:'6px 0'}}>{card.a}</div>
            <Text style={{color:C.text2}}>{card.d}</Text>

        </div>
      </div>
      <Flex justify="center" gap={10} style={{marginTop:16}} wrap>
        <Button onClick={()=>next(-1)}>◀ ก่อนหน้า</Button>
        <Button danger onClick={()=>mark(false)}>ยังไม่แม่น</Button>

  {m:'1312',t:'สร้างโรงเรือนรุกล้ำโดยสุจริต → จดภาระจำยอม'},

  {m:'1349',t:'ทางจำเป็น — ที่ดินถูกล้อมไม่มีทางออก'},
  {m:'1382',t:'ครอบครองปรปักษ์ 10 ปี (อสังหาฯ) / 5 ปี (สังหาฯ)'},
  {m:'1387',t:'ภาระจำยอม — สามยทรัพย์/ภารยทรัพย์'},
];
function MatchGame(){
  const [rounds,setRounds]=React.useState(0);
  const [pool]=React.useState(()=>matchPairs.slice().sort(()=>Math.random()-.5).slice(0,6));
  const [rights]=React.useState(()=>pool.map(p=>p.t).sort(()=>Math.random()-.5));
  const [sel,setSel]=React.useState(null);
  const [matched,setMatched]=React.useState({});
  const [wrong,setWrong]=React.useState(null);
  const done=Object.keys(matched).length===pool.length;
  const pick=(t)=>{
    if(!sel) return;
    if(sel.t===t){ setMatched(m=>({...m,[sel.m]:true})); setSel(null); }
    else { setWrong(t); setTimeout(()=>setWrong(null),500); setSel(null); }
  };
  return (
    <div>
      <Alert type="info" showIcon style={{borderRadius:10,marginBottom:12}}
        message="วิธีเล่น: คลิก 'เลขมาตรา' ทางซ้าย แล้วคลิก 'หลักกฎหมาย' ทางขวาที่คู่กัน จับให้ครบทุกคู่"/>
      {done && <Result status="success" title="จับคู่ครบแล้ว! 🎉" subTitle="แม่นมาตราขึ้นเยอะเลย ลองสุ่มชุดใหม่ดู"
        extra={<Button type="primary" style={{background:C.gold,borderColor:C.gold}} onClick={()=>setRounds(r=>r+1)} key="r">เล่นชุดใหม่</Button>}/>}
      {!done && <Row gutter={12}>
        <Col span={9}>
          <Space direction="vertical" style={{width:'100%'}}>
            {pool.map(p=>(
              <div key={p.m} onClick={()=>!matched[p.m]&&setSel(p)}
                style={{...box(matched[p.m]?C.greenBg:(sel&&sel.m===p.m?C.gold:C.white), matched[p.m]?C.green:(sel&&sel.m===p.m?C.goldDark:C.border)),
                  cursor:matched[p.m]?'default':'pointer',textAlign:'center',opacity:matched[p.m]?.55:1,marginBottom:0,
                  color:sel&&sel.m===p.m?'#fff':C.text}}>
                <span className="mnum" style={sel&&sel.m===p.m?{background:'#fff',color:C.goldDark}:{}}>ม.{p.m}</span> {matched[p.m]&&'✓'}
              </div>
            ))}
          </Space>
        </Col>
        <Col span={15}>
          <Space direction="vertical" style={{width:'100%'}}>
            {rights.map((t,i)=>{
              const isM=Object.keys(matched).some(k=>pool.find(p=>p.m===k&&p.t===t));
              return (<div key={i} onClick={()=>!isM&&pick(t)}
                style={{...box(isM?C.greenBg:(wrong===t?C.redBg:C.white), isM?C.green:(wrong===t?C.red:C.border)),
                  cursor:isM?'default':'pointer',opacity:isM?.55:1,marginBottom:0,fontSize:13}}>
                {t} {isM&&'✓'}
              </div>);
            })}
          </Space>
        </Col>
      </Row>}
    </div>
  );
}

];
function TimelineTab(){
  const [yr,setYr]=React.useState(0);
  const maxY=12;
  return (
    <div className="fadeUp">
      <Alert type="warning" showIcon style={{borderRadius:12,marginBottom:16}}
        message="เลื่อนแถบ 'จำนวนปี' แล้วดูว่าแต่ละอายุความ 'ครบกำหนด' เมื่อไร — สีเต็มแท่ง = สิทธิเกิด/หมดผลแล้ว"/>
      <Card style={box(C.white,C.border)} bodyStyle={{padding:18}}>
        <Flex align="center" gap={12} wrap>
          <Text strong style={{fontSize:16}}>⏱️ จำนวนปีที่ผ่านไป:</Text>
          <div style={{background:C.gold,color:'#fff',borderRadius:10,padding:'2px 16px',fontSize:22,fontWeight:700}}>{yr} ปี</div>
        </Flex>
        <Slider min={0} max={maxY} value={yr} onChange={setYr} marks={{0:'0',1:'1',5:'5',10:'10',12:'12+'}}
          styles={{track:{background:C.gold},handle:{borderColor:C.goldDark}}} style={{marginTop:10}}/>
      </Card>
      <div style={{marginTop:16}}>
        {timelineData.map((t,i)=>{
          const pct=Math.min(100, (yr/t.years)*100);
          const reached=yr>=t.years;
          return (
            <Card key={i} style={{...box(reached?C.greenBg:C.white, reached?C.green:C.border),marginBottom:12}} bodyStyle={{padding:'14px 16px'}}>
              <Flex justify="space-between" align="center" wrap gap={6}>
                <Text strong>{t.label} <span className="mnum">ม.{t.m}</span></Text>
                <Tag color={reached?'green':'default'}>{reached?'✓ ครบ '+t.years+' ปี':'ต้องการ '+t.years+' ปี'}</Tag>
              </Flex>
              <div className="tl-track" style={{marginTop:8}}>
                <div className="tl-fill" style={{width:pct+'%', background:reached?C.green:t.color}}></div>
              </div>
              {reached && <Text className="fadeUp" style={{color:C.green,display:'block',marginTop:8,fontSize:13}}>⚖️ {t.note}</Text>}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

function CaseDiagnosisTab(){
  const [topic,setTopic]=React.useState(null);
  const [nodeId,setNodeId]=React.useState(null);
  const [path,setPath]=React.useState([]);
  const [result,setResult]=React.useState(null);
  const start=(k)=>{setTopic(k);setNodeId(caseTrees[k].start);setPath([]);setResult(null);};
  const choose=(opt)=>{
    const tree=caseTrees[topic];
    setPath(p=>[...p,{q:tree.nodes[nodeId].q,a:opt.t}]);
    if(opt.go.startsWith('r')){ setResult(tree.results[opt.go]); }
    else setNodeId(opt.go);
  };
  const reset=()=>{setTopic(null);setNodeId(null);setPath([]);setResult(null);};
  if(!topic) return (
    <div className="fadeUp">
      <Alert type="success" showIcon style={{borderRadius:12,marginBottom:16}}
        message="เครื่องมือช่วยวินิจฉัย — ตอบคำถามทีละขั้น ระบบจะไล่ตาม IRAC แล้วบอกมาตราที่ใช้ + แนวคำตอบ"/>
      <Row gutter={12}>
        {Object.keys(caseTrees).map(k=>(
          <Col xs={24} md={8} key={k} style={{marginBottom:12}}>
            <Card hoverable className="qc" onClick={()=>start(k)}
              style={{borderRadius:16,border:'2px solid '+C.border,background:C.white,textAlign:'center'}}>
              <div style={{fontSize:34}}>{caseTrees[k].name.split(' ')[0]}</div>
              <Title level={5} style={{margin:'8px 0 0'}}>{caseTrees[k].name.substring(caseTrees[k].name.indexOf(' ')+1)}</Title>
              <Text type="secondary">เริ่มวินิจฉัย →</Text>
            </Card>
          </Col>
        ))}
      </Row>
    </div>
  );
  const tree=caseTrees[topic];
  return (
    <div className="fadeUp">
      <Flex justify="space-between" align="center" style={{marginBottom:12}}>
        <Tag color="gold" style={{fontSize:14,padding:'4px 10px'}}>{tree.name}</Tag>
        <Button size="small" onClick={reset}>↺ เลือกหัวข้อใหม่</Button>
      </Flex>
      {path.length>0 && <Card style={box(C.surface,C.border)} bodyStyle={{padding:12}}>
        <Steps direction="vertical" size="small" current={path.length}
          items={path.map(p=>({title:p.q,description:<Tag color="blue">{p.a}</Tag>,status:'finish'}))}/>
      </Card>}
      {!result && <Card className="fadeUp pulse" style={{...box(C.white,C.gold),marginTop:12}} bodyStyle={{padding:18}}>
        <Title level={5} style={{marginTop:0}}>{tree.nodes[nodeId].q}</Title>
        <Space direction="vertical" style={{width:'100%'}}>
          {tree.nodes[nodeId].opts.map((o,i)=>(
            <Button key={i} block size="large" onClick={()=>choose(o)}
              style={{textAlign:'left',height:'auto',whiteSpace:'normal',padding:'10px 14px',borderColor:C.border}}>{o.t}</Button>
          ))}
        </Space>
      </Card>}
      {result && <div className="fadeUp">
        <Result status={result.color===C.green?'success':(result.color===C.red?'error':'warning')}
          title={<span>{result.verdict}</span>}
          subTitle={<Tag color={result.color===C.green?'green':(result.color===C.red?'red':'gold')} style={{fontSize:15,marginTop:6}}>{result.law}</Tag>}/>
        <Card style={box(C.gold2,C.gold)} bodyStyle={{padding:16}}>
          <Text strong style={{color:C.goldDark}}>📝 แนวเขียนตอบ (IRAC):</Text>
          <Paragraph style={{marginTop:8,marginBottom:0,color:C.text2}}>{result.irac}</Paragraph>
        </Card>
        <Flex gap={10} style={{marginTop:14}} justify="center">
          <Button onClick={()=>start(topic)}>↻ วินิจฉัยเคสนี้ใหม่</Button>
          <Button type="primary" style={{background:C.gold,borderColor:C.gold}} onClick={reset}>เลือกหัวข้ออื่น</Button>
        </Flex>
      </div>}
    </div>
  );
}

function ExamSimTab(){
  const [setKey,setSetKey]=React.useState(null);
  const [qi,setQi]=React.useState(0);
  const [reveal,setReveal]=React.useState(false);
  const [secs,setSecs]=React.useState(0);
  const [running,setRunning]=React.useState(false);
  React.useEffect(()=>{
    if(!running) return;
    const t=setInterval(()=>setSecs(s=>s+1),1000);
    return ()=>clearInterval(t);
  },[running]);
  const begin=(k)=>{setSetKey(k);setQi(0);setReveal(false);setSecs(0);setRunning(true);};
  const fmt=(s)=>String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  if(!setKey) return (
    <div className="fadeUp">
      <Alert type="warning" showIcon style={{borderRadius:12,marginBottom:16}}
        message="โหมดจำลองข้อสอบจริง — จับเวลาเหมือนห้องสอบ (จริง 2.5 ชม./4 ข้อ ≈ 37 นาที/ข้อ) เขียนตอบในกระดาษก่อน แล้วค่อยกด 'ดูแนวคำตอบ'"/>
      <Row gutter={12}>
        {Object.keys(examSets).map(k=>(
          <Col xs={24} md={12} key={k} style={{marginBottom:12}}>
            <Card hoverable className="qc" onClick={()=>begin(k)} style={{borderRadius:16,border:'2px solid '+C.gold,background:C.white}}>
              <Flex align="center" gap={12}>
                <div style={{fontSize:34}}>📝</div>
                <div>
                  <Title level={4} style={{margin:0}}>ข้อสอบไล่ภาค {k}</Title>
                  <Text type="secondary">อัตนัย 4 ข้อ · LAW2101 ม.รามคำแหง</Text>
                </div>
              </Flex>
            </Card>
          </Col>
        ))}
      </Row>
      <Alert type="info" showIcon style={{borderRadius:10}} message="มีข้อสอบภูมิภาคด้วย (ธ.ค.) เนื้อหาแนวเดียวกัน — ฝึกชุดหลักให้แม่นก่อน"/>
    </div>
  );
  const set=examSets[setKey];
  const cur=set[qi];
  return (
    <div className="fadeUp">
      <Flex justify="space-between" align="center" wrap gap={8} style={{marginBottom:12}}>
        <Space><Tag color="gold">ไล่ภาค {setKey}</Tag><Tag>ข้อ {cur.n}/4</Tag></Space>
        <Space>
          <Tag color={running?'green':'default'} style={{fontSize:15,fontFamily:'monospace'}}>⏱ {fmt(secs)}</Tag>
          <Button size="small" onClick={()=>setRunning(r=>!r)}>{running?'พัก':'เดินเวลา'}</Button>
          <Button size="small" danger onClick={()=>{setSetKey(null);setRunning(false);}}>ออก</Button>
        </Space>
      </Flex>
      <Card style={box(C.white,C.border)} bodyStyle={{padding:20}}>
        <Tag color="blue" style={{marginBottom:8}}>{cur.topic}</Tag>
        <Paragraph className="serif" style={{fontSize:17,lineHeight:1.9,color:C.text}}>{cur.q}</Paragraph>
      </Card>
      {!reveal && <Card style={{...box(C.surface,C.border),marginTop:12}} bodyStyle={{padding:16}}>
        <Text strong>✍️ เขียนตอบตาม IRAC:</Text>
        <div style={{marginTop:8,color:C.text3,fontSize:13}}>Issue (ประเด็น) → Rule (มาตรา+หลัก) → Application (ปรับข้อเท็จจริง) → Conclusion (ฟันธง)</div>
        <Button type="primary" style={{background:C.gold,borderColor:C.gold,marginTop:12}} onClick={()=>setReveal(true)}>ดูแนวคำตอบ (ธง) ▼</Button>
      </Card>}
      {reveal && <Card className="fadeUp" style={{...box(C.greenBg,C.green),marginTop:12}} bodyStyle={{padding:18}}>
        <Text strong style={{color:C.green,fontSize:15}}>🏳️ แนวคำตอบ (ธงคำตอบ)</Text>
        <Paragraph style={{marginTop:8,marginBottom:0,color:C.text2,fontSize:15}}>{cur.key}</Paragraph>
      </Card>}
      <Flex justify="space-between" style={{marginTop:16}}>
        <Button disabled={qi===0} onClick={()=>{setQi(q=>q-1);setReveal(false);}}>◀ ข้อก่อน</Button>
        {qi<set.length-1
          ? <Button type="primary" style={{background:C.goldDark,borderColor:C.goldDark}} onClick={()=>{setQi(q=>q+1);setReveal(false);}}>ข้อถัดไป ▶</Button>
          : <Button type="primary" style={{background:C.green,borderColor:C.green}} onClick={()=>{setRunning(false);}}>จบชุด · หยุดเวลา ✓</Button>}
      </Flex>
    </div>
  );
}

const qcColor={mnem:C.purple,flow:C.cyan,contrast:C.red,chunk:C.blue,formula:C.gold};
const qcBg={mnem:C.purpleBg,flow:C.cyanBg,contrast:C.redBg,chunk:C.blueBg,formula:C.gold2};
function QuickTab(){
  return (
    <div className="fadeUp">
      {quickSections.map((s,i)=> s.divider
        ? <Divider key={i} orientation="left" style={{borderColor:C.borderDark,color:C.text2,fontWeight:700,fontSize:15}}>{s.divider}</Divider>

              <Tag color={s.type==='contrast'?'red':(s.type==='mnem'?'purple':(s.type==='chunk'?'blue':'gold'))} style={{marginTop:2}}>{s.s}</Tag>
              <div style={{flex:1}}>
                <Text strong style={{color:qcColor[s.type],fontSize:15}}>{s.t}</Text>
                <div style={{color:C.text2,marginTop:2}}>{s.b}</div>

            </Flex>
          </Card>
      )}

  );
}
