# openkm static site — nginx server block (served at root "/")
# All app paths are relative (./sw.js, start_url "./"), so root serving is correct.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/manifest+json image/svg+xml;

    # ---- Health check (used by Docker HEALTHCHECK / load balancers) ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- Service worker: must never be cached, or updates won't propagate ----
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # ---- HTML & manifest: always revalidate so new deploys show immediately ----
    location ~* \.(html|webmanifest)$ {
        add_header Cache-Control "no-cache";
    }
    location ~* \.json$ {
        add_header Cache-Control "no-cache";
    }

    # ---- Long-lived static assets (single, clean Cache-Control header) ----
    location ~* \.(js|css|png|jpe?g|gif|svg|ico|webp|avif|woff2?|ttf|eot)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ---- Directory index + 404 ----
    location / {
        try_files $uri $uri/ =404;
    }

    # Do not expose dotfiles / VCS if any slipped into the image
    location ~ /\.(?!well-known) {
        deny all;
    }
}
