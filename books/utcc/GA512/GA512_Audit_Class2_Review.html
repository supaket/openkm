<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA511 การสอบบัญชี — ความเห็น & หลักฐาน (Class 2)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/antd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.8/reset.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  body { background:#f2f4f8; font-family:'Noto Sans Thai',sans-serif; margin:0; }
  * { font-family:'Noto Sans Thai',sans-serif !important; }
  .wrap { max-width:1080px; margin:0 auto; padding:16px 12px 60px; }
  .hero { background:linear-gradient(135deg,#3d5a80,#5b7aa8); border-radius:14px; padding:22px 26px; color:#f0f5fb; margin-bottom:14px; }
  .hero h1 { margin:0 0 6px; font-size:24px; color:#f0f5fb; }
  .hero p { margin:0; opacity:.94; }
  .sec-card { background:#fffdf9; border:1px solid #dde3ec; border-radius:12px; padding:16px 18px; margin-bottom:12px; box-shadow:0 1px 3px rgba(40,60,90,.06); }
  .sec-card h3 { margin:0 0 10px; color:#3d5a80; font-size:17px; }
  .tag-step { display:inline-block; background:#3d5a80; color:#fff; border-radius:20px; padding:1px 12px; font-size:12.5px; margin-right:8px; }
  table.fin { width:100%; border-collapse:collapse; font-size:13.5px; background:#fff; }
  table.fin th { background:#dde6f1; color:#2c3f5c; padding:6px 8px; border:1px solid #c4d3e5; text-align:center; }
  table.fin td { padding:6px 8px; border:1px solid #dde5ee; vertical-align:top; }
  table.fin tr.total td { background:#e8eef6; font-weight:700; }
  table.fin tr.head td { background:#f1f5fa; font-weight:600; }
  .hl { background:#fff3bf; padding:0 4px; border-radius:4px; font-weight:600; }
  .kbox { background:#e8eef6; border-left:4px solid #3d5a80; border-radius:8px; padding:10px 14px; margin:10px 0; font-size:14px; }
  .analogy { background:#eef7ee; border-left:4px solid #4a7c46; border-radius:8px; padding:10px 14px; margin:10px 0; font-size:14px; }
  .warn { background:#fdf1f0; border-left:4px solid #c0564a; border-radius:8px; padding:10px 14px; margin:10px 0; font-size:14px; }
  .je { background:#f7f8fb; border:1px dashed #9aabc4; border-radius:8px; padding:8px 14px; font-size:13.5px; margin:8px 0; }
  .je b { color:#3d5a80; }
  .flip-card { perspective:1000px; cursor:pointer; height:210px; }
  .flip-inner { position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d; }
  .flip-card.flipped .flip-inner { transform:rotateY(180deg); }
  .flip-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:16px; text-align:center; }
  .flip-front { background:#fffdf9; border:2px solid #a7b8d1; color:#2c3f5c; font-weight:600; font-size:15px; }
  .flip-back { background:#3d5a80; color:#f0f5fb; transform:rotateY(180deg); font-size:13px; line-height:1.5; overflow:auto; }
  .qcard { border-radius:12px; padding:14px 16px; color:#fff; margin-bottom:10px; }
  .qcard h4 { color:#fff; margin:0 0 6px; font-size:15.5px; }
  .qcard div { font-size:13.5px; line-height:1.6; }
  .pill { display:inline-block; border-radius:16px; padding:2px 10px; font-size:12.5px; font-weight:600; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { Tabs, Card, Collapse, Tag, Button, Row, Col, Progress, Alert, Steps, Drawer, FloatButton, Segmented, Radio, Divider } = antd;
const { useState } = React;

const OPN = {
  unqualified:{th:'ไม่มีเงื่อนไข',en:'Unqualified',color:'#237804',bg:'#eaf6ea'},
  qualified:{th:'มีเงื่อนไข',en:'Qualified',color:'#ad6800',bg:'#fff7e6'},
  adverse:{th:'งบไม่ถูกต้อง',en:'Adverse',color:'#a8071a',bg:'#fff1f0'},
  disclaimer:{th:'ไม่แสดงความเห็น',en:'Disclaimer',color:'#391085',bg:'#f4eeff'},
};

/* ============ TAB 1 : ความเห็น 4 แบบ + matrix ============ */
function OpinionTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">1.1</span>ความเห็นของผู้สอบบัญชี 4 แบบ</h3>
      <Row gutter={[10,10]}>
        {Object.entries(OPN).map(([k,o])=><Col xs={12} md={6} key={k}>
          <Card size="small" style={{height:'100%',background:o.bg,borderColor:o.color}}>
            <div style={{fontWeight:700,color:o.color,fontSize:15}}>{o.th}</div>
            <div style={{fontSize:12.5,color:'#555'}}>{o.en} opinion</div>
          </Card></Col>)}
      </Row>
      <div className="kbox">📌 ความเห็นแบบไม่มีเงื่อนไข <b>อาจมีวรรคเน้นข้อมูลและเหตุการณ์ (Emphasis of Matter)</b> ได้ โดยไม่ทำให้ความเห็นเปลี่ยนเป็นแบบมีเงื่อนไข</div>
    </div>

    <div className="sec-card">
      <h3><span className="tag-step">1.2</span>ตารางตัดสินใจ — หัวใจของบทนี้</h3>
      <p>ความเห็นที่เปลี่ยนแปลงไปขึ้นกับ 2 แกน: <b>ธรรมชาติของเรื่อง</b> (รู้ว่างบผิด vs หลักฐานไม่พอ) และ <b>ระดับผลกระทบ</b> (มีสาระสำคัญแต่ไม่แผ่กระจาย vs มีสาระสำคัญและแผ่กระจาย)</p>
      <div style={{overflowX:'auto'}}>
      <table className="fin">
        <thead><tr><th style={{minWidth:180}}>ธรรมชาติของเรื่อง</th><th>มีสาระสำคัญ<br/>แต่ไม่แผ่กระจาย</th><th>มีสาระสำคัญ<br/>และแผ่กระจาย</th></tr></thead>
        <tbody>
          <tr><td><b>หลักฐานเพียงพอ แต่รู้ว่างบผิด</b><br/>(Misstatement / งบไม่เป็นไปตามมาตรฐาน)</td>
            <td style={{background:OPN.qualified.bg,textAlign:'center',fontWeight:700,color:OPN.qualified.color}}>มีเงื่อนไข<br/>Qualified</td>
            <td style={{background:OPN.adverse.bg,textAlign:'center',fontWeight:700,color:OPN.adverse.color}}>งบไม่ถูกต้อง<br/>Adverse</td></tr>
          <tr><td><b>หลักฐานไม่เพียงพอ</b><br/>(ถูกจำกัดขอบเขต / Scope limitation)</td>
            <td style={{background:OPN.qualified.bg,textAlign:'center',fontWeight:700,color:OPN.qualified.color}}>มีเงื่อนไข<br/>Qualified</td>
            <td style={{background:OPN.disclaimer.bg,textAlign:'center',fontWeight:700,color:OPN.disclaimer.color}}>ไม่แสดงความเห็น<br/>Disclaimer</td></tr>
        </tbody>
      </table>
      </div>
      <div className="analogy">🧠 จำเป็นภาพ: <b>ไม่แผ่กระจาย = ยังให้ "มีเงื่อนไข" ได้ทั้งสองแถว</b> | พอ <b>แผ่กระจาย</b> ต้องแยก: รู้ว่าผิด→<b>Adverse</b> / หลักฐานไม่พอ→<b>Disclaimer</b></div>
      <div className="warn">⚠️ ถ้าเรื่องนั้น <b>ไม่มีสาระสำคัญ</b> (immaterial) → ความเห็นยังเป็น <b>ไม่มีเงื่อนไข</b> เสมอ (ไม่เข้าตารางนี้)</div>
      <div className="kbox">🧪 กดปุ่มลอย "ทดลอง" มุมขวาล่าง → <b>เครื่องมือตัดสินความเห็น</b> เลือก 2 คำถามแล้วดูคำตอบ + ช่องที่ไฮไลต์ในตารางทันที</div>
    </div>

    <div className="sec-card">
      <h3><span className="tag-step">1.3</span>เข้าใจแต่ละแบบ (เงื่อนไขที่ทำให้เกิด)</h3>
      <Collapse items={[
        {key:'u',label:'✅ ไม่มีเงื่อนไข (Unqualified) — งบดีทุกอย่าง',children:<div>รวบรวมหลักฐาน<b>เพียงพอและเหมาะสม</b> และสรุปได้ว่างบการเงิน<b>ไม่มีข้อมูลที่ขัดต่อข้อเท็จจริงอันเป็นสาระสำคัญ</b></div>},
        {key:'q',label:'⚠️ มีเงื่อนไข (Qualified) — "ผิดบางส่วน!"',children:<div>เกิดได้ 2 ทาง: ① ได้หลักฐานเพียงพอ แต่พบรายการที่<b>ขัดต่อข้อเท็จจริงอันเป็นสาระสำคัญ แต่ไม่แผ่กระจาย</b> | ② ได้หลักฐาน<b>ไม่เพียงพอ</b> และคาดว่าอาจมีข้อมูลขัดต่อข้อเท็จจริงที่เป็นสาระสำคัญ แต่ไม่แผ่กระจาย</div>},
        {key:'a',label:'❌ งบไม่ถูกต้อง (Adverse) — งบผิดหนัก',children:<div>ได้รับหลักฐานที่เหมาะสมอย่างเพียงพอ และสรุปได้ว่ารายการหรือผลรวมหลายรายการแสดงข้อมูลที่ขัดต่อข้อเท็จจริงอันเป็นสาระสำคัญ <b>และแผ่กระจาย</b>ไปยังงบการเงิน</div>},
        {key:'d',label:'🚫 ไม่แสดงความเห็น (Disclaimer) — หลักฐานไม่พอจนสรุปไม่ได้',children:<div>ได้หลักฐาน<b>ไม่เพียงพอ</b> และคาดว่ามีข้อมูลขัดต่อข้อเท็จจริงที่ส่งผลกระทบอันเป็นสาระสำคัญ<b>และแผ่กระจาย</b> หรือมีความไม่แน่นอนหลายเรื่องที่อาจสัมพันธ์กันจนกระทบงบการเงินโดยรวม</div>},
      ]}/>
    </div>

    <div className="sec-card">
      <h3><span className="tag-step">1.4</span>"แผ่กระจาย" (Pervasive) คืออะไร</h3>
      <table className="fin"><tbody>
        <tr><td>①</td><td>ผลกระทบ<b>ไม่จำกัดเฉพาะ</b>องค์ประกอบ บัญชี หรือรายการใดรายการหนึ่งของงบการเงิน</td></tr>
        <tr><td>②</td><td>ถ้าจำกัดเฉพาะบางส่วน แต่ส่วนนั้น<b>เป็นสัดส่วนที่สำคัญอย่างมาก</b>ต่องบการเงิน</td></tr>
        <tr><td>③</td><td>เกี่ยวกับการเปิดเผยข้อมูลซึ่งเป็น<b>ข้อมูลพื้นฐาน</b>ที่ผู้ใช้ต้องมีเพื่อเข้าใจงบการเงิน</td></tr>
      </tbody></table>
    </div>
  </div>;
}

/* ============ TAB 2 : ก่อนแสดงความเห็น + Going Concern ============ */
function BeforeTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">2.1</span>ก่อนแสดงความเห็น ต้องประเมิน 6 เรื่อง</h3>
      <table className="fin"><tbody>
        <tr><td>1</td><td>การเปิดเผยเกี่ยวกับ<b>นโยบายการบัญชี</b>ที่เลือกและนำไปปฏิบัติอย่างถูกต้อง</td></tr>
        <tr><td>2</td><td>นโยบายบัญชี<b>สอดคล้องกับแม่บทการรายงานทางการเงิน</b>หรือไม่</td></tr>
        <tr><td>3</td><td><b>ประมาณการทางบัญชี</b>สมเหตุสมผลหรือไม่</td></tr>
        <tr><td>4</td><td>ข้อมูล<b>เกี่ยวข้องกัน เชื่อถือได้ เปรียบเทียบกันได้ และเข้าใจได้</b>หรือไม่</td></tr>
        <tr><td>5</td><td>งบการเงินมีการ<b>เปิดเผยข้อมูลอย่างเพียงพอ</b>หรือไม่</td></tr>
        <tr><td>6</td><td><b>คำศัพท์</b>ที่ใช้ รวมถึง<b>ชื่อของงบการเงิน</b>แต่ละงบมีความเหมาะสมหรือไม่</td></tr>
      </tbody></table>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">2.2</span>การดำเนินงานต่อเนื่อง (Going Concern)</h3>
      <p>ผู้สอบบัญชีมีความรับผิดชอบในการได้มาซึ่งหลักฐานที่เหมาะสมอย่างเพียงพอ เกี่ยวกับ<b>ความเหมาะสมของการใช้เกณฑ์การดำเนินงานต่อเนื่อง</b>ของผู้บริหารในการจัดทำงบการเงิน</p>
      <Steps direction="vertical" size="small" current={-1} items={[
        {title:'ใช้เกณฑ์ going concern ไม่เหมาะสม',description:'→ แสดงความเห็นว่างบการเงินไม่ถูกต้อง (Adverse)'},
        {title:'เกณฑ์เหมาะสม + เปิดเผยข้อมูลเพียงพอ',description:'→ เพิ่มวรรค "ความไม่แน่นอนที่มีสาระสำคัญที่เกี่ยวข้องกับการดำเนินงานต่อเนื่อง" (ยังไม่มีเงื่อนไข)'},
        {title:'เปิดเผยข้อมูลไม่เพียงพอ',description:'→ แสดงความเห็นแบบมีเงื่อนไข (Qualified) หรือว่างบไม่ถูกต้อง (Adverse)'},
      ]}/>
      <div className="analogy">🧭 จับหลัก: <b>เกณฑ์ผิด → Adverse</b> | <b>เกณฑ์ถูกแต่เปิดเผยไม่พอ → Qualified/Adverse</b> | <b>เกณฑ์ถูก เปิดเผยพอ → เพิ่มวรรคเตือน (ไม่มีเงื่อนไข)</b></div>
    </div>
  </div>;
}

/* ============ TAB 3 : ส่วนประกอบรายงาน ============ */
function ReportTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">3.1</span>ส่วนประกอบของรายงานผู้สอบบัญชี (เรียงตามลำดับ)</h3>
      <Steps direction="vertical" size="small" current={-1} items={[
        {title:'หัวเรื่องและผู้รับ',description:'เป็นลายลักษณ์อักษร | ระบุชัดว่าเป็นรายงานของผู้สอบบัญชีรับอนุญาต | ระบุผู้รับรายงาน'},
        {title:'ความเห็น (Opinion) — อยู่ส่วนแรก',description:'ต้องมีหัวข้อ "ความเห็น" | ระบุกิจการ ว่างบได้รับการตรวจสอบแล้ว ชื่อของงบแต่ละงบ อ้างอิงหมายเหตุประกอบ ระบุวันที่/รอบระยะเวลา'},
        {title:'เกณฑ์ในการแสดงความเห็น (Basis for Opinion)',description:'ต่อจากความเห็น | ระบุว่าตรวจตามมาตรฐานการสอบบัญชี | ความเป็นอิสระ จรรยาบรรณ | รวบรวมหลักฐานเพียงพอก่อนแสดงความเห็น'},
        {title:'การดำเนินงานต่อเนื่อง (ถ้ามี)',description:'วรรคความไม่แน่นอนที่มีสาระสำคัญ (ถ้ามี)'},
        {title:'เรื่องสำคัญในการตรวจสอบ (Key Audit Matters) + ข้อมูลอื่น (Other Information)'},
        {title:'ความรับผิดชอบของผู้บริหารต่องบการเงิน',description:'จัดทำงบตามแม่บทการรายงานทางการเงิน + รับผิดชอบการควบคุมภายใน + ประเมินความสามารถในการดำเนินงานต่อเนื่อง'},
        {title:'ความรับผิดชอบของผู้สอบบัญชีต่อการตรวจสอบ',description:'วัตถุประสงค์: (1) ได้ความเชื่อมั่นอย่างสมเหตุสมผลว่างบโดยรวมปราศจากการแสดงข้อมูลขัดต่อข้อเท็จจริงอันเป็นสาระสำคัญ ไม่ว่าจากทุจริตหรือข้อผิดพลาด (2) เสนอรายงานที่รวมความเห็น'},
        {title:'ชื่อ/ลายมือชื่อ/ที่อยู่ ผู้สอบบัญชี และวันที่ในรายงาน'},
      ]}/>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">3.2</span>ประเด็นที่ต้องจำเรื่อง "ความเชื่อมั่นอย่างสมเหตุสมผล"</h3>
      <div className="kbox">🎯 <b>Reasonable assurance = ความเชื่อมั่นระดับสูง แต่ไม่ใช่การรับประกัน</b> ว่าการตรวจสอบตามมาตรฐานจะตรวจพบข้อมูลที่ขัดต่อข้อเท็จจริงอันเป็นสาระสำคัญที่มีอยู่ได้เสมอไป</div>

function SufficiencyTab(){
  return <div>

        <Col xs={24} md={12}><Card size="small" title="📊 ความเพียงพอ = ปริมาณ" style={{height:'100%',background:'#eef3fa'}}>
          วัด<b>ปริมาณ</b>ของหลักฐาน ขึ้นกับ:<br/>① <b>ความเสี่ยงที่ประเมินได้</b> — เสี่ยงยิ่งสูง ยิ่งต้องการหลักฐานมากขึ้น<br/>② <b>คุณภาพของหลักฐาน</b> — คุณภาพยิ่งสูง อาจต้องการปริมาณน้อยลง</Card></Col>
        <Col xs={24} md={12}><Card size="small" title="💎 ความเหมาะสม = คุณภาพ" style={{height:'100%',background:'#eef7ee'}}>
          วัด<b>คุณภาพ</b>ของหลักฐาน = <b>ความเกี่ยวข้อง (relevance)</b> + <b>ความน่าเชื่อถือ (reliability)</b> ที่ใช้สนับสนุนข้อสรุปในการแสดงความเห็น</Card></Col>
      </Row>
      <div className="warn">⚠️ กับดักสำคัญ: การได้หลักฐาน<b>ปริมาณมากขึ้น ทดแทนคุณภาพต่ำไม่ได้</b> — ปริมาณเยอะแต่ห่วย ก็ยังไม่พอ</div>
    </div>
    <div className="sec-card">
      <h3><span className="tag-step">5.2</span>ปัจจัยที่กระทบความน่าเชื่อถือของหลักฐาน 6 ข้อ</h3>
      <table className="fin"><tbody>
        <tr><td>1</td><td><b>ความเป็นอิสระของผู้ให้ข้อมูล</b> — มาจากภายนอกที่เป็นอิสระ น่าเชื่อถือกว่ามาจากภายในกิจการ</td></tr>
        <tr><td>2</td><td><b>ประสิทธิภาพของการควบคุมภายใน</b>ของลูกค้า — ควบคุมภายในดี หลักฐานที่ผลิตขึ้นน่าเชื่อถือกว่า</td></tr>
        <tr><td>3</td><td><b>การได้มาซึ่งหลักฐานโดยตรงของผู้สอบ</b> (direct knowledge) — ผู้สอบหาเอง น่าเชื่อถือกว่าได้มาทางอ้อม</td></tr>
        <tr><td>4</td><td><b>คุณสมบัติของผู้ให้ข้อมูล</b> — ผู้ให้ข้อมูลมีความรู้/ความสามารถ ยิ่งน่าเชื่อถือ</td></tr>
        <tr><td>5</td><td><b>ระดับความเป็นภววิสัย (objectivity)</b> — เป็นกลาง วัดได้ น่าเชื่อถือกว่าอัตวิสัย</td></tr>
        <tr><td>6</td><td><b>ความทันเวลา (timeliness)</b> — ยิ่งทันเวลา/ใกล้วันที่ในงบ ยิ่งน่าเชื่อถือ</td></tr>
      </tbody></table>
      <div className="kbox">🧭 จำลำดับความน่าเชื่อถือ (สูง→ต่ำ): หลักฐานผู้สอบหาเอง &gt; แหล่งภายนอกอิสระ &gt; ที่ผลิตในกิจการที่ควบคุมภายในดี &gt; คำบอกเล่าด้วยวาจาจากภายใน</div>
    </div>
  </div>;
}

function FlashTab(){
  const [order,setOrder]=useState(CARDS.map((_,i)=>i));
  const [flipped,setFlipped]=useState({});
  const [score,setScore]=useState({know:0,dunno:0});
  const shuffle=()=>{setOrder([...order].sort(()=>Math.random()-.5));setFlipped({});setScore({know:0,dunno:0});};
  return <div>
    <div style={{marginBottom:12,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <Button type="primary" style={{background:'#3d5a80'}} onClick={shuffle}>🔀 สับการ์ด</Button>
      <Tag color="green">รู้แล้ว {score.know}</Tag><Tag color="red">ยังไม่รู้ {score.dunno}</Tag>
      <Progress percent={Math.round((score.know+score.dunno)/CARDS.length*100)} size="small" style={{width:180}} strokeColor="#3d5a80"/>
      <span style={{fontSize:12.5,color:'#5a6478'}}>แตะการ์ดเพื่อพลิกดูคำตอบ</span>
    </div>
    <Row gutter={[10,10]}>
      {order.map(i=><Col xs={24} sm={12} lg={8} key={i}>
        <div className={'flip-card'+(flipped[i]?' flipped':'')} onClick={()=>setFlipped({...flipped,[i]:!flipped[i]})}>
          <div className="flip-inner">
            <div className="flip-face flip-front">{CARDS[i].q}</div>
            <div className="flip-face flip-back"><div>{CARDS[i].a}
              <div style={{marginTop:8}} onClick={e=>e.stopPropagation()}>
                <Button size="small" style={{marginRight:6}} onClick={()=>setScore(s=>({...s,know:s.know+1}))}>✅ รู้แล้ว</Button>
                <Button size="small" danger onClick={()=>setScore(s=>({...s,dunno:s.dunno+1}))}>❌ ทวนอีก</Button>
              </div></div></div>
          </div>
        </div>
      </Col>)}
    </Row>
  </div>;
}

/* ============ LAB 1 : Opinion Decision Tool ============ */
function DecisionLab(){
  const [nature,setNature]=useState('misstatement'); // misstatement | scope
  const [impact,setImpact]=useState('material_np');  // immaterial | material_np | material_pervasive
  let key;
  if(impact==='immaterial') key='unqualified';
  else if(nature==='misstatement') key = impact==='material_np'?'qualified':'adverse';
  else key = impact==='material_np'?'qualified':'disclaimer';
  const o=OPN[key];
  const cell=(nat,imp)=> nat===nature && imp===impact && impact!=='immaterial';
  const cellStyle=(k,active)=>({textAlign:'center',fontWeight:700,color:OPN[k].color,background:active?OPN[k].color:OPN[k].bg,...(active?{color:'#fff'}:{})});
  return <div>
    <Alert type="info" showIcon style={{marginBottom:12}} message="ตอบ 2 คำถาม แล้วดูความเห็นที่ถูกต้อง + ช่องที่ไฮไลต์" />
    <div style={{fontSize:13.5,marginBottom:4}}><b>คำถามที่ 1 — ธรรมชาติของเรื่อง</b></div>
    <Radio.Group value={nature} onChange={e=>setNature(e.target.value)} optionType="button" buttonStyle="solid" style={{marginBottom:12,flexWrap:'wrap'}}
      options={[{label:'รู้ว่างบผิด (หลักฐานพอ)',value:'misstatement'},{label:'หลักฐานไม่พอ (จำกัดขอบเขต)',value:'scope'}]}/>
    <div style={{fontSize:13.5,marginBottom:4}}><b>คำถามที่ 2 — ระดับผลกระทบ</b></div>
    <Radio.Group value={impact} onChange={e=>setImpact(e.target.value)} optionType="button" buttonStyle="solid" style={{marginBottom:14,flexWrap:'wrap'}}
      options={[{label:'ไม่มีสาระสำคัญ',value:'immaterial'},{label:'มีสาระสำคัญ ไม่แผ่กระจาย',value:'material_np'},{label:'มีสาระสำคัญ และแผ่กระจาย',value:'material_pervasive'}]}/>
    <div style={{padding:'14px',borderRadius:10,background:o.bg,border:'2px solid '+o.color,textAlign:'center',marginBottom:14}}>
      <div style={{fontSize:13,color:'#555'}}>ความเห็นที่ถูกต้อง</div>
      <div style={{fontSize:22,fontWeight:800,color:o.color}}>{o.th}</div>
      <div style={{fontSize:13,color:o.color}}>{o.en} opinion</div>
    </div>
    {impact==='immaterial'
      ? <div className="analogy" style={{fontSize:13}}>ℹ️ ไม่มีสาระสำคัญ → ไม่กระทบความเห็น ยังคงเป็น "ไม่มีเงื่อนไข" ไม่ต้องดูตาราง</div>
      : <table className="fin">
          <thead><tr><th>ธรรมชาติ / ผลกระทบ</th><th>ไม่แผ่กระจาย</th><th>แผ่กระจาย</th></tr></thead>
          <tbody>
            <tr><td><b>รู้ว่างบผิด</b></td>
              <td style={cellStyle('qualified',cell('misstatement','material_np'))}>Qualified</td>
              <td style={cellStyle('adverse',cell('misstatement','material_pervasive'))}>Adverse</td></tr>
            <tr><td><b>หลักฐานไม่พอ</b></td>
              <td style={cellStyle('qualified',cell('scope','material_np'))}>Qualified</td>
              <td style={cellStyle('disclaimer',cell('scope','material_pervasive'))}>Disclaimer</td></tr>
          </tbody>
        </table>}
  </div>;
}

/* ============ LAB 2 : Case Quiz ============ */
function CaseQuizLab(){
  const [i,setI]=useState(0);
  const [picked,setPicked]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const c=CASES[i];
  const choose=(k)=>{ if(picked)return; setPicked(k); if(k===c.ans)setScore(score+1); };
  const next=()=>{ if(i+1<CASES.length){setI(i+1);setPicked(null);} else setDone(true); };
  if(done) return <div style={{textAlign:'center',padding:20}}>
    <div style={{fontSize:40}}>🎉</div>
    <div style={{fontSize:18,fontWeight:700,margin:'8px 0'}}>ได้ {score} / {CASES.length} คะแนน</div>
    <Button type="primary" style={{background:'#3d5a80'}} onClick={()=>{setI(0);setPicked(null);setScore(0);setDone(false);}}>เริ่มใหม่</Button>
  </div>;
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
      <Tag color="blue">เคส {i+1} / {CASES.length}</Tag><Tag color="green">คะแนน {score}</Tag></div>
    <div className="sec-card" style={{marginBottom:10}}>
      <div style={{fontWeight:700,marginBottom:4}}>{c.name}</div>
      <div style={{fontSize:13.5}}>{c.scenario}</div>
    </div>
    <Row gutter={[8,8]}>
      {Object.entries(OPN).map(([k,o])=>{
        let border='#d9d9d9',bg='#fff';
        if(picked){ if(k===c.ans){border=o.color;bg=o.bg;} else if(k===picked){border='#c0564a';bg='#fff1f0';} }
        return <Col xs={12} key={k}>
          <div onClick={()=>choose(k)} style={{cursor:picked?'default':'pointer',padding:'10px',borderRadius:8,border:'2px solid '+border,background:bg,textAlign:'center',fontWeight:600,fontSize:13.5,color:o.color}}>
            {o.th}<div style={{fontSize:11,color:'#888'}}>{o.en}</div></div>
        </Col>;})}
    </Row>
    {picked && <div className={picked===c.ans?'analogy':'warn'} style={{marginTop:10,fontSize:13}}>
      <div style={{fontWeight:700,marginBottom:4}}>{picked===c.ans?'✅ ถูกต้อง!':'❌ ยังไม่ใช่ — คำตอบคือ '+OPN[c.ans].th}</div>
      <div dangerouslySetInnerHTML={{__html:c.why}}/>
      <div style={{marginTop:8}}><Button type="primary" size="small" style={{background:'#3d5a80'}} onClick={next}>{i+1<CASES.length?'เคสถัดไป →':'ดูคะแนน'}</Button></div>
    </div>}
  </div>;
}

  {s:'ผู้สอบทำขั้นตอนการควบคุมภายในซ้ำเองเพื่อดูว่าให้ผลตรงกัน',ans:6},
  {s:'เปรียบเทียบอัตรากำไรขั้นต้นปีนี้กับปีก่อนเพื่อหาความผิดปกติ',ans:7},
  {s:'สอบถามผู้จัดการฝ่ายบัญชีเรื่องนโยบายการตัดจำหน่ายหนี้สูญ',ans:8},
];
function EvidenceMatchLab(){
  const [i,setI]=useState(0);
  const [picked,setPicked]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const q=EMATCH[i];
  const choose=(n)=>{ if(picked)return; setPicked(n); if(n===q.ans)setScore(score+1); };
  const next=()=>{ if(i+1<EMATCH.length){setI(i+1);setPicked(null);} else setDone(true); };
  if(done) return <div style={{textAlign:'center',padding:20}}>
    <div style={{fontSize:40}}>🎯</div>
    <div style={{fontSize:18,fontWeight:700,margin:'8px 0'}}>ได้ {score} / {EMATCH.length} คะแนน</div>
    <Button type="primary" style={{background:'#3d5a80'}} onClick={()=>{setI(0);setPicked(null);setScore(0);setDone(false);}}>เริ่มใหม่</Button>
  </div>;
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
      <Tag color="blue">ข้อ {i+1} / {EMATCH.length}</Tag><Tag color="green">คะแนน {score}</Tag></div>
    <Alert type="info" showIcon style={{marginBottom:10}} message="สถานการณ์นี้ใช้หลักฐานประเภทไหน?" description={q.s}/>
    <Row gutter={[6,6]}>
      {EVID.map(e=>{
        let border='#d9d9d9',bg='#fff';
        if(picked){ if(e.n===q.ans){border='#237804';bg='#eaf6ea';} else if(e.n===picked){border='#c0564a';bg='#fff1f0';} }
        return <Col xs={12} md={6} key={e.n}>
          <div onClick={()=>choose(e.n)} style={{cursor:picked?'default':'pointer',padding:'8px 6px',borderRadius:8,border:'2px solid '+border,background:bg,textAlign:'center',fontSize:12,fontWeight:600,minHeight:52,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {e.th}</div></Col>;})}
    </Row>
    {picked && <div className={picked===q.ans?'analogy':'warn'} style={{marginTop:10,fontSize:13}}>
      <div style={{fontWeight:700}}>{picked===q.ans?'✅ ถูกต้อง':'❌ คำตอบคือ '+EVID[q.ans-1].th+' ('+EVID[q.ans-1].en+')'}</div>
      <div style={{marginTop:6}}><Button type="primary" size="small" style={{background:'#3d5a80'}} onClick={next}>{i+1<EMATCH.length?'ข้อถัดไป →':'ดูคะแนน'}</Button></div>
    </div>}
  </div>;
}

/* ============ FLOATING TOOL ============ */
function FloatingLab(){
  const [open,setOpen]=useState(false);
  const [seg,setSeg]=useState('decide');
  const w = typeof window!=='undefined'? Math.min(560, window.innerWidth-16) : 560;
  return <React.Fragment>
    <FloatButton type="primary" onClick={()=>setOpen(true)} description="ทดลอง" shape="square"
      style={{right:24,bottom:24,width:58,height:58}} icon={<span style={{fontSize:20}}>🧪</span>}/>
    <Drawer open={open} onClose={()=>setOpen(false)} width={w} title="🧪 ห้องทดลองแบบโต้ตอบ" styles={{body:{paddingTop:12}}}>
      <Segmented block value={seg} onChange={setSeg} style={{marginBottom:14}}
        options={[{label:'🧭 ตัดสินความเห็น',value:'decide'},{label:'🎯 ฝึกเคส',value:'quiz'},{label:'🔍 จับคู่หลักฐาน',value:'evid'}]}/>
      {seg==='decide' && <DecisionLab/>}
      {seg==='quiz' && <CaseQuizLab/>}
      {seg==='evid' && <EvidenceMatchLab/>}
    </Drawer>
  </React.Fragment>;
}
