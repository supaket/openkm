<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button,
        Row, Col, Divider, Alert, Statistic, Flex, Segmented, Radio, Progress,
        Collapse, Result, Tooltip, Badge, Empty } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState, useEffect, useMemo } = React;

/* ============ PALETTE — โทน "จารึกดินเผา" (ต่างจากวิชาตัวแทนที่ใช้โทนทอง) ============ */
const C = {
  prim:'#9B5D46', primDark:'#7A4634', primLight:'#C08A6E',
  accent:'#A5674C', accentDark:'#6E4433',
  bg:'#F6F0E4', surface:'#EEE6D6', surface2:'#E6DCC8', surface3:'#F1EADB',
  border:'#DCCFB6', borderDark:'#C2AC8A',
  text:'#3B2F26', text2:'#5A4B3E', text3:'#7C6E5E',
  white:'#FBF8F1',
  green:'#5D8A66', greenBg:'#EFF5F0',
  red:'#B85C5C', redBg:'#F5ECEA',
  purple:'#7B6B8A', purpleBg:'#F0ECF3',
  blue:'#5B7A9E', blueBg:'#ECF0F5',
  cyan:'#5B8A8A', cyanBg:'#ECF2F2',
};

/* ============ SHARED HELPERS ============ */
const Stars = ({n}) => <span style={{color:C.accent, letterSpacing:1}}>{'★'.repeat(n)}<span style={{color:C.border}}>{'★'.repeat(3-n)}</span></span>;

const Ref = ({children}) => (
  <span className="ref-badge" style={{background:C.surface2, color:C.primDark, padding:'1px 8px', borderRadius:7, border:`1px solid ${C.border}`, whiteSpace:'nowrap', fontSize:12.5}}>{children}</span>
);

const Pill = ({color, bg, children}) => (
  <span className="tag-chip" style={{background:bg, color:color, border:`1px solid ${color}33`}}>{children}</span>
);

const Box = ({tone='prim', title, icon, children, style}) => {
  const map = {
    green:[C.green,C.greenBg], red:[C.red,C.redBg], blue:[C.blue,C.blueBg],
    purple:[C.purple,C.purpleBg], cyan:[C.cyan,C.cyanBg], prim:[C.primDark,C.surface3]
  };
  const [cc,bb] = map[tone]||map.prim;
  return (
    <div className="lesson-body" style={{background:bb, border:`1px solid ${cc}33`, borderLeft:`4px solid ${cc}`, borderRadius:12, padding:'13px 16px', margin:'10px 0', ...style}}>
      {title && <div style={{fontWeight:700, color:cc, marginBottom:6, fontSize:15}}>{icon} {title}</div>}
      <div style={{color:C.text2, fontSize:14.5}}>{children}</div>
    </div>
  );
};

// แถวหลัก: badge อ้างอิง + คำอธิบาย
const SRule = ({n, children}) => (
  <div style={{display:'flex', gap:10, alignItems:'flex-start', margin:'7px 0'}}>
    <Ref>{n}</Ref>
    <span style={{color:C.text2, fontSize:14.3, flex:1}}>{children}</span>
  </div>
);

/* ============ ANIMATED SVG DIAGRAM ENGINE ============ */
function DiaNode({x, y, w=150, h=62, title, sub, color, active}) {
  return (
    <g className={active?'node-pulse':''}>
      <rect x={x-w/2} y={y-h/2} width={w} height={h} rx={14}
        fill={active ? color : C.white}
        stroke={color} strokeWidth={active?3:2}
        style={{filter: active?`drop-shadow(0 4px 10px ${color}55)`:'none', transition:'all .4s'}} />
      <text x={x} y={sub? y-6 : y+5} textAnchor="middle"
        fontFamily="'Noto Sans Thai'" fontWeight="700" fontSize="15"
        fill={active ? C.white : color}>{title}</text>
      {sub && <text x={x} y={y+14} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="11"
        fill={active ? C.white : C.text3}>{sub}</text>}
    </g>
  );
}

function DiaEdge({id, d, color, label, labelX, labelY, dashed, animate, dur=2.6, width=3, dim}) {
  const op = dim ? 0.15 : 1;
  return (
    <g style={{opacity:op, transition:'opacity .4s'}}>
      <path id={id} d={d} fill="none" stroke={color} strokeWidth={width}
        strokeDasharray={dashed?'7 7':'none'} strokeLinecap="round"
        markerEnd={`url(#arrow-${id})`} />
      <defs>
        <marker id={`arrow-${id}`} markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L7,3 L0,6 Z" fill={color}/>
        </marker>
      </defs>
      {animate && !dim &&
        <circle r="6.5" fill={color}>
          <animateMotion dur={`${dur}s`} repeatCount="indefinite" rotate="0">
            <mpath href={`#${id}`}/>
          </animateMotion>
        </circle>}
      {label && !dim &&
        <g>
          <rect x={labelX-label.length*4.1-8} y={labelY-13} width={label.length*8.2+16} height={22} rx={11}
            fill={C.white} stroke={color+'55'} />
          <text x={labelX} y={labelY+2} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12"
            fontWeight="600" fill={color}>{label}</text>
        </g>}
    </g>
  );
}

/* แผนภาพแกนวิชา: "สายธารกฎหมาย 3 สาย ไหลมาสู่ประเทศไทย" */
function LegalRiversDiagram() {
  const modes = {
    civil: {
      label:'สายซีวิลลอว์ (โรมัน)', color:C.blue,
      desc:'กฎหมายโรมัน (Jus Civile) พัฒนาต่อเนื่องกว่า 1,300 ปี จนถึง Corpus Juris Civilis ของจัสติเนียน → ฟื้นฟูที่มหาวิทยาลัยโบโลญญา → กลายเป็น "กฎหมายกลาง" ของยุโรปภาคพื้นทวีป (ฝรั่งเศส เยอรมัน) → ไทยรับมาจัดทำประมวลกฎหมายลายลักษณ์อักษร (ป.พ.พ., ป.อาญา) — นี่คือสายหลักของกฎหมายไทยปัจจุบัน',
    },
    common: {
      label:'สายคอมมอนลอว์ (อังกฤษ)', color:C.purple,
      desc:'เกิดจากศาลของกษัตริย์อังกฤษ (King’s Court) ใช้จารีตประเพณี + คำพิพากษาเป็นบ่อเกิดกฎหมาย (Judge-made Law) มีลูกขุน 12 คน และหลัก Precedent — เมื่อคอมมอนลอว์แข็งตัว จึงเกิดระบบ Equity (ศาล Chancery ค.ศ. 1485) มาถ่วงดุล แล้วรวมกันด้วย Judicature Acts ค.ศ. 1875 → แพร่ไปอเมริกา ออสเตรเลีย — ไทยรับอิทธิพลเพียง "บางส่วน"',
    },
    thai: {
      label:'สายกฎหมายไทยเดิม (ธรรมศาสตร์)', color:C.green,
      desc:'คัมภีร์พระธรรมศาสตร์จากอินเดีย (ศาสนาพราหมณ์ — กำเนิดจากคดีไร่แดงของพระโมนสาร) เข้าสู่สยาม เป็นกฎหมายศักดิ์สูงสุดเทียบรัฐธรรมนูญ → ร.1 ทรงชำระเป็นกฎหมายตราสามดวง พ.ศ. 2347 (29 ลักษณะ 1,600+ บท) → ใช้มากว่า 100 ปี จนถูกยกเลิก พ.ศ. 2481 เมื่อไทยเปลี่ยนเข้าสู่ระบบประมวลกฎหมายแบบซีวิลลอว์',
    },
  };
  const [m, setM] = useState('civil');
  const M = modes[m];
  const dim = k => m!==k;
  // พิกัดโหนด
  const RO={x:115,y:70}, EU={x:115,y:195}, EN={x:545,y:70}, EQ={x:545,y:195}, IN={x:330,y:70}, TS={x:330,y:195}, TH={x:330,y:320};
  return (
    <div>
      <div style={{textAlign:'center', marginBottom:12}}>
        <Segmented value={m} onChange={setM} size="large"
          options={Object.keys(modes).map(k=>({label:modes[k].label, value:k}))} />
      </div>
      <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:16, padding:'8px 4px'}}>
        <svg viewBox="0 0 660 380" style={{width:'100%', height:'auto', maxHeight:430}}>
          {/* สายโรมัน */}
          <DiaEdge id="r1" d={`M ${RO.x} ${RO.y+32} L ${EU.x} ${EU.y-33}`} color={C.blue}
            label="Corpus Juris Civilis" labelX={115} labelY={133} animate dur={2.4} dim={dim('civil')} />
          <DiaEdge id="r2" d={`M ${EU.x+55} ${EU.y+22} Q 210 300 ${TH.x-78} ${TH.y-8}`} color={C.blue}
            label="ปฏิรูปเป็นประมวล" labelX={185} labelY={280} animate dur={2.8} dim={dim('civil')} />
          {/* สายอังกฤษ */}
          <DiaEdge id="e1" d={`M ${EN.x} ${EN.y+32} L ${EQ.x} ${EQ.y-33}`} color={C.purple}
            label="Equity ถ่วงดุล 1485" labelX={545} labelY={133} animate dur={2.4} dim={dim('common')} />
          <DiaEdge id="e2" d={`M ${EQ.x-55} ${EQ.y+22} Q 450 300 ${TH.x+78} ${TH.y-8}`} color={C.purple}
            label="ไทยรับบางส่วน" labelX={478} labelY={280} animate dur={2.8} dashed dim={dim('common')} />
          {/* สายธรรมศาสตร์ */}
          <DiaEdge id="t1" d={`M ${IN.x} ${IN.y+32} L ${TS.x} ${TS.y-33}`} color={C.green}
            label="ร.1 ชำระ พ.ศ.2347" labelX={330} labelY={133} animate dur={2.4} dim={dim('thai')} />
          <DiaEdge id="t2" d={`M ${TS.x} ${TS.y+32} L ${TH.x} ${TH.y-33}`} color={C.green}
            label="ยกเลิก 2481" labelX={330} labelY={258} animate dur={2.2} dashed dim={dim('thai')} />

          <DiaNode {...RO} title="กฎหมายโรมัน" sub="Jus Civile · 12 โต๊ะ" color={C.blue} active={m==='civil'} />
          <DiaNode {...EU} title="ยุโรปภาคพื้น" sub="ฝรั่งเศส · เยอรมัน" color={C.blue} active={m==='civil'} />
          <DiaNode {...EN} title="อังกฤษ" sub="King's Court" color={C.purple} active={m==='common'} />
          <DiaNode {...EQ} title="Common Law + Equity" sub="รวมกัน ค.ศ.1875" color={C.purple} active={m==='common'} w={168} />
          <DiaNode {...IN} title="พระธรรมศาสตร์" sub="อินเดีย · พราหมณ์" color={C.green} active={m==='thai'} />
          <DiaNode {...TS} title="กฎหมายตราสามดวง" sub="ร.1 · 29 ลักษณะ" color={C.green} active={m==='thai'} w={168} />
          <DiaNode {...TH} title="ประเทศไทยปัจจุบัน" sub="ระบบซีวิลลอว์ · ป.พ.พ." color={C.prim} active w={178} />
        </svg>
      </div>
      <Box tone={m==='civil'?'blue':(m==='common'?'purple':'green')} title={`สายธาร: ${M.label}`} icon="🌊" style={{marginTop:12}}>
        {M.desc}
      </Box>
    </div>
  );
}

// เส้นเวลา/ท่อขั้นตอนแนวนอน
function FlowStrip({steps, color=C.prim}) {
  return (
    <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:14, padding:'16px 10px', overflowX:'auto'}}>
      <svg viewBox={`0 0 ${steps.length*180} 130`} style={{width:'100%', minWidth:steps.length*150, height:'auto'}}>
        {steps.map((s,i)=>{
          const x = 90 + i*180;
          return (
            <g key={i}>
              {i<steps.length-1 &&
                <DiaEdge id={`fs-${color.slice(1)}-${i}`} d={`M ${x+62} 55 L ${x+118} 55`} color={color} animate dur={1.8} width={2.5}/>}
              <circle cx={x} cy={55} r={34} fill={s.bg||C.surface3} stroke={color} strokeWidth={2.5} className="node-pulse"/>
              <text x={x} y={62} textAnchor="middle" fontSize="24">{s.icon}</text>
              <text x={x} y={112} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5" fontWeight="600" fill={C.text2}>
                {s.t}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ============ TAB 1: FOUNDATIONS (ปูพื้น) ============ */
function FoundationsTab() {
  const vocab = [
    ['พระธรรมศาสตร์', 'Dhammasattha', 'คัมภีร์ความยุติธรรมจากอินเดีย ศักดิ์สูงสุดของกฎหมายไทยเดิม (เทียบรัฐธรรมนูญ)', C.green],
    ['กฎหมายตราสามดวง', 'Three Seals Code', 'กฎหมายที่ ร.1 ทรงชำระ พ.ศ. 2347 — 29 ลักษณะ ประทับตรา 3 ดวง', C.prim],
    ['กฎมณเฑียรบาล', 'Palace Law', 'กฎหมายพิเศษว่าด้วยการสืบราชสันตติวงศ์ (ร.6 พ.ศ. 2467) ยังใช้อยู่ปัจจุบัน', C.accentDark],
    ['Civil Law', 'ซีวิลลอว์', 'ระบบกฎหมายลายลักษณ์อักษร (ประมวล) สืบจากโรมัน — ไทยใช้ระบบนี้', C.blue],
    ['Common Law', 'คอมมอนลอว์', 'ระบบจารีตประเพณี + คำพิพากษาเป็นบ่อเกิดกฎหมาย กำเนิดที่อังกฤษ', C.purple],
    ['Precedent', 'บรรทัดฐาน', 'หลัก Stare Decisis — คำพิพากษาคดีเดิมผูกพันคดีใหม่ที่ข้อเท็จจริงเหมือนกัน', C.cyan],
  ];
  return (
    <div className="fade-up">
      <Alert type="info" showIcon style={{marginBottom:18, background:C.blueBg, border:`1px solid ${C.blue}44`}}
        message={<span style={{fontWeight:700, color:C.blue, fontSize:16}}>เริ่มจากศูนย์ก็เข้าใจได้ 👋</span>}
        description={<span style={{color:C.text2}}>วิชานี้ตอบคำถามเดียว: <strong>"กฎหมายที่เราใช้อยู่ทุกวันนี้ เดินทางมาจากไหน?"</strong> คำตอบคือมี "สายธาร" ใหญ่ ๆ ไหลมาบรรจบกันที่ประเทศไทย — สายโรมัน สายอังกฤษ และสายธรรมศาสตร์ของไทยเอง ดูแผนภาพด้านล่างแล้วภาพทั้งวิชาจะชัดทันที</span>} />

      <Card style={{marginBottom:18, borderColor:C.border, background:C.surface3}} bodyStyle={{padding:'18px 20px'}}>
        <Title level={4} style={{marginTop:0, color:C.text}}>🍚 นึกภาพง่าย ๆ ด้วยชีวิตจริง</Title>
        <Paragraph style={{color:C.text2, fontSize:15}}>
          กฎหมายก็เหมือน <strong>สูตรอาหารประจำบ้าน</strong> — บ้านไทยมีสูตรเดิมตกทอดมาจากปู่ย่า
          (<Pill color={C.green} bg={C.greenBg}>พระธรรมศาสตร์ → ตราสามดวง</Pill>)
          ต่อมาเราไปเรียนสูตรจากครัวยุโรปที่จดเป็นตำราเป๊ะ ๆ ทุกขั้นตอน
          (<Pill color={C.blue} bg={C.blueBg}>Civil Law — ประมวลกฎหมาย</Pill>)

function IracCard({c}) {
  const [step, setStep] = useState(0);
  const parts = [
    {k:'Issue', th:'ประเด็น (I)', color:C.blue, body:c.issue},
    {k:'Rule', th:'หลักกฎหมาย (R)', color:C.purple, body:<span>{c.rule.map(x=><span key={x} style={{marginRight:6}}><Ref>{x}</Ref></span>)}<div style={{marginTop:8}}>{c.ruleText}</div></span>},
    {k:'Application', th:'ปรับข้อเท็จจริง (A)', color:C.accentDark, body:c.application},
    {k:'Conclusion', th:'สรุป (C)', color:C.green, body:c.conclusion},
  ];
  return (
    <Card style={{marginBottom:18, borderColor:C.border}} bodyStyle={{padding:'18px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:10}}>
        <Tag color="volcano" style={{fontWeight:700}}>{c.tag}</Tag>
        <span style={{fontWeight:700, fontSize:16, color:C.text}}>{c.topic}</span>
        <Stars n={c.star}/>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3}}>
        <strong style={{color:C.primDark}}>โจทย์: </strong>{c.facts}
      </div>
      <div style={{margin:'14px 0 6px'}}>
        {parts.slice(0,step).map((p,i)=>(
          <div key={i} className="fade-up" style={{borderLeft:`4px solid ${p.color}`, background:p.color+'12', borderRadius:'0 10px 10px 0', padding:'11px 15px', marginBottom:10}}>
            <div style={{fontWeight:700, color:p.color, marginBottom:3}}>{p.th}</div>
            <div style={{color:C.text2, fontSize:14.3}}>{p.body}</div>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center', marginTop:6}}>
        {step<4
          ? <Button type="primary" size="large" onClick={()=>setStep(step+1)}
              style={{background:parts[step].color, borderColor:parts[step].color}}>
              เปิดขั้น {parts[step].th} ▸</Button>
          : <Space>
              <Tag color="green" style={{padding:'6px 14px', fontSize:14}}>✅ ครบ IRAC แล้ว</Tag>
              <Button onClick={()=>setStep(0)}>เริ่มใหม่</Button>
            </Space>}
      </div>
    </Card>
  );
}

function IracTab() {
  return (

  );
}

function LabCard({c, onScore}) {
  const [picked, setPicked] = useState(null);
  const choose = (v)=>{ if(picked!==null) return; setPicked(v); onScore(v===c.answer); };
  const correct = picked===c.answer;
  return (
    <Card style={{marginBottom:16, borderColor:picked===null?C.border:(correct?C.green:C.red), borderWidth:picked===null?1:2}} bodyStyle={{padding:'16px 18px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:8}}>
        <span style={{fontSize:22}}>{c.icon}</span>
        <span style={{fontWeight:700, fontSize:15.5, color:C.text}}>{c.topic}</span>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'11px 14px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3, marginBottom:10}}>
        {c.scenario}
      </div>
      <div style={{fontWeight:700, color:C.primDark, marginBottom:10}}>❓ {c.question}</div>
      <Space wrap>
        <Button size="large" type={picked===true?'primary':'default'}
          style={picked===true?{background:correct?C.green:C.red, borderColor:correct?C.green:C.red}:{}}
          onClick={()=>choose(true)} disabled={picked!==null && picked!==true}>{c.yesLabel}</Button>
        <Button size="large" type={picked===false?'primary':'default'}
          style={picked===false?{background:correct?C.green:C.red, borderColor:correct?C.green:C.red}:{}}
          onClick={()=>choose(false)} disabled={picked!==null && picked!==false}>{c.noLabel}</Button>
      </Space>
      {picked!==null && (
        <div className="fade-up" style={{marginTop:12}}>
          <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:8}}>
            <Tag color={correct?'green':'red'} style={{fontWeight:700, fontSize:13.5, padding:'3px 12px'}}>
              {correct?'🎯 ทายถูก!':'📖 ยังไม่ใช่ — ดูเฉลย'}</Tag>
            {c.refs.map(r=><Ref key={r}>{r}</Ref>)}
          </div>
          <div style={{background:correct?C.greenBg:C.redBg, border:`1px solid ${correct?C.green:C.red}44`, borderLeft:`4px solid ${correct?C.green:C.red}`, borderRadius:10, padding:'11px 14px'}}>
            <div style={{fontWeight:700, color:correct?C.green:C.red, marginBottom:4}}>⚖️ คำวินิจฉัย: {c.verdict}</div>
            <div style={{color:C.text2, fontSize:14.3}}>{c.explain}</div>
          </div>
        </div>
      )}
    </Card>
  );
}

      <div style={{textAlign:'center', marginBottom:14}}>

  const Qd = quizData[i];
  const choose = (k)=>{ if(picked!==null) return; setPicked(k); if(k===Qd.correct) setScore(s=>s+1); };
  const next = ()=>{ if(i+1>=quizData.length){ setDone(true); } else { setI(i+1); setPicked(null);} };
  const restart = ()=>{ setI(0); setPicked(null); setScore(0); setDone(false); };

  if(done) return (
    <Result status={score>=9?'success':'info'}
      title={`ได้ ${score} / ${quizData.length} คะแนน`}
      subTitle={score>=9?'แม่นมาก! พร้อมเข้าห้องสอบแล้ว 🎉':'กลับไปไล่แท็บบทเรียน & Case Lab อีกรอบ แล้วมาลองใหม่นะ 💪'}
      extra={<Button type="primary" style={{background:C.prim, borderColor:C.prim}} onClick={restart}>ทำใหม่อีกครั้ง</Button>}/>
  );
  return (
    <div>
      <Flex justify="space-between" align="center" style={{marginBottom:10}}>
        <Text style={{color:C.text3}}>ข้อ {i+1} / {quizData.length}</Text>
        <Tag color="gold">คะแนน {score}</Tag>
      </Flex>
      <Progress percent={Math.round((i)/quizData.length*100)} showInfo={false} strokeColor={C.green} trailColor={C.surface2} style={{marginBottom:16}}/>
      <div style={{fontSize:17, fontWeight:600, color:C.text, marginBottom:16, lineHeight:1.7}}>{Qd.q}</div>
      <Space direction="vertical" style={{width:'100%'}} size={10}>
        {Qd.opts.map((o,k)=>{
          let bg=C.white, bd=C.border, cc=C.text;
          if(picked!==null){
            if(k===Qd.correct){ bg=C.greenBg; bd=C.green; cc=C.green; }
            else if(k===picked){ bg=C.redBg; bd=C.red; cc=C.red; }
          }
          return (
            <div key={k} onClick={()=>choose(k)} className={picked===null?'hoverlift':''}
              style={{cursor:picked===null?'pointer':'default', background:bg, border:`1.5px solid ${bd}`, borderRadius:10, padding:'12px 16px', color:cc, fontSize:15, fontWeight:500, transition:'all .25s'}}>
              <span style={{fontWeight:700, marginRight:8}}>{'กขคง'[k]}.</span>{o}
              {picked!==null && k===Qd.correct && <span style={{float:'right'}}>✅</span>}
              {picked===k && k!==Qd.correct && <span style={{float:'right'}}>❌</span>}
            </div>
          );
        })}
      </Space>
      {picked!==null && (
        <div className="fade-up">
          <Box tone={picked===Qd.correct?'green':'red'} title={picked===Qd.correct?'ถูกต้อง!':'ยังไม่ใช่'} icon={picked===Qd.correct?'🎯':'📖'} style={{marginTop:14}}>
            {Qd.exp}
          </Box>
          <div style={{textAlign:'center', marginTop:12}}>
            <Button type="primary" size="large" style={{background:C.green, borderColor:C.green}} onClick={next}>
              {i+1>=quizData.length?'ดูผลคะแนน':'ข้อถัดไป ▸'}</Button>
          </div>
        </div>
      )}
    </div>
  );
}

function FlashcardTab() {
  const [mode, setMode] = useState('all');
  const pool = useMemo(()=>{
    if (mode==='exam') return flashcards.filter(c=>c.exam);
    if (mode==='star3') return flashcards.filter(c=>c.star===3);
    return flashcards;
  },[mode]);
  const [order, setOrder] = useState(()=>flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flip, setFlip] = useState(false);
  const [score, setScore] = useState({c:0,w:0});

  useEffect(()=>{ setOrder(pool.map((_,i)=>i)); setIdx(0); setFlip(false); setScore({c:0,w:0}); },[mode]);

  const card = pool[order[idx]] || pool[0];
  const go = (dir)=>{ setFlip(false); setTimeout(()=>setIdx(i=>Math.max(0,Math.min(pool.length-1,i+dir))),120); };
  const shuffle = ()=>{ const o=[...Array(pool.length).keys()]; for(let i=o.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]];} setOrder(o); setIdx(0); setFlip(false); };
  const mark = (ok)=>{ setScore(s=>({c:s.c+(ok?1:0), w:s.w+(ok?0:1)})); go(1); };

  if(!card) return <Empty description="ไม่มีการ์ด"/>;
  return (
    <div className="fade-up">
      <Flex justify="space-between" align="center" wrap="wrap" gap={10} style={{marginBottom:14}}>
        <Segmented value={mode} onChange={setMode}
          options={[{label:`ทั้งหมด (${flashcards.length})`,value:'all'},{label:`ออกสอบ (${flashcards.filter(c=>c.exam).length})`,value:'exam'},{label:`★★★ (${flashcards.filter(c=>c.star===3).length})`,value:'star3'}]}/>
        <Space>
          <Tag color="green">ถูก {score.c}</Tag>
          <Tag color="red">ผิด {score.w}</Tag>
          <Button size="small" onClick={shuffle}>🔀 สุ่ม</Button>
        </Space>
      </Flex>
      <div style={{textAlign:'center', color:C.text3, marginBottom:8}}>การ์ด {idx+1} / {pool.length}</div>
      <Progress percent={Math.round((idx+1)/pool.length*100)} showInfo={false} strokeColor={C.prim} trailColor={C.surface2} style={{marginBottom:14}}/>
      <div className="fc-perspective" style={{maxWidth:640, margin:'0 auto', minHeight:290}}>
        <div className={'fc-card'+(flip?' flipped':'')} style={{minHeight:290}} onClick={()=>setFlip(f=>!f)}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.prim}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:290}}>
            <div style={{position:'absolute', top:14, left:16}}><Stars n={card.star}/></div>
            {card.exam && <Tag color="volcano" style={{position:'absolute', top:12, right:12}}>ข้อสอบ</Tag>}
            <div style={{fontSize:12.5, color:C.text3, marginBottom:10}}>❓ คำถาม (แตะเพื่อพลิก)</div>
            <div style={{fontSize:18.5, fontWeight:600, color:C.text, textAlign:'center', lineHeight:1.7}}>{card.q}</div>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.green}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:290}}>
            <div style={{fontSize:12.5, color:C.green, marginBottom:8, fontWeight:700}}>✅ คำตอบ</div>
            <div style={{fontSize:20, fontWeight:800, color:C.green, textAlign:'center', marginBottom:card.d?12:0}}>{card.a}</div>
            {card.d && <div style={{fontSize:14.5, color:C.text2, textAlign:'center', lineHeight:1.8}}>{card.d}</div>}
          </div>
        </div>
      </div>
      <Flex justify="center" align="center" gap={10} style={{marginTop:20}} wrap="wrap">
        <Button onClick={()=>go(-1)} disabled={idx===0}>◂ ก่อนหน้า</Button>
        {flip
          ? <Space>
              <Button danger onClick={()=>mark(false)}>✗ ยังไม่แม่น</Button>
              <Button type="primary" style={{background:C.green, borderColor:C.green}} onClick={()=>mark(true)}>✓ จำได้</Button>
            </Space>
          : <Button type="primary" style={{background:C.prim, borderColor:C.prim}} onClick={()=>setFlip(true)}>พลิกดูคำตอบ</Button>}
        <Button onClick={()=>go(1)} disabled={idx===pool.length-1}>ถัดไป ▸</Button>
      </Flex>
    </div>
  );
}
