<script type="text/babel" data-presets="env,react">
const { Tabs, Card, Collapse, Tag, Button, Row, Col, Progress, Alert, Divider, Statistic, Steps } = antd;
const { useState } = React;

/* ---------- helpers ---------- */
const n = (x)=> x.toLocaleString('en-US');
const Num = ({v})=> <td className={v<0?'neg':'num'}>{v<0?`(${n(-v)})`:n(v)}</td>;

/* ============ TAB 1 : สรุปปูพื้นจากศูนย์ ============ */
function SummaryTab(){
  return <div>
    <div className="sec-card">
      <h3><span className="tag-step">STEP 0</span>บัญชีคืออะไร ทำไมต้องมี</h3>
      <p>บัญชีคือกระบวนการ <b>เก็บรวบรวม → จดบันทึก → จำแนก → สรุปผล → วิเคราะห์และแปลความหมาย</b> ข้อมูลทางการเงิน เพื่อ "สื่อสารข้อมูล" ให้คนตัดสินใจได้ (นิยาม AAA: identifying, measuring, communicating)</p>
      <div className="analogy">🍜 เปรียบเทียบ: ร้านก๋วยเตี๋ยวของคุณ — อยากรู้ว่า "เดือนนี้กำไรไหม" "เงินสดพอจ่ายค่าเช่าไหม" "ควรกู้เพิ่มไหม" คำตอบทั้งหมดอยู่ในงบการเงิน 3 ตัว</div>
      <table className="fin">
        <thead><tr><th></th><th>บัญชีการเงิน (Financial)</th><th>บัญชีบริหาร (Management)</th></tr></thead>
        <tbody>

          <tr><td>รูปแบบ</td><td>General purpose ภาพรวมกว้าง</td><td>Specific purpose ละเอียดมาก</td></tr>
          <tr><td>กฎเกณฑ์</td><td>ต้องทำตามมาตรฐานบัญชี</td><td>ไม่มีข้อบังคับ</td></tr>
          <tr><td>ความถี่</td><td>รายปี/รายไตรมาส</td><td>บ่อยเท่าที่ต้องการ</td></tr>
          <tr><td>มุมมองเวลา</td><td>อดีต (ข้อมูลตรวจสอบได้)</td><td>อนาคต (ประมาณการ)</td></tr>
        </tbody>
      </table>
      <div className="kbox">📏 <b>มาตรฐานบัญชี:</b> สากล — IASB ออก IAS/IFRS | ไทย — สภาวิชาชีพบัญชีฯ ออก TAS/TFRS<br/>กิจการมีส่วนได้เสียสาธารณะ (PAEs) ใช้ TFRS เต็มรูป | กิจการไม่มีส่วนได้เสียสาธารณะ (NPAEs) ใช้ TFRS for NPAEs</div>
    </div>

    <div className="sec-card">
      <h3><span className="tag-step">STEP 1</span>งบการเงิน 3 ตัวหลัก — จำด้วยภาพ</h3>
      <Row gutter={[10,10]}>
        <Col xs={24} md={8}><Card size="small" style={{background:'#eef3fa',height:'100%'}} title="📷 งบแสดงฐานะการเงิน (งบดุล)">
          "ภาพถ่าย" ณ วันใดวันหนึ่ง — มั่งคั่งแค่ไหน<br/><b>สินทรัพย์ = หนี้สิน + ส่วนของเจ้าของ</b><br/>หัวงบ: "ณ วันที่ 31 ธ.ค. ..."</Card></Col>
        <Col xs={24} md={8}><Card size="small" style={{background:'#f0f7ee',height:'100%'}} title="🎬 งบกำไรขาดทุน">
          "วิดีโอ" ตลอดงวด — ทำกำไรได้เท่าไร<br/><b>กำไร = รายได้ − ค่าใช้จ่าย</b><br/>หัวงบ: "สำหรับปี ..."</Card></Col>
        <Col xs={24} md={8}><Card size="small" style={{background:'#fbf3ec',height:'100%'}} title="💧 งบกระแสเงินสด">
          เงินสดเข้า−ออกจริงตลอดงวด<br/><b>3 กิจกรรม: ดำเนินงาน / ลงทุน / จัดหาเงิน</b><br/>Cash is King!</Card></Col>
      </Row>
      <div className="kbox">📚 ชุดงบการเงินสมบูรณ์ตาม IAS 1 มี <b>5 รายการ</b>: (1) งบแสดงฐานะการเงิน (2) งบกำไรขาดทุน+กำไรขาดทุนเบ็ดเสร็จ (3) งบแสดงการเปลี่ยนแปลงส่วนของผู้ถือหุ้น (4) งบกระแสเงินสด (5) หมายเหตุประกอบงบการเงิน</div>
      <h3 style={{marginTop:14}}>ความสัมพันธ์ของ 3 งบ</h3>
      <svg viewBox="0 0 760 190" style={{width:'100%',maxWidth:760}}>
        <rect x="10" y="55" width="150" height="80" rx="10" fill="#dbe7f5" stroke="#7a9cc4"/>
        <text x="85" y="88" textAnchor="middle" fontSize="13" fill="#2d4a6b">งบฐานะการเงิน</text>
        <text x="85" y="108" textAnchor="middle" fontSize="12" fill="#2d4a6b">ต้นงวด (1 ม.ค.)</text>
        <rect x="600" y="55" width="150" height="80" rx="10" fill="#dbe7f5" stroke="#7a9cc4"/>
        <text x="675" y="88" textAnchor="middle" fontSize="13" fill="#2d4a6b">งบฐานะการเงิน</text>
        <text x="675" y="108" textAnchor="middle" fontSize="12" fill="#2d4a6b">สิ้นงวด (31 ธ.ค.)</text>
        <rect x="220" y="12" width="320" height="60" rx="10" fill="#e4f0e2" stroke="#6d9c68"/>
        <text x="380" y="36" textAnchor="middle" fontSize="12.5" fill="#33582f">งบกำไรขาดทุน: อธิบายการเปลี่ยนแปลงของ</text>
        <text x="380" y="56" textAnchor="middle" fontSize="12.5" fill="#33582f">"ส่วนของเจ้าของ" (ผ่านกำไรสะสม)</text>
        <rect x="220" y="118" width="320" height="60" rx="10" fill="#f7ecdd" stroke="#c09a5e"/>
        <text x="380" y="142" textAnchor="middle" fontSize="12.5" fill="#7a5a20">งบกระแสเงินสด: อธิบายการเปลี่ยนแปลงของ</text>
        <text x="380" y="162" textAnchor="middle" fontSize="12.5" fill="#7a5a20">"เงินสด"</text>
        <line x1="160" y1="95" x2="600" y2="95" stroke="#8a6d3b" strokeWidth="2" strokeDasharray="6 4"/>
        <polygon points="600,95 588,89 588,101" fill="#8a6d3b"/>
      </svg>
      <div className="kbox">🔗 งบฐานะการเงิน = "จุด" สองจุด (ต้นงวด/สิ้นงวด) ส่วนงบกำไรขาดทุนและงบกระแสเงินสด = "เส้นทาง" ที่อธิบายว่าเดินจากจุดแรกมาจุดหลังได้อย่างไร</div>
    </div>

    <div className="sec-card">
      <h3><span className="tag-step">STEP 2</span>สมการบัญชี — หัวใจของทุกอย่าง</h3>
      <div style={{textAlign:'center',fontSize:18,fontWeight:700,color:'#5c4a32',margin:'8px 0'}}>สินทรัพย์ (A) = หนี้สิน (L) + ส่วนของเจ้าของ (E)</div>
      <p>ขยายได้เรื่อยๆ จนเห็นทั้งระบบบัญชี 5 หมวด:</p>
      <div className="je">A = L + E<br/>A = L + ทุน + กำไรสะสม<br/>A = L + ทุน + กำไรสะสมต้นงวด + <span className="hl">กำไรสุทธิปีนี้</span> − เงินปันผล<br/>A = L + ทุน + กำไรสะสมต้นงวด + <span className="hl">รายได้ − ค่าใช้จ่าย</span> − เงินปันผล</div>
      <p>→ 5 หมวดบัญชี: <Tag color="blue">สินทรัพย์</Tag><Tag color="red">หนี้สิน</Tag><Tag color="gold">ทุน</Tag><Tag color="green">รายได้</Tag><Tag color="orange">ค่าใช้จ่าย</Tag></p>
      <Collapse items={[
        {key:'a',label:'🔵 สินทรัพย์ (Assets) — ทรัพยากรที่ให้ประโยชน์ในอนาคต',children:<div>
          <b>หมุนเวียน (Current)</b> — ได้ประโยชน์ภายใน 1 ปี: เงินสด ลูกหนี้การค้า สินค้าคงเหลือ เงินลงทุนระยะสั้น<br/>
          <b>ไม่หมุนเวียน (Non-current)</b> — ใช้เกิน 1 ปี: ที่ดิน อาคาร อุปกรณ์</div>},
        {key:'l',label:'🔴 หนี้สิน (Liabilities) — ภาระผูกพันที่ต้องจ่ายคืน',children:<div>
          <b>หมุนเวียน</b> — ครบกำหนดใน 1 ปี: เจ้าหนี้การค้า ค่าใช้จ่ายค้างจ่าย เงินกู้ระยะยาวส่วนที่ถึงกำหนดใน 1 ปี<br/>
          <b>ไม่หมุนเวียน</b> — เกิน 1 ปี: เงินกู้ระยะยาว หุ้นกู้</div>},
        {key:'e',label:'🟡 ส่วนของเจ้าของ (Equity) — สินทรัพย์สุทธิ (A − L)',children:<div>
          <b>ทุน (Capital)</b> — เงินที่เจ้าของลงไว้<br/>
          <b>กำไรสะสม (Retained Earnings)</b> — กำไรที่สะสมไว้ยังไม่แบ่งคืนเจ้าของ<br/>
          วนลูปทุกปี: กำไรสะสมต้นงวด + กำไร(ขาดทุน)ปีนี้ − ปันผล = กำไรสะสมปลายงวด</div>},
      ]}/>
    </div>

    <div className="sec-card">
      <h3><span className="tag-step">STEP 3</span>อ่านงบกำไรขาดทุน — บันได 5 ขั้นของกำไร</h3>
      <table className="fin">
        <tbody>
          <tr><td>รายได้จากการขาย</td><td className="num">1,500,000</td><td rowSpan={2} style={{background:'#f0f7ee'}}>ขายได้ − ต้นทุนของที่ขาย</td></tr>
          <tr><td>หัก ต้นทุนขาย (COGS)</td><td className="neg">(800,000)</td></tr>
          <tr className="total"><td>① กำไรขั้นต้น (Gross Profit)</td><td className="num">700,000</td><td>วัดว่า "ขายของ" กำไรดีไหม</td></tr>
          <tr><td>หัก ค่าใช้จ่ายบริหาร (เงินเดือน 150,000 + ค่าเช่า 120,000 + ค่าเสื่อม 240,000)</td><td className="neg">(510,000)</td><td>ค่าใช้จ่ายในการดำเนินงาน</td></tr>
          <tr className="total"><td>② กำไรก่อนดอกเบี้ยและภาษี (EBIT)</td><td className="num">190,000</td><td>วัดผลการดำเนินธุรกิจล้วนๆ</td></tr>
          <tr><td>หัก ดอกเบี้ยจ่าย</td><td className="neg">(60,000)</td><td>ต้นทุนการกู้เงิน</td></tr>
          <tr className="total"><td>③ กำไรก่อนภาษี (EBT)</td><td className="num">130,000</td><td></td></tr>
          <tr><td>หัก ภาษีเงินได้ (20%)</td><td className="neg">(26,000)</td><td></td></tr>
          <tr className="total"><td>④ กำไรสุทธิ (Net Profit)</td><td className="num">104,000</td><td>→ เข้ากำไรสะสมในงบฐานะการเงิน</td></tr>
        </tbody>
      </table>
      <div className="kbox">⑤ <b>EBITDA</b> = EBIT + ค่าเสื่อมราคา = 190,000 + 240,000 = 430,000 (กำไรก่อนดอกเบี้ย ภาษี ค่าเสื่อม — ใกล้เคียงเงินสดจากธุรกิจ)</div>
      <div className="kbox">🎯 <b>Matching Concept:</b> ค่าใช้จ่ายต้องบันทึกงวดเดียวกับรายได้ที่เกี่ยวข้อง เช่น ต้นทุนขายบันทึกพร้อมกับรายได้ขาย ไม่ใช่ตอนซื้อของเข้าร้าน</div>
    </div>

    <div className="sec-card">
      <h3><span className="tag-step">STEP 4</span>เกณฑ์คงค้าง (Accrual Basis) — กำไร ≠ เงินสด</h3>
      <p>รับรู้รายได้/ค่าใช้จ่าย <b>เมื่อธุรกรรมเกิดขึ้น</b> ไม่ใช่เมื่อรับ/จ่ายเงินสด — งบฐานะการเงินและงบกำไรขาดทุนใช้เกณฑ์นี้</p>
      <table className="fin">
        <thead><tr><th>ธุรกรรม</th><th>ผลต่อกำไร</th><th>ผลต่อเงินสด</th></tr></thead>
        <tbody>
          <tr><td>ขายสินค้าเป็นเงินเชื่อ</td><td style={{textAlign:'center',color:'#237804'}}>เพิ่มขึ้น</td><td style={{textAlign:'center'}}>ไม่กระทบ</td></tr>
          <tr><td>กู้ยืมเงินจากธนาคาร</td><td style={{textAlign:'center'}}>ไม่กระทบ</td><td style={{textAlign:'center',color:'#237804'}}>เพิ่มขึ้น</td></tr>
          <tr><td>ออกหุ้นเพิ่มทุนเป็นเงินสด</td><td style={{textAlign:'center'}}>ไม่กระทบ</td><td style={{textAlign:'center',color:'#237804'}}>เพิ่มขึ้น</td></tr>
          <tr><td>ลูกหนี้นำเงินมาชำระค่าสินค้า</td><td style={{textAlign:'center'}}>ไม่กระทบ</td><td style={{textAlign:'center',color:'#237804'}}>เพิ่มขึ้น</td></tr>
          <tr><td>จ่ายชำระหนี้ค่าสินค้า</td><td style={{textAlign:'center'}}>ไม่กระทบ</td><td style={{textAlign:'center',color:'#a8071a'}}>ลดลง</td></tr>
          <tr><td>ซื้ออุปกรณ์อายุใช้งาน 5 ปี</td><td style={{textAlign:'center',color:'#a8071a'}}>ลดปีละ 1/5 (ค่าเสื่อม)</td><td style={{textAlign:'center',color:'#a8071a'}}>ลดทันทีเต็มจำนวน</td></tr>
        </tbody>
      </table>
      <div className="warn">⚠️ กับดักข้อสอบ: "ขายเชื่อ" มีกำไรแต่ยังไม่มีเงินสด | "รับชำระจากลูกหนี้" มีเงินสดแต่ไม่มีกำไรเพิ่ม (กำไรรับรู้ไปแล้วตอนขาย) | "ค่าเสื่อมราคา" เป็นค่าใช้จ่ายแต่ไม่มีเงินสดออก</div>
    </div>

    <div className="sec-card">
      <h3><span className="tag-step">STEP 5</span>งบกระแสเงินสด — 3 กิจกรรม (ด-ล-จ)</h3>

/* ============ TAB 5 : สูตร & แทนค่า ============ */
function FormulaTab(){
  const F = ({t,f,s})=> <div className="sec-card"><h3>{t}</h3><div className="je"><b>สูตร:</b> {f}</div><div className="kbox"><b>แทนค่า:</b> {s}</div></div>;
  return <div>
    <F t="① สมการบัญชี" f="สินทรัพย์ = หนี้สิน + ส่วนของเจ้าของ" s="สมใจ: 2,520,000 = 1,344,000 + 1,176,000 ✓ | แสนดี: 3,630,000 = 1,526,000 + 2,104,000 ✓"/>
    <F t="② กำไรสะสมปลายงวด" f="กำไรสะสมต้นงวด + กำไรสุทธิ − เงินปันผล" s="สมใจปีแรก: 0 + 176,000 − 0 = 176,000 | แสนดี: 0 + 104,000 − 0 = 104,000"/>
    <F t="③ บันไดกำไร" f="ขาย − COGS = GP → − คชจ.ดำเนินงาน = EBIT → − ดอกเบี้ย = EBT → − ภาษี = NP" s="สมใจ: 1,500,000 − 800,000 = 700,000 → − 430,000 = 270,000 → − 50,000 = 220,000 → − 44,000 = 176,000"/>
    <F t="④ EBITDA" f="EBIT + ค่าเสื่อมราคาและค่าตัดจำหน่าย" s="สมใจ: 270,000 + 160,000 = 430,000 | แสนดี: 190,000 + 240,000 = 430,000 (บังเอิญเท่ากัน!)"/>
    <F t="⑤ ค่าเสื่อมราคา (เส้นตรง)" f="ราคาทุน ÷ อายุการใช้งาน" s="สมใจ: 800,000 ÷ 5 = 160,000/ปี | แสนดี: 1,200,000 ÷ 5 = 240,000/ปี"/>
    <F t="⑥ ดอกเบี้ยจ่ายต่อปี" f="เงินต้น × อัตราดอกเบี้ย" s="สมใจ: 1,000,000 × 5% = 50,000 | แสนดี: 1,000,000 × 6% = 60,000"/>
    <F t="⑦ ภาษีเงินได้นิติบุคคล" f="กำไรก่อนภาษี × อัตราภาษี (20%)" s="สมใจ: 220,000 × 20% = 44,000 | แสนดี: 130,000 × 20% = 26,000"/>
    <F t="⑧ เงินสดสิ้นงวด (งบกระแสเงินสด)" f="CF ดำเนินงาน + CF ลงทุน + CF จัดหาเงิน + เงินสดต้นงวด" s="สมใจ: (−20,000) + (−800,000) + 2,000,000 + 0 = 1,180,000 ✓ตรงงบฐานะ"/>
    <F t="⑨ ปันผลหุ้นบุริมสิทธิ" f="อัตราบุริมสิทธิ × ทุนหุ้นบุริมสิทธิชำระแล้ว (ที่เหลือเป็นของหุ้นสามัญ)" s="เทเวศน์: 8% × 1,000,000 = 80,000 → หุ้นสามัญได้ 300,000 − 80,000 = 220,000"/>
    <F t="⑩ หุ้นปันผล" f="จำนวนหุ้นชำระแล้ว × อัตราหุ้นปันผล × par" s="อัมรินทร์: 150,000 หุ้น × 10% × 10 บาท = 150,000 (โอนกำไรสะสม→ทุน รวมไม่เปลี่ยน)"/>
    <F t="⑪ ลูกหนี้การค้าปลายงวด" f="ลูกหนี้ต้นงวด + ขายเชื่อ − เงินที่เก็บได้" s="สมใจ: 0 + 1,500,000 − 1,000,000 = 500,000"/>
    <F t="⑫ สินค้าคงเหลือปลายงวด" f="สินค้าต้นงวด + ซื้อ − ต้นทุนขาย" s="สมใจ: 0 + 1,000,000 − 800,000 = 200,000"/>
  </div>;
}

function FlashTab(){
  const [order,setOrder] = useState(CARDS.map((_,i)=>i));
  const [flipped,setFlipped] = useState({});
  const [score,setScore] = useState({know:0,dunno:0});
  const shuffle=()=>{ setOrder([...order].sort(()=>Math.random()-.5)); setFlipped({}); setScore({know:0,dunno:0}); };
  return <div>
    <div style={{marginBottom:12,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <Button type="primary" style={{background:'#8a6d3b'}} onClick={shuffle}>🔀 สับการ์ด</Button>
      <Tag color="green">รู้แล้ว {score.know}</Tag><Tag color="red">ยังไม่รู้ {score.dunno}</Tag>
      <Progress percent={Math.round((score.know+score.dunno)/CARDS.length*100)} size="small" style={{width:180}} strokeColor="#8a6d3b"/>
      <span style={{fontSize:12.5,color:'#7a6a4a'}}>แตะการ์ดเพื่อพลิกดูคำตอบ</span>
    </div>
    <Row gutter={[10,10]}>
      {order.map(i=><Col xs={24} sm={12} lg={8} key={i}>
        <div className={'flip-card'+(flipped[i]?' flipped':'')} onClick={()=>setFlipped({...flipped,[i]:!flipped[i]})}>
          <div className="flip-inner">
            <div className="flip-face flip-front">{CARDS[i].q}</div>
            <div className="flip-face flip-back"><div>{CARDS[i].a}
              <div style={{marginTop:8}} onClick={e=>e.stopPropagation()}>
                <Button size="small" style={{marginRight:6}} onClick={()=>setScore(s=>({...s,know:s.know+1}))}>✅ รู้แล้ว</Button>
                <Button size="small" danger onClick={()=>setScore(s=>({...s,dunno:s.dunno+1}))}>❌ ทวนอีก</Button>
              </div></div></div>
          </div>
        </div>
      </Col>)}
    </Row>
  </div>;
}

          <tr><td>จ่ายดอกเบี้ยไหวไหม</td><td className="num">EBIT 244,000 เทียบดอกเบี้ย 24,000</td><td>สูงกว่าหลายเท่าตัว ไม่มีปัญหา</td></tr>
        </tbody>
      </table>
      <div className="kbox">✍️ ปิดท้ายด้วยเกณฑ์คงค้างเพื่อคะแนนเต็ม: กำไร 176,000 แต่ลูกหนี้ค้างเก็บ 400,000 + สินค้าจมสต๊อก 250,000 → กำไรไม่เท่าเงินสด แต่กิจการถือเงินสด 1,736,000 สภาพคล่องไม่ใช่ปัญหา</div>
    </Step>

    <div className="sec-card">
      <h3>🎯 สรุปกับดัก 6 จุดของโจทย์แนวนี้</h3>
      <table className="fin">
        <thead><tr><th>#</th><th>กับดัก</th><th>ทางถูก</th></tr></thead>
        <tbody>
          <tr><td>1</td><td>ลืมยอดยกมา (เริ่มจาก 0 แบบเคสในห้อง)</td><td>ตั้งบรรทัดยกมาก่อน แล้วค่อยบวกรายการปีนี้</td></tr>
          <tr><td>2</td><td>ลงทุนหุ้นทั้งก้อนตามเงินที่รับ</td><td>ทุน (par) + ส่วนเกินมูลค่าหุ้น แยกกัน</td></tr>
          <tr><td>3</td><td>คิดดอกเบี้ยเต็มปี</td><td>นับเดือนจากวันกู้ถึงสิ้นปี (× n/12)</td></tr>
          <tr><td>4</td><td>คิดค่าเสื่อมเครื่องเดียว</td><td>เครื่องเก่า + เครื่องใหม่ ทุกเครื่องที่มี</td></tr>
          <tr><td>5</td><td>ลืมค่าใช้จ่ายค้างจ่ายปลายปี</td><td>เกณฑ์คงค้าง: เกิดปีไหนลงปีนั้น</td></tr>
          <tr><td>6</td><td>ปันผลเป็นค่าใช้จ่าย / ลืมตั้งหนี้</td><td>ปันผลลดกำไรสะสม + ตั้งเงินปันผลค้างจ่าย</td></tr>
        </tbody>
      </table>
    </div>
  </div>;
}
