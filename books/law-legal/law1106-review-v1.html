  {id:4, cat:"กฎหมายตราสามดวง", q:"คัมภีร์พระธรรมศาสตร์คืออะไร? มีที่มาอย่างไร?", a:"คัมภีร์ชุมนุมกฎเกณฑ์แห่งความยุติธรรม จากอินเดีย (พราหมณ์) ★ ที่มา: 'คดีไร่แดง' → พระโมนสารจดเป็นลักษณ์อักษร → สอนพระเจ้าสมมิติราช ★ ศักดิ์เทียบรัฐธรรมนูญ", stars:3, exam:true},
  {id:5, cat:"กฎหมายตราสามดวง", q:"'คดีไร่แดง' มีความสำคัญอย่างไรต่อกฎหมายไทย?", a:"เป็นเหตุให้กำเนิดคัมภีร์พระธรรมศาสตร์ ● ชาย 2 คน ทะเลาะเรื่องผลแดง → พระโมนสารตัดสิน → บรรทัดฐานกฎหมาย → จดลักษณ์อักษรไว้เป็นคัมภีร์", stars:2, exam:false},

  {id:10, cat:"กฎหมายตราสามดวง", q:"กฎหมายสุโขทัย (ศิลาจารึกหลักที่ 1) มีลักษณะอย่างไร?", a:"บัญญัติโดยพ่อขุนรามคำแหง ● เสรีภาพในการค้าขาย ไม่เก็บภาษีจังกอบ ● ระบบยุติธรรมเปิด (ตีกลองร้องทุกข์ได้) ● เป็นกฎหมายประเพณีปฏิบัติ", stars:1, exam:false},

  {id:11, cat:"กฎมณเฑียรบาล ร.6", q:"กฎมณเฑียรบาลว่าด้วยการสืบราชสันตติวงศ์ ออกสมัยใด?", a:"ออกในสมัยรัชกาลที่ 6 (พ.ศ. 2467) ● เป็นกฎหมายพิเศษที่ควบคุมการสืบราชสมบัติ ● ยังมีผลบังคับใช้อยู่ในปัจจุบัน", stars:3, exam:true},

  {id:14, cat:"กฎมณเฑียรบาล ร.6", q:"มาตรา 13 กฎมณเฑียรบาล กำหนดอะไร?", a:"กรณีราชวงศ์ฝ่ายชายสูญสิ้นลง ● รัฐสภา (หรือองค์กรที่กำหนด) มีอำนาจเลือกพระบรมวงศานุวงศ์ที่เหมาะสมสืบราชสมบัติ ● เป็นกลไกสำรองของการสืบสันตติวงศ์", stars:3, exam:true},

  {id:16, cat:"กฎมณเฑียรบาล ร.6", q:"กฎมณเฑียรบาลสัมพันธ์กับรัฐธรรมนูญไทยอย่างไร?", a:"รัฐธรรมนูญ ม.2 รับรองว่าไทยมีพระมหากษัตริย์เป็นประมุข ● กฎมณเฑียรบาลกำหนดวิธีสืบราชสมบัติ ● ใช้ควบคู่กับรัฐธรรมนูญ ม.20-23 (หมวดพระมหากษัตริย์)", stars:2, exam:false},

function FlipCard({card, onClick, flipped}){
  const stars = "⭐".repeat(card.stars);
  return(
    <div className={`flip-card ${flipped?"flipped":""}`} onClick={onClick}>
      <div className="flip-inner">
        <div className="flip-face flip-front">
          <div className="card-cat">{card.cat}</div>
          <div className="card-q">{card.q}</div>
          <div className="card-stars">{stars}</div>
          <div className="card-badges">
            {card.exam && <span className="exam-badge">📝 เน้นสอบ</span>}
            {card.stars===3 && <span className="hot-badge">🔥 สำคัญมาก</span>}
          </div>
        </div>
        <div className="flip-face flip-back">
          <div className="card-a" style={{whiteSpace:"pre-line"}}>{card.a}</div>
        </div>
      </div>
    </div>
  );
}

function FlashTab(){
  const [flipped, setFlipped] = useState({});
  const [filter, setFilter] = useState("all");
  const toggle = id => setFlipped(p=>({...p,[id]:!p[id]}));
  const filtered = filter==="exam" ? CARDS.filter(c=>c.exam) : filter==="star3" ? CARDS.filter(c=>c.stars===3) : CARDS;
  const examCount = CARDS.filter(c=>c.exam).length;
  return(
    <div>
      <div className="fc-controls">
        <button className={`fc-btn ${filter==="all"?"active":""}`} onClick={()=>setFilter("all")}>ทั้งหมด ({CARDS.length})</button>
        <button className={`fc-btn ${filter==="exam"?"active":""}`} onClick={()=>setFilter("exam")}>📝 เน้นสอบ ({examCount})</button>
        <button className={`fc-btn ${filter==="star3"?"active":""}`} onClick={()=>setFilter("star3")}>⭐⭐⭐ สำคัญมาก</button>
        <button className="fc-btn" onClick={()=>setFlipped({})}>↺ พลิกกลับทั้งหมด</button>
        <span className="fc-progress">แสดง {filtered.length} ใบ</span>
      </div>
      <div className="card-grid">
        {filtered.map(c=>(
          <FlipCard key={c.id} card={c} flipped={!!flipped[c.id]} onClick={()=>toggle(c.id)} />
        ))}
      </div>
    </div>
  );
}

function QuickTab(){

            <div className="contrast-row">

                <div className="contrast-label">{q.contrast.a.label}</div>
                <div style={{whiteSpace:"pre-line",fontSize:".88rem"}}>{q.contrast.a.text}</div>
              </div>
              <div className="contrast-b">
                <div className="contrast-label">{q.contrast.b.label}</div>
                <div style={{whiteSpace:"pre-line",fontSize:".88rem"}}>{q.contrast.b.text}</div>
              </div>
            </div>
          </div>

          {/* Chunking */}
          <div style={{marginBottom:"10px"}}>
            <div style={{fontSize:".8rem",fontWeight:700,color:"#8C6A45",marginBottom:"4px",textTransform:"uppercase",letterSpacing:".5px"}}>📦 Chunking – แยกกลุ่ม</div>
            <div className="chunk-box">
              {q.chunk.map((c,i)=><div key={i} className="chunk">{c}</div>)}

          </div>

          {/* 30-second Formula */}
          <div>
            <div style={{fontSize:".8rem",fontWeight:700,color:"#8C6A45",marginBottom:"4px",textTransform:"uppercase",letterSpacing:".5px"}}>⏱️ สูตร 30 วินาที</div>
            <div className="formula-box">

              <div className="formula-sub">{q.formulaSub}</div>
            </div>

        </div>
      ))}
    </div>
  );
}

            {dot:"ค.ศ.\n529-534",text:"Corpus Juris Civilis – จักรพรรดิจัสติเนียนรวบรวมกฎหมายโรมันทั้งหมด ประกอบด้วย Code / Digest / Institutes / Novels"},
            {dot:"ค.ศ.\n1100+",text:"การฟื้นฟูกฎหมายโรมัน – มหาวิทยาลัย Bologna นำ Corpus Juris Civilis มาสอน → แพร่กระจายไปทั่วยุโรป"},
          ].map((t,i)=>(
            <div key={i} className="timeline-item">
              <div className="timeline-dot" style={{whiteSpace:"pre-line",lineHeight:1.2,fontSize:".65rem",textAlign:"center"}}>{t.dot}</div>
              <div className="timeline-body">{t.text}</div>
            </div>
          ))}
        </div>

        <div className="section-sub">📌 กฎหมายฮัมมูราบี (เพิ่มเติม)</div>
        <div className="section-text">
          บาบิโลน สมัยพระเจ้าฮัมมูราบี ราว 1,754 ปีก่อนคศ. ● 282 บทบัญญัติ ●
          หลัก "ตาต่อตา" (Lex Talionis) ● แบ่งชนชั้น 3 กลุ่ม:
        </div>
        <div className="tag-row">
          <span className="law-tag">Awellu = ชนชั้นปกครอง (ข้าราชการ)</span>
          <span className="law-tag">Muskinu = ชนชั้นกลาง (ไพร่/เสรีชน)</span>
          <span className="law-tag">Ardu = ทาส</span>
        </div>
      </div>
    </div>
  );
}
