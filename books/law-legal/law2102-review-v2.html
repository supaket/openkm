// ==================== COMPONENTS ====================
function Stars({n}) {
  return <span style={{color:'#B5986A'}}>{'⭐'.repeat(n)}</span>;
}

function SummaryTab() {
  return (
    <div style={{padding:'8px 0'}}>
      {summaryData.map(sec=>(
        <Card key={sec.key} size="small"
          style={{marginBottom:16,background:C.surface,borderColor:C.border}}
          title={<span style={{color:C.text,fontWeight:600,fontFamily:'Noto Sans Thai,sans-serif'}}>{sec.title}</span>}
          extra={<Space wrap>{sec.tags.map(([l,c],i)=><Tag key={i} color={c}>{l}</Tag>)}</Space>}
        >
          {sec.content()}
        </Card>
      ))}
    </div>
  );
}

function FlashcardTab() {
  const [idx,setIdx]=React.useState(0);
  const [flipped,setFlipped]=React.useState(false);
  const [score,setScore]=React.useState({correct:0,wrong:0});
  const [filter,setFilter]=React.useState('all');
  const [order,setOrder]=React.useState(flashcards.map((_,i)=>i));

  const filtered=React.useMemo(()=>{
    if(filter==='all') return flashcards;
    if(filter==='exam') return flashcards.filter(c=>c.exam);
    if(filter==='star3') return flashcards.filter(c=>c.star===3);
    return flashcards;
  },[filter]);

  const total=filtered.length;
  const safeIdx=Math.min(idx,total-1);
  const current=filtered[safeIdx];

  React.useEffect(()=>{setIdx(0);setFlipped(false);},[filter]);

  function shuffle(){setIdx(Math.floor(Math.random()*total));setFlipped(false);}
  function go(dir){setIdx(i=>(i+dir+total)%total);setFlipped(false);}
  function mark(correct){setScore(s=>({...s,[correct?'correct':'wrong']:s[correct?'correct':'wrong']+1}));go(1);}

  if(!current) return null;

  return (
    <div style={{padding:'8px 0'}}>
      <Flex justify="center" gap={8} wrap="wrap" style={{marginBottom:12}}>
        <Button type={filter==='all'?'primary':'default'} onClick={()=>setFilter('all')}>ทั้งหมด ({flashcards.length})</Button>
        <Button onClick={()=>setFilter('exam')} style={{background:filter==='exam'?C.red:undefined,borderColor:filter==='exam'?C.red:undefined,color:filter==='exam'?'#fff':undefined}}>ข้อสอบเก่า ({flashcards.filter(c=>c.exam).length})</Button>
        <Button onClick={()=>setFilter('star3')} style={{background:filter==='star3'?C.amber:undefined,borderColor:filter==='star3'?C.amber:undefined,color:filter==='star3'?'#fff':undefined}}>⭐⭐⭐ ({flashcards.filter(c=>c.star===3).length})</Button>
        <Button onClick={shuffle} style={{background:C.cyan,borderColor:C.cyan,color:'#fff'}}>🔀 สุ่ม</Button>
      </Flex>
      <div style={{textAlign:'center',marginBottom:8}}>
        <Text style={{color:C.text3}}>ข้อ {safeIdx+1} / {total} &nbsp;|&nbsp; <Stars n={current.star}/>
          {current.exam&&<>&nbsp;<Tag color="red" style={{fontSize:11}}>ข้อสอบเก่า</Tag></>}
        </Text>
      </div>
      <div className="fc-perspective" onClick={()=>setFlipped(f=>!f)} style={{maxWidth:700,margin:'0 auto'}}>
        <div className={`fc-card${flipped?' flipped':''}`}>
          <div className="fc-face fc-front">
            <Text style={{fontSize:14,color:C.text,lineHeight:1.7}}>{current.q}</Text>
          </div>
          <div className="fc-face fc-back">
            <div style={{textAlign:'left',width:'100%',overflowY:'auto',maxHeight:200}}>
              <Text strong style={{color:C.green,display:'block',marginBottom:4,fontSize:14}}>{current.a}</Text>
              <Text style={{fontSize:12,color:C.text2,lineHeight:1.6}}>{current.d}</Text>
            </div>
          </div>
        </div>
      </div>
      <Text style={{display:'block',textAlign:'center',color:C.text3,fontSize:12,marginTop:4}}>แตะการ์ดเพื่อพลิกดูคำตอบ</Text>
      <Flex justify="center" gap={12} style={{marginTop:12}} wrap="wrap">
        <Button onClick={()=>go(-1)}>← ก่อนหน้า</Button>
        <Button style={{background:C.red,borderColor:C.red,color:'#fff'}} onClick={()=>mark(false)}>❌ ยังไม่รู้</Button>
        <Button style={{background:C.green,borderColor:C.green,color:'#fff'}} onClick={()=>mark(true)}>✅ รู้แล้ว</Button>
        <Button onClick={()=>go(1)}>ถัดไป →</Button>
      </Flex>
      <Flex justify="center" gap={24} style={{marginTop:12}}>
        <Statistic title="✅ รู้แล้ว" value={score.correct} valueStyle={{color:C.green,fontSize:20}}/>
        <Statistic title="❌ ยังไม่รู้" value={score.wrong} valueStyle={{color:C.red,fontSize:20}}/>
      </Flex>
    </div>
  );
}

        if(item.divider){
          return <Divider key={i} style={{borderColor:C.borderDark,color:C.goldDark,fontWeight:700,fontFamily:'Noto Sans Thai,sans-serif'}}>{item.divider}</Divider>;

        const typeStyle={
          mnem:{bg:C.purpleBg,border:C.purple,accent:C.purple},

          formula:{bg:'#FFF8E7',border:C.amber,accent:C.amber},
        }[item.type]||{bg:C.surface,border:C.border,accent:C.gold};
        return (
          <div key={i} className="qc" style={{background:typeStyle.bg,border:`1px solid ${typeStyle.border}`,borderLeft:`4px solid ${typeStyle.accent}`,borderRadius:8,padding:'10px 14px',marginBottom:10}}>

              <Tag style={{background:typeStyle.accent,color:'#fff',border:'none',fontSize:11}}>{item.s}</Tag>

            {key:'quick',label:'⚡ การ์ดจำด่วน',children:<QuickTab/>},
          ]}/>
          <div style={{textAlign:'center',marginTop:20,color:C.text3,fontSize:12}}>
            LAW2102 · อัปเดตตามขอบเขตข้อสอบ · {flashcards.length} Flashcards
          </div>
        </Content>
      </Layout>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
