const fmt = (n) => Math.round(n).toLocaleString('en-US');
const fmt2 = (n) => (Math.round(n*100)/100).toLocaleString('en-US', {minimumFractionDigits: (n%1===0?0:2)});
const Stars = ({n}) => <span>{'⭐'.repeat(n)}</span>;
const Pop = ({v, color, prefix, suffix, f}) => <span key={String(v)} className="pop" style={{fontWeight:700, color: color||C.goldDark}}>{prefix||''}{(f||fmt)(v)}{suffix||''}</span>;

/* ============================================================
   TAB 0 — ปูพื้นก่อน
   ============================================================ */
const sortItems = [
  {t:'ค่าวัตถุดิบที่จะใช้ผลิตปีหน้า', rel:true, why:'เกิดในอนาคต + เปลี่ยนตามทางเลือก (ทำเอง = จ่าย, ซื้อ = ไม่จ่าย)'},
  {t:'เงินที่จ่ายซื้อเครื่องจักรไปเมื่อ 2 ปีก่อน', rel:false, why:'ต้นทุนจม (sunk) — จ่ายไปแล้ว ตัดสินใจยังไงก็เรียกคืนไม่ได้'},
  {t:'ค่าเช่าที่จะได้ ถ้าปล่อยเช่าพื้นที่โรงงานแทนการผลิตเอง', rel:true, why:'ต้นทุนค่าเสียโอกาส (opportunity cost) — เลือกผลิตเอง = สละเงินก้อนนี้'},
  {t:'เงินเดือนผู้บริหารสำนักงานใหญ่ที่ถูก "ปันส่วน" มาให้แผนก', rel:false, why:'common fixed cost — เลิกแผนกไปเงินก้อนนี้ก็ยังต้องจ่ายเท่าเดิม'},
  {t:'ค่าแรงล่วงเวลาที่ต้องจ่ายเพิ่ม ถ้ารับออร์เดอร์พิเศษ', rel:true, why:'ต้นทุนส่วนเพิ่ม (incremental) — เกิดเฉพาะเมื่อรับงาน'},
  {t:'ค่าเสื่อมราคาเครื่องจักรเก่า (คิดจากราคาที่ซื้อมาแล้ว)', rel:false, why:'มาจากต้นทุนจม — ตัวเลขบัญชีของอดีต ไม่ใช่เงินสดอนาคต'},
];
const SunkSorter = () => {
  const [answers, setAnswers] = useState({});
  const [show, setShow] = useState(null);
  const answer = (i, val) => {
    setAnswers(a => ({...a, [i]: val}));
    setShow(i);
  };
  const score = Object.entries(answers).filter(([i,v]) => sortItems[i].rel === v).length;
  const done = Object.keys(answers).length;
  return (
    <Card size="small" style={{background:C.white, borderColor:C.borderDark}}
      title={<Text strong style={{color:C.text}}>🎮 เกมคัดต้นทุน: ข้อไหน "เกี่ยว" กับการตัดสินใจ (relevant) ข้อไหน "ไม่เกี่ยว"?</Text>}>
      {sortItems.map((it,i)=>{
        const a = answers[i];
        const correct = a !== undefined && a === it.rel;
        return (
          <Card key={i} size="small" className="sortitem" style={{marginBottom:8,
            background: a===undefined ? C.surface3 : correct ? C.greenBg : C.redBg,
            borderColor: a===undefined ? C.border : correct ? C.green : C.red}}>
            <Flex justify="space-between" align="center" gap={8} wrap="wrap">
              <Text style={{color:C.text}}>{it.t}</Text>
              <Space>
                <Button size="small" type={a===true?'primary':'default'} onClick={()=>answer(i,true)}>เกี่ยว ✓</Button>
                <Button size="small" type={a===false?'primary':'default'} onClick={()=>answer(i,false)}>ไม่เกี่ยว ✗</Button>
              </Space>
            </Flex>
            {show===i && a!==undefined && (
              <Alert style={{marginTop:6}} type={correct?'success':'error'}
                message={<span><Text strong>{correct?'ถูกต้อง! ':'ยังไม่ใช่ — '}</Text>{it.why}</span>}/>
            )}
          </Card>
        );
      })}
      <Statistic title="คะแนน" value={`${score} / ${done}`} valueStyle={{color: score===done?C.green:C.goldDark}}/>
    </Card>
  );
};

const vocab = [
  {key:1, w:'Relevant cost', m:'ต้นทุนที่ "เกี่ยว" กับการตัดสินใจ — ต้องผ่าน 2 ด่าน: (1) เกิดในอนาคต (2) แต่ละทางเลือกไม่เท่ากัน'},
  {key:2, w:'Sunk cost (ต้นทุนจม)', m:'จ่ายไปแล้วในอดีต เรียกคืนไม่ได้ ไม่มีวันเกี่ยวกับการตัดสินใจ เช่น ราคาเครื่องจักรที่ซื้อมาแล้ว'},
  {key:3, w:'Opportunity cost (ค่าเสียโอกาส)', m:'ประโยชน์ที่ "สละไป" เมื่อเลือกทางหนึ่ง เช่น เลือกผลิตเอง = สละค่าเช่าที่จะได้จากพื้นที่ — ไม่อยู่ในบัญชี แต่เกี่ยวเสมอ'},
  {key:4, w:'Avoidable / Unavoidable fixed cost', m:'ต้นทุนคงที่ที่ "หายไปถ้าเลิกทำ" (เกี่ยว) vs ที่ยังอยู่ไม่ว่ายังไง (ไม่เกี่ยว)'},
  {key:5, w:'Segment margin', m:'CM ของแผนก − direct fixed ของแผนก = กำไรที่แผนกนั้นสร้างจริง ๆ ใช้ตัดสินว่าควรเลิกแผนกไหม'},
  {key:6, w:'Common fixed cost', m:'ต้นทุนส่วนกลางที่ถูก "ปันส่วน" มาให้แผนก — เลิกแผนกก็ไม่หาย ห้ามใช้ตัดสินใจ'},
  {key:7, w:'Special order', m:'ออร์เดอร์พิเศษราคาต่ำกว่าปกติ — รับได้ถ้าราคา > ต้นทุนส่วนเพิ่ม และมีกำลังการผลิตเหลือ'},
  {key:8, w:'Transfer price', m:'ราคาซื้อขาย "ระหว่างแผนกในบริษัทเดียวกัน" เช่น แผนกขาผลิตขาเก้าอี้ขายให้แผนกประกอบ'},
  {key:9, w:'Joint products / Split-off point', m:'สินค้าหลายตัวที่เกิดจากกระบวนการเดียวกัน / จุดที่สินค้าแยกร่างออกจากกัน'},
  {key:10, w:'Joint cost', m:'ต้นทุนก่อนจุดแยกร่าง — ถึงเวลาตัดสินใจ "ขายเลยหรือแปรรูปต่อ" มันกลายเป็นต้นทุนจมไปแล้ว'},
];

const BasicsTab = () => (
  <div>
    <Card className="fadein" style={{marginBottom:16, background:C.white, borderColor:C.border}}
      title={<Text strong style={{color:C.text}}>🎓 สองบทนี้เรียนอะไร (แบบ case method)</Text>}>
      <Paragraph style={{color:C.text}}>
        ผู้บริหารเจอคำถามแบบนี้ทุกวัน: "ออร์เดอร์ราคาถูกมา รับไหม?" "ชิ้นส่วนนี้ทำเองหรือซื้อ?" "แผนกขาดทุน ปิดเลยดีไหม?"
        — คำตอบผิด ๆ มักมาจากการเอา "ตัวเลขบัญชีทุกตัว" มาคิด ทั้งที่บางตัวไม่เกี่ยวกับการตัดสินใจเลย
      </Paragraph>
      <Card size="small" style={{background:C.greenBg, borderColor:C.green, marginBottom:8}}>
        <Text strong style={{color:C.green}}>กฎทองข้อเดียวของทั้งสองบท:</Text><br/>
        <Text style={{color:C.text, fontSize:16}}>ต้นทุน/รายได้จะ "เกี่ยว" ต่อเมื่อ <strong>① เกิดในอนาคต</strong> และ <strong>② แต่ละทางเลือกไม่เท่ากัน</strong> — ที่เหลือโยนทิ้งให้หมด</Text>
      </Card>
      <Paragraph style={{color:C.text}}>
        ตัวอย่างชีวิตจริง: ซื้อตั๋วคอนเสิร์ต 1,500 บาทแล้ววันงานป่วยหนัก — "เสียดายตั๋ว" ไม่ใช่เหตุผลที่ควรไป
        เพราะเงิน 1,500 จ่ายไปแล้ว ไปหรือไม่ไปก็ไม่ได้คืน (sunk cost) สิ่งที่เกี่ยวมีแค่ "ความสุข vs สุขภาพจากนี้ไป"
        สมองมนุษย์แพ้กับดักนี้ประจำ จนมีชื่อเรียกว่า sunk cost fallacy
      </Paragraph>
    </Card>
    <div className="fadein" style={{animationDelay:'0.1s'}}><SunkSorter/></div>
    <Card className="fadein" style={{marginTop:16, background:C.white, borderColor:C.border, animationDelay:'0.2s'}}
      title={<Text strong style={{color:C.text}}>📖 ศัพท์ที่ต้องรู้ (10 คำ)</Text>}>
      <Table size="small" pagination={false} columns={[
        {title:'คำศัพท์', dataIndex:'w', key:'w', width:250, render:t=><Text strong style={{color:C.goldDark}}>{t}</Text>},
        {title:'ความหมายแบบบ้าน ๆ', dataIndex:'m', key:'m'},
      ]} dataSource={vocab}/>
    </Card>
  </div>
);

/* ============================================================

const flowNodes = [
  {t:'1. ตั้งโจทย์ให้ชัด', d:'ปัญหาคืออะไร ทางเลือกมีอะไรบ้าง (ทำเอง vs ซื้อ / รับ vs ไม่รับ / เก็บ vs เลิก)', icon:'🎯'},
  {t:'2. ลิสต์เงินอนาคตของแต่ละทาง', d:'รายได้และต้นทุนที่ "จะเกิด" ภายใต้แต่ละทางเลือก รวม opportunity cost ที่ไม่อยู่ในบัญชีด้วย', icon:'📋'},
  {t:'3. โยนของไม่เกี่ยวทิ้ง', d:'ตัด sunk cost, common fixed ที่ปันส่วน, และต้นทุนที่เท่ากันทุกทางเลือก', icon:'🗑️'},
  {t:'4. เทียบเฉพาะส่วนต่าง', d:'เหลือแต่ตัวเลขที่ต่างกัน (differential) — เทียบกันตรง ๆ ว่าทางไหนกำไรมากกว่า', icon:'⚖️'},
  {t:'5. เช็คปัจจัยคุณภาพ', d:'ตัวเลขไม่ใช่ทุกอย่าง: คุณภาพ supplier, ความสัมพันธ์ลูกค้า, ขวัญพนักงาน, ผลระยะยาว', icon:'🧭'},
];
const FlowAnimation = () => {
  const [step, setStep] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const timer = useRef(null);
  useEffect(() => {
    if (playing) {
      timer.current = setInterval(() => setStep(s => {
        if (s >= flowNodes.length-1) { setPlaying(false); return s; }
        return s+1;
      }), 1600);
    }
    return () => clearInterval(timer.current);
  }, [playing]);
  return (
    <Card style={{background:C.white, borderColor:C.borderDark, marginBottom:16}}
      title={<Text strong style={{color:C.text}}>🎬 สูตรสำเร็จตัดสินใจ 5 ขั้น — ใช้กับทุกเคสในบท (กด Play)</Text>}>
      <Flex gap={8} style={{marginBottom:12}}>
        <Button type="primary" className={playing?'':'pulse'} disabled={playing} onClick={()=>{setStep(0); setPlaying(true);}}>▶ Play</Button>
        <Button onClick={()=>{setPlaying(false); setStep(-1);}}>รีเซ็ต</Button>
        <Button onClick={()=>{setPlaying(false); setStep(flowNodes.length-1);}}>แสดงทั้งหมด</Button>
      </Flex>
      <Row gutter={[8,8]}>
        {flowNodes.map((n,i)=>(
          <Col xs={12} md={i<3?8:12} key={i}>
            <div className={'node' + (i===step?' active':'') + (i<step?' done':'')}>
              <div style={{fontSize:20}}>{n.icon}</div>{n.t}
            </div>
          </Col>
        ))}
      </Row>
      <div style={{minHeight:56, marginTop:12}}>
        {step>=0
          ? <Alert type="info" message={<span><Text strong>{flowNodes[step].icon} {flowNodes[step].t}: </Text>{flowNodes[step].d}</span>}/>
          : <Alert type="warning" message="ทุกเคส (special order, make-or-buy, keep-or-drop, process further, transfer pricing) ใช้ 5 ขั้นเดียวกันหมด — ต่างกันแค่ว่าอะไรคือ relevant"/>}
      </div>
    </Card>
  );
};

];
const dAspects = [
  {a:'❓ คำถาม', so:'รับออร์เดอร์ราคาถูกไหม', mb:'ทำเองหรือซื้อจากข้างนอก', kd:'เลิกแผนก/สินค้าไหม', pf:'ขายที่จุดแยกร่าง หรือแปรรูปต่อ', tp:'ตั้งราคาซื้อขายระหว่างแผนกเท่าไร'},
  {a:'✅ กฎตัดสิน', so:'รับ ถ้าราคา > ต้นทุนส่วนเพิ่ม (เมื่อมีกำลังผลิตเหลือ)', mb:'เลือกทางที่ต้นทุน relevant ต่ำกว่า (VC + fixed ที่เลี่ยงได้ ± ค่าเสียโอกาส)', kd:'เลิก ถ้า segment margin ติดลบ (CM < direct fixed ที่เลี่ยงได้)', pf:'ต่อ ถ้ารายได้ส่วนเพิ่ม > ต้นทุนแปรรูปส่วนเพิ่ม', tp:'ขั้นต่ำผู้ขาย = VC + CM ที่เสียไป | เพดานผู้ซื้อ = ราคาตลาดภายนอก'},

];
const DecisionCompare = () => {

const FlashcardTab = () => {
  const [filter, setFilter] = useState('all');
  const [order, setOrder] = useState(flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [score, setScore] = useState({ok:0, ng:0});
  const pool = order.map(i=>flashcards[i]).filter(c => filter==='all' ? true : filter==='exam' ? c.exam : c.star===3);
  const card = pool[Math.min(idx, pool.length-1)];
  const shuffle = () => { const a=[...Array(flashcards.length).keys()]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} setOrder(a); setIdx(0); setFlipped(false); setScore({ok:0,ng:0}); };
  const nav = (d) => { setFlipped(false); setIdx(i => (i + d + pool.length) % pool.length); };
  const mark = (good) => { setScore(s => good ? {...s, ok:s.ok+1} : {...s, ng:s.ng+1}); nav(1); };
  const setF = (f) => { setFilter(f); setIdx(0); setFlipped(false); };
  if (!card) return <Alert type="warning" message="ไม่มีการ์ดในโหมดนี้" />;
  return (
    <div>
      <Flex justify="space-between" wrap="wrap" gap={8} style={{marginBottom:12}}>
        <Space wrap>
          <Button type={filter==='all'?'primary':'default'} onClick={()=>setF('all')}>ทั้งหมด ({flashcards.length})</Button>
          <Button type={filter==='exam'?'primary':'default'} onClick={()=>setF('exam')}>เฉพาะแนวข้อสอบ ({flashcards.filter(c=>c.exam).length})</Button>
          <Button type={filter==='star3'?'primary':'default'} onClick={()=>setF('star3')}>⭐⭐⭐ ({flashcards.filter(c=>c.star===3).length})</Button>
        </Space>
        <Button onClick={shuffle}>🔀 สลับการ์ด</Button>
      </Flex>
      <Row gutter={16} style={{marginBottom:12}}>
        <Col span={8}><Statistic title="การ์ดที่" value={`${idx+1} / ${pool.length}`} /></Col>
        <Col span={8}><Statistic title="ตอบถูก" value={score.ok} valueStyle={{color:C.green}} /></Col>
        <Col span={8}><Statistic title="ตอบผิด" value={score.ng} valueStyle={{color:C.red}} /></Col>
      </Row>
      <div className="fc-perspective" onClick={()=>setFlipped(f=>!f)}>
        <div className={'fc-card' + (flipped ? ' flipped' : '')}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.borderDark}`}}>
            <Space direction="vertical" align="center">
              <Space>{card.exam && <Tag color="volcano">แนวข้อสอบ</Tag>}<Stars n={card.star} /></Space>
              <Title level={4} style={{color:C.text, margin:0}}>{card.q}</Title>
              <Text style={{color:C.text3}}>(คลิกเพื่อพลิกดูคำตอบ)</Text>
            </Space>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.gold}`}}>
            <Space direction="vertical" align="center">
              <Title level={4} style={{color:C.goldDark, margin:0}}>{card.a}</Title>
              <Text style={{color:C.text2}}>{card.d}</Text>
            </Space>
          </div>
        </div>
      </div>
      <Flex justify="center" gap={8} style={{marginTop:16}} wrap="wrap">
        <Button onClick={()=>nav(-1)}>← ก่อนหน้า</Button>
        <Button style={{background:C.greenBg, borderColor:C.green, color:C.green}} onClick={()=>mark(true)}>✓ ตอบถูก</Button>
        <Button style={{background:C.redBg, borderColor:C.red, color:C.red}} onClick={()=>mark(false)}>✗ ตอบผิด</Button>
        <Button onClick={()=>nav(1)}>ถัดไป →</Button>
      </Flex>
    </div>
  );
};
