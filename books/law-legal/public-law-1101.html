<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button,
        Row, Col, Divider, Alert, Statistic, Flex, Segmented, Radio, Progress, Steps,
        Collapse, Switch, Select, Result, Tooltip, Badge, Empty } = antd;
const { Title, Text, Paragraph } = Typography;
const { useState, useEffect, useRef, useMemo } = React;

/* ============ PALETTE (โทนคราม–ศิลาราชการ เฉพาะวิชามหาชน) ============ */
const C = {
  navy:'#3F5B8C', navyDark:'#2E4468', navyLight:'#7E97C0',
  amber:'#A9823F', amberDark:'#7E6231',
  bg:'#EEF2F7', surface:'#E3E9F2', surface2:'#D8E0EC', surface3:'#F3F6FA',
  border:'#C9D4E3', borderDark:'#A9BAD1',
  text:'#26303F', text2:'#46536A', text3:'#6B7A92',
  white:'#FBFCFE',
  green:'#4E8A6A', greenBg:'#EAF4EE',
  red:'#B65454', redBg:'#F6ECEA',
  purple:'#7A6699', purpleBg:'#F0EDF6',
  blue:'#4E7AA8', blueBg:'#EAF1F7',
  cyan:'#4E8A8A', cyanBg:'#EAF3F3',
};

/* ============ SHARED HELPERS ============ */
const Stars = ({n}) => <span style={{color:C.amber, letterSpacing:1}}>{'★'.repeat(n)}<span style={{color:C.border}}>{'★'.repeat(3-n)}</span></span>;

// ป้ายหลักกฎหมาย (วิชานี้อ้าง "หลัก/พ.ร.บ." มากกว่าเลขมาตรา)
const Pr = ({children}) => (
  <span className="sec-badge" style={{background:C.surface2, color:C.navyDark, padding:'1px 9px', borderRadius:7, border:`1px solid ${C.border}`, whiteSpace:'nowrap', fontSize:12.5}}>{children}</span>
);

const Pill = ({color, bg, children}) => (
  <span className="tag-chip" style={{background:bg, color:color, border:`1px solid ${color}33`}}>{children}</span>
);

const Box = ({tone='navy', title, icon, children, style}) => {
  const map = {
    green:[C.green,C.greenBg], red:[C.red,C.redBg], blue:[C.blue,C.blueBg],
    purple:[C.purple,C.purpleBg], cyan:[C.cyan,C.cyanBg], navy:[C.navyDark,C.surface3],
    amber:[C.amberDark,'#F7F2E6']
  };
  const [cc,bb] = map[tone]||map.navy;
  return (
    <div className="lesson-body" style={{background:bb, border:`1px solid ${cc}33`, borderLeft:`4px solid ${cc}`, borderRadius:12, padding:'13px 16px', margin:'10px 0', ...style}}>
      {title && <div style={{fontWeight:700, color:cc, marginBottom:6, fontSize:15}}>{icon} {title}</div>}
      <div style={{color:C.text2, fontSize:14.5}}>{children}</div>
    </div>
  );
};

// แถวหลักย่อยในบทเรียน
const HRule = ({n, children}) => (
  <div style={{display:'flex', gap:10, alignItems:'flex-start', margin:'7px 0'}}>
    <Pr>{n}</Pr>
    <span style={{color:C.text2, fontSize:14.3, flex:1}}>{children}</span>
  </div>
);

/* ============ ANIMATED SVG DIAGRAM ENGINE ============ */
function DiaNode({x, y, w=150, h=62, title, sub, color, active, onClick}) {
  return (
    <g style={{cursor:onClick?'pointer':'default'}} onClick={onClick} className={active?'node-pulse':''}>
      <rect x={x-w/2} y={y-h/2} width={w} height={h} rx={14}
        fill={active ? color : C.white}
        stroke={color} strokeWidth={active?3:2}
        style={{filter: active?`drop-shadow(0 4px 10px ${color}55)`:'none', transition:'all .4s'}} />
      <text x={x} y={sub? y-6 : y+5} textAnchor="middle"
        fontFamily="'Noto Sans Thai'" fontWeight="700" fontSize="16"
        fill={active ? C.white : color}>{title}</text>
      {sub && <text x={x} y={y+14} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="11.5"
        fill={active ? C.white : C.text3}>{sub}</text>}
    </g>
  );
}

function DiaEdge({id, d, color, label, labelX, labelY, dashed, animate, dur=2.6, reverse, width=3, dim}) {
  const op = dim ? 0.15 : 1;
  return (
    <g style={{opacity:op, transition:'opacity .4s'}}>
      <path id={id} d={d} fill="none" stroke={color} strokeWidth={width}
        strokeDasharray={dashed?'7 7':'none'} strokeLinecap="round"
        markerEnd={`url(#arrow-${id})`} />
      <defs>
        <marker id={`arrow-${id}`} markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L7,3 L0,6 Z" fill={color}/>
        </marker>
      </defs>
      {animate && !dim &&
        <circle r="6.5" fill={color}>
          <animateMotion dur={`${dur}s`} repeatCount="indefinite" keyPoints={reverse?'1;0':'0;1'} keyTimes="0;1" rotate="0">
            <mpath href={`#${id}`}/>
          </animateMotion>
        </circle>}
      {label &&
        <g>
          <rect x={labelX-label.length*4.1-8} y={labelY-13} width={label.length*8.2+16} height={22} rx={11}
            fill={C.white} stroke={color+'55'} />
          <text x={labelX} y={labelY+2} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5"
            fontWeight="600" fill={color}>{label}</text>
        </g>}
    </g>
  );
}

/* แผนภาพแกนของวิชา: กฎหมาย–รัฐ–เอกชน–ศาล (สลับได้ 3 โหมด) */
function PublicLawDiagram() {
  const modes = {
    relation: {
      label:'นิติสัมพันธ์มหาชน', color:C.blue,
      desc:'ในกฎหมายมหาชน คู่กรณีฝ่ายหนึ่งคือ "รัฐ/หน่วยงานของรัฐ/เจ้าหน้าที่ของรัฐ" ซึ่งมีอำนาจเหนือเอกชน — รัฐออก "คำสั่งฝ่ายเดียว" บังคับเอาได้โดยไม่ต้องได้รับความยินยอม (หลักความไม่เท่าเทียม) ต่างจากกฎหมายเอกชนที่คู่สัญญาเสมอภาค ต้องมีเจตนาเสนอ–สนองตรงกัน',
    },
    nitirat: {
      label:'หลักนิติรัฐ', color:C.red,
      desc:'"ไม่มีกฎหมาย ไม่มีอำนาจ" — รัฐเองก็ต้องอยู่ "ใต้" กฎหมาย จะใช้อำนาจใดได้ต่อเมื่อมีกฎหมายให้อำนาจไว้ และกฎหมายนั้นต้องเป็นกฎหมายที่ดี ถูกต้องเป็นธรรม นี่คือหัวใจของทั้งวิชา ออกสอบเกือบทุกเทอม',
    },
    control: {
      label:'การควบคุมอำนาจรัฐ', color:C.green,
      desc:'เมื่อรัฐมีอำนาจเหนือ ย่อมต้องมี "ระบบตรวจสอบ" — เอกชนที่ถูกกระทบสิทธิฟ้องศาลปกครองได้ (ไทยใช้ระบบศาลคู่) ศาลตรวจสอบความชอบด้วยกฎหมายและเพิกถอนคำสั่งที่มิชอบ นอกจากนั้นยังควบคุมโดยรัฐสภาและองค์กรอิสระได้อีกชั้นหนึ่ง',
    }
  };
  const [m, setM] = useState('relation');
  const M = modes[m];
  const L = {x:330, y:60}, S = {x:130, y:190}, P = {x:530, y:190}, J = {x:330, y:320};
  return (
    <div>
      <div style={{textAlign:'center', marginBottom:12}}>
        <Segmented value={m} onChange={setM} size="large"
          options={Object.keys(modes).map(k=>({label:modes[k].label, value:k}))} />
      </div>
      <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:16, padding:'8px 4px'}}>
        <svg viewBox="0 0 660 390" style={{width:'100%', height:'auto', maxHeight:430}}>
          {/* กฎหมาย → รัฐ : ให้อำนาจ/จำกัดอำนาจ */}
          <DiaEdge id="ls" d={`M ${L.x-60} ${L.y+22} Q 190 100 ${S.x+18} ${S.y-34}`} color={m==='nitirat'?C.red:C.navy}
            label={m==='nitirat'?'ให้อำนาจ + จำกัดอำนาจ':'ให้อำนาจเท่าที่กำหนด'} labelX={190} labelY={92}
            dashed={m!=='nitirat'} animate dur={2.6} width={m==='nitirat'?4:3} dim={m==='control'} />
          {/* รัฐ → เอกชน : คำสั่งฝ่ายเดียว */}
          <DiaEdge id="sp" d={`M ${S.x+72} ${S.y} L ${P.x-72} ${P.y}`} color={m==='relation'?C.red:C.blue}
            label={m==='relation'?'คำสั่งฝ่ายเดียว (อำนาจเหนือ)':'ใช้อำนาจปกครอง'} labelX={330} labelY={168}
            animate dur={2.2} width={m==='relation'?4:3} dim={m==='nitirat'} />
          {/* เอกชน → ศาล : ฟ้องตรวจสอบ */}
          <DiaEdge id="pj" d={`M ${P.x-30} ${P.y+34} Q 470 300 ${J.x+70} ${J.y-14}`} color={m==='control'?C.green:C.cyan}
            label={m==='control'?'ฟ้องศาลปกครอง':'สิทธิฟ้องคดี'} labelX={480} labelY={286}
            animate dur={2.4} width={m==='control'?4:2.5} dim={m==='relation'} />
          {/* ศาล → รัฐ : เพิกถอนคำสั่งมิชอบ */}
          {m==='control' &&
            <DiaEdge id="js" d={`M ${J.x-70} ${J.y-14} Q 190 300 ${S.x+26} ${S.y+34}`} color={C.red}
              label="เพิกถอนคำสั่งที่มิชอบ" labelX={185} labelY={286} animate dur={2.2} width={4} />}
          {/* นิติรัฐ: เอกชนได้รับความคุ้มครองจากกฎหมาย */}
          {m==='nitirat' &&
            <DiaEdge id="lp" d={`M ${L.x+60} ${L.y+22} Q 470 100 ${P.x-18} ${P.y-34}`} color={C.green}
              label="คุ้มครองสิทธิเสรีภาพ" labelX={475} labelY={92} animate dur={2.8} width={3.5} />}

          <DiaNode {...L} title="กฎหมาย" sub="รัฐธรรมนูญ · พ.ร.บ." color={C.purple} active />
          <DiaNode {...S} title="รัฐ / ฝ่ายปกครอง" sub="เจ้าหน้าที่ของรัฐ" color={C.navy} active />
          <DiaNode {...P} title="เอกชน" sub="ประชาชน" color={C.cyan} active />
          <DiaNode {...J} title={m==='control'?'ศาลปกครอง':'ศาล'} sub={m==='control'?'ระบบศาลคู่':'องค์กรตุลาการ'} color={M.color==='#B65454'?C.blue:M.color} active />
        </svg>
      </div>
      <Box tone={m==='relation'?'blue':(m==='nitirat'?'red':'green')} title={`โหมด: ${M.label}`} icon="🎬" style={{marginTop:12}}>
        {M.desc}
      </Box>
    </div>
  );
}

// แถบขั้นตอน (pipeline) เคลื่อนไหว
function FlowStrip({steps, color=C.navy}) {
  return (
    <div style={{background:C.white, border:`1px solid ${C.border}`, borderRadius:14, padding:'16px 10px', overflowX:'auto'}}>
      <svg viewBox={`0 0 ${steps.length*180} 130`} style={{width:'100%', minWidth:steps.length*150, height:'auto'}}>
        {steps.map((s,i)=>{
          const x = 90 + i*180;
          return (
            <g key={i}>
              {i<steps.length-1 &&
                <DiaEdge id={`fs${color.replace('#','')}${i}`} d={`M ${x+62} 55 L ${x+118} 55`} color={color} animate dur={1.8} width={2.5}/>}
              <circle cx={x} cy={55} r={34} fill={s.bg||C.surface3} stroke={color} strokeWidth={2.5} className="node-pulse"/>
              <text x={x} y={60} textAnchor="middle" fontSize="24">{s.icon}</text>
              <text x={x} y={112} textAnchor="middle" fontFamily="'Noto Sans Thai'" fontSize="12.5" fontWeight="600" fill={C.text2}>
                {s.t}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ============ TAB 1: FOUNDATIONS (ปูพื้นฐาน) ============ */
function FoundationsTab() {
  const vocab = [
    ['กฎหมายมหาชน', 'Public Law', 'กฎหมายที่ให้ "อำนาจและหน้าที่" แก่รัฐ/หน่วยงาน/เจ้าหน้าที่ของรัฐ เพื่อประโยชน์ของประชาชนส่วนใหญ่ โดยรัฐมีอำนาจเหนือผู้ใต้ปกครอง', C.navy],
    ['หลักนิติรัฐ', 'Legal State / Rechtsstaat', 'รัฐต้องปกครอง "โดยกฎหมาย" ไม่ใช่ตามอำเภอใจ — ไม่มีกฎหมายให้อำนาจ ฝ่ายปกครองทำมิได้', C.red],
    ['หลักนิติธรรม', 'The Rule of Law', 'หลักของอังกฤษ (Dicey): กฎหมายเป็นใหญ่ · เสมอภาคต่อหน้ากฎหมาย · สิทธิปัจเจกชนคุ้มครองโดยศาล', C.purple],
    ['ประโยชน์สาธารณะ', 'Public Interest', 'ความต้องการของคนส่วนใหญ่ในสังคม ซึ่งรัฐมีหน้าที่จัดหาในรูป "บริการสาธารณะ" — เป้าหมายสูงสุดของกฎหมายมหาชน', C.green],
    ['อำนาจดุลพินิจ', 'Discretionary Power', 'อำนาจที่กฎหมายเปิดช่องให้ฝ่ายปกครอง "เลือก" ตัดสินใจได้ — จึงต้องมีระบบควบคุมการใช้', C.blue],
    ['ระบบศาลคู่', 'Dual Court System', 'แยกศาลปกครอง (คดีมหาชน) ออกจากศาลยุติธรรม (คดีเอกชน) — ไทย ฝรั่งเศส เยอรมนี ใช้ระบบนี้', C.cyan],
  ];
  return (
    <div className="fade-up">
      <Alert type="info" showIcon style={{marginBottom:18, background:C.blueBg, border:`1px solid ${C.blue}44`}}
        message={<span style={{fontWeight:700, color:C.blue, fontSize:16}}>เริ่มจากศูนย์ก็เข้าใจได้ 👋</span>}
        description={<span style={{color:C.text2}}>วิชานี้ตอบคำถามเดียว: <strong>"รัฐมีอำนาจเหนือเรา แล้วอะไรจะกันไม่ให้รัฐใช้อำนาจตามอำเภอใจ?"</strong> คำตอบคือ "กฎหมายมหาชน" — กฎหมายที่ทั้ง <strong>ให้อำนาจ</strong> รัฐ และ <strong>ควบคุม</strong> รัฐไปพร้อมกัน ทุกบทในวิชานี้วนอยู่รอบแกนนี้</span>} />

      <Card style={{marginBottom:18, borderColor:C.border, background:C.surface3}} bodyStyle={{padding:'18px 20px'}}>
        <Title level={4} style={{marginTop:0, color:C.text}}>🏗️ นึกภาพง่าย ๆ ด้วยชีวิตจริง</Title>
        <Paragraph style={{color:C.text2, fontSize:15}}>

function IracCard({c}) {
  const [step, setStep] = useState(0); // 0=facts only, 1..4 reveal I R A C
  const parts = [
    {k:'Issue', th:'ประเด็น (I)', color:C.blue, body:c.issue},
    {k:'Rule', th:'หลักกฎหมาย (R)', color:C.purple, body:<span>{c.rule.map(x=><span key={x} style={{marginRight:6}}><Pr>{x}</Pr></span>)}<div style={{marginTop:8}}>{c.ruleText}</div></span>},
    {k:'Application', th:'ปรับข้อเท็จจริง (A)', color:C.amberDark, body:c.application},
    {k:'Conclusion', th:'สรุป (C)', color:C.green, body:c.conclusion},
  ];
  return (
    <Card style={{marginBottom:18, borderColor:C.border}} bodyStyle={{padding:'18px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:10}}>
        <Tag color="geekblue" style={{fontWeight:700}}>{c.tag}</Tag>
        <span style={{fontWeight:700, fontSize:16, color:C.text}}>{c.topic}</span>
        <Stars n={c.star}/>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3}}>
        <strong style={{color:C.navyDark}}>ข้อเท็จจริง: </strong>{c.facts}
      </div>
      <div style={{margin:'14px 0 6px'}}>
        {parts.slice(0,step).map((p,i)=>(
          <div key={i} className="fade-up" style={{borderLeft:`4px solid ${p.color}`, background:p.color+'12', borderRadius:'0 10px 10px 0', padding:'11px 15px', marginBottom:10}}>
            <div style={{fontWeight:700, color:p.color, marginBottom:3}}>{p.th}</div>
            <div style={{color:C.text2, fontSize:14.3}}>{p.body}</div>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center', marginTop:6}}>
        {step<4
          ? <Button type="primary" size="large" onClick={()=>setStep(step+1)}
              style={{background:parts[step].color, borderColor:parts[step].color}}>
              เปิดขั้น {parts[step].th} ▸</Button>
          : <Space>
              <Tag color="green" style={{padding:'6px 14px', fontSize:14}}>✅ ครบ IRAC แล้ว</Tag>
              <Button onClick={()=>setStep(0)}>เริ่มใหม่</Button>
            </Space>}
      </div>
    </Card>
  );
}

function IracTab() {
  return (
    <div className="fade-up">
      <Alert type="info" showIcon style={{marginBottom:16, background:C.blueBg, border:`1px solid ${C.blue}44`}}
        message={<span style={{fontWeight:700, color:C.blue}}>เดินเคสทีละขั้น Issue → Rule → Application → Conclusion</span>}
        description={<span style={{color:C.text2}}>ลองคิดคำตอบในใจก่อน แล้วค่อยกดเปิดทีละขั้น — วิชานี้เป็นอัตนัย 3 ข้อ ข้อละ 25 คะแนน โครงเขียนตอบ "วางหลัก → วินิจฉัย → สรุป" คือกุญแจได้คะแนน</span>} />
      {iracCases.map(c=><IracCard key={c.id} c={c}/>)}
      <Box tone="navy" title="โครงเขียนตอบให้ได้คะแนน (จำเป็นมาก)" icon="✍️">
        <b>วางหลักกฎหมาย</b> (ยกหลัก/ทฤษฎี/พ.ร.บ. ที่เกี่ยว พร้อมชื่อภาษาอังกฤษถ้ามี) → <b>วินิจฉัย</b> (จับข้อเท็จจริงเข้ากับหลักทีละประเด็น + ยกตัวอย่างประกอบ) → <b>สรุป</b> (ตอบคำถามให้ตรง). เขียนครบ 3 ท่อนนี้ทุกข้อเสมอ — ตอบถูกแต่ไม่ยกหลัก = เสียคะแนนฟรี
      </Box>
    </div>
  );
}

function PredictCard({c, onAnswered}) {
  const [pick, setPick] = useState(null); // true/false = คำตอบที่ผู้เรียนทาย
  const revealed = pick!==null;
  const correct = revealed && pick===c.answer;
  const toneColor = c.answer ? C.green : C.red;
  return (
    <Card className={revealed?'':'hoverlift'} style={{marginBottom:16, borderColor:revealed?toneColor:C.border, borderWidth:revealed?2:1}} bodyStyle={{padding:'16px 18px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:8}}>
        <span style={{fontSize:22}}>{c.icon}</span>
        <span style={{fontWeight:700, fontSize:15.5, color:C.text}}>{c.topic}</span>
      </div>
      <div style={{background:C.surface3, borderRadius:12, padding:'11px 14px', border:`1px solid ${C.border}`, color:C.text2, fontSize:14.3, marginBottom:12}}>
        {c.facts}
      </div>
      <Flex align="center" justify="space-between" gap={12} wrap="wrap">
        <span style={{fontWeight:700, color:C.navyDark, fontSize:14.8}}>🔮 ทำนายก่อนเฉลย: {c.q}</span>
        {!revealed &&
          <Space>
            <Button size="large" style={{borderColor:C.green, color:C.green, fontWeight:700}}
              onClick={()=>{setPick(true); onAnswered(true===c.answer);}}>{c.yesLabel}</Button>
            <Button size="large" style={{borderColor:C.red, color:C.red, fontWeight:700}}
              onClick={()=>{setPick(false); onAnswered(false===c.answer);}}>{c.noLabel}</Button>
          </Space>}
      </Flex>
      {revealed && (
        <div className="fade-up" style={{marginTop:12}}>
          <Flex align="center" gap={10} wrap="wrap" style={{marginBottom:8}}>
            <Tag color={correct?'green':'red'} style={{padding:'4px 12px', fontSize:14, fontWeight:700}}>
              {correct?'🎯 ทายถูก!':'📖 ยังไม่ใช่ — ดูเหตุผลด้านล่าง'}</Tag>
            <span style={{fontWeight:800, color:toneColor}}>เฉลย: {c.answer?c.yesLabel:c.noLabel}</span>
          </Flex>
          <div style={{marginBottom:10}}>
            {c.secs.map(sec=><span key={sec} style={{display:'inline-block', margin:'3px 6px 3px 0', background:toneColor, color:C.white, padding:'3px 12px', borderRadius:8, fontWeight:700, fontFamily:"'Noto Serif Thai'", fontSize:13}}>{sec}</span>)}
          </div>
          <div style={{background:C.surface3, borderRadius:12, padding:'12px 15px', border:`1px solid ${C.border}`}}>
            <div style={{fontSize:12.5, color:C.text3, fontWeight:700, marginBottom:4}}>คำวินิจฉัย</div>
            <div style={{color:C.text2, fontSize:14.6, lineHeight:1.85}}>{c.ruling}</div>
          </div>
        </div>
      )}
    </Card>
  );
}

function CaseLabTab() {
  const [score, setScore] = useState({c:0, t:0});
  const onAnswered = (ok)=> setScore(s=>({c:s.c+(ok?1:0), t:s.t+1}));
  return (
    <div className="fade-up">
      <Alert type="warning" showIcon style={{marginBottom:16, background:'#F7F2E6', border:`1px solid ${C.amber}66`}}
        message={<span style={{fontWeight:700, color:C.amberDark}}>🧪 Case Lab — อ่านข้อเท็จจริง "ทายผลก่อน" แล้วค่อยดูเฉลย</span>}
        description={<span style={{color:C.text2}}>เหมือนอาจารย์ซักในห้องแบบ Socratic: ตัดสินเองก่อนว่า <strong>ชอบ/ไม่ชอบด้วยกฎหมาย</strong> จากนั้นระบบจะเฉลยพร้อม <strong>หลักกฎหมายที่ใช้</strong> และคำวินิจฉัยเต็ม — ระวัง มีข้อหลอกที่คำตอบสวนสัญชาตญาณ</span>} />
      <Flex justify="flex-end" style={{marginBottom:10}}>
        <Tag color="geekblue" style={{padding:'5px 14px', fontSize:14}}>ทายถูก {score.c} / {score.t} จากทั้งหมด {labCases.length} เคส</Tag>
      </Flex>
      {labCases.map(c=><PredictCard key={c.id} c={c} onAnswered={onAnswered}/>)}
      <Box tone="cyan" title="สังเกตแพตเทิร์น" icon="💡">
        เคสส่วนใหญ่เฉลยว่า "ไม่ชอบ/ไม่ได้" เพราะโจทย์วิชานี้มักสร้างสถานการณ์ให้รัฐใช้อำนาจ <strong>เกิน–ข้าม–นอก–อคติ</strong> แล้วถามให้เราตรวจสอบ — แต่เคสสุดท้าย (กำหนดเพดานราคา) เฉลยว่า "ได้" เพราะ<strong>มีกฎหมายให้อำนาจ</strong> นี่แหละเส้นแบ่งที่ข้อสอบต้องการวัด
      </Box>
    </div>
  );
}

function Quiz() {
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const Qd = quizData[i];
  const choose = (k)=>{ if(picked!==null) return; setPicked(k); if(k===Qd.correct) setScore(s=>s+1); };
  const next = ()=>{ if(i+1>=quizData.length){ setDone(true); } else { setI(i+1); setPicked(null);} };
  const restart = ()=>{ setI(0); setPicked(null); setScore(0); setDone(false); };

  if(done) return (
    <Result status={score>=9?'success':'info'}
      title={`ได้ ${score} / ${quizData.length} คะแนน`}
      subTitle={score>=9?'เก่งมาก! พร้อมลงสนามสอบแล้ว 🎉':'กลับไปทวนแท็บบทเรียน (โดยเฉพาะโมดูล ★★★) แล้วลองใหม่นะ 💪'}
      extra={<Button type="primary" style={{background:C.navy, borderColor:C.navy}} onClick={restart}>ทำใหม่อีกครั้ง</Button>}/>
  );
  return (
    <div>
      <Flex justify="space-between" align="center" style={{marginBottom:10}}>
        <Text style={{color:C.text3}}>ข้อ {i+1} / {quizData.length}</Text>
        <Tag color="geekblue">คะแนน {score}</Tag>
      </Flex>
      <Progress percent={Math.round((i)/quizData.length*100)} showInfo={false} strokeColor={C.green} trailColor={C.surface2} style={{marginBottom:16}}/>
      <div style={{fontSize:17, fontWeight:600, color:C.text, marginBottom:16, lineHeight:1.7}}>{Qd.q}</div>
      <Space direction="vertical" style={{width:'100%'}} size={10}>
        {Qd.opts.map((o,k)=>{
          let bg=C.white, bd=C.border, cc=C.text;
          if(picked!==null){
            if(k===Qd.correct){ bg=C.greenBg; bd=C.green; cc=C.green; }
            else if(k===picked){ bg=C.redBg; bd=C.red; cc=C.red; }
          }
          return (
            <div key={k} onClick={()=>choose(k)} className={picked===null?'hoverlift':''}
              style={{cursor:picked===null?'pointer':'default', background:bg, border:`1.5px solid ${bd}`, borderRadius:10, padding:'12px 16px', color:cc, fontSize:15, fontWeight:500, transition:'all .25s'}}>
              <span style={{fontWeight:700, marginRight:8}}>{'กขคง'[k]}.</span>{o}
              {picked!==null && k===Qd.correct && <span style={{float:'right'}}>✅</span>}
              {picked===k && k!==Qd.correct && <span style={{float:'right'}}>❌</span>}
            </div>
          );
        })}
      </Space>
      {picked!==null && (
        <div className="fade-up">
          <Box tone={picked===Qd.correct?'green':'red'} title={picked===Qd.correct?'ถูกต้อง!':'ยังไม่ใช่'} icon={picked===Qd.correct?'🎯':'📖'} style={{marginTop:14}}>
            {Qd.exp}
          </Box>
          <div style={{textAlign:'center', marginTop:12}}>
            <Button type="primary" size="large" style={{background:C.green, borderColor:C.green}} onClick={next}>
              {i+1>=quizData.length?'ดูผลคะแนน':'ข้อถัดไป ▸'}</Button>
          </div>
        </div>
      )}
    </div>
  );
}

  const [mode, setMode] = useState('all');
  const pool = useMemo(()=>{
    let p = flashcards;
    if (mode==='exam') p = flashcards.filter(c=>c.exam);
    if (mode==='star3') p = flashcards.filter(c=>c.star===3);
    return p;
  },[mode]);
  const [order, setOrder] = useState(()=>flashcards.map((_,i)=>i));
  const [idx, setIdx] = useState(0);
  const [flip, setFlip] = useState(false);
  const [score, setScore] = useState({c:0,w:0});

  useEffect(()=>{ setOrder(pool.map((_,i)=>i)); setIdx(0); setFlip(false); setScore({c:0,w:0}); },[mode]);

  const card = pool[order[idx]] || pool[0];
  const go = (dir)=>{ setFlip(false); setTimeout(()=>setIdx(i=>Math.max(0,Math.min(pool.length-1,i+dir))),120); };
  const shuffle = ()=>{ const o=[...Array(pool.length).keys()]; for(let i=o.length-1;i>0;i--){const j=Math.floor(((i*7+3)%(i+1)));[o[i],o[j]]=[o[j],o[i]];} setOrder(o); setIdx(0); setFlip(false); };
  const mark = (ok)=>{ setScore(s=>({c:s.c+(ok?1:0), w:s.w+(ok?0:1)})); go(1); };

  if(!card) return <Empty description="ไม่มีการ์ด"/>;
  return (
    <div className="fade-up">
      <Flex justify="space-between" align="center" wrap="wrap" gap={10} style={{marginBottom:14}}>
        <Segmented value={mode} onChange={setMode}
          options={[{label:`ทั้งหมด (${flashcards.length})`,value:'all'},{label:`ออกสอบ (${flashcards.filter(c=>c.exam).length})`,value:'exam'},{label:`★★★ (${flashcards.filter(c=>c.star===3).length})`,value:'star3'}]}/>
        <Space>
          <Tag color="green">ถูก {score.c}</Tag>
          <Tag color="red">ผิด {score.w}</Tag>
          <Button size="small" onClick={shuffle}>🔀 สุ่ม</Button>
        </Space>
      </Flex>
      <div style={{textAlign:'center', color:C.text3, marginBottom:8}}>การ์ด {idx+1} / {pool.length}</div>
      <Progress percent={Math.round((idx+1)/pool.length*100)} showInfo={false} strokeColor={C.navy} trailColor={C.surface2} style={{marginBottom:14}}/>
      <div className="fc-perspective" style={{maxWidth:640, margin:'0 auto', minHeight:280}}>
        <div className={'fc-card'+(flip?' flipped':'')} style={{minHeight:280}} onClick={()=>setFlip(f=>!f)}>
          <div className="fc-face" style={{background:C.white, border:`2px solid ${C.navy}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:280}}>
            <div style={{position:'absolute', top:14, left:16}}><Stars n={card.star}/></div>
            {card.exam && <Tag color="geekblue" style={{position:'absolute', top:12, right:12}}>ข้อสอบ</Tag>}
            <div style={{fontSize:12.5, color:C.text3, marginBottom:10}}>❓ คำถาม (แตะเพื่อพลิก)</div>
            <div style={{fontSize:19, fontWeight:600, color:C.text, textAlign:'center', lineHeight:1.7}}>{card.q}</div>
          </div>
          <div className="fc-face fc-back" style={{background:C.surface3, border:`2px solid ${C.green}`, padding:'26px', justifyContent:'center', alignItems:'center', minHeight:280}}>
            <div style={{fontSize:12.5, color:C.green, marginBottom:8, fontWeight:700}}>✅ คำตอบ</div>
            <div style={{fontSize:20, fontWeight:800, color:C.green, textAlign:'center', marginBottom:card.d?12:0}}>{card.a}</div>
            {card.d && <div style={{fontSize:14.5, color:C.text2, textAlign:'center', lineHeight:1.8}}>{card.d}</div>}
          </div>
        </div>
      </div>
      <Flex justify="center" align="center" gap={10} style={{marginTop:20}} wrap="wrap">
        <Button onClick={()=>go(-1)} disabled={idx===0}>◂ ก่อนหน้า</Button>
        {flip
          ? <Space>
              <Button danger onClick={()=>mark(false)}>✗ ยังไม่แม่น</Button>
              <Button type="primary" style={{background:C.green, borderColor:C.green}} onClick={()=>mark(true)}>✓ จำได้</Button>
            </Space>
          : <Button type="primary" style={{background:C.navy, borderColor:C.navy}} onClick={()=>setFlip(true)}>พลิกดูคำตอบ</Button>}
        <Button onClick={()=>go(1)} disabled={idx===pool.length-1}>ถัดไป ▸</Button>
      </Flex>
    </div>
  );
}

/* ============ APP SHELL ============ */

      }
    }}>
      <Layout style={{minHeight:'100vh', background:C.bg}}>
        <div style={{background:`linear-gradient(135deg, ${C.navyDark}, ${C.navy})`, padding:'26px 16px 22px', textAlign:'center', boxShadow:'0 2px 14px rgba(46,68,104,.3)'}}>
          <div style={{color:C.white, fontSize:13, letterSpacing:3, opacity:.9}}>LAW 1101 · มหาวิทยาลัยรามคำแหง</div>
          <h1 style={{color:C.white, margin:'6px 0 4px', fontSize:30, fontWeight:800}}>หลักกฎหมายมหาชน</h1>
          <div style={{color:'#DCE6F5', fontSize:14.5}}>ห้องเรียนอินเทอร์แอกทีฟ · เรียนจากศูนย์ถึงเขียนตอบข้อสอบได้ · สไตล์ Case Method + Socratic</div>
        </div>
        <Layout.Content style={{padding:'22px 16px 10px'}}>
          <div style={{maxWidth:940, margin:'0 auto'}}>
            <Tabs activeKey={tab} onChange={setTab} items={items} centered type="card" size="large"/>
          </div>
        </Layout.Content>
        <Layout.Footer style={{textAlign:'center', background:'transparent', color:C.text3, fontSize:13}}>
          จัดทำเพื่อการทบทวนของนักศึกษา · อ้างอิงเอกสารสรุป LAW1101 (หลักนิติรัฐ · การควบคุมอำนาจรัฐ · การจัดระเบียบบริหารราชการแผ่นดิน · พ.ร.บ.วิธีปฏิบัติราชการทางปกครอง 2539 · พ.ร.บ.ความรับผิดทางละเมิดฯ 2539 · พ.ร.บ.จัดตั้งศาลปกครองฯ 2542 · พ.ร.บ.ระเบียบบริหารราชการแผ่นดิน 2534) · แนวคำตอบยึดตามแนวข้อสอบรามคำแหง 2563–2568
        </Layout.Footer>
      </Layout>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
