<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAW 1101 Flashcard Quiz - 30 ข้อสุ่ม</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #1a237e;
            --secondary: #3949ab;
            --accent: #ff6f00;
            --success: #2e7d32;
            --danger: #c62828;
            --gold: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1rem; }
        .header .stock-info { margin-top: 10px; font-size: 0.9rem; color: var(--gold); }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            min-width: 100px;
        }
        
        .stat-number { font-size: 2rem; font-weight: 700; color: var(--gold); }
        .stat-label { font-size: 0.9rem; opacity: 0.8; }
        
        .flashcard-container { perspective: 1000px; margin-bottom: 30px; }
        
        .flashcard {
            position: relative;
            width: 100%;
            min-height: 300px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }
        
        .flashcard.flipped { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute;
            width: 100%;
            min-height: 300px;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .card-front {
            background: linear-gradient(135deg, #2d132c, #1a1a40);
            border: 2px solid var(--accent);
        }
        
        .card-back {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border: 2px solid var(--success);
            transform: rotateY(180deg);
        }
        
        .question-number {
            position: absolute;
            top: 15px;
            left: 20px;
            background: var(--accent);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .card-label {
            position: absolute;
            top: 15px;
            right: 20px;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .card-front .card-label { background: rgba(255,111,0,0.2); color: var(--accent); }
        .card-back .card-label { background: rgba(46,125,50,0.3); color: #81c784; }
        
        .card-content { font-size: 1.3rem; line-height: 1.8; padding: 20px 0; }
        .tap-hint { position: absolute; bottom: 15px; font-size: 0.85rem; opacity: 0.6; }
        
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Sarabun', sans-serif;
        }
        
        .btn-prev, .btn-next {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-prev:hover, .btn-next:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(57,73,171,0.4);
        }
        
        .btn-shuffle {
            background: linear-gradient(135deg, var(--accent), #ff8f00);
            color: #000;
        }
        
        .btn-shuffle:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,111,0,0.4);
        }
        
        .progress-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #66bb6a);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: var(--gold); text-decoration: none; font-size: 1rem; }
        .back-link a:hover { text-decoration: underline; }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
            .card-content { font-size: 1.1rem; }
            .nav-btn { padding: 12px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 LAW 1101 Flashcard Quiz</h1>
            <p>หลักกฎหมายมหาชน | สุ่ม 30 ข้อทุกครั้งที่ Refresh</p>
            <div class="stock-info">📦 คลังคำถาม: <span id="stockCount">100</span> ข้อ</div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="currentCard">1</div>
                <div class="stat-label">ข้อที่</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalCards">30</div>
                <div class="stat-label">ทั้งหมด</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="viewedCount">0</div>
                <div class="stat-label">ดูเฉลยแล้ว</div>
            </div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        
        <div class="flashcard-container">
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="card-face card-front">
                    <span class="question-number" id="questionNum">Q.1</span>
                    <span class="card-label">❓ คำถาม</span>
                    <div class="card-content" id="questionText">Loading...</div>
                    <span class="tap-hint">👆 แตะเพื่อดูคำตอบ</span>
                </div>
                <div class="card-face card-back">
                    <span class="question-number" id="answerNum">Q.1</span>
                    <span class="card-label">✅ คำตอบ</span>
                    <div class="card-content" id="answerText">Loading...</div>
                    <span class="tap-hint">👆 แตะเพื่อกลับคำถาม</span>
                </div>
            </div>
        </div>
        
        <div class="nav-buttons">
            <button class="nav-btn btn-prev" onclick="prevCard()">⬅️ ก่อนหน้า</button>
            <button class="nav-btn btn-shuffle" onclick="shuffleCards()">🔀 สุ่มใหม่</button>
            <button class="nav-btn btn-next" onclick="nextCard()">ถัดไป ➡️</button>
        </div>
        
        <div class="back-link">
            <a href="law1101-study-guide.html">📖 กลับไปอ่านสรุป</a> | 
            <a href="../../book-learning-hub.html">📚 กลับ Library Hub</a>
        </div>
    </div>
    
    <script>
        // =====================================================
        // 📦 QUESTION BANK - 100 Questions from LAW 1101
        // =====================================================
        const questionBank = [
            // ========== บทนำ: ความหมาย (10 ข้อ) ==========
            {"q":"กฎหมายมหาชน คืออะไร?","a":"กฎหมายที่บัญญัติให้อำนาจและหน้าที่แก่รัฐ หน่วยงานของรัฐ และเจ้าหน้าที่ของรัฐ เพื่อประโยชน์ของประชาชนส่วนใหญ่ โดยฝ่ายปกครองมีอำนาจเหนือผู้ใต้ปกครอง"},
            {"q":"ปรัชญาของกฎหมายมหาชนคืออะไร?","a":"\"เมื่อไม่มีกฎหมายให้อำนาจ → จะทำมิได้\""},
            {"q":"ปรัชญาของกฎหมายเอกชนคืออะไร?","a":"\"เมื่อไม่มีกฎหมายห้าม → ย่อมทำได้\""},
            {"q":"กฎหมายมหาชนมีขอบเขตครอบคลุมกฎหมายประเภทใดบ้าง?","a":"1. กฎหมายรัฐธรรมนูญ 2. กฎหมายปกครอง 3. กฎหมายการคลัง 4. กฎหมายภาษีอากร"},
            {"q":"กฎหมายรัฐธรรมนูญมีวัตถุประสงค์อะไร?","a":"วางระเบียบการปกครองของรัฐในทางการเมือง กำหนดโครงสร้างของรัฐ ระบอบการปกครอง และการใช้อำนาจอธิปไตย"},
            {"q":"กฎหมายปกครองมีวัตถุประสงค์อะไร?","a":"วางหลักเกี่ยวกับการจัดระเบียบการปกครองของรัฐในทางปกครอง รวมถึงการจัดระเบียบราชการบริหารและบริการสาธารณะ"},
            {"q":"หลักความชอบด้วยกฎหมายในกฎหมายมหาชนหมายความว่าอะไร?","a":"การใช้อำนาจหน้าที่ขององค์กรรัฐ ต้องเป็นอำนาจที่กฎหมายกำหนดเท่านั้น จะใช้อำนาจนอกเหนือจากที่กฎหมายบัญญัติไว้ไม่ได้"},
            {"q":"หลักประโยชน์สาธารณะหมายความว่าอะไร?","a":"การใช้อำนาจต้องเป็นอำนาจเพื่อตอบสนองความต้องการของคนส่วนใหญ่ในสังคม ไม่ใช่เพื่อคนบางกลุ่มหรือคนใดคนหนึ่ง"},
            {"q":"ราชการแผ่นดินไทยแบ่งเป็นกี่ส่วน?","a":"3 ส่วน: 1.ราชการบริหารส่วนกลาง 2.ราชการบริหารส่วนภูมิภาค 3.ราชการบริหารส่วนท้องถิ่น"},
            {"q":"อำนาจอธิปไตยแบ่งออกเป็นกี่อำนาจ?","a":"3 อำนาจ: 1.อำนาจนิติบัญญัติ (รัฐสภา) 2.อำนาจบริหาร (รัฐบาล/ครม.) 3.อำนาจตุลาการ (ศาล)"},
            
            // ========== ความแตกต่าง มหาชน-เอกชน (15 ข้อ) ==========
            {"q":"ทฤษฎี 6 ประการที่ใช้แยกความแตกต่างระหว่างกฎหมายมหาชนกับเอกชนมีอะไรบ้าง?","a":"1.ตัวการ 2.ผลประโยชน์ 3.ความไม่เท่าเทียม 4.นิติวิธี 5.นิติปรัชญา 6.เขตอำนาจศาล"},
            {"q":"ทฤษฎีตัวการ (องค์กร) แยกกฎหมายมหาชนกับเอกชนอย่างไร?","a":"มหาชน: รัฐ/หน่วยงานรัฐ ↔ เอกชน หรือ รัฐ ↔ รัฐ | เอกชน: เอกชน ↔ เอกชน"},
            {"q":"ทฤษฎีผลประโยชน์ (เนื้อหา) แยกกฎหมายมหาชนกับเอกชนอย่างไร?","a":"มหาชน: มุ่งประโยชน์ส่วนรวม/สาธารณประโยชน์ | เอกชน: มุ่งประโยชน์ของเอกชน/เฉพาะบุคคล"},
            {"q":"ทฤษฎีความไม่เท่าเทียม (รูปแบบ) แยกกฎหมายมหาชนกับเอกชนอย่างไร?","a":"มหาชน: วิธีบังคับ หลีกเลี่ยงไม่ได้ รัฐมีสิทธิมากกว่า เป็นคำสั่งหรือข้อห้าม | เอกชน: ความเสมอภาค เสรีภาพในการทำสัญญา"},
            {"q":"กฎหมายมหาชนใช้วิธีการอะไรในการสร้างนิติสัมพันธ์?","a":"ใช้นิติกรรมฝ่ายเดียว (คำสั่ง/ข้อห้าม) ไม่จำเป็นต้องมีความยินยอม"},
            {"q":"กฎหมายเอกชนใช้วิธีการอะไรในการสร้างนิติสัมพันธ์?","a":"ใช้สัญญา ต้องมีเจตนาสนองตรงกันระหว่างคู่สัญญา"},
            {"q":"นิติวิธีของกฎหมายมหาชนเป็นอย่างไร?","a":"สร้างหลักกฎหมายพิเศษ ไม่นำกฎหมายเอกชนมาใช้โดยตรง"},
            {"q":"นิติปรัชญาของกฎหมายมหาชนคืออะไร?","a":"ประสานประโยชน์สาธารณะกับประโยชน์เอกชน ให้เกิดความสมดุล"},
            {"q":"นิติปรัชญาของกฎหมายเอกชนคืออะไร?","a":"ความยุติธรรมเท่าเทียม หลักเสรีภาพแห่งความสมัครใจ"},
            {"q":"คดีกฎหมายมหาชนอยู่ในอำนาจศาลใด?","a":"ศาลปกครอง และศาลรัฐธรรมนูญ (ระบบศาลคู่)"},
            {"q":"คดีกฎหมายเอกชนอยู่ในอำนาจศาลใด?","a":"ศาลยุติธรรม"},
            {"q":"ลักษณะของกฎหมายมหาชน 5 ประการมีอะไรบ้าง?","a":"1.คู่กรณีฝ่ายหนึ่งเป็นองค์กรรัฐ 2.มุ่งประโยชน์สาธารณะ 3.ไม่ตั้งอยู่บนความเสมอภาค 4.มีสภาพบังคับทั่วไป 5.อยู่ในอำนาจศาลพิเศษ"},
            {"q":"วิธีจำทฤษฎี 6 ประการคืออะไร?","a":"\"ตัว-ผล-ไม่เท่า-นิติ-ปรัชญา-ศาล\" (ตัวการ, ผลประโยชน์, ไม่เท่าเทียม, นิติวิธี, นิติปรัชญา, ศาล)"},
            {"q":"เหตุใดกฎหมายมหาชนจึงไม่นำหลักกฎหมายเอกชนมาใช้โดยตรง?","a":"เพราะจุดมุ่งหมายต่างกัน คู่กรณีต่างกัน อำนาจพิเศษของฝ่ายปกครอง และผลทางกฎหมายต่างกัน"},
            {"q":"เอกสิทธิ์ของฝ่ายปกครองมีอะไรบ้าง?","a":"กระทำไปได้ก่อน ยกเลิกสัญญาฝ่ายเดียวได้ แก้ไขสัญญาได้ (แต่ต้องคำนึงถึงสาธารณประโยชน์)"},
            
            // ========== หลักนิติรัฐและหลักนิติธรรม (15 ข้อ) ==========
            {"q":"หลักนิติรัฐ (Rechtsstaat) มีความหมายว่าอะไร?","a":"หลักการที่ว่า \"รัฐต้องอยู่ภายใต้กฎหมาย\" การใช้อำนาจรัฐทุกประเภทต้องมีกฎหมายรองรับ"},
            {"q":"หลักนิติรัฐมีสาระสำคัญกี่ประการ? อะไรบ้าง?","a":"3 ประการ: 1.จำกัดอำนาจรัฐ 2.คุ้มครองสิทธิเสรีภาพ 3.กฎหมายต้องถูกต้อง เป็นธรรม สมเหตุสมผล"},
            {"q":"หลักนิติรัฐได้รับอิทธิพลจากนักกฎหมายคนใด?","a":"กาเร เดอ มัลแบร์ (นักกฎหมายฝรั่งเศส)"},
            {"q":"รัชกาลที่ 4 ทรงเรียกการปกครองโดยกฎหมายว่าอะไร?","a":"\"ระบบนับถือกฎหมาย\""},
            {"q":"องค์ประกอบรูปแบบของหลักนิติรัฐมีกี่หลัก?","a":"4 หลัก: 1.หลักการแบ่งแยกอำนาจ 2.หลักความชอบด้วยกฎหมาย 3.หลักประกันสิทธิในกระบวนการพิจารณา 4.หลักประกันสิทธิเข้าถึงกระบวนการยุติธรรม"},
            {"q":"องค์ประกอบเนื้อหาของหลักนิติรัฐมีกี่หลัก?","a":"4 หลัก: 1.หลักประกันสิทธิเสรีภาพขั้นพื้นฐาน 2.หลักความชัดเจนแน่นอนของกฎหมาย 3.หลักกฎหมายห้ามมีผลย้อนหลัง 4.หลักความพอสมควรแก่เหตุ"},
            {"q":"หลักนิติรัฐ ใช้ในระบบกฎหมายใด?","a":"ระบบ Civil Law (ภาคพื้นยุโรป) เช่น ฝรั่งเศส เยอรมนี ไทย"},
            {"q":"หลักนิติธรรม (Rule of Law) มาจากใคร?","a":"Albert V. Dicey นักกฎหมายชาวอังกฤษ"},
            {"q":"หลักนิติธรรม (Rule of Law) ใช้ในประเทศใด?","a":"ระบบ Common Law เช่น อังกฤษ สหรัฐอเมริกา"},
            {"q":"The Rule of Law มีความสำคัญ 3 ประการอะไรบ้าง?","a":"1.Supremacy of Law (กฎหมายเป็นใหญ่) 2.Equality before the Law (เสมอภาคต่อหน้ากฎหมาย) 3.Constitution based on Individual Rights (รัฐธรรมนูญตั้งอยู่บนสิทธิปัจเจกชน)"},
            {"q":"ข้อแตกต่างระหว่างหลักนิติรัฐกับหลักนิติธรรมในเรื่องบ่อเกิดกฎหมาย?","a":"หลักนิติรัฐ: Civil Law - ตัวบทกฎหมาย (ประมวลกฎหมาย) | หลักนิติธรรม: Common Law - คำพิพากษา (จารีตประเพณี)"},
            {"q":"ข้อแตกต่างระหว่างหลักนิติรัฐกับหลักนิติธรรมในเรื่องการคุ้มครองสิทธิ?","a":"หลักนิติรัฐ: บัญญัติไว้ในรัฐธรรมนูญ | หลักนิติธรรม: คุ้มครองโดยศาล"},
            {"q":"ข้อแตกต่างระหว่างหลักนิติรัฐกับหลักนิติธรรมในเรื่องศาลปกครอง?","a":"หลักนิติรัฐ: มีศาลปกครอง (ระบบศาลคู่) | หลักนิติธรรม: ไม่มีศาลปกครอง (ศาลยุติธรรมเดียว)"},
            {"q":"ข้อแตกต่างระหว่างหลักนิติรัฐกับหลักนิติธรรมในเรื่องการควบคุมการตรากฎหมาย?","a":"หลักนิติรัฐ: ศาลรัฐธรรมนูญตรวจสอบ | หลักนิติธรรม: รัฐสภาเป็นรัฐาธิปัตย์"},
            {"q":"วิธีจำความแตกต่างหลักนิติรัฐกับหลักนิติธรรมคืออะไร?","a":"นิติรัฐ = ภาคพื้นยุโรป = มีศาลปกครอง = Civil Law | นิติธรรม = อังกฤษ = ศาลเดียว = Common Law"},
            
            // ========== รัฐและอำนาจอธิปไตย (12 ข้อ) ==========
            {"q":"องค์ประกอบของรัฐมีกี่ประการ? อะไรบ้าง?","a":"4 ประการ: 1.ประชากร (Population) 2.ดินแดน (Territory) 3.รัฐบาล (Government) 4.อำนาจอธิปไตย (Sovereignty)"},
            {"q":"ลักษณะสำคัญของอำนาจอธิปไตย 4 ประการคืออะไร?","a":"1.ความเด็ดขาด (Absoluteness) 2.ครอบคลุมทั่วไป (Comprehensiveness) 3.ความถาวร (Permanence) 4.ไม่แบ่งแยก (Indivisibility)"},
            {"q":"วิธีจำลักษณะอำนาจอธิปไตยคืออะไร?","a":"\"เด็ด-ครอบ-ถาวร-ไม่แยก\""},
            {"q":"วิธีจำองค์ประกอบของรัฐคืออะไร?","a":"\"ประ-ดิน-รัฐ-อธิป\" (ประชากร-ดินแดน-รัฐบาล-อธิปไตย)"},
            {"q":"ประเทศไทยมีรูปแบบของรัฐเป็นแบบใด?","a":"รัฐเดี่ยว (Unitary State) - มีรัฐบาลกลางเป็นองค์กรเดียวที่มีอำนาจสูงสุด"},
            {"q":"สหพันธรัฐ (Federation) คืออะไร?","a":"รัฐรวมที่รวมตัวโดยรัฐธรรมนูญสร้างรัฐใหม่ รัฐสมาชิกสละอำนาจอธิปไตยบางส่วน เช่น สหรัฐอเมริกา ออสเตรเลีย เยอรมนี"},
            {"q":"สมาพันธรัฐ (Confederation) คืออะไร?","a":"รัฐรวมที่เกิดจากความร่วมมือตามสนธิสัญญา รัฐสมาชิกยังมีอิสระ เช่น สหภาพยุโรป (EU)"},
            {"q":"หน้าที่ของรัฐสมัยใหม่มีกี่ประการ?","a":"3 ประการ: 1.หน้าที่ในการปกครอง 2.หน้าที่ในการบริหารจัดการ 3.หน้าที่ในการดูแลคุณภาพชีวิต"},
            {"q":"การเมืองแบบมีส่วนร่วม (Participative Politics) มีวิธีการใดบ้าง?","a":"1.การเรียกคืนอำนาจ (Recall) 2.การริเริ่มเสนอแนะ (Initiatives) 3.การทำประชาพิจารณ์ 4.การแสดงประชามติ (Referendum)"},
            {"q":"อำนาจนิติบัญญัติเป็นของใคร?","a":"รัฐสภา (ส.ส. และ ส.ว.) ทำหน้าที่ออกกฎหมาย"},
            {"q":"อำนาจบริหารเป็นของใคร?","a":"คณะรัฐมนตรีและข้าราชการ ทำหน้าที่บริหารปกครองประเทศตามกฎหมาย"},
            {"q":"อำนาจตุลาการเป็นของใคร?","a":"ศาล ทำหน้าที่ตัดสินคดี ข้อขัดแย้งตามกฎหมาย"},
            
            // ========== ระบบศาล (10 ข้อ) ==========
            {"q":"ประเทศไทยมีระบบศาลกี่ระบบ? อะไรบ้าง?","a":"4 ระบบ: 1.ศาลรัฐธรรมนูญ 2.ศาลยุติธรรม 3.ศาลปกครอง 4.ศาลทหาร"},
            {"q":"ศาลรัฐธรรมนูญมีหน้าที่อะไร?","a":"วินิจฉัยว่ากฎหมายขัดรัฐธรรมนูญหรือไม่ และวินิจฉัยปัญหาอำนาจหน้าที่ขององค์กรตามรัฐธรรมนูญ"},
            {"q":"ศาลรัฐธรรมนูญมีตุลาการกี่คน?","a":"9 คน"},
            {"q":"ศาลยุติธรรมมีโครงสร้างอย่างไร?","a":"ศาลชั้นต้น → ศาลอุทธรณ์ → ศาลฎีกา"},
            {"q":"ศาลปกครองมีหน้าที่อะไร?","a":"พิจารณาคดีพิพาทระหว่างรัฐกับเอกชน และเพิกถอนกฎหรือคำสั่งทางปกครองที่ไม่ชอบ"},
            {"q":"ศาลปกครองใช้ระบบพิจารณาคดีแบบใด?","a":"ระบบไต่สวน"},
            {"q":"พ.ร.บ.จัดตั้งศาลปกครองฯ ประกาศใช้เมื่อปีใด?","a":"พ.ศ. 2542"},
            {"q":"ศาลทหารมีหน้าที่อะไร?","a":"พิจารณาคดีอาญาที่จำเลยเป็นทหารประจำการ"},
            {"q":"ระบบศาลเดี่ยวคืออะไร?","a":"ศาลยุติธรรมมีอำนาจพิจารณาทุกประเภทคดี ไม่มีศาลปกครอง ใช้ใน Common Law (อังกฤษ สหรัฐฯ)"},
            {"q":"ระบบศาลคู่คืออะไร?","a":"แยกศาลปกครองออกจากศาลยุติธรรม ใช้ใน Civil Law (ฝรั่งเศส เยอรมนี ไทย)"},
            
            // ========== การควบคุมอำนาจรัฐ (12 ข้อ) ==========
            {"q":"การควบคุมอำนาจรัฐแบ่งเป็นกี่ประเภท?","a":"2 ประเภท: 1.การควบคุมแบบป้องกัน (ก่อนดำเนินการ) 2.การควบคุมแบบแก้ไข (หลังดำเนินการ)"},
            {"q":"การควบคุมโดยองค์กรภายในมีวิธีการใด?","a":"การร้องทุกข์ การอุทธรณ์ การควบคุมโดยองค์กรทางปกครอง"},
            {"q":"การควบคุมโดยองค์กรภายนอกมีอะไรบ้าง?","a":"1.ทางการเมือง (รัฐสภา) 2.ผู้ตรวจการแผ่นดิน 3.องค์กรตุลาการ (ศาล)"},
            {"q":"การควบคุมทางการเมืองโดยรัฐสภามีวิธีการใด?","a":"กระทู้ถาม อภิปรายไม่ไว้วางใจ ยุบสภา"},
            {"q":"ผู้ตรวจการแผ่นดิน (Ombudsman) มีอำนาจอะไร?","a":"รายงานและเผยแพร่ (ไม่มีอำนาจสั่ง)"},
            {"q":"องค์กรใดมีประสิทธิภาพมากที่สุดในการควบคุมอำนาจรัฐ?","a":"ศาลปกครอง เพราะเป็นกลาง เชี่ยวชาญเฉพาะด้าน มีอำนาจเพิกถอนคำสั่งได้ และคำพิพากษามีผลบังคับทางกฎหมาย"},
            {"q":"หลักบริการสาธารณะ 4 ประการมีอะไรบ้าง?","a":"1.หลักความต่อเนื่อง 2.หลักความเสมอภาค 3.หลักการปรับปรุงเปลี่ยนแปลง 4.หลักการกำกับดูแลโดยรัฐ"},
            {"q":"วิธีจำหลักบริการสาธารณะคืออะไร?","a":"\"ต่อ-เท่า-เปลี่ยน-คุม\" (ต่อเนื่อง-เท่าเทียม-เปลี่ยนแปลงได้-คุมโดยรัฐ)"},
            {"q":"วิธีจำการควบคุมภายนอก?","a":"\"เมือง-อิสระ-ศาล\" (การเมือง → องค์กรอิสระ → ตุลาการ)"},
            {"q":"หลักการฟังความทั้งสองฝ่ายหมายความว่าอะไร?","a":"ก่อนออกคำสั่งทางปกครอง ต้องให้โอกาสผู้รับผลกระทบชี้แจงและโต้แย้งก่อน"},
            {"q":"สิทธิอุทธรณ์คำสั่งทางปกครองมีระยะเวลาเท่าไร?","a":"ผู้รับคำสั่งมีสิทธิอุทธรณ์ภายใน 15 วัน"},
            {"q":"ประโยชน์สาธารณะคืออะไร?","a":"ความต้องการของประชาชนส่วนใหญ่ในสังคม ซึ่งรัฐมีหน้าที่จัดหาหรือดำเนินการให้เกิดขึ้น"},
            
            // ========== การจัดระเบียบบริหารราชการ (14 ข้อ) ==========
            {"q":"การจัดระเบียบบริหารราชการแผ่นดินแบ่งเป็นกี่ส่วน?","a":"3 ส่วน: 1.ส่วนกลาง (กระทรวง ทบวง กรม) 2.ส่วนภูมิภาค (จังหวัด อำเภอ) 3.ส่วนท้องถิ่น (อบจ. เทศบาล อบต.)"},
            {"q":"ส่วนกลางใช้หลักการปกครองแบบใด?","a":"หลักการรวมอำนาจ (Centralization) - อำนาจตัดสินใจอยู่ที่ส่วนกลาง"},
            {"q":"ส่วนภูมิภาคใช้หลักการปกครองแบบใด?","a":"หลักการแบ่งอำนาจ (Deconcentration) - มอบอำนาจบางส่วนแต่ยังอยู่ในบังคับบัญชาของส่วนกลาง"},
            {"q":"ส่วนท้องถิ่นใช้หลักการปกครองแบบใด?","a":"หลักการกระจายอำนาจ (Decentralization) - มีอิสระ อยู่ในการกำกับดูแลเท่านั้น"},
            {"q":"ความแตกต่างระหว่างการควบคุมบังคับบัญชาและการควบคุมกำกับดูแลคืออะไร?","a":"บังคับบัญชา: กลับ แก้ ยกเลิก เพิกถอนคำสั่งได้ | กำกับดูแล: ดูเฉพาะความชอบด้วยกฎหมาย ไม่แทรกแซงดุลพินิจ"},
            {"q":"โครงสร้างส่วนภูมิภาคมีลำดับอย่างไร?","a":"จังหวัด (ผวจ.) > อำเภอ (นอภ.) > ตำบล (กำนัน) > หมู่บ้าน (ผญบ.)"},
            {"q":"องค์กรปกครองส่วนท้องถิ่นแบบทั่วไปมีอะไรบ้าง?","a":"อบจ. (องค์การบริหารส่วนจังหวัด), เทศบาล, อบต. (องค์การบริหารส่วนตำบล)"},
            {"q":"องค์กรปกครองส่วนท้องถิ่นแบบพิเศษมีอะไรบ้าง?","a":"กทม. (กรุงเทพมหานคร), เมืองพัทยา"},
            {"q":"ฝ่ายบริหารและฝ่ายนิติบัญญัติของ อบจ. คือใคร?","a":"บริหาร: นายก อบจ. | นิติบัญญัติ: ส.อบจ. | ออก: ข้อบัญญัติ อบจ."},
            {"q":"ฝ่ายบริหารและฝ่ายนิติบัญญัติของเทศบาลคือใคร?","a":"บริหาร: นายกเทศมนตรี | นิติบัญญัติ: สท. | ออก: เทศบัญญัติ"},
            {"q":"ฝ่ายบริหารและฝ่ายนิติบัญญัติของ กทม. คือใคร?","a":"บริหาร: ผู้ว่าราชการ กทม. | นิติบัญญัติ: ส.ก. | ออก: ข้อบัญญัติ กทม."},
            {"q":"เทศบาลนครต้องมีประชากรเท่าไร?","a":"50,000 คนขึ้นไป + รายได้สมควร"},
            {"q":"เทศบาลเมืองต้องมีประชากรเท่าไร?","a":"10,000 คนขึ้นไป หรือที่ตั้งศาลากลางจังหวัด + รายได้สมควร"},
            {"q":"วิธีจำการจัดระเบียบบริหารราชการคืออะไร?","a":"\"กลาง-รวม / ภูมิภาค-แบ่ง / ท้องถิ่น-กระจาย\" และ \"กลาง→บังคับบัญชา→ภูมิภาค→กำกับดูแล→ท้องถิ่น\""},
            
            // ========== กฎหมายสำคัญและเทคนิคสอบ (12 ข้อ) ==========
            {"q":"พ.ร.บ.ความรับผิดทางละเมิดของเจ้าหน้าที่ พ.ศ. 2539 มีหลักการสำคัญอย่างไร?","a":"เจ้าหน้าที่ละเมิดในการปฏิบัติหน้าที่ → หน่วยงานรัฐเป็นผู้รับผิด ผู้เสียหายฟ้องหน่วยงานรัฐ ไม่ใช่ฟ้องเจ้าหน้าที่โดยตรง"},
            {"q":"หน่วยงานรัฐไล่เบี้ยเจ้าหน้าที่ได้ในกรณีใด?","a":"หากเจ้าหน้าที่จงใจหรือประมาทเลินเล่ออย่างร้ายแรง"},
            {"q":"พ.ร.บ.วิธีปฏิบัติราชการทางปกครอง พ.ศ. 2539 กำหนดเรื่องใด?","a":"กำหนดขั้นตอนการปฏิบัติราชการทางปกครอง การออกคำสั่งทางปกครอง หลักการฟังความทั้งสองฝ่าย"},
            {"q":"พ.ร.บ.จัดตั้งศาลปกครองฯ พ.ศ. 2542 เกี่ยวข้องกับคดีประเภทใด?","a":"คดีกระทำโดยไม่ชอบด้วยกฎหมาย ละเลยต่อหน้าที่ ละเมิดทางปกครอง สัญญาทางปกครอง"},
            {"q":"อำนาจผูกพันคืออะไร?","a":"อำนาจที่ต้องปฏิบัติเมื่อมีข้อเท็จจริงตามกฎหมาย เช่น เมื่อครบเงื่อนไขการสมรส ต้องรับจดทะเบียน"},
            {"q":"อำนาจดุลพินิจคืออะไร?","a":"อำนาจที่เลือกตัดสินใจได้ตามที่กฎหมายให้อำนาจ มีอิสระในการเลือกทางใดทางหนึ่ง เช่น การอนุญาตก่อสร้าง"},
            {"q":"องค์กรอิสระตามรัฐธรรมนูญมีอะไรบ้าง?","a":"กกต., ผู้ตรวจการแผ่นดิน, ป.ป.ช., ผู้ตรวจเงินแผ่นดิน, กสม."},
            {"q":"IRAC Method ในการตอบข้อสอบอัตนัยคืออะไร?","a":"I=Issue (ประเด็น) R=Rule (หลักกฎหมาย) A=Application (ปรับใช้) C=Conclusion (สรุป)"},
            {"q":"หลักความเป็นกฎหมายสูงสุดหมายความว่าอะไร?","a":"กฎหมายใดขัดหรือแย้งต่อรัฐธรรมนูญ กฎหมายนั้นเป็นโมฆะ"},
            {"q":"ใครทำหน้าที่คุ้มครองความเป็นกฎหมายสูงสุดของรัฐธรรมนูญ?","a":"ศาลรัฐธรรมนูญ"},
            {"q":"ใครเป็นบิดาแห่งกฎหมายไทย?","a":"กรมหลวงราชบุรีดิเรกฤทธิ์ (พระองค์เจ้ารพีพัฒนศักดิ์)"},
            {"q":"ใครได้รับการยกย่องเป็นพระบิดาแห่งกฎหมายมหาชนของไทย?","a":"รัชกาลที่ 5"}
        ];
        
        // =====================================================
        // 🎮 QUIZ LOGIC
        // =====================================================
        let currentQuestions = [];
        let currentIndex = 0;
        let viewedAnswers = new Set();
        
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
        
        function initQuiz() {
            // Shuffle and pick 30 random questions
            currentQuestions = shuffleArray(questionBank).slice(0, 30);
            currentIndex = 0;
            viewedAnswers = new Set();
            document.getElementById('stockCount').textContent = questionBank.length;
            updateCard();
            updateStats();
        }
        
        function updateCard() {
            const card = currentQuestions[currentIndex];
            document.getElementById('questionNum').textContent = `Q.${currentIndex + 1}`;
            document.getElementById('answerNum').textContent = `Q.${currentIndex + 1}`;
            document.getElementById('questionText').textContent = card.q;
            document.getElementById('answerText').textContent = card.a;
            document.getElementById('flashcard').classList.remove('flipped');
        }
        
        function updateStats() {
            document.getElementById('currentCard').textContent = currentIndex + 1;
            document.getElementById('totalCards').textContent = currentQuestions.length;
            document.getElementById('viewedCount').textContent = viewedAnswers.size;
            const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }
        
        function flipCard() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.toggle('flipped');
            if (flashcard.classList.contains('flipped')) {
                viewedAnswers.add(currentIndex);
                updateStats();
            }
        }
        
        function nextCard() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                updateCard();
                updateStats();
            }
        }
        
        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
                updateStats();
            }
        }
        
        function shuffleCards() { initQuiz(); }
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
            if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
        });
        
        // Auto-init on page load (random every refresh)
        initQuiz();
    </script>
</body>
</html>
