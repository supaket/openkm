<script type="text/babel">
const { ConfigProvider, theme, Layout, Tabs, Typography, Card, Tag, Table, Space, Button, Row, Col, Divider, Alert, Statistic, Flex, Progress, Collapse, Checkbox } = antd;

const chapters = [
  { file:'CVP_Ch4_Interactive_Review.html', ch:'4', color:C.blue,

/* ---------- ปูพื้นข้ามบท (สำหรับคนไม่มีพื้นเลย) ---------- */
const FoundationCard = ({icon, title, color, children, uses}) => (
  <Card size="small" className="fadein" style={{marginBottom:12, background:C.white, borderColor:color, borderLeft:`5px solid ${color}`}}>
    <Space align="start">
      <div style={{fontSize:26}}>{icon}</div>
      <div>
        <Text strong style={{color, fontSize:15}}>{title}</Text>
        {children}
        <div style={{marginTop:6}}><Text style={{color:C.text3, fontSize:12}}>ใช้ในบท: {uses}</Text></div>
      </div>
    </Space>
  </Card>
);
const CostSplitDemo = () => {
  const [units, setUnits] = useState(100);
  const rent = 9000, perCup = 40;
  const total = rent + perCup*units;
  return (
    <Card size="small" style={{background:C.surface3, borderColor:C.gold, marginTop:8}}>
      <Text style={{color:C.text2}}>ร้านกาแฟขายได้ <Text strong style={{color:C.goldDark}}>{units.toLocaleString()}</Text> แก้ว/เดือน</Text>
      <input type="range" min="0" max="400" value={units} onChange={e=>setUnits(+e.target.value)}
        style={{width:'100%', height:36, touchAction:'none'}}/>
      <Row gutter={8}>
        <Col span={8}><Statistic title="ค่าเช่า (คงที่)" value={rent.toLocaleString()} valueStyle={{fontSize:15, color:C.purple}}/></Col>
        <Col span={8}><Statistic title="ค่าของ (ผันแปร)" value={(perCup*units).toLocaleString()} valueStyle={{fontSize:15, color:C.red}}/></Col>
        <Col span={8}><Statistic title="ต้นทุนรวม" value={total.toLocaleString()} valueStyle={{fontSize:15, color:C.text}}/></Col>
      </Row>
      <Text style={{color:C.text3, fontSize:12}}>ลากดู: ค่าเช่านิ่งเท่าเดิมเสมอ (คงที่) ส่วนค่าของโตตามจำนวนแก้ว (ผันแปร) — เข้าใจสองคำนี้ = เข้าใจครึ่งวิชา</Text>
    </Card>
  );
};
const FoundationTab = () => (
  <div>
    <Alert type="success" style={{marginBottom:12}} message={<Text strong>ยังไม่เคยเรียนบัญชีบริหารมาก่อน? อ่านตรงนี้ให้จบก่อน แล้วทุกบทจะง่ายขึ้นทันที — 6 แนวคิดที่เป็นรากของทั้ง 5 บท</Text>}/>
    <FoundationCard icon="⚖️" title="1. ต้นทุนคงที่ vs ต้นทุนผันแปร" color={C.purple} uses="Ch.4, 9, 13">
      <Paragraph style={{color:C.text, margin:'4px 0'}}>
        ต้นทุน <Text strong>คงที่ (fixed)</Text> ไม่เปลี่ยนตามจำนวนที่ผลิต/ขาย เช่น ค่าเช่า เงินเดือนประจำ ค่าเสื่อมเครื่องจักร ·
        ต้นทุน <Text strong>ผันแปร (variable)</Text> โตตามจำนวน เช่น วัตถุดิบ ค่าคอมมิชชั่น — แยกสองอย่างนี้ให้ออกคือด่านแรกของแทบทุกโจทย์
      </Paragraph>
      <CostSplitDemo/>
    </FoundationCard>
    <FoundationCard icon="💵" title="2. Contribution Margin (กำไรส่วนเกิน)" color={C.cyan} uses="Ch.4, 13">
      <Paragraph style={{color:C.text, margin:'4px 0'}}>
        CM = ราคาขาย − ต้นทุนผันแปร = เงินที่เหลือจากการขาย 1 หน่วย ไว้ "ช่วยจ่าย" ต้นทุนคงที่ก่อน พอจ่ายครบที่เหลือคือกำไร ·
        กาแฟแก้วละ 100 ต้นทุนของ 40 → CM = 60 บาท/แก้ว · ขายกี่แก้วถึงพอจ่ายค่าเช่า 9,000? = 9,000 ÷ 60 = 150 แก้ว (นี่คือจุดคุ้มทุน)
      </Paragraph>
    </FoundationCard>
    <FoundationCard icon="🏦" title="3. กำไร ไม่เท่ากับ เงินสด" color={C.blue} uses="Ch.9, 14">
      <Paragraph style={{color:C.text, margin:'4px 0'}}>
        กำไรทางบัญชีนับตอน "ขายได้" แม้ยังไม่ได้เงิน และหักค่าเสื่อมที่ไม่มีเงินออกจริง · เงินสดนับตอน "เงินเข้า-ออกจริง" ·
        ธุรกิจขายดีแต่ล้มได้ถ้าลูกค้าจ่ายช้า — เพราะเหตุนี้ Ch.9 จึงมีทั้งงบกำไรและงบเงินสดแยกกัน และ Ch.14 ใช้ "กระแสเงินสด" ไม่ใช่กำไร
      </Paragraph>
    </FoundationCard>
    <FoundationCard icon="⏳" title="4. เงินวันนี้ มีค่ามากกว่าเงินอนาคต (Time Value of Money)" color={C.gold} uses="Ch.14">
      <Paragraph style={{color:C.text, margin:'4px 0'}}>
        เงิน 100 วันนี้ เอาไปฝาก/ลงทุนได้ ปีหน้าจึงกลายเป็นมากกว่า 100 · ดังนั้นจะเทียบเงินคนละปีต้อง "ดึงกลับมาเป็นค่าวันนี้" ก่อน (คิดลด/discount) ·
        ตาราง PV ในข้อสอบก็คือค่า 1 ÷ (1+r) ยกกำลังจำนวนปี ที่คำนวณไว้ให้แล้ว
      </Paragraph>
    </FoundationCard>
    <FoundationCard icon="🗑️" title="5. ต้นทุนที่ 'เกี่ยว' กับการตัดสินใจ (Relevant Cost)" color={C.red} uses="Ch.12, 13">
      <Paragraph style={{color:C.text, margin:'4px 0'}}>
        ต้นทุนจะเกี่ยวก็ต่อเมื่อ (1) เกิดในอนาคต และ (2) ต่างกันระหว่างทางเลือก · เงินที่จ่ายไปแล้ว (sunk cost เช่น ราคาเครื่องจักรเก่า) ไม่มีวันเกี่ยว ·
        ต้นทุนที่ถูก "ปันส่วน" มา (common cost) ก็มักไม่เกี่ยว — โยนทิ้งจากการเทียบได้เลย
      </Paragraph>
    </FoundationCard>
    <FoundationCard icon="🔢" title="6. อ่านตัวเลข 'ต่อหน่วย' กับ 'ก้อนรวม' ให้แยกออก" color={C.green} uses="ทุกบท">
      <Paragraph style={{color:C.text, margin:'4px 0'}}>
        ตัวหลอกยอดฮิต: "fixed cost ต่อหน่วย" ดูเหมือนผันแปรแต่ก้อนรวมไม่เปลี่ยน — อย่าเอาไปคูณจำนวนหน่วยเวลาตัดสินใจ ·
        เคล็ด: เจอเลขต่อหน่วยเมื่อไร ลองแปลงกลับเป็นก้อนรวมก่อนคิดเสมอ (เจอบ่อยมากใน Ch.13 special order และ Ch.4)
      </Paragraph>
    </FoundationCard>
    <Alert type="info" message={<span><Text strong>พร้อมแล้ว? </Text>กลับไปคลิกการ์ดบทด้านบน เริ่มที่ Ch.4 (CVP) ซึ่งใช้แนวคิด 1–2 ตรง ๆ แล้วไล่ไป 9 → 12 → 13 → 14</span>}/>
  </div>

    {t:'NPV vs IRR', f:'ขัดกันเมื่อจัดอันดับ → เชื่อ NPV เสมอ', e:'เงินจริง > เปอร์เซ็นต์'},
    {t:'ไส้ในโจทย์ NPV', f:'ปี 0: เครื่อง + working capital | ปีท้าย: CF + ซาก + WC คืน', e:'CS 14.3 → 117,968'},
  ],
};
const FormulaSheet = () => {
  const items = chapters.map(c => ({
    key:c.ch,
    label: <Text strong style={{color:c.color}}>{c.icon} Ch.{c.ch} — {c.title}</Text>,
    children: <Table size="small" pagination={false} columns={formulaCol} dataSource={sheets[c.ch].map((r,i)=>({...r,key:i}))}/>,
  }));
  return (
    <div>
      <Alert type="warning" style={{marginBottom:12}} message={<Text strong>ชีตสูตรรวมทุกบท — เปิดหน้านี้ค้างไว้ตอนสอบ (ถ้าอนุญาต) หรือใช้ทวนรอบสุดท้ายก่อนเข้าห้อง</Text>}/>
      <Collapse items={items} defaultActiveKey={['4']} accordion={false}/>
    </div>
  );
};

const StudyPlan = () => (

    <Row gutter={[12,12]}>
      {[
        {n:'รอบ 1 · เข้าใจ', d:'เปิดแท็บ "🌱 ปูพื้นก่อน" ของทุกบท เล่นตัวจำลอง (ร้านกาแฟ, ถังสินค้า, ไทม์แมชชีน) จนเห็นภาพ ไม่ต้องท่องสูตร', col:C.blue},
        {n:'รอบ 2 · ทำเป็น', d:'แท็บ "🧪 ห้องทดลอง" เลื่อน slider หา "จุดที่คำตอบพลิก" + แท็บ "🎓 เคส" ปิดเฉลยแล้วลองตอบ cold call เอง', col:C.green},
        {n:'รอบ 3 · จำแม่น', d:'แท็บ "🎴 Flashcard" กรองเฉพาะ ⭐⭐⭐ และแนวข้อสอบ จับเวลาทำจนตอบถูกเกิน 90%', col:C.purple},
        {n:'ก่อนเข้าห้อง', d:'อ่านชีตสูตรรวม (แท็บข้าง ๆ) + ตาราง "กับดักรวม" ด้านล่าง 1 รอบ — โฟกัสจุดที่คนพลาดบ่อย', col:C.red},
      ].map((s,i)=>(
        <Col xs={24} md={12} key={i}>
          <Card size="small" style={{background:C.white, borderColor:s.col, borderLeft:`5px solid ${s.col}`, height:'100%'}}>
            <Text strong style={{color:s.col}}>{s.n}</Text><br/>
            <Text style={{color:C.text}}>{s.d}</Text>
          </Card>
        </Col>
      ))}
    </Row>
    <Card size="small" style={{background:C.surface3, borderColor:C.borderDark, marginTop:12}}>
      <Text strong style={{color:C.text2}}>เคล็ดอ่านโจทย์ 10 วินาทีแรก (ใช้ได้ทุกบท): </Text>
      <Text style={{color:C.text}}>1) โจทย์ให้ "เงินสด" หรือ "กำไร"? 2) ถามอะไร (หน่วย/เงิน/รับ-ไม่รับ/เลิก-ไม่เลิก)? 3) มีตัวหลอกไหม (fixed ต่อหน่วย, sunk cost, common cost ที่ปันส่วน, joint cost)? แล้วค่อยเลือกสูตร</Text>
    </Card>
  </div>
);

/* ---------- Cross-chapter traps ---------- */
const traps = [
  {ch:'4', t:'หาร BE ด้วย VC ratio', r:'ต้องหารด้วย CM ratio (VC ratio ไว้เช็ค 1−CMratio)'},
  {ch:'4', t:'เอายอดขายที่วางแผนมาหา BE', r:'BE ใช้แค่ F, P, V เท่านั้น'},
  {ch:'9', t:'คอลัมน์ปี = 4 ไตรมาสบวกกัน', r:'ใช้ EI ปลายปี และ BI ต้นปี เท่านั้น'},
  {ch:'9', t:'ใส่ค่าเสื่อมในงบเงินสด', r:'ค่าเสื่อมไม่ใช่เงินสด ตัดออกจาก disbursements'},
  {ch:'12', t:'ตัดสินแผนกด้วยบรรทัดสุดท้าย', r:'ใช้ segment margin (ก่อน common cost)'},
  {ch:'12', t:'สลับ floor/ceiling ของ TP', r:'คนขายตั้ง floor · คนซื้อตั้ง ceiling'},
  {ch:'13', t:'เทียบ special order กับ full cost', r:'เทียบกับต้นทุนส่วนเพิ่ม (11 > 8.25 รับได้)'},
  {ch:'13', t:'ใช้ allocated joint cost ตัดสินขาย/แปรรูป', r:'joint cost เป็น sunk — เทียบ incremental เท่านั้น'},
  {ch:'13', t:'เรียง product mix ด้วย CM ต่อชิ้น', r:'เรียงด้วย CM ต่อหน่วยทรัพยากรที่ขาด'},
  {ch:'14', t:'เอาค่าเสื่อมไปหักใน NPV/payback', r:'ค่าเสื่อมใช้เฉพาะ ARR — ที่เหลือใช้เงินสด'},
  {ch:'14', t:'จัดอันดับโครงการด้วย IRR', r:'ใช้ NPV (จำนวนเงิน) เมื่อเลือกได้อันเดียว'},
  {ch:'14', t:'ลืม working capital คืนปีสุดท้าย', r:'WC ลงปี 0 และได้คืนปีสุดท้าย + ซาก'},
];
const chColor = {'4':C.blue,'9':C.green,'12':C.purple,'13':C.red,'14':C.cyan};
const TrapTable = () => {
  const [f, setF] = useState('all');
  const rows = traps.filter(x => f==='all' || x.ch===f);
  return (
    <div>
      <Alert type="error" style={{marginBottom:12}} message={<Text strong>กับดักรวมทุกบท — จุดที่ทำให้เสียคะแนนบ่อยที่สุด อ่านซ้ำก่อนสอบ</Text>}/>
      <Flex gap={6} wrap="wrap" style={{marginBottom:10}}>
        <Button size="small" type={f==='all'?'primary':'default'} onClick={()=>setF('all')}>ทั้งหมด</Button>
        {chapters.map(c=><Button key={c.ch} size="small" type={f===c.ch?'primary':'default'} onClick={()=>setF(c.ch)} style={f===c.ch?{background:c.color,borderColor:c.color}:{}}>Ch.{c.ch}</Button>)}
      </Flex>
      <Table size="small" pagination={false} columns={[
        {title:'บท', dataIndex:'ch', key:'ch', width:60, render:ch=><Tag style={{color:chColor[ch],borderColor:chColor[ch]}}>Ch.{ch}</Tag>},
        {title:'❌ ที่คนพลาด', dataIndex:'t', key:'t', render:t=><Text style={{color:C.red}}>{t}</Text>},
        {title:'✅ ที่ถูกต้อง', dataIndex:'r', key:'r', render:t=><Text style={{color:C.green}}>{t}</Text>},
      ]} dataSource={rows.map((r,i)=>({...r,key:i}))}/>
    </div>
  );
};

/* ---------- Readiness checklist ---------- */
const checkItems = [
  'Ch.4 — หา BE ทั้งหน่วยและยอดขายได้ + target profit + แยก multi-product',
  'Ch.4 — อธิบาย margin of safety และ DOL ได้',
  'Ch.9 — ทำ production & DM purchases budget (ขาย+EI−BI) ได้',
  'Ch.9 — ทำ cash budget โดยตัดค่าเสื่อม + schedule เก็บเงิน/จ่ายเงิน',
  'Ch.12 — คำนวณ ROI (margin×turnover), RI, EVA ได้',
  'Ch.12 — หา bargaining range ของ transfer price ได้',
  'Ch.13 — แยก relevant/irrelevant + ทำครบ 4 เคส (SO/MoB/KoD/PF)',
  'Ch.13 — product mix ด้วยทรัพยากรจำกัด + pricing',
  'Ch.14 — payback, ARR, NPV, IRR จากตาราง',
  'Ch.14 — อธิบายว่าทำไม NPV ชนะ IRR เมื่อโครงการขัดกัน',
];
const Readiness = () => {
  const [done, setDone] = useState([]);
  const pct = Math.round(done.length / checkItems.length * 100);
  return (
    <div>
      <Alert type="success" style={{marginBottom:12}} message={<Text strong>เช็กความพร้อม — ติ๊กหัวข้อที่ทำได้เองโดยไม่เปิดเฉลย</Text>}/>
      <Progress percent={pct} strokeColor={pct===100?C.green:C.gold} style={{marginBottom:12}}/>
      {pct===100 && <Alert type="success" style={{marginBottom:12}} message="พร้อมสอบแล้ว! ทวนกับดักรวมอีกรอบแล้วพักผ่อนให้พอ"/>}
      <Space direction="vertical" style={{width:'100%'}}>
        {checkItems.map((it,i)=>(
          <Card key={i} size="small" style={{background: done.includes(i)?C.greenBg:C.white, borderColor: done.includes(i)?C.green:C.border}}>
            <Checkbox checked={done.includes(i)} onChange={e=>setDone(d=> e.target.checked ? [...d,i] : d.filter(x=>x!==i))}>
              <Text style={{color:C.text}}>{it}</Text>
            </Checkbox>
          </Card>
        ))}
      </Space>
    </div>
  );
};

        <Row gutter={[16,16]} style={{marginBottom:24}}>

        </Row>

        <Tabs centered type="card" defaultActiveKey="found" items={[
          { key:'found', label:'🌱 ปูพื้น', children:<FoundationTab/> },

          รวมจากสไลด์ MA_5e_PPT (Ch.4/9/12/13/14) · ทุกตัวเลขตัวอย่างตรงกับ Cornerstone ในหนังสือ · เปิดในเบราว์เซอร์ใดก็ได้ ใช้ออฟไลน์ได้
        </Text>
      </Layout.Content>
